<!DOCTYPE html>
<html>
<head>  
<meta charset="utf-8">
    <title>Star Test</title>
</head>  
<body>
<canvas id="myDrawing" width="800" height="800">
    <p>Your browser doesn't support canvas</p>
</canvas>

<script type="module">

    import { QuickFont } from '../../dist/draw/QuickFont.js';

    const drawingCanvas = document.getElementById('myDrawing');
    const context = drawingCanvas.getContext('2d');
	context.translate( 300,100 );

    const font = new QuickFont("../../truetypefonts/DiscoMo.ttf");
    font.onFontLoaded().then(() => {
        font.setStyle( 1, "#000000", "#ffffff", .2 );
        // draw();
        setInterval(draw, 1);
    });

    function draw()
    {
        context.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height); 

        font.setStyle( Math.random()*10, "#000000", "#ffffff", 1 );
        font.drawGlyph( 10, 'myDrawing' );

    }

</script>
    
</body>
</html>
