<!DOCTYPE html>
<html>
<head>  
<meta charset="utf-8">
    <title>Spinning Font Test</title>
</head>  
<body>
<canvas id="myDrawing" width="800" height="800">
    <p>Your browser doesn't support canvas</p>
</canvas>

<script type="module">

    import { QuickFont } from '../../dist/draw/QuickFont.js';
    import { Color } from '../../dist/utils/Color.js'

    const drawingCanvas = document.getElementById('myDrawing');
    const context = drawingCanvas.getContext('2d');
	context.translate( 500, 400 );

    const font = new QuickFont("../../truetypefonts/20FACES.TTF");
    font.onFontLoaded().then(() => {
        font.setStyle( 1, "#000000", "#ffffff", .2 );
        // draw();
        setInterval(draw,1);
    });

    function draw()
    {
        for( var i=0; i<20; i++ ){
            var col = Color.rndColor();
            font.setStyle( Math.random()*10, col, "#ffffff", .2 );	
            font.drawGlyph( 52, 'myDrawing' );
            context.rotate(20 * Math.PI / 180);
        }
    }

</script>
    
</body>
</html>
