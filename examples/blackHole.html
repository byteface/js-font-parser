<!DOCTYPE html>
<html>
<head>  
<meta charset="utf-8">
    <title>Drawing Test</title>
</head>  
<body>

<canvas id="myDrawing" width="800" height="800">
    <p>Your browser doesn't support canvas</p>
</canvas>

<script type="module">

    import { CanvasGlyph } from '../../dist/draw/CanvasGlyph.js';
    
    const drawingCanvas = document.getElementById('myDrawing');
    const context = drawingCanvas.getContext('2d');
    context.translate( 400, 300 );

    const font = new CanvasGlyph("../../truetypefonts/DiscoMo.ttf");
    font.onFontLoaded().then(() => {
        font.setStyle(1, "#000000", "#ffffff", 0.2);
        // font.setWobble(20);
        // setInterval(drawIt, 100);
        drawIt();
    });
    
    function drawIt()
    {
        for( var i=0; i<20; i++ ){
            var col = Math.floor(Math.random()*16777215).toString(16);
            font.setStyle( Math.random()*100, "#000000", col, .2 );	
            font.drawGlyph( 27, 'myDrawing' );
            context.rotate(20 * Math.PI / 180);
        }
    }
    
</script>    
    

</body>
</html>
