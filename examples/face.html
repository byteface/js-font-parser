<!DOCTYPE html>
<html>
<head>  
<meta charset="utf-8">
    <title>Another Font Test</title>
</head>  
<body>
<canvas id="myDrawing" width="800" height="800">
    <p>Your browser doesn't support canvas</p>
</canvas>

<script type="module">

    import { QuickFont } from '../../dist/draw/QuickFont.js';
    
    const drawingCanvas = document.getElementById('myDrawing');
    const context = drawingCanvas.getContext('2d');
    context.translate( 200, 300 );

    const font = new QuickFont("../../truetypefonts/20FACES.TTF");
    font.onFontLoaded().then(() => {
        font.setStyle(1, "#000000", "#ffffff", 0.2);
        drawIt();
    });
    
    function drawIt()
    {
        var col = Math.floor(Math.random()*16777215).toString(16);
        font.setStyle( Math.random()*1, "#ff0000", "#ff0000", .1 );	
        context = font.drawGlyph( Math.round(Math.random()*55), 'myDrawing' );
    }
    
</script>
    
</body>
</html>
