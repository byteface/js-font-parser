<!DOCTYPE html>
<html>
<head>  
<meta charset="utf-8">
    <title>Stacking Test</title>
</head>  
<body>
<canvas id="myDrawing" width="800" height="800">
    <p>Your browser doesn't support canvas</p>
</canvas>

<script type="module">

    import { QuickFont } from '../../dist/draw/QuickFont.js';

    const drawingCanvas = document.getElementById('myDrawing');
    const context = drawingCanvas.getContext('2d');
	// context.translate( 500, 400 );

    const font = new QuickFont("../../truetypefonts/DiscoMo.ttf");
    font.onFontLoaded().then(() => {
        font.setStyle(1, "#000000", "#ffffff",1);
        draw();
        // setInterval(draw,1);
    });

    function draw()
    {
        var g = Math.round(Math.random()*100)
        for( var i=0; i<100; i++ ){
            var context = font.drawGlyph(g, 'myDrawing');
            context.translate(1, 1);
        }
    }

</script>
    
</body>
</html>
