<!DOCTYPE HTML>
<html lang="en">

<head>
    <title>Load Example</title>
    <meta charset="utf-8">
</head>

<body>

<script type="text/javascript" src="dist-build/fontparser.min.js"></script>

<script>

    const { FontParserTTF, CanvasRenderer } = window.FontParser;

    FontParserTTF.load("truetypefonts/DiscoMo.ttf").then(font => {
        const drawingCanvas = document.getElementById('myDrawing');
        const context = drawingCanvas.getContext('2d');

        setInterval(() => {
            const glyphIndex = Math.floor(Math.random() * font.getNumGlyphs());
            const glyph = font.getGlyph(glyphIndex);
            if (!glyph) return;

            CanvasRenderer.drawGlyphToContext(context, glyph, {
                x: Math.random() * 900 + 20,
                y: Math.random() * 900 + 20,
                scale: Math.random() * 0.2 + 0.05,
                styles: {
                    lineWidth: Math.random() * 4 + 1,
                    strokeStyle: '#000000',
                    fillStyle: '#' + Math.floor(Math.random()*16777215).toString(16),
                    globalAlpha: Math.random() * 0.9 + 0.1
                }
            });
        }, 150);
    });

</script>

<canvas id="myDrawing" width="1000" height="1000">
<p>Your browser doesn't support canvas</p>
</canvas>

</body>
</html>
