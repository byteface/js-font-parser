name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  package-smoke:
    name: Package Smoke (Node 22)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and pack
        run: |
          npm run build
          npm pack

      - name: Install packed tarball in clean project
        run: |
          PKG_TGZ="$(ls -1 js-font-parser-*.tgz | head -n 1)"
          mkdir -p /tmp/js-font-parser-smoke
          rm -rf /tmp/js-font-parser-smoke/*
          cd /tmp/js-font-parser-smoke
          npm init -y
          npm install "$GITHUB_WORKSPACE/$PKG_TGZ"

      - name: Import package entrypoint
        run: |
          node --input-type=module -e "import('js-font-parser').then((m)=>{ if(!m || !m.FontParser) process.exit(1); }).catch(()=>process.exit(1));"
