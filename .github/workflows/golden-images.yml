name: Golden Images

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      base_sha:
        description: "Base commit SHA (optional; defaults by event)"
        required: false
        type: string
      head_sha:
        description: "Head commit SHA (optional; defaults by event)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  visual-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve SHAs
        id: shas
        shell: bash
        run: |
          BASE_INPUT="${{ github.event.inputs.base_sha || '' }}"
          HEAD_INPUT="${{ github.event.inputs.head_sha || '' }}"

          if [[ -n "$BASE_INPUT" ]]; then
            BASE_SHA="$BASE_INPUT"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.sha }}"
          fi

          if [[ -n "$HEAD_INPUT" ]]; then
            HEAD_SHA="$HEAD_INPUT"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            HEAD_SHA="${{ github.sha }}"
          fi

          echo "base=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "Using base=$BASE_SHA head=$HEAD_SHA"

      - name: Validate golden target set
        run: npm run test:golden:validate

      - name: Detect visual-risk changes
        id: risk
        shell: bash
        run: |
          BASE_SHA="${{ steps.shas.outputs.base }}"
          HEAD_SHA="${{ steps.shas.outputs.head }}"
          CHANGED="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)"

          printf '%s\n' "$CHANGED"

          if printf '%s\n' "$CHANGED" | grep -E -q '^(demos/|tools/|src/layout/|src/render/|src/data/|src/table/|src/utils/|dist-build/|tests/golden/|\.github/workflows/golden-images\.yml)'; then
            echo "run_visual=true" >> "$GITHUB_OUTPUT"
            echo "Visual-risk files changed; running golden compare."
          else
            echo "run_visual=false" >> "$GITHUB_OUTPUT"
            echo "No visual-risk files changed; skipping heavy golden capture."
          fi

      - name: Install Playwright package
        if: steps.risk.outputs.run_visual == 'true'
        run: npm install --no-save playwright

      - name: Install Playwright Chromium
        if: steps.risk.outputs.run_visual == 'true'
        run: npx playwright install --with-deps chromium

      - name: Capture and compare
        if: steps.risk.outputs.run_visual == 'true'
        run: |
          node tests/golden/scripts/between-commits.mjs \
            --base "${{ steps.shas.outputs.base }}" \
            --head "${{ steps.shas.outputs.head }}" \
            --targets tests/golden/targets.json \
            --out tests/golden/diff

      - name: Skip note
        if: steps.risk.outputs.run_visual != 'true'
        run: echo "Golden compare skipped because this PR did not touch visual-risk paths."

      - name: Upload diff artifacts
        if: always() && steps.risk.outputs.run_visual == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: golden-image-diff
          path: |
            tests/golden/diff
