<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Localized Glyph Review</title>
  <style>
    :root { --bg:#f6f4f1; --ink:#1e1f24; --muted:#5e6574; --panel:#fff; --border:#e3e1db; }
    body { margin:0; font-family:"Merriweather", serif; background:var(--bg); color:var(--ink); }
    header { padding:22px 20px 10px; }
    h1 { margin:0 0 6px; font-size:26px; }
    p { margin:0 0 14px; color:var(--muted); }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px; margin:12px 20px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    select, input[type="file"] { padding:8px 10px; border-radius:8px; border:1px solid var(--border); }
    .label { font-size:12px; color:var(--muted); margin-right:6px; }
    canvas { width:100%; height:220px; border:1px dashed #ddd; background:#fff; }
    .glyphs { margin-top:8px; font-size:14px; }
    .glyphs span { display:inline-block; padding:2px 6px; border:1px solid #ddd; border-radius:6px; margin:2px; background:#fff; }
    .note { color:var(--muted); font-size:12px; }
  </style>
</head>
<body>
<div data-nav="main"></div>

  <header>
    <h1>Localized Glyph Review</h1>
    <p>Shows localized fonts and highlights composed characters for visual inspection.</p>
  </header>

  <div class="panel">
    <div class="row">
      <div class="label">Font</div>
      <select id="fontSelect" data-font-source-ui="off"></select>
      <input id="fontFileInput" type="file" accept=".ttf,.otf,.woff,.woff2" />
      <div class="label">Language</div>
      <select id="sampleSelect"></select>
    </div>
    <div class="glyphs" id="highlight"></div>
    <div class="note" id="missingNote"></div>
    <div class="note" id="fontUrl"></div>
  </div>

  <div class="panel">
    <canvas id="preview" width="1200" height="220"></canvas>
  </div>

  <div class="panel">
    <table id="glyphTable" style="width:100%;border-collapse:collapse;font-size:12px">
      <thead>
        <tr>
          <th style="text-align:left;border-bottom:1px solid #eee;padding:6px">#</th>
          <th style="text-align:left;border-bottom:1px solid #eee;padding:6px">Char</th>
          <th style="text-align:left;border-bottom:1px solid #eee;padding:6px">Code</th>
          <th style="text-align:left;border-bottom:1px solid #eee;padding:6px">Glyph</th>
        </tr>
      </thead>
      <tbody id="glyphRows"></tbody>
    </table>
  </div>

  <div class="panel note">
    These samples are meant to surface awkward composites. If a glyph looks off, we can tune the rule.
  </div>

  <script type="module">
    import { FontParser } from "../dist/data/FontParser.js";
    import { CanvasRenderer } from "../dist/render/CanvasRenderer.js";
    import { Table } from "../dist/table/Table.js";
    import { listLanguages, supportsLanguage } from "../dist/utils/LanguageSupport.js";
    import { getFontList } from "./shared/font-catalog.js";
    import { createFontLoader, getSelectedFont, populateFontSelect } from "./shared/font-ui.js";

    const fonts = getFontList('localizedReview');
    const loadFont = createFontLoader((url) => FontParser.load(url));

    const samples = [
      { code: "pl", label: "Polish", text: "Zażółć gęślą jaźń" },
      { code: "cs", label: "Czech", text: "Příliš žluťoučký kůň" },
      { code: "hu", label: "Hungarian", text: "Árvíztűrő tükörfúrógép" },
      { code: "tr", label: "Turkish", text: "İstanbul, ığdır, şehri" },
      { code: "ro", label: "Romanian", text: "Șerban ține țăruș" },
      { code: "es", label: "Spanish", text: "¡Feliz cumpleaños!" }
    ];

    const fontSelect = document.getElementById("fontSelect");
    const fontFileInput = document.getElementById("fontFileInput");
    const sampleSelect = document.getElementById("sampleSelect");
    const preview = document.getElementById("preview");
    const highlight = document.getElementById("highlight");
    const missingNote = document.getElementById("missingNote");
    const fontUrl = document.getElementById("fontUrl");
    const glyphRows = document.getElementById("glyphRows");
    const languages = listLanguages();
    let currentFont = null;
    let currentFontInfo = null;
    let customFontUrl = null;

    samples.forEach((s, i) => {
      const opt = document.createElement("option");
      opt.value = String(i);
      opt.textContent = s.label;
      sampleSelect.appendChild(opt);
    });

    function render() {
      if (!currentFont || !currentFontInfo) return;
      const fontInfo = currentFontInfo;
      const font = currentFont;
      const sample = samples[Number(sampleSelect.value)] ?? samples[0];
      const lang = languages.find(l => l.code === sample.code);
      const required = lang ? Array.from(new Set(Array.from(lang.required))) : [];
      fontUrl.textContent = `Using font: ${fontInfo.name} (${fontInfo.url})`;
      const support = supportsLanguage(font, sample.code);
      const missingSet = new Set(support?.missing ?? []);
      highlight.innerHTML = required
        .map(ch => `<span style="border-color:${missingSet.has(ch) ? "#e2b8ad" : "#cfe3d6"};background:${missingSet.has(ch) ? "#fdecea" : "#eef7f0"}">${ch}</span>`)
        .join(" ");
      if (support?.missing?.length) {
        missingNote.textContent = `Missing (${support.missing.length}): ${support.missing.join(" ")}`;
      } else {
        missingNote.textContent = "All required glyphs present for this language.";
      }
      const hasGlyf = !!font.getTableByType(Table.glyf);
      const hasCff = !!font.getTableByType(Table.CFF);
      if (!hasGlyf && !hasCff) return;

      const ctx = preview.getContext("2d");
      ctx.clearRect(0, 0, preview.width, preview.height);

      CanvasRenderer.drawString(font, sample.text, preview, {
        x: 24,
        y: 160,
        scale: 0.11,
        styles: {
          fillStyle: "#2c3e50",
          strokeStyle: "#111",
          lineWidth: 1.5
        }
      });

      const chars = Array.from(sample.text);
      glyphRows.innerHTML = "";
      chars.forEach((ch, i) => {
        const code = ch.codePointAt(0);
        const gid = font.getGlyphIndexByChar(ch);
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="border-bottom:1px solid #eee;padding:6px">${i}</td>
          <td style="border-bottom:1px solid #eee;padding:6px">${ch}</td>
          <td style="border-bottom:1px solid #eee;padding:6px">U+${code?.toString(16).toUpperCase().padStart(4, "0")}</td>
          <td style="border-bottom:1px solid #eee;padding:6px;${gid ? "color:#1f7a3f" : "color:#b2432c"}">${gid ?? "missing"}</td>
        `;
        glyphRows.appendChild(tr);
      });
    }

    async function loadAndRender() {
      const selected = customFontUrl
        ? { name: fontFileInput.files?.[0]?.name || "Custom font", url: customFontUrl, isCustom: true }
        : getSelectedFont(fontSelect, fonts);
      try {
        currentFont = await loadFont(selected.url);
        currentFontInfo = selected;
        render();
      } catch (err) {
        fontUrl.textContent = `Failed to load font: ${selected?.url ?? ""}`;
        missingNote.textContent = `Error: ${err}`;
        const ctx = preview.getContext("2d");
        ctx.clearRect(0, 0, preview.width, preview.height);
        glyphRows.innerHTML = "";
      }
    }

    sampleSelect.addEventListener("change", render);
    fontSelect.addEventListener("change", () => {
      if (fontFileInput.value) {
        fontFileInput.value = "";
        if (customFontUrl) URL.revokeObjectURL(customFontUrl);
        customFontUrl = null;
      }
      loadAndRender();
    });
    fontFileInput.addEventListener("change", () => {
      if (customFontUrl) URL.revokeObjectURL(customFontUrl);
      customFontUrl = fontFileInput.files?.[0] ? URL.createObjectURL(fontFileInput.files[0]) : null;
      loadAndRender();
    });

    populateFontSelect(fontSelect, fonts);
    loadAndRender();
  </script>
  <script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
