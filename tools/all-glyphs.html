<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>All Glyphs Grid</title>
    <meta charset="utf-8">
    <style>
        :root { color-scheme: light; }
        body {
            margin: 0;
            font-family: "Georgia", "Times New Roman", serif;
            background: radial-gradient(circle at top, #f6f6f2 0%, #ecebe4 50%, #e1dfd4 100%);
            color: #1b1b1b;
        }
        .page {
            padding: 18px 24px 24px;
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; }
        .panel {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #d8d6cb;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(30, 20, 10, 0.08);
        }
        label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #5d5648;
        }
        select, input[type="range"] {
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #d8d6cb;
            font-size: 14px;
            min-width: 220px;
            background: #fbfbf8;
        }
        input[type="checkbox"] { transform: translateY(2px); }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #4b463d;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
        }
        #stage {
            border-radius: 16px;
            padding: 18px;
            background: #ffffff;
            border: 1px solid #d8d6cb;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6);
        }
        canvas {
            width: 100%;
            height: auto;
            display: block;
        }
        .hint {
            margin-top: 10px;
            color: #5d5648;
            font-size: 12px;
        }
        .warn { color: #a33a2a; }
        .glyph-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(28, 24, 18, 0.58);
            z-index: 80;
            padding: 24px;
        }
        .glyph-modal.open { display: flex; }
        .glyph-modal-card {
            width: min(920px, 96vw);
            max-height: 88vh;
            overflow: auto;
            background: #fffdfa;
            border: 1px solid #d8d6cb;
            border-radius: 18px;
            box-shadow: 0 24px 60px rgba(30, 20, 10, 0.25);
            padding: 18px;
            display: grid;
            gap: 14px;
        }
        .glyph-modal-head {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 16px;
        }
        .glyph-modal-title {
            margin: 0;
            font-size: 24px;
        }
        .glyph-modal-sub {
            margin: 6px 0 0;
            color: #6f6657;
            font-size: 13px;
        }
        .glyph-modal-close {
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid #d8d6cb;
            background: #f4f0ea;
            color: #3d382f;
            cursor: pointer;
        }
        .glyph-modal-grid {
            display: grid;
            grid-template-columns: minmax(320px, 1.2fr) minmax(220px, 0.9fr);
            gap: 16px;
        }
        .glyph-modal-stage {
            border: 1px solid #d8d6cb;
            border-radius: 14px;
            background: #fff;
            padding: 10px;
        }
        .glyph-modal-stage canvas {
            width: 100%;
            height: auto;
            display: block;
        }
        .glyph-metrics {
            display: grid;
            gap: 8px;
        }
        .glyph-metric {
            border: 1px solid #e3dfd6;
            border-radius: 12px;
            background: #fbf9f5;
            padding: 10px 12px;
        }
        .glyph-metric strong {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #7d7261;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div id="fontDrawerMount"></div>
    <div class="page">
    <h1>All Glyphs Grid</h1>
    <div class="panel">
        <select id="fontSelect" hidden data-font-source-ui="off"></select>
        <label>
            Cell Size
            <input id="cellInput" type="range" min="40" max="160" value="100" />
        </label>
        <label>
            Scale
            <input id="scaleInput" type="range" min="20" max="140" value="60" />
        </label>
        <label>
            Show Index
            <input id="indexInput" type="checkbox" checked />
        </label>
        <label>
            Show Points
            <input id="pointsInput" type="checkbox" />
        </label>
        <label>
            Debug Glyph
            <input id="debugGlyphInput" type="number" min="0" placeholder="Index" />
        </label>
        <label>
            Start Glyph
            <input id="startInput" type="number" min="0" value="0" />
        </label>
        <label>
            Max Glyphs
            <input id="limitInput" type="number" min="64" max="4096" step="64" value="1024" />
        </label>
        <button id="renderBtn">Render</button>
        <button id="debugBtn">Log CFF Ops</button>
    </div>
    <div id="stage">
        <canvas id="canvas" width="1200" height="800"></canvas>
        <div id="status" class="hint"></div>
    </div>
    <div id="glyphModal" class="glyph-modal" aria-hidden="true">
        <div class="glyph-modal-card">
            <div class="glyph-modal-head">
                <div>
                    <h2 id="glyphModalTitle" class="glyph-modal-title">Glyph</h2>
                    <p id="glyphModalSub" class="glyph-modal-sub"></p>
                </div>
                <button id="glyphModalClose" class="glyph-modal-close" type="button">Close</button>
            </div>
            <div class="glyph-modal-grid">
                <div class="glyph-modal-stage">
                    <canvas id="glyphModalCanvas" width="560" height="420"></canvas>
                </div>
                <div id="glyphMetrics" class="glyph-metrics"></div>
            </div>
        </div>
    </div>
    </div>

    <script type="module">
        import { FontParser } from "../dist/data/FontParser.js";
        import { FontParserWOFF } from "../dist/data/FontParserWOFF.js";
        import { CanvasRenderer } from "../dist/render/CanvasRenderer.js";
        import { Table } from "../dist/table/Table.js";
        import { getFontList } from "./shared/font-catalog.js";
        import { createFontDrawer, createFontLoader, getSelectedFont } from "./shared/font-ui.js";
        import { clearCanvas } from "./shared/canvas-utils.js";
        import { setStatus } from "./shared/status-ui.js";

        const fontDrawerMount = document.getElementById("fontDrawerMount");
        const fontSelect = document.getElementById("fontSelect");
        const cellInput = document.getElementById("cellInput");
        const scaleInput = document.getElementById("scaleInput");
        const indexInput = document.getElementById("indexInput");
        const pointsInput = document.getElementById("pointsInput");
        const debugGlyphInput = document.getElementById("debugGlyphInput");
        const startInput = document.getElementById("startInput");
        const limitInput = document.getElementById("limitInput");
        const renderBtn = document.getElementById("renderBtn");
        const debugBtn = document.getElementById("debugBtn");
        const canvas = document.getElementById("canvas");
        const status = document.getElementById("status");
        const ctx = canvas.getContext("2d");
        const glyphModal = document.getElementById("glyphModal");
        const glyphModalClose = document.getElementById("glyphModalClose");
        const glyphModalTitle = document.getElementById("glyphModalTitle");
        const glyphModalSub = document.getElementById("glyphModalSub");
        const glyphModalCanvas = document.getElementById("glyphModalCanvas");
        const glyphMetrics = document.getElementById("glyphMetrics");
        const glyphModalCtx = glyphModalCanvas.getContext("2d");

        const fonts = getFontList("allGlyphs");
        const glyphCellMap = [];
        let currentGridFont = null;
        let currentUnicodeMap = new Map();

        const loadFont = createFontLoader(async (url) => {
            if (isWoff(url)) {
                return FontParserWOFF.load(url);
            }
            return FontParser.load(url);
        });

        function isWoff(url) {
            return url.toLowerCase().endsWith(".woff");
        }

        function getGlyphBounds(glyph) {
            if (!glyph) return null;
            const count = Math.max(0, glyph.getPointCount() - 2);
            if (count === 0) return null;
            let minx = Infinity;
            let miny = Infinity;
            let maxx = -Infinity;
            let maxy = -Infinity;
            for (let i = 0; i < count; i++) {
                const p = glyph.getPoint(i);
                if (!p) continue;
                if (p.x < minx) minx = p.x;
                if (p.y < miny) miny = p.y;
                if (p.x > maxx) maxx = p.x;
                if (p.y > maxy) maxy = p.y;
            }
            if (!isFinite(minx) || !isFinite(miny)) return null;
            return { minx, miny, maxx, maxy };
        }

        function buildGlyphToUnicodeMap(font) {
            const cmap = font.getTableByType?.(Table.cmap);
            const formats = Array.isArray(cmap?.formats) ? cmap.formats : [];
            const map = new Map();
            for (let cp = 0; cp <= 0xFFFF; cp++) {
                let gid = null;
                for (const format of formats) {
                    if (!format || typeof format.mapCharCode !== "function") continue;
                    const value = format.mapCharCode(cp);
                    if (Number.isInteger(value) && value > 0) {
                        gid = value;
                        break;
                    }
                }
                if (gid != null && !map.has(gid)) {
                    map.set(gid, cp);
                }
            }
            return map;
        }

        function drawGlyphPoints(ctx, glyph, x, y, scale) {
            if (!ctx || !glyph) return;
            const radius = 6 / scale;
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, -scale);
            for (let i = 0; i < glyph.getPointCount(); i++) {
                const p = glyph.getPoint(i);
                if (!p) continue;
                ctx.beginPath();
                ctx.fillStyle = p.onCurve ? "#d35400" : "#2980b9";
                ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function renderGlyphModal(entry) {
            if (!entry || !glyphModalCtx) return;
            const { glyphIndex, glyph, codePoint, font } = entry;
            const bounds = getGlyphBounds(glyph);
            if (!glyph || !bounds) return;

            const modalCanvas = glyphModalCanvas;
            glyphModalCtx.clearRect(0, 0, modalCanvas.width, modalCanvas.height);
            glyphModalCtx.fillStyle = "#fffdfa";
            glyphModalCtx.fillRect(0, 0, modalCanvas.width, modalCanvas.height);

            const unitsPerEm = typeof font.getUnitsPerEm === "function" ? font.getUnitsPerEm() : 1000;
            const hhea = font.getTableByType(Table.hhea);
            const ascender = hhea?.ascender ?? unitsPerEm * 0.8;
            const descender = hhea?.descender ?? -unitsPerEm * 0.2;
            const emHeight = ascender - descender || unitsPerEm;
            const usableWidth = modalCanvas.width - 80;
            const usableHeight = modalCanvas.height - 80;
            const scale = Math.min(usableWidth / Math.max(1, bounds.maxx - bounds.minx), usableHeight / Math.max(1, emHeight));
            const baselineY = 40 + ascender * scale;
            const drawX = 40 + ((usableWidth - ((bounds.maxx - bounds.minx) * scale)) * 0.5) - (bounds.minx * scale);

            glyphModalCtx.save();
            glyphModalCtx.strokeStyle = "#d8d6cb";
            glyphModalCtx.lineWidth = 1;
            glyphModalCtx.setLineDash([5, 5]);
            glyphModalCtx.beginPath();
            glyphModalCtx.moveTo(0, baselineY);
            glyphModalCtx.lineTo(modalCanvas.width, baselineY);
            glyphModalCtx.stroke();
            glyphModalCtx.beginPath();
            glyphModalCtx.moveTo(0, 40 + (ascender - (font.getAscent?.() ?? ascender)) * scale);
            glyphModalCtx.lineTo(modalCanvas.width, 40 + (ascender - (font.getAscent?.() ?? ascender)) * scale);
            glyphModalCtx.stroke();
            glyphModalCtx.restore();

            CanvasRenderer.drawGlyphToContext(glyphModalCtx, glyph, {
                x: drawX,
                y: baselineY,
                scale,
                styles: { fillStyle: "#2f2a22", strokeStyle: "#2f2a22", lineWidth: 1.5 }
            });

            glyphModalTitle.textContent = codePoint != null
                ? `${String.fromCodePoint(codePoint)}  U+${codePoint.toString(16).toUpperCase().padStart(4, "0")}`
                : `Glyph ${glyphIndex}`;
            glyphModalSub.textContent = `Glyph ${glyphIndex} · advance ${glyph.advanceWidth} · left side bearing ${glyph.leftSideBearing}`;
            glyphMetrics.replaceChildren();
            [
                ["Glyph Index", glyphIndex],
                ["Unicode", codePoint != null ? `U+${codePoint.toString(16).toUpperCase().padStart(4, "0")}` : "Unmapped"],
                ["Advance Width", glyph.advanceWidth],
                ["Left Side Bearing", glyph.leftSideBearing],
                ["Bounds", `${bounds.minx}, ${bounds.miny} -> ${bounds.maxx}, ${bounds.maxy}`],
                ["Point Count", Math.max(0, glyph.getPointCount() - 2)]
            ].forEach(([label, value]) => {
                const item = document.createElement("div");
                item.className = "glyph-metric";
                const strong = document.createElement("strong");
                strong.textContent = label;
                item.appendChild(strong);
                item.append(String(value));
                glyphMetrics.appendChild(item);
            });
            glyphModal.classList.add("open");
            glyphModal.setAttribute("aria-hidden", "false");
        }

        function renderGrid(font) {
            if (!ctx) return;
            const cell = Number(cellInput.value);
            const scaleFactor = Number(scaleInput.value) / 100;
            const showIndex = indexInput.checked;
            const showPoints = pointsInput.checked;
            const debugGlyphIndex = Number(debugGlyphInput.value);
            const startGlyph = Math.max(0, Math.floor(Number(startInput.value) || 0));
            const maxGlyphs = Math.max(64, Math.floor(Number(limitInput.value) || 1024));

            const hasGlyf = !!font.getTableByType(Table.glyf);
            const hasCff = !!font.getTableByType(Table.CFF);
            const hasCff2 = !!font.getTableByType(Table.CFF2);
            if (!hasGlyf && !hasCff) {
                clearCanvas(canvas, ctx, "#fbfbf8");
                setStatus(status, hasCff2 ? "CFF2 outlines are not supported yet." : "No glyph outlines found.", "warning");
                return;
            }

            const hhea = font.getTableByType(Table.hhea);
            const unitsPerEm = typeof font.getUnitsPerEm === "function" ? font.getUnitsPerEm() : 1000;
            const ascender = hhea?.ascender ?? unitsPerEm * 0.8;
            const descender = hhea?.descender ?? -unitsPerEm * 0.2;
            const emHeight = ascender - descender || unitsPerEm;
            const scale = (cell * scaleFactor) / emHeight;

            const glyphCount = font.getNumGlyphs();
            const endGlyph = Math.min(glyphCount, startGlyph + maxGlyphs);
            const visibleGlyphs = Math.max(0, endGlyph - startGlyph);
            const unicodeMap = buildGlyphToUnicodeMap(font);
            const cols = Math.max(1, Math.floor(canvas.width / cell));
            const rows = Math.max(1, Math.ceil(visibleGlyphs / cols));
            const height = rows * cell + 40;

            canvas.height = height;
            clearCanvas(canvas, ctx, "#fbfbf8");
            glyphCellMap.length = 0;
            currentGridFont = font;
            currentUnicodeMap = unicodeMap;

            ctx.strokeStyle = "#e6e3da";
            ctx.lineWidth = 1;
            ctx.font = "11px serif";
            ctx.fillStyle = "#5d5648";

            for (let localIndex = 0; localIndex < visibleGlyphs; localIndex++) {
                const i = startGlyph + localIndex;
                const col = localIndex % cols;
                const row = Math.floor(localIndex / cols);
                const x = col * cell;
                const y = row * cell;

                ctx.strokeRect(x, y, cell, cell);

                const glyph = font.getGlyph(i);
                if (glyph) {
                    const bounds = getGlyphBounds(glyph);
                    const centerX = bounds ? (bounds.minx + bounds.maxx) * 0.5 : 0;
                    const emPixels = emHeight * scale;
                    const topY = y + (cell - emPixels) * 0.5;
                    const baselineY = topY + (ascender * scale);
                    CanvasRenderer.drawGlyphToContext(ctx, glyph, {
                        x: x + cell * 0.5 - (centerX * scale),
                        y: baselineY,
                        scale,
                        styles: { fillStyle: "#2f2a22", strokeStyle: "#2f2a22", lineWidth: 1 }
                    });
                    if (showPoints && Number.isFinite(debugGlyphIndex) && debugGlyphIndex === i) {
                        drawGlyphPoints(
                            ctx,
                            glyph,
                            x + cell * 0.5 - (centerX * scale),
                            baselineY,
                            scale
                        );
                    }
                }

                glyphCellMap.push({
                    x,
                    y,
                    w: cell,
                    h: cell,
                    glyphIndex: i,
                    glyph,
                    codePoint: unicodeMap.get(i) ?? null,
                    font
                });

                if (showIndex) {
                    ctx.fillText(String(i), x + 6, y + 14);
                }

                const codePoint = unicodeMap.get(i);
                if (Number.isInteger(codePoint)) {
                    ctx.save();
                    ctx.font = "10px sans-serif";
                    ctx.fillStyle = "#908877";
                    ctx.textAlign = "right";
                    ctx.fillText(`U+${codePoint.toString(16).toUpperCase().padStart(4, "0")}`, x + cell - 6, y + cell - 8);
                    ctx.restore();
                }
            }

            setStatus(
                status,
                `Showing glyphs ${startGlyph}–${Math.max(startGlyph, endGlyph - 1)} of ${glyphCount} | Columns: ${cols} | Rows: ${rows}`,
                visibleGlyphs < glyphCount ? "warning" : "info"
            );
        }

        async function render() {
            const selected = getSelectedFont(fontSelect, fonts);
            setStatus(status, `Loading ${selected.name}...`, "info");
            try {
                const font = await loadFont(selected.url);
                window.__allGlyphsFont = font;
                renderGrid(font);
            } catch (err) {
                setStatus(status, `Failed to load font: ${err}`, "warning");
            }
        }

        renderBtn.addEventListener("click", render);
        debugBtn.addEventListener("click", async () => {
            const selected = getSelectedFont(fontSelect, fonts);
            const index = Number(debugGlyphInput.value);
            if (!Number.isFinite(index)) {
                console.warn("Debug glyph index is not set.");
                return;
            }
            try {
                const font = await loadFont(selected.url);
                const cff = font.getTableByType(Table.CFF);
                if (!cff || typeof cff.debugCharString !== "function") {
                    console.warn("CFF debug is unavailable for this font.");
                    return;
                }
                const ops = cff.debugCharString(index);
                console.log(`CFF ops for glyph ${index}:`, ops);
            } catch (err) {
                console.warn("Failed to log CFF ops:", err);
            }
        });
        canvas.addEventListener("click", (event) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (event.clientX - rect.left) * scaleX;
            const y = (event.clientY - rect.top) * scaleY;
            const hit = glyphCellMap.find((cell) => x >= cell.x && x <= cell.x + cell.w && y >= cell.y && y <= cell.y + cell.h && cell.glyph);
            if (hit) renderGlyphModal(hit);
        });
        glyphModalClose.addEventListener("click", () => {
            glyphModal.classList.remove("open");
            glyphModal.setAttribute("aria-hidden", "true");
        });
        glyphModal.addEventListener("click", (event) => {
            if (event.target === glyphModal) {
                glyphModal.classList.remove("open");
                glyphModal.setAttribute("aria-hidden", "true");
            }
        });
        fontSelect.addEventListener("change", render);
        cellInput.addEventListener("input", render);
        scaleInput.addEventListener("input", render);
        indexInput.addEventListener("change", render);
        pointsInput.addEventListener("change", render);
        startInput.addEventListener("input", render);
        limitInput.addEventListener("input", render);

        createFontDrawer({
            mount: fontDrawerMount,
            select: fontSelect,
            fonts,
            allowUrl: true,
            title: "Font"
        });
        render();
    </script>
</body>
</html>
