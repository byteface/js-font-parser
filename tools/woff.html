<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>WOFF Demo</title>
</head>
<body>
<div data-nav="main" style="position:sticky;top:0;z-index:10;background:#f6f4f1;border-bottom:1px solid #e3e1db;padding:10px 16px;font-family:'Merriweather',serif;display:flex;gap:12px;align-items:center"><a href="../demos/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Demos</a><a href="../tools/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Tools</a></div>

<h1>WOFF Demo</h1>
<div style="margin-bottom:12px;">
    <label>Text:
        <input id="textInput" value="Hello WOFF" />
    </label>
</div>
<canvas id="myDrawing" width="900" height="360"></canvas>

<script type="module">
    import { FontParserWOFF } from '../dist/data/FontParserWOFF.js';
    import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';

    const canvas = document.getElementById('myDrawing');
    const textInput = document.getElementById('textInput');
    const ctx = canvas.getContext('2d');

    let font = null;
    FontParserWOFF.load("https://cdn.jsdelivr.net/fontsource/fonts/open-sans@latest/latin-400-normal.woff")
        .then(f => {
            font = f;
            render();
        })
        .catch(error => {
            console.error('Error loading WOFF:', error);
        });

    textInput.addEventListener('input', render);

    function render() {
        if (!font) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        CanvasRenderer.drawString(font, textInput.value, canvas, {
            x: 40,
            y: 220,
            scale: 0.18,
            spacing: 2,
            styles: {
                fillStyle: '#000000',
                strokeStyle: '#000000',
                lineWidth: '1',
                globalAlpha: '1'
            }
        });
    }
</script>
</body>
</html>
