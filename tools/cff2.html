<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CFF2 Inspector</title>
  <style>
    :root { --bg:#f6f4f1; --ink:#1e1f24; --muted:#5e6574; --panel:#fff; --border:#e3e1db; }
    body { margin:0; font-family:"Merriweather", serif; background:var(--bg); color:var(--ink); }
    header { padding:22px 20px 10px; }
    h1 { margin:0 0 6px; font-size:26px; }
    p { margin:0 0 14px; color:var(--muted); }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px; margin:12px 20px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    input[type="file"] { padding:6px; }
    canvas { width:100%; height:220px; border:1px dashed #ddd; background:#fff; }
    code { background:#f3f3f3; padding:2px 4px; border-radius:4px; }
  </style>
</head>
<body>
<div data-nav="main"></div>
  <header>
    <h1>CFF2 Inspector</h1>
    <p>Load a font file to detect CFF2 and render sample text.</p>
  </header>

  <div class="panel">
    <div class="row">
      <input id="fileInput" type="file" accept=".otf,.ttf" />
      <label>Sample <input id="sample" value="CFF2 test" style="padding:6px;border-radius:6px;border:1px solid #ccc" /></label>
      <button id="setDefault" type="button">Default Axes</button>
      <button id="setMin" type="button">Min Axes</button>
      <button id="setMax" type="button">Max Axes</button>
    </div>
    <div id="axisControls" style="margin-top:10px"></div>
    <div id="info" style="margin-top:8px;color:var(--muted);font-size:12px"></div>
  </div>

  <div class="panel">
    <canvas id="preview" width="1200" height="220"></canvas>
  </div>

  <script type="module">
    import { ByteArray } from "../dist/utils/ByteArray.js";
    import { FontParser } from "../dist/data/FontParser.js";
    import { TableDirectory } from "../dist/table/TableDirectory.js";
    import { Table } from "../dist/table/Table.js";
    import { CanvasRenderer } from "../dist/render/CanvasRenderer.js";

    const input = document.getElementById("fileInput");
    const info = document.getElementById("info");
    const preview = document.getElementById("preview");
    const sample = document.getElementById("sample");
    const axisControls = document.getElementById("axisControls");
    const setDefault = document.getElementById("setDefault");
    const setMin = document.getElementById("setMin");
    const setMax = document.getElementById("setMax");

    let font = null;
    let axisValues = {};

    function applyAxes(values) {
      if (!font || typeof font.setVariationByAxes !== "function") return;
      axisValues = { ...axisValues, ...values };
      font.setVariationByAxes(axisValues);
      renderSample();
      renderAxisControls();
    }

    function getAxisExtremes(kind) {
      const axes = font?.getVariationAxes?.() ?? [];
      if (!axes.length) return {};
      if (kind === "min") return Object.fromEntries(axes.map(a => [a.name, a.minValue]));
      if (kind === "max") return Object.fromEntries(axes.map(a => [a.name, a.maxValue]));
      return Object.fromEntries(axes.map(a => [a.name, a.defaultValue]));
    }

    function renderAxisControls() {
      const axes = font?.getVariationAxes?.() ?? [];
      axisControls.innerHTML = "";
      if (!axes.length) {
        axisControls.textContent = "No variation axes detected.";
        return;
      }
      const title = document.createElement("div");
      title.style.fontSize = "12px";
      title.style.color = "var(--muted)";
      title.style.marginBottom = "8px";
      title.textContent = "Variation axes";
      axisControls.appendChild(title);

      for (const axis of axes) {
        const row = document.createElement("div");
        row.className = "row";
        row.style.marginBottom = "6px";
        const label = document.createElement("label");
        label.style.minWidth = "80px";
        label.textContent = `${axis.name} (${axis.minValue}-${axis.maxValue})`;
        const slider = document.createElement("input");
        slider.type = "range";
        slider.min = String(axis.minValue);
        slider.max = String(axis.maxValue);
        slider.step = String(Math.max(0.1, (axis.maxValue - axis.minValue) / 400));
        slider.value = String(axisValues[axis.name] ?? axis.defaultValue);
        const valueOut = document.createElement("code");
        valueOut.textContent = String(Number(slider.value).toFixed(2));
        slider.addEventListener("input", () => {
          valueOut.textContent = String(Number(slider.value).toFixed(2));
          applyAxes({ [axis.name]: Number(slider.value) });
        });
        row.appendChild(label);
        row.appendChild(slider);
        row.appendChild(valueOut);
        axisControls.appendChild(row);
      }
    }

    function renderSample() {
      if (!font) return;
      const ctx = preview.getContext("2d");
      ctx.clearRect(0, 0, preview.width, preview.height);
      CanvasRenderer.drawString(font, sample.value || "CFF2 test", preview, {
        x: 24,
        y: 160,
        scale: 0.11,
        styles: { fillStyle: "#2c3e50", strokeStyle: "#111", lineWidth: 1.5 }
      });
    }

    input.addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const buf = await file.arrayBuffer();
      const byteArray = new ByteArray(new Uint8Array(buf));
      const dir = new TableDirectory(byteArray);
      const tags = [];
      for (let i = 0; i < dir.numTables; i++) {
        const entry = dir.getEntry(i);
        tags.push(entry.tag);
      }
      const hasCFF2 = tags.includes(Table.CFF2);
      font = FontParser.fromArrayBuffer(buf);
      axisValues = getAxisExtremes("default");
      applyAxes(axisValues);
      info.innerHTML = `Tables: ${tags.length} | CFF2: <code>${hasCFF2 ? "yes" : "no"}</code> | Axes: <code>${(font.getVariationAxes?.() ?? []).length}</code>`;
      renderSample();
    });

    sample.addEventListener("input", renderSample);
    setDefault.addEventListener("click", () => applyAxes(getAxisExtremes("default")));
    setMin.addEventListener("click", () => applyAxes(getAxisExtremes("min")));
    setMax.addEventListener("click", () => applyAxes(getAxisExtremes("max")));
  </script>
  <script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
