<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Font Library (CDN)</title>
    <meta charset="utf-8">
    <style>
        :root { color-scheme: light; }
        body {
            margin: 24px;
            font-family: "Georgia", "Times New Roman", serif;
            background: radial-gradient(circle at top, #f2f6ff 0%, #e7ecf7 50%, #dce2f2 100%);
            color: #1b1b1b;
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; }
        .panel {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #d6dbe8;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(20, 30, 60, 0.08);
        }
        label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #4a5671;
        }
        input[type="text"], select {
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #d6dbe8;
            font-size: 14px;
            min-width: 220px;
            background: #fbfcff;
        }
        input[type="range"] { width: 160px; }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #2f4f7a;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
        }
        button.secondary { background: #6c7ea3; }
        #stage {
            border-radius: 16px;
            padding: 18px;
            background: #ffffff;
            border: 1px solid #d6dbe8;
            min-height: 360px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6);
        }
        canvas {
            width: 100%;
            height: 360px;
            display: block;
        }
        .hint {
            margin-top: 10px;
            color: #4a5671;
            font-size: 12px;
        }
        .links {
            margin-top: 10px;
            font-size: 12px;
            color: #4a5671;
        }
        .links a {
            color: #2f4f7a;
            text-decoration: none;
            border-bottom: 1px solid rgba(47, 79, 122, 0.35);
        }
        .warn { color: #a33a2a; }
    </style>
</head>
<body>
<div data-nav="main"></div>

    <h1>Font Library (CDN)</h1>
    <div class="panel">
        <label>
            Search
            <input id="filterInput" type="text" placeholder="name or tag" />
        </label>
        <label>
            Tag
            <select id="tagFilter">
                <option value="all">All</option>
                <option value="serif">Serif</option>
                <option value="sans">Sans</option>
                <option value="color">Color</option>
                <option value="variable">Variable</option>
                <option value="script">Script</option>
                <option value="icons">Icons</option>
            </select>
        </label>
        <label>
            Catalog
            <select id="fontSelect" data-font-source-ui="off"></select>
        </label>
        <label>
            Or URL
            <input id="urlInput" type="text" placeholder="https://.../font.ttf" />
        </label>
        <label>
            Text
            <input id="textInput" type="text" value="The quick brown fox jumps over the lazy dog." />
        </label>
        <label>
            Size
            <input id="sizeInput" type="range" min="60" max="220" value="140" />
        </label>
        <label>
            Mode
            <select id="modeSelect">
                <option value="outline">Outline</option>
                <option value="color">Color (COLR/CPAL)</option>
            </select>
        </label>
        <button id="renderBtn">Load + Render</button>
        <button id="iconBtn" class="secondary">Icon Sample</button>
    </div>
    <div id="stage">
        <canvas id="canvas" width="1200" height="360"></canvas>
        <div id="status" class="hint"></div>
        <div class="links">
            Font sources:
            <a href="https://www.cdnfonts.com/" target="_blank" rel="noreferrer">CDN Fonts</a>
            ·
            <a href="https://fonts.google.com/" target="_blank" rel="noreferrer">Google Fonts</a>
        </div>
    </div>

    <script type="module">
        import { FontParser } from "../dist/data/FontParser.js";
        import { FontParserWOFF } from "../dist/data/FontParserWOFF.js";
        import { CanvasRenderer } from "../dist/render/CanvasRenderer.js";
        import { getSelectedFont, populateFontSelect } from "./shared/font-ui.js";
        import { createSharedToolbar, persistInputValue, persistSelectValue } from "./shared/shared-toolbar.js";
        import { clearCanvas } from "./shared/canvas-utils.js";
        import { setStatus } from "./shared/status-ui.js";
        import { detectFontMagic, fetchArrayBuffer, fetchText, pickBestFontUrlFromCss } from "./shared/font-io.js";

        const fontSelect = document.getElementById("fontSelect");
        const filterInput = document.getElementById("filterInput");
        const tagFilter = document.getElementById("tagFilter");
        const urlInput = document.getElementById("urlInput");
        const textInput = document.getElementById("textInput");
        const sizeInput = document.getElementById("sizeInput");
        const modeSelect = document.getElementById("modeSelect");
        const renderBtn = document.getElementById("renderBtn");
        const iconBtn = document.getElementById("iconBtn");
        const canvas = document.getElementById("canvas");
        const status = document.getElementById("status");
        const ctx = canvas.getContext("2d");
        let currentFont = null;
        let currentFontMeta = null;
        let filteredCatalog = [];
        let catalogPersistenceBound = false;

        const catalog = [
            {
                name: "Twemoji Mozilla (local, COLR/CPAL)",
                url: "../truetypefonts/color/TwemojiMozilla.ttf",
                type: "ttf",
                tags: ["color", "local"]
            },
            {
                name: "DevilInside (local)",
                url: "../truetypefonts/devil-inside-font/DevilInside-G3xP.ttf",
                type: "ttf",
                tags: ["display", "local"]
            },
            {
                name: "Font Awesome (local OTF)",
                url: "../truetypefonts/FontAwesome.otf",
                type: "otf",
                tags: ["icons", "local"]
            },
            {
                name: "Minecraft (local)",
                url: "../truetypefonts/Minecraft.ttf",
                type: "ttf",
                tags: ["display", "local"]
            },
            {
                name: "Kremlin Minister (local)",
                url: "../truetypefonts/kremlin_minister/Kremlin Minister.ttf",
                type: "ttf",
                tags: ["display", "local"]
            },
            {
                name: "Open Sans Regular (CDN)",
                url: "https://cdn.jsdelivr.net/fontsource/fonts/open-sans@latest/latin-400-normal.woff",
                type: "woff",
                tags: ["text", "cdn"]
            },
            {
                name: "Open Sans Bold (CDN)",
                url: "https://cdn.jsdelivr.net/fontsource/fonts/open-sans@latest/latin-700-normal.woff",
                type: "woff",
                tags: ["text", "cdn"]
            },
            {
                name: "Roboto Regular (CDN)",
                url: "https://cdn.jsdelivr.net/fontsource/fonts/roboto@latest/latin-400-normal.woff",
                type: "woff",
                tags: ["text", "cdn"]
            },
            {
                name: "Inter Regular (CDN)",
                url: "https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-400-normal.woff",
                type: "woff",
                tags: ["text", "cdn"]
            },
            {
                name: "Merriweather Regular (CDN)",
                url: "https://cdn.jsdelivr.net/fontsource/fonts/merriweather@latest/latin-400-normal.woff",
                type: "woff",
                tags: ["text", "cdn"]
            },
            {
                name: "IBM Plex Sans (CDN)",
                url: "https://cdn.jsdelivr.net/fontsource/fonts/ibm-plex-sans@latest/latin-400-normal.woff",
                type: "woff",
                tags: ["text", "cdn"]
            },
            {
                name: "Font Awesome Solid (CDN)",
                url: "https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/webfonts/fa-solid-900.ttf",
                type: "ttf",
                tags: ["icons", "cdn"]
            },
            {
                name: "Noto Sans (local)",
                url: "../truetypefonts/noto/NotoSans-Regular.ttf",
                type: "ttf",
                tags: ["text", "local"]
            },
            {
                name: "DiscoMo (local)",
                url: "../truetypefonts/DiscoMo.ttf",
                type: "ttf",
                tags: ["display", "local"]
            },
            {
                name: "Quill (local)",
                url: "../truetypefonts/Quill.ttf",
                type: "ttf",
                tags: ["script", "local"]
            }
        ];

        const loadedFontCache = new Map();
        const TOOL_KEY = "tool:font-library";

        function deriveTags(item) {
            const tags = new Set(item.tags || []);
            const name = String(item.name || "").toLowerCase();
            const url = String(item.url || "").toLowerCase();
            if (name.includes("serif") || name.includes("merriweather")) tags.add("serif");
            if (name.includes("sans") || name.includes("roboto") || name.includes("inter") || name.includes("open sans")) tags.add("sans");
            if (name.includes("variable") || name.includes("vf") || url.includes("-vf") || url.includes("[wght]")) tags.add("variable");
            if (name.includes("arabic")) tags.add("arabic");
            if (name.includes("hebrew")) tags.add("hebrew");
            if (name.includes("devanagari")) tags.add("devanagari");
            if (name.includes("thai")) tags.add("thai");
            return Array.from(tags);
        }

        function applyCatalogFilter() {
            const q = (filterInput.value || "").trim().toLowerCase();
            const tag = tagFilter.value;
            filteredCatalog = catalog.filter((item) => {
                const tags = deriveTags(item);
                const hay = `${item.name} ${item.url} ${tags.join(" ")}`.toLowerCase();
                if (q && !hay.includes(q)) return false;
                if (tag !== "all" && !tags.includes(tag)) return false;
                return true;
            });
            populateFontSelect(fontSelect, filteredCatalog);
            if (filteredCatalog.length === 0) {
                setStatus(status, "No fonts match current search/filter.", "warning");
                return;
            }
            if (!catalogPersistenceBound) {
                persistSelectValue(fontSelect, TOOL_KEY, "catalog");
                catalogPersistenceBound = true;
            }
            loadAndRender();
        }

        async function loadFontFromUrl(url) {
            if (loadedFontCache.has(url)) return loadedFontCache.get(url);

            const buf = await fetchArrayBuffer(url);
            const bytes = new Uint8Array(buf);
            const magic = detectFontMagic(bytes);
            if (magic === "html" || magic === "unknown") {
                throw new Error(`Downloaded content is not a readable font binary (magic=${magic}).`);
            }
            let parsed;
            try {
                if (magic === "woff") {
                    // Use async WOFF path with decompression support.
                    parsed = await FontParserWOFF.load(url);
                } else {
                    parsed = FontParser.fromArrayBuffer(buf);
                }
            } catch (primaryError) {
                // Practical CDN fallback: if a direct .woff URL fails to parse,
                // try sibling .ttf/.otf URLs before surfacing the error.
                if (magic === "woff") {
                    const candidates = [
                        url.replace(/\.woff$/i, ".ttf"),
                        url.replace(/\.woff$/i, ".otf")
                    ].filter((u, i, arr) => arr.indexOf(u) === i && u !== url);
                    for (const candidate of candidates) {
                        try {
                            const b = await fetchArrayBuffer(candidate);
                            const m = detectFontMagic(new Uint8Array(b));
                            if (m === "ttf" || m === "otf") {
                                parsed = FontParser.fromArrayBuffer(b);
                                setStatus(status, `Primary WOFF parse failed; using fallback: ${candidate}`, "warning");
                                break;
                            }
                        } catch {
                            // continue trying next fallback candidate
                        }
                    }
                }
                if (!parsed) {
                    throw new Error(`Parse failed for ${url} (magic=${magic}): ${primaryError}`);
                }
            }
            loadedFontCache.set(url, parsed);
            return parsed;
        }

        async function resolveInputToFontUrl(rawInputUrl) {
            const lower = rawInputUrl.toLowerCase();
            if (!lower.endsWith(".css")) return rawInputUrl;

            const cssText = await fetchText(rawInputUrl);
            const fontUrl = pickBestFontUrlFromCss(cssText, rawInputUrl);
            if (!fontUrl) {
                throw new Error("No font file URL found in CSS.");
            }
            return fontUrl;
        }

        function renderFont(font, text) {
            if (!ctx) return;
            clearCanvas(canvas, ctx, "#fbfcff");

            const unitsPerEm = typeof font.getUnitsPerEm === "function" ? font.getUnitsPerEm() : 1000;
            const sizePx = Number(sizeInput.value);
            const scale = sizePx / unitsPerEm;
            const baseline = canvas.height * 0.7;
            const mode = modeSelect.value;

            if (mode === "color") {
                CanvasRenderer.drawColorString(font, text, canvas, {
                    x: 20,
                    y: baseline,
                    scale,
                    spacing: 12,
                    fallbackFill: "#2f4f7a",
                    fallbackAdvance: unitsPerEm * 0.9
                });
                setStatus(status, "Rendered with color layers if available, otherwise outline fallback.", "info");
            } else {
                CanvasRenderer.drawString(font, text, canvas, {
                    x: 20,
                    y: baseline,
                    scale,
                    spacing: 12,
                    styles: { fillStyle: "#2f4f7a", strokeStyle: "#2f4f7a", lineWidth: 1 }
                });
                setStatus(status, "Rendered with outlines.", "info");
            }
        }

        async function loadAndRender() {
            if (!filteredCatalog.length) return;
            const customUrl = urlInput.value.trim();
            const selected = getSelectedFont(fontSelect, filteredCatalog);
            const inputUrl = customUrl || selected.url;

            setStatus(status, `Loading font: ${inputUrl}`, "info");

            try {
                const url = await resolveInputToFontUrl(inputUrl);
                if (url !== inputUrl) {
                    setStatus(status, `Resolved CSS to font: ${url}`, "info");
                }
                const font = await loadFontFromUrl(url);
                currentFont = font;
                currentFontMeta = { selected, url };
                const text = textInput.value || "";
                renderFont(font, text);
            } catch (err) {
                currentFont = null;
                setStatus(status, `Failed to load font. CORS or format issues? ${err}`, "warning");
            }
        }

        iconBtn.addEventListener("click", () => {
            textInput.value = "\uf007 \uf013 \uf0c7 \uf0f3 \uf0f4";
            modeSelect.value = "outline";
            loadAndRender();
        });

        renderBtn.addEventListener("click", loadAndRender);
        fontSelect.addEventListener("change", () => {
            urlInput.value = "";
            loadAndRender();
        });
        sizeInput.addEventListener("input", loadAndRender);
        modeSelect.addEventListener("change", loadAndRender);
        filterInput.addEventListener("input", applyCatalogFilter);
        tagFilter.addEventListener("change", applyCatalogFilter);

        persistInputValue(filterInput, TOOL_KEY, "search");
        persistSelectValue(tagFilter, TOOL_KEY, "tag");
        persistInputValue(urlInput, TOOL_KEY, "url");
        persistInputValue(textInput, TOOL_KEY, "text");
        persistSelectValue(modeSelect, TOOL_KEY, "mode");
        persistInputValue(sizeInput, TOOL_KEY, "size");

        createSharedToolbar({
            mount: document.body,
            fontSelect,
            sizeInput,
            scriptOptions: [
                { value: "latin", label: "Latin" },
                { value: "arabic", label: "Arabic" },
                { value: "hebrew", label: "Hebrew" },
                { value: "devanagari", label: "Devanagari" },
                { value: "icons", label: "Icons" }
            ],
            onScriptChange: (value) => {
                if (value === "arabic") textInput.value = "مرحبا بالعالم";
                else if (value === "hebrew") textInput.value = "שלום עולם";
                else if (value === "devanagari") textInput.value = "नमस्ते दुनिया";
                else if (value === "icons") textInput.value = "\uf007 \uf013 \uf0c7 \uf0f3";
                else textInput.value = "The quick brown fox jumps over the lazy dog.";
                loadAndRender();
            },
            getExportData: () => ({
                tool: "font-library",
                selected: currentFontMeta?.selected?.name || null,
                sourceUrl: currentFontMeta?.url || null,
                mode: modeSelect.value,
                size: Number(sizeInput.value),
                text: textInput.value,
                diagnostics: typeof currentFont?.getDiagnostics === "function" ? currentFont.getDiagnostics() : []
            }),
            exportFilename: "font-library-report.json",
            getDiagnosticsText: () => {
                const list = typeof currentFont?.getDiagnostics === "function" ? currentFont.getDiagnostics() : [];
                if (!list.length) return "No diagnostics.";
                return list.slice(0, 30).map((d) => `[${d.phase}/${d.level}] ${d.code}: ${d.message}`).join("\n");
            }
        });

        applyCatalogFilter();
    </script>
  <script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
