<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Multilingual Demo</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            color: #222;
        }
        .block {
            margin-bottom: 28px;
        }
        .label {
            margin-bottom: 6px;
            color: #444;
        }
        .note {
            color: #666;
            font-size: 13px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div data-nav="main"></div>

<h1>Multilingual Demo</h1>
<div class="note">
    Arabic and Devanagari require shaping (GSUB/GPOS). This demo renders raw glyph sequences,
    so those scripts may appear unshaped.
</div>
<div id="font-list"></div>

<script type="module">
    import { FontParser } from '../dist/data/FontParser.js';
    import { Debug } from '../dist/utils/Debug.js';
    import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';

    const DEBUG = false;
    Debug.enabled = DEBUG;

    const samples = [
        {
            label: "English (Latin) - NotoSans-Regular.ttf",
            file: "NotoSans-Regular.ttf",
            text: "hello world"
        },
        {
            label: "Russian (Cyrillic) - NotoSans-Regular.ttf",
            file: "NotoSans-Regular.ttf",
            text: "Я вас любил: любовь ещё, быть может,"
        },
        {
            label: "Greek - NotoSans-Regular.ttf",
            file: "NotoSans-Regular.ttf",
            text: "Γειά σου κόσμε"
        },
        {
            label: "Hebrew - NotoSansHebrew-Regular.ttf",
            file: "NotoSansHebrew-Regular.ttf",
            text: "שלום עולם"
        },
        {
            label: "Arabic - NotoNaskhArabic-Regular.ttf",
            file: "NotoNaskhArabic-Regular.ttf",
            text: "مرحبا بالعالم"
        },
        {
            label: "Hindi (Devanagari) - NotoSansDevanagari-Regular.ttf",
            file: "NotoSansDevanagari-Regular.ttf",
            text: "नमस्ते दुनिया"
        },
        {
            label: "Thai - NotoSansThaiLooped-Regular.ttf",
            file: "NotoSansThaiLooped-Regular.ttf",
            text: "สวัสดีชาวโลก"
        }
    ];

    const container = document.getElementById("font-list");

    samples.forEach((sample) => {
        const block = document.createElement("div");
        block.className = "block";

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = sample.label;
        block.appendChild(label);

        const canvas = document.createElement("canvas");
        canvas.width = 1000;
        canvas.height = 220;
        block.appendChild(canvas);

        container.appendChild(block);

        const url = `../truetypefonts/noto/${encodeURIComponent(sample.file)}`;
        FontParser.load(url)
            .then(font => {
                CanvasRenderer.drawString(font, sample.text, canvas, {
                    x: 20,
                    y: 160,
                    scale: 0.09,
                    styles: cssStyles
                });
            })
            .catch(error => {
                console.error("Failed to load font:", sample.file, error);
            });
    });

    const cssStyles = {
        fillStyle: '#1f5fbf',
        strokeStyle: '#000000',
        globalAlpha: '1',
        lineWidth: '2'
    };

</script>
  <script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
