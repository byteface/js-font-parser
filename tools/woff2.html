<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>WOFF2 Loader</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        .page { padding: 18px 24px 24px; }
        .panel { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
        canvas { border: 1px dashed #ccc; width: 100%; height: auto; }
        .hint { font-size: 12px; color: #666; margin-top: 6px; }
        button { cursor: pointer; }
    </style>
</head>
<body>
<div data-nav="main"></div>
<div class="page">
<h1>WOFF2 Loader</h1>
<div class="panel">
    <label>Sample WOFF2:
        <select id="sampleSelect"></select>
    </label>
    <button id="sampleLoadBtn" type="button">Load sample</button>
    <label>Upload WOFF2:
        <input id="fileInput" type="file" accept=".woff2" />
    </label>
</div>
<div class="panel">
    <label>Text:
        <input id="textInput" value="Hello WOFF2" />
    </label>
    <label>Size:
        <input id="sizeInput" type="range" min="48" max="280" value="160" step="4" />
    </label>
    <button id="decoderBtn" type="button">Enable browser decoder</button>
    <button id="reproBtn" type="button">Repro missing-decoder failure</button>
</div>
<div class="hint">Default browser decoder path: <code>woff2-encoder</code> ESM, with <code>wawoff2</code> fallback.</div>
<div class="hint">Decoder source: <strong id="decoderSource">none</strong></div>
<div id="status" class="hint"></div>
<pre id="reproReport" class="hint" style="white-space:pre-wrap;border:1px solid #ddd;padding:8px;border-radius:6px;background:#fafafa;max-height:180px;overflow:auto;">No repro run yet.</pre>
<canvas id="myDrawing" width="1000" height="420"></canvas>
</div>

<script type="module">
    import { FontParserWOFF2, CanvasRenderer, setWoff2Decoder, setWoff2DecoderAsync } from '../dist/index.js';
    import { clearCanvas } from './shared/canvas-utils.js';
    import { setStatus } from './shared/status-ui.js';
    import { getFontList } from './shared/font-catalog.js';
    import { populateFontSelect, getSelectedFont } from './shared/font-ui.js';
    import { fetchArrayBuffer } from './shared/font-io.js';
    import { createSharedToolbar, persistInputValue, persistSelectValue } from './shared/shared-toolbar.js';

    const canvas = document.getElementById('myDrawing');
    const textInput = document.getElementById('textInput');
    const sizeInput = document.getElementById('sizeInput');
    const fileInput = document.getElementById('fileInput');
    const sampleSelect = document.getElementById('sampleSelect');
    const sampleLoadBtn = document.getElementById('sampleLoadBtn');
    const decoderBtn = document.getElementById('decoderBtn');
    const reproBtn = document.getElementById('reproBtn');
    const decoderSource = document.getElementById('decoderSource');
    const reproReport = document.getElementById('reproReport');
    const status = document.getElementById('status');
    const ctx = canvas.getContext('2d');

    const sampleFonts = getFontList('woff2Samples');
    const DEFAULT_DECODER_ESM = 'https://cdn.jsdelivr.net/npm/woff2-encoder@2.0.0/+esm';
    const DEFAULT_DECODER_SCRIPT = 'https://unpkg.com/wawoff2@2.0.1/build/decompress_binding.js';
    const SAMPLE_TEXT_BY_LABEL = {
        'Noto Sans subset (Latin)': 'Hello WOFF2',
        'Noto Sans Hebrew subset': 'שלום עולם',
        'Noto Naskh Arabic subset': 'مرحبا',
        'Roboto Variable subset': 'Variable WOFF2',
        'Font Awesome icons subset': '\uf007 \uf013 \uf0c0 \uf0f3'
    };

    let font = null;
    let decoderReady = false;
    let decoderLabel = 'none';
    const TOOL_KEY = "tool:woff2-loader";

    populateFontSelect(sampleSelect, sampleFonts);

    textInput.addEventListener('input', render);
    sizeInput.addEventListener('input', render);
    sampleSelect.addEventListener('change', applySampleTextFromSelection);
    persistSelectValue(sampleSelect, TOOL_KEY, "sample");
    persistInputValue(textInput, TOOL_KEY, "text");
    persistInputValue(sizeInput, TOOL_KEY, "size");

    decoderBtn.addEventListener('click', async () => {
        try {
            await ensureDecoderInstalled();
            setStatus(status, 'WOFF2 browser decoder is ready.', 'success');
        } catch (err) {
            setStatus(status, `Decoder setup failed: ${err?.message || err}`, 'warning');
        }
    });

    reproBtn.addEventListener('click', async () => {
        const selected = getSelectedFont(sampleSelect, sampleFonts);
        if (!selected) return;
        const prevReady = decoderReady;
        const prevLabel = decoderLabel;
        const prevGlobalWoff2 = globalThis.WOFF2;
        const prevGlobalWoff2Alt = globalThis.Woff2Decoder;
        try {
            decoderReady = false;
            decoderLabel = 'none';
            decoderSource.textContent = decoderLabel;
            setWoff2Decoder(null);
            setWoff2DecoderAsync(null);
            try { globalThis.WOFF2 = null; } catch {}
            try { globalThis.Woff2Decoder = null; } catch {}

            const bytes = await fetchArrayBuffer(selected.url);
            try {
                await FontParserWOFF2.fromArrayBufferAsync(bytes);
                reproReport.textContent = 'Unexpected: decode succeeded without configured decoder.';
            } catch (err) {
                reproReport.textContent = `Expected decoder failure:\n${err?.message || err}`;
            }

        } catch (err) {
            reproReport.textContent = `Repro run failed: ${err?.message || err}`;
        } finally {
            decoderReady = prevReady;
            decoderLabel = prevLabel;
            decoderSource.textContent = decoderLabel;
            try { globalThis.WOFF2 = prevGlobalWoff2; } catch {}
            try { globalThis.Woff2Decoder = prevGlobalWoff2Alt; } catch {}
        }
    });

    sampleLoadBtn.addEventListener('click', async () => {
        const selected = getSelectedFont(sampleSelect, sampleFonts);
        if (!selected) return;
        await loadWoff2Url(selected.url, selected.name);
    });

    fileInput.addEventListener('change', async () => {
        const file = fileInput.files?.[0];
        if (!file) return;
        try {
            await ensureDecoderInstalled();
            setStatus(status, `Loading ${file.name}...`, 'info');
            const parser = await FontParserWOFF2.fromArrayBufferAsync(await file.arrayBuffer());
            font = parser;
            render();
            setStatus(status, `Loaded ${file.name} (${decoderLabel})`, 'success');
        } catch (err) {
            font = null;
            clearCanvas(canvas, ctx);
            setStatus(status, `Failed to load ${file.name}: ${err?.message || err}`, 'warning');
        }
    });

    async function loadWoff2Url(url, label) {
        try {
            await ensureDecoderInstalled();
            setStatus(status, `Loading ${label}...`, 'info');
            const parser = await FontParserWOFF2.fromArrayBufferAsync(await fetchArrayBuffer(url));
            font = parser;
            render();
            setStatus(status, `Loaded ${label} (${decoderLabel})`, 'success');
        } catch (err) {
            font = null;
            clearCanvas(canvas, ctx);
            setStatus(status, `Failed to load ${label}: ${err?.message || err}`, 'warning');
        }
    }

    async function ensureDecoderInstalled() {
        if (decoderReady) return;
        const globalDecode = globalThis?.WOFF2?.decode;
        if (typeof globalDecode === 'function') {
            setWoff2Decoder((bytes) => toUint8Array(globalDecode(toTightArrayBuffer(bytes))));
            decoderReady = true;
            decoderLabel = 'global WOFF2.decode';
            decoderSource.textContent = decoderLabel;
            return;
        }

        setStatus(status, 'Setting up browser WOFF2 decoder...', 'info');
        const esmDecoder = await loadDecoderEsm(DEFAULT_DECODER_ESM);
        if (typeof esmDecoder === 'function') {
            setWoff2DecoderAsync(async (bytes) => toUint8Array(await esmDecoder(toTightArrayBuffer(bytes))));
            decoderReady = true;
            decoderLabel = 'woff2-encoder';
            decoderSource.textContent = decoderLabel;
            return;
        }

        const moduleRef = await loadWawoff2Module(DEFAULT_DECODER_SCRIPT);
        if (!moduleRef || typeof moduleRef.decompress !== 'function') {
            throw new Error('Decoder module loaded but Module.decompress is unavailable.');
        }

        setWoff2Decoder((bytes) => {
            return toUint8Array(moduleRef.decompress(toTightArrayBuffer(bytes)));
        });
        decoderReady = true;
        decoderLabel = 'wawoff2';
        decoderSource.textContent = decoderLabel;
    }

    async function loadDecoderEsm(url) {
        try {
            const mod = await import(url);
            if (typeof mod?.decompress === 'function') return mod.decompress;
            if (typeof mod?.default === 'function') return mod.default;
            if (mod?.default && typeof mod.default.decompress === 'function') return mod.default.decompress;
            return null;
        } catch {
            return null;
        }
    }

    async function loadWawoff2Module(src) {
        if (!document.querySelector(`script[data-woff2-decoder="${src}"]`)) {
            await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.async = true;
                script.dataset.woff2Decoder = src;
                script.onload = resolve;
                script.onerror = () => reject(new Error(`Failed to load decoder script: ${src}`));
                document.head.appendChild(script);
            });
        }

        const moduleRef = globalThis.Module;
        if (!moduleRef) {
            throw new Error('Decoder script loaded but global Module was not created.');
        }
        if (typeof moduleRef.decompress === 'function') {
            return moduleRef;
        }

        await new Promise((resolve, reject) => {
            const timeout = setTimeout(() => reject(new Error('Decoder initialization timed out.')), 7000);
            const prevInit = moduleRef.onRuntimeInitialized;
            moduleRef.onRuntimeInitialized = () => {
                clearTimeout(timeout);
                if (typeof prevInit === 'function') {
                    try { prevInit(); } catch {
                        // ignore
                    }
                }
                resolve();
            };
        });

        return moduleRef;
    }

    function toTightArrayBuffer(bytes) {
        if (!bytes) return new ArrayBuffer(0);
        if (bytes instanceof ArrayBuffer) return bytes;
        const view = bytes instanceof Uint8Array ? bytes : toUint8Array(bytes);
        const start = view.byteOffset;
        const end = start + view.byteLength;
        if (start === 0 && end === view.buffer.byteLength) return view.buffer;
        return view.buffer.slice(start, end);
    }

    function toUint8Array(value) {
        if (value instanceof Uint8Array) {
            return new Uint8Array(value.buffer, value.byteOffset, value.byteLength);
        }
        if (value instanceof ArrayBuffer) {
            return new Uint8Array(value);
        }
        if (ArrayBuffer.isView(value)) {
            return new Uint8Array(value.buffer, value.byteOffset, value.byteLength);
        }
        throw new Error('Decoder returned unsupported byte type.');
    }

    function applySampleTextFromSelection() {
        const selected = getSelectedFont(sampleSelect, sampleFonts);
        if (!selected) return;
        const sampleText = SAMPLE_TEXT_BY_LABEL[selected.name];
        if (sampleText) {
            textInput.value = sampleText;
        }
    }

    function render() {
        if (!font) return;
        clearCanvas(canvas, ctx);

        const fontSize = Number(sizeInput.value) || 160;
        const unitsPerEm = Number(font.getUnitsPerEm?.()) || 1000;
        const scale = fontSize / unitsPerEm;

        CanvasRenderer.drawString(font, textInput.value || '', canvas, {
            x: 40,
            y: Math.round(canvas.height * 0.65),
            scale,
            spacing: 2,
            styles: {
                fillStyle: '#111111',
                strokeStyle: '#111111',
                lineWidth: '1',
                globalAlpha: '1'
            }
        });
    }

    createSharedToolbar({
        mount: document.body,
        fontSelect: sampleSelect,
        sizeInput,
        scriptOptions: [
            { value: "latin", label: "Latin" },
            { value: "hebrew", label: "Hebrew" },
            { value: "arabic", label: "Arabic" },
            { value: "icons", label: "Icons" }
        ],
        onScriptChange: (value) => {
            if (value === "hebrew") textInput.value = "שלום עולם";
            else if (value === "arabic") textInput.value = "مرحبا";
            else if (value === "icons") textInput.value = "\uf007 \uf013 \uf0c0 \uf0f3";
            else textInput.value = "Hello WOFF2";
            render();
        },
        getExportData: () => ({
            tool: "woff2-loader",
            sample: sampleSelect.options[sampleSelect.selectedIndex]?.text || null,
            sampleUrl: sampleSelect.value,
            text: textInput.value,
            size: Number(sizeInput.value),
            decoderSource: decoderLabel,
            diagnostics: typeof font?.getDiagnostics === 'function' ? font.getDiagnostics() : []
        }),
        exportFilename: "woff2-loader-report.json",
        getDiagnosticsText: () => {
            const list = typeof font?.getDiagnostics === 'function' ? font.getDiagnostics() : [];
            if (!list.length) return "No diagnostics.";
            return list.slice(0, 30).map((d) => `[${d.phase}/${d.level}] ${d.code}: ${d.message}`).join('\n');
        }
    });

    // Try to boot decoder + first sample automatically.
    (async () => {
        try {
            await ensureDecoderInstalled();
            setStatus(status, 'WOFF2 browser decoder ready. Loading first sample...', 'success');
            const first = sampleFonts[0];
            if (first) {
                applySampleTextFromSelection();
                await loadWoff2Url(first.url, first.name);
            }
        } catch (err) {
            setStatus(status, `Decoder not ready yet: ${err?.message || err}`, 'warning');
        }
    })();
</script>
<script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
