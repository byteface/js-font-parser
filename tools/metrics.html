<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Font Metrics Inspector</title>
  <style>
    :root { --bg:#f2efe9; --ink:#1e1b16; --muted:#6a5f57; --panel:#fff; --border:#e5ded6; --accent:#7b4d2a; }
    body { margin:0; font-family:"Cormorant Garamond", Georgia, serif; background:var(--bg); color:var(--ink); }
    header { padding:22px 20px 10px; }
    h1 { margin:0 0 6px; font-size:28px; }
    p { margin:0 0 14px; color:var(--muted); }
    .wrap { display:grid; gap:16px; padding:16px 20px 32px; }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px; }
    .controls { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; }
    label { font-size:12px; color:var(--muted); display:block; margin-bottom:4px; }
    input { width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--border); box-sizing:border-box; }
    canvas { width:100%; height:280px; border:1px dashed var(--border); border-radius:10px; background:#fffaf5; }
    .metrics-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; }
    .metric-card {
      border:1px solid var(--border);
      border-radius:10px;
      background:#fbf8f3;
      padding:10px 12px;
    }
    .metric-card strong {
      display:block;
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:0.08em;
      color:var(--muted);
      margin-bottom:4px;
    }
    .metric-card span {
      font-size:18px;
      color:var(--ink);
    }
    .meta {
      font-family:ui-monospace, Menlo, monospace;
      font-size:12px;
      color:var(--muted);
      white-space:pre-wrap;
      background:#fbf8f3;
      border:1px solid var(--border);
      border-radius:10px;
      padding:10px;
      margin-top:8px;
    }
    .note { color:var(--muted); font-size:12px; }
  </style>
</head>
<body>
  <div id="fontDrawerMount"></div>
  <header>
    <h1>Metrics Inspector</h1>
    <p>Preview one font with baseline guides, typographic metrics, text advance, and table values that are useful for spacing and layout checks.</p>
  </header>
  <div class="wrap">
    <section class="panel">
      <div class="controls">
        <div>
          <label for="sampleInput">Sample Text</label>
          <input id="sampleInput" value="Hamburgefons 012345 ÅÁÉÖÑ" />
        </div>
        <div>
          <label for="scaleInput">Scale</label>
          <input id="scaleInput" type="number" min="0.02" max="0.6" step="0.01" value="0.12" />
        </div>
      </div>
    </section>

    <section class="panel">
      <canvas id="previewCanvas" width="1200" height="320"></canvas>
      <div class="note">Guides: baseline, ascender, descender, x-height, cap-height, and advance end.</div>
    </section>

    <section class="panel">
      <div id="metricsGrid" class="metrics-grid"></div>
      <div id="tableDump" class="meta"></div>
    </section>
  </div>

  <script type="module">
    import { FontParser } from '../dist/data/FontParser.js';
    import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';
    import { Table } from '../dist/table/Table.js';
    import { getFontList } from './shared/font-catalog.js';
    import { createFontDrawer, createFontLoader, getSelectedFont } from './shared/font-ui.js';

    const fonts = getFontList('featureMatrix');
    const loadFont = createFontLoader(FontParser.load);

    const ui = {
      fontDrawerMount: document.getElementById('fontDrawerMount'),
      fontSelect: document.createElement('select'),
      sampleInput: document.getElementById('sampleInput'),
      scaleInput: document.getElementById('scaleInput'),
      previewCanvas: document.getElementById('previewCanvas'),
      metricsGrid: document.getElementById('metricsGrid'),
      tableDump: document.getElementById('tableDump')
    };

    ui.fontSelect.id = 'fontSelect';
    ui.fontSelect.hidden = true;
    ui.fontSelect.dataset.fontSourceUi = 'off';
    document.body.appendChild(ui.fontSelect);

    let font = null;

    function safeNumber(value) {
      return Number.isFinite(value) ? value : null;
    }

    function addMetric(label, value) {
      const card = document.createElement('div');
      card.className = 'metric-card';
      card.innerHTML = `<strong>${label}</strong><span>${value ?? 'n/a'}</span>`;
      ui.metricsGrid.appendChild(card);
    }

    function drawGuide(ctx, y, width, color, label) {
      if (!Number.isFinite(y)) return;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(width, y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = color;
      ctx.font = '12px sans-serif';
      ctx.fillText(label, 12, Math.max(14, y - 6));
      ctx.restore();
    }

    function renderMetrics() {
      if (!font) return;
      const canvas = ui.previewCanvas;
      const ctx = canvas.getContext('2d');
      const text = ui.sampleInput.value || '';
      const scale = parseFloat(ui.scaleInput.value) || 0.12;

      const upm = safeNumber(font.getUnitsPerEm?.()) ?? 1000;
      const ascent = safeNumber(font.getAscent?.()) ?? Math.round(upm * 0.8);
      const descent = safeNumber(font.getDescent?.()) ?? -Math.round(upm * 0.2);
      const hhea = font.getTableByType?.(Table.hhea);
      const os2 = font.getOs2Metrics?.() || {};
      const vertical = font.getVerticalMetrics?.() || null;
      const lineGap = safeNumber(hhea?.lineGap) ?? 0;
      const xHeight = safeNumber(os2?.xHeight);
      const capHeight = safeNumber(os2?.capHeight);

      const baselineY = 210;
      const ascY = baselineY - ascent * scale;
      const descY = baselineY - descent * scale;
      const xHeightY = xHeight != null ? baselineY - xHeight * scale : NaN;
      const capHeightY = capHeight != null ? baselineY - capHeight * scale : NaN;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fffaf5';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawGuide(ctx, baselineY, canvas.width, '#af814f', 'baseline');
      drawGuide(ctx, ascY, canvas.width, '#4b8ba1', 'ascender');
      drawGuide(ctx, descY, canvas.width, '#9e5858', 'descender');
      drawGuide(ctx, xHeightY, canvas.width, '#7895bf', 'x-height');
      drawGuide(ctx, capHeightY, canvas.width, '#89a064', 'cap-height');

      const layout = font.layoutString(text, { gsubFeatures: ['liga'] });
      CanvasRenderer.drawLayout(font, layout, canvas, {
        x: 40,
        y: baselineY,
        scale,
        styles: { fillStyle: '#1e1b16', strokeStyle: '#1e1b16', lineWidth: 1 }
      });

      const advanceTotal = layout.reduce((sum, g) => sum + (g.xAdvance ?? 0), 0);
      const advanceX = 40 + advanceTotal * scale;
      ctx.save();
      ctx.strokeStyle = '#7b4d2a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(advanceX, 36);
      ctx.lineTo(advanceX, canvas.height - 26);
      ctx.stroke();
      ctx.fillStyle = '#7b4d2a';
      ctx.font = '12px sans-serif';
      ctx.fillText('advance end', Math.min(canvas.width - 90, advanceX + 8), 26);
      ctx.restore();

      const names = font.getNameInfo?.() || {};
      const glyphs = safeNumber(font.getNumGlyphs?.());
      const avgWidth = safeNumber(os2?.averageCharWidth);
      const typoAsc = safeNumber(os2?.typoAscender);
      const typoDesc = safeNumber(os2?.typoDescender);
      const typoGap = safeNumber(os2?.typoLineGap);
      const winAsc = safeNumber(os2?.usWinAscent);
      const winDesc = safeNumber(os2?.usWinDescent);
      const vAsc = safeNumber(vertical?.ascender);
      const vDesc = safeNumber(vertical?.descender);
      const vGap = safeNumber(vertical?.lineGap);
      const vAdvanceMax = safeNumber(vertical?.advanceHeightMax);

      ui.metricsGrid.innerHTML = '';
      addMetric('Font', names.fullName || names.fontFamily || 'unknown');
      addMetric('Glyphs', glyphs);
      addMetric('UPM', upm);
      addMetric('Advance', Math.round(advanceTotal));
      addMetric('Ascender', ascent);
      addMetric('Descender', descent);
      addMetric('Line Gap', lineGap);
      addMetric('x-Height', xHeight);
      addMetric('Cap Height', capHeight);
      addMetric('Avg Width', avgWidth);
      addMetric('OS/2 Typo Asc', typoAsc);
      addMetric('OS/2 Typo Desc', typoDesc);
      addMetric('OS/2 Typo Gap', typoGap);
      addMetric('Win Ascent', winAsc);
      addMetric('Win Descent', winDesc);
      addMetric('V Ascender', vAsc);
      addMetric('V Descender', vDesc);
      addMetric('V Line Gap', vGap);
      addMetric('V Advance Max', vAdvanceMax);

      ui.tableDump.textContent = [
        `Sample: ${JSON.stringify(text)}`,
        `Glyph count: ${layout.length}`,
        `Advance width: ${Math.round(advanceTotal)}`,
        `Ascent/Descent: ${ascent} / ${descent}`,
        `Line gap: ${lineGap}`,
        `Vertical metrics: ${vertical ? `${vertical.ascender} / ${vertical.descender} / ${vertical.lineGap}` : 'n/a'}`,
        `Name: ${names.fullName || names.fontFamily || 'unknown'}`,
        `Family/Subfamily: ${names.fontFamily || 'n/a'} / ${names.fontSubfamily || 'n/a'}`
      ].join('\n');
    }

    async function loadSelected() {
      const selected = getSelectedFont(ui.fontSelect, fonts);
      font = await loadFont(selected.url);
      renderMetrics();
    }

    createFontDrawer({
      mount: ui.fontDrawerMount,
      select: ui.fontSelect,
      fonts,
      allowUrl: true,
      title: 'Font'
    });

    ui.fontSelect.addEventListener('change', loadSelected);
    ui.sampleInput.addEventListener('input', renderMetrics);
    ui.scaleInput.addEventListener('input', renderMetrics);

    loadSelected();
  </script>
</body>
</html>
