<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Variable Font Explorer</title>
    <meta charset="utf-8">
    <style>
        :root { color-scheme: light; }
        body {
            margin: 24px;
            font-family: "Fraunces", "Georgia", serif;
            background: radial-gradient(circle at 20% 10%, #ffffff, #eef2f6);
            color: #15171b;
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; }
        .panel {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #dbe2e7;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(20, 30, 60, 0.08);
        }
        label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #4e5a6b;
        }
        select, input[type="text"], input[type="range"] {
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #dbe2e7;
            font-size: 14px;
            min-width: 200px;
            background: #fbfcff;
        }
        .layout {
            display: grid;
            grid-template-columns: minmax(240px, 320px) 1fr;
            gap: 16px;
        }
        .card {
            background: #ffffff;
            border: 1px solid #dbe2e7;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 6px 20px rgba(20, 30, 60, 0.06);
        }
        canvas {
            width: 100%;
            height: 320px;
            border: 1px dashed #dbe2e7;
            border-radius: 12px;
            background: #fbfcff;
        }
        .axis { margin-bottom: 12px; }
        .axis label { font-size: 11px; }
        .hint { margin-top: 8px; color: #4e5a6b; font-size: 12px; }
    </style>
</head>
<body>
<div data-nav="main" style="position:sticky;top:0;z-index:10;background:#f6f4f1;border-bottom:1px solid #e3e1db;padding:10px 16px;font-family:'Merriweather',serif;display:flex;gap:12px;align-items:center"><a href="../demos/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Demos</a><a href="../tools/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Tools</a></div>

    <h1>Variable Font Explorer</h1>
    <div class="panel">
        <label>
            Font
            <select id="fontSelect"></select>
        </label>
        <label>
            Text
            <input id="textInput" value="VARIABLE" />
        </label>
        <label style="flex-direction:row;align-items:center;gap:8px;text-transform:none;letter-spacing:normal;">
            <button id="compositeSample" type="button">Composite sample</button>
        </label>
        <label style="flex-direction:row;align-items:center;gap:8px;text-transform:none;letter-spacing:normal;">
            <input id="enableGvar" type="checkbox" checked />
            Enable gvar
        </label>
        <label style="flex-direction:row;align-items:center;gap:8px;text-transform:none;letter-spacing:normal;">
            <input id="soloAxis" type="checkbox" />
            Solo first axis
        </label>
        <label style="flex-direction:row;align-items:center;gap:8px;text-transform:none;letter-spacing:normal;">
            <input id="swapAxes" type="checkbox" />
            Swap axis order
        </label>
        <label style="flex-direction:row;align-items:center;gap:8px;text-transform:none;letter-spacing:normal;">
            <input id="lockOrigin" type="checkbox" />
            Lock origin
        </label>
        <label style="flex-direction:row;align-items:center;gap:8px;text-transform:none;letter-spacing:normal;">
            <input id="debugContours" type="checkbox" />
            Debug contours
        </label>
        <label style="flex-direction:row;align-items:center;gap:8px;text-transform:none;letter-spacing:normal;">
            <input id="debugCff2" type="checkbox" />
            CFF2 trace
        </label>
        <label style="flex-direction:row;align-items:center;gap:8px;text-transform:none;letter-spacing:normal;">
            <button id="dumpCff2" type="button">Dump CFF2 blends</button>
        </label>
    </div>

    <div class="layout">
        <div class="card">
            <div id="axes"></div>
            <div class="axis">
                <label>Probe glyph id</label>
                <div style="display:flex;gap:8px;flex-wrap:wrap">
                    <input id="probeGlyph" type="text" value="4" style="min-width:120px" />
                    <button id="probeMax">Find max Δ glyph</button>
                    <button id="axesMin">All axes min</button>
                    <button id="axesMax">All axes max</button>
                    <button id="axesReset">Reset axes</button>
                </div>
            </div>
            <label style="flex-direction:row;align-items:center;gap:8px;text-transform:none;letter-spacing:normal;">
                <input id="compareAxes" type="checkbox" />
                Compare min/max overlay (probe)
            </label>
            <div class="hint" id="status">Axes are read from `fvar`. gvar interpolation is experimental but includes IUP.</div>
        </div>
        <div class="card">
            <canvas id="canvas" width="900" height="260"></canvas>
            <div class="hint" style="margin-top:8px">Probe glyph render</div>
            <canvas id="probeCanvas" width="260" height="260"></canvas>
        </div>
    </div>

    <script type="module">
        import { FontParser } from '../dist/data/FontParser.js';
        import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';
        import { Table } from '../dist/table/Table.js';

        const fontSelect = document.getElementById('fontSelect');
        const textInput = document.getElementById('textInput');
        const compositeSample = document.getElementById('compositeSample');
        const axesContainer = document.getElementById('axes');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const probeCanvas = document.getElementById('probeCanvas');
        const probeCtx = probeCanvas.getContext('2d');
        const status = document.getElementById('status');
        const enableGvar = document.getElementById('enableGvar');
        const debugContours = document.getElementById('debugContours');
        const debugCff2 = document.getElementById('debugCff2');
        const dumpCff2 = document.getElementById('dumpCff2');
        const soloAxis = document.getElementById('soloAxis');
        const swapAxes = document.getElementById('swapAxes');
        const lockOrigin = document.getElementById('lockOrigin');
        const probeGlyphInput = document.getElementById('probeGlyph');
        const probeMaxBtn = document.getElementById('probeMax');
        const axesMinBtn = document.getElementById('axesMin');
        const axesMaxBtn = document.getElementById('axesMax');
        const axesResetBtn = document.getElementById('axesReset');
        const compareAxes = document.getElementById('compareAxes');
        const logDeltas = true;
        let loggedVstore = false;
        let baselinePoints = null;
        let dumpCff2Trace = false;
        let lastMainCff2Trace = [];

        function summarizeCff2Event(evt) {
            if (!evt || typeof evt !== 'object') return evt;
            if (evt.type !== 'blend') {
                return {
                    type: evt.type,
                    op: evt.op,
                    argsLen: Array.isArray(evt.args) ? evt.args.length : 0,
                    argsTail: Array.isArray(evt.args) ? evt.args.slice(-12) : []
                };
            }
            const base = Array.isArray(evt.base) ? evt.base : [];
            const out = Array.isArray(evt.out) ? evt.out : [];
            const delta = out.map((v, i) => +(v - (base[i] ?? 0)).toFixed(4));
            return {
                type: 'blend',
                vsIndex: evt.vsIndex,
                n: evt.n,
                regionCount: Array.isArray(evt.deltas) && evt.n ? Math.max(0, (evt.deltas.length / evt.n)) : null,
                coords: Array.isArray(evt.coords) ? evt.coords.map(v => +Number(v).toFixed(4)) : [],
                regionIndices: Array.isArray(evt.regionIndices) ? evt.regionIndices.slice(0, 12) : [],
                regionScalars: Array.isArray(evt.regionScalars) ? evt.regionScalars.map(v => +Number(v).toFixed(6)) : [],
                base: base.slice(0, 12),
                out: out.slice(0, 12),
                delta: delta.slice(0, 12)
            };
        }

        const fonts = [
            { name: 'Source Serif 4 Variable (CFF2)', url: '../truetypefonts/OTF/source-serif4/SourceSerif4Variable-Roman.otf' },
            { name: 'Playwrite GB S Variable', url: '../truetypefonts/Playwrite_GB_S/PlaywriteGBS-VariableFont_wght.ttf' },
            { name: 'Playwrite GB S Italic Variable', url: '../truetypefonts/Playwrite_GB_S/PlaywriteGBS-Italic-VariableFont_wght.ttf' },
            { name: 'Arimo Variable', url: '../truetypefonts/arimo/Arimo[wght].ttf' },
            { name: 'Noto Sans Arabic VF', url: '../truetypefonts/curated-extra/NotoSansArabic-VF.ttf' },
            { name: 'Noto Sans Devanagari VF', url: '../truetypefonts/curated-extra/NotoSansDevanagari-VF.ttf' },
            { name: 'Noto Sans Hebrew VF', url: '../truetypefonts/curated-extra/NotoSansHebrew-VF.ttf' },
            { name: 'Noto Sans Thai VF', url: '../truetypefonts/curated-extra/NotoSansThai-VF.ttf' },
            { name: 'Noto Sans Khmer VF', url: '../truetypefonts/curated-extra/NotoSansKhmer-VF.ttf' },
            { name: 'Noto Sans Ethiopic VF', url: '../truetypefonts/curated-extra/NotoSansEthiopic-VF.ttf' }
        ];

        const cache = new Map();
        let font = null;
        let axes = [];

        function populateFonts() {
            fontSelect.innerHTML = '';
            fonts.forEach((f, i) => {
                const opt = document.createElement('option');
                opt.value = String(i);
                opt.textContent = f.name;
                fontSelect.appendChild(opt);
            });
        }

        async function loadFont(url) {
            if (cache.has(url)) return cache.get(url);
            const f = await FontParser.load(url);
            cache.set(url, f);
            return f;
        }

        function clear() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fbfcff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function renderContours(glyph, context, scale, originX, originY) {
            if (!glyph || !context) return;
            const colors = ['#1f6feb', '#e5534b', '#2da44e', '#a371f7', '#bf8700', '#f85149'];
            let contourIndex = 0;
            let start = 0;
            for (let i = 0; i < glyph.getPointCount(); i++) {
                const p = glyph.getPoint(i);
                if (!p || !p.endOfContour) continue;
                const color = colors[contourIndex % colors.length];
                // debug: contour stats
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                let area = 0;
                let prev = glyph.getPoint(i);
                for (let j = start; j <= i; j++) {
                    const pt = glyph.getPoint(j);
                    if (!pt) continue;
                    minX = Math.min(minX, pt.x);
                    maxX = Math.max(maxX, pt.x);
                    minY = Math.min(minY, pt.y);
                    maxY = Math.max(maxY, pt.y);
                    if (prev) {
                        area += (prev.x * pt.y) - (pt.x * prev.y);
                    }
                    prev = pt;
                }
                if (prev) {
                    const first = glyph.getPoint(start);
                    if (first) {
                        area += (prev.x * first.y) - (first.x * prev.y);
                    }
                }
                const w = maxX - minX;
                const h = maxY - minY;
                console.log(`Contour ${contourIndex}: pts=${i - start + 1} bounds=[${minX},${minY}]→[${maxX},${maxY}] w=${w} h=${h} area=${area / 2}`);

                context.save();
                context.translate(originX, originY);
                context.scale(scale, -scale);
                context.beginPath();
                let first = true;
                for (let j = start; j <= i; j++) {
                    const pt = glyph.getPoint(j);
                    if (!pt) continue;
                    if (first) {
                        context.moveTo(pt.x, pt.y);
                        first = false;
                    } else {
                        context.lineTo(pt.x, pt.y);
                    }
                }
                context.closePath();
                context.strokeStyle = color;
                context.lineWidth = 2 / scale;
                context.stroke();
                context.restore();
                // label contour index near its first point (screen space)
                const firstPt = glyph.getPoint(start);
                if (firstPt) {
                    const sx = originX + (firstPt.x * scale);
                    const sy = originY - (firstPt.y * scale);
                    context.save();
                    context.fillStyle = color;
                    context.font = '14px monospace';
                    context.fillText(String(contourIndex), sx + 4, sy - 4);
                    context.beginPath();
                    context.arc(sx, sy, 3, 0, Math.PI * 2);
                    context.fill();
                    context.restore();
                }
                start = i + 1;
                contourIndex++;
            }
        }

        function renderText() {
            if (!font) return;
            clear();
            const head = font.getTableByType(Table.head);
            const unitsPerEm = head?.unitsPerEm ?? 1000;
            const scale = 160 / unitsPerEm;
            const hasCff2 = !!font.getTableByType(Table.CFF2);
            const liveCoords = axes.map((axis, idx) => {
                const value = (soloAxis.checked && idx > 0) ? axis.defaultValue : axis.value;
                const norm = value === axis.defaultValue
                    ? 0
                    : value > axis.defaultValue
                        ? (value - axis.defaultValue) / (axis.maxValue - axis.defaultValue)
                        : (value - axis.defaultValue) / (axis.defaultValue - axis.minValue);
                return Math.max(-1, Math.min(1, norm));
            });
            if (swapAxes.checked && liveCoords.length > 1) {
                liveCoords.reverse();
            }
            // Keep CFF2 coords in sync even on re-renders triggered by debug buttons.
            if (enableGvar.checked && hasCff2 && typeof font.setVariationCoords === 'function') {
                font.setVariationCoords(liveCoords);
            }
            if (debugCff2.checked && font.getTableByType(Table.CFF2)) {
                window.__CFF2_TRACE = [];
                window.__CFF2_DEBUG = true;
            } else {
                window.__CFF2_DEBUG = false;
                lastMainCff2Trace = [];
            }
            if (debugContours.checked) {
                const glyph = font.getGlyphByChar ? font.getGlyphByChar('A') : null;
                let ox = 60;
                let oy = 220;
                if (lockOrigin.checked && glyph) {
                    let minX = Infinity, minY = Infinity;
                    for (let i = 0; i < glyph.getPointCount(); i++) {
                        const p = glyph.getPoint(i);
                        if (!p) continue;
                        if (p.x < minX) minX = p.x;
                        if (p.y < minY) minY = p.y;
                    }
                    if (minX !== Infinity) ox = ox - (minX * scale);
                    if (minY !== Infinity) oy = oy + (minY * scale);
                    if (logDeltas) {
                        console.log('CFF2 glyph min', { minX, minY });
                    }
                }
                renderContours(glyph, ctx, scale, ox, oy);
            } else if (lockOrigin.checked) {
                let cursorX = 40;
                const baselineY = 220;
                for (const ch of textInput.value) {
                    const glyph = font.getGlyphByChar ? font.getGlyphByChar(ch) : null;
                    if (!glyph) {
                        cursorX += 8;
                        continue;
                    }
                    let minX = Infinity;
                    let minY = Infinity;
                    for (let i = 0; i < glyph.getPointCount(); i++) {
                        const p = glyph.getPoint(i);
                        if (!p) continue;
                        if (p.x < minX) minX = p.x;
                        if (p.y < minY) minY = p.y;
                    }
                    const drawX = minX !== Infinity ? cursorX - (minX * scale) : cursorX;
                    const drawY = minY !== Infinity ? baselineY + (minY * scale) : baselineY;
                    CanvasRenderer.drawGlyphToContext(ctx, glyph, {
                        x: drawX,
                        y: drawY,
                        scale,
                        styles: { fillStyle: '#2f4f7a', strokeStyle: '#2f4f7a', lineWidth: 1 }
                    });
                    cursorX += (glyph.advanceWidth ?? 0) * scale + 4;
                }
            } else {
                CanvasRenderer.drawString(font, textInput.value, canvas, {
                    x: 40,
                    y: 220,
                    scale,
                    spacing: 4,
                    styles: { fillStyle: '#2f4f7a', strokeStyle: '#2f4f7a', lineWidth: 1 }
                });
            }
            if (debugCff2.checked && Array.isArray(window.__CFF2_TRACE)) {
                lastMainCff2Trace = window.__CFF2_TRACE.slice();
            }

            const glyph = font.getGlyphByChar ? font.getGlyphByChar('H') : null;
            let maxDelta = 0;
            if (glyph && glyph.getPointCount && baselinePoints) {
                const count = Math.min(glyph.getPointCount(), baselinePoints.length);
                for (let i = 0; i < count; i++) {
                    const p = glyph.getPoint(i);
                    const b = baselinePoints[i];
                    if (!p || !b) continue;
                    const dx = p.x - b.x;
                    const dy = p.y - b.y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d > maxDelta) maxDelta = d;
                }
            }
            const axisSummary = axes.map(axis => `${axis.name}=${axis.value}`).join(', ');
            const coords = liveCoords.map(v => v.toFixed(2)).join(',');
            const probeInfo = renderProbeGlyph();
            status.textContent = `fvar: ${font.getTableByType(Table.fvar) ? 'yes' : 'no'} | gvar: ${font.getTableByType(Table.gvar) ? 'yes' : 'no'} | cff2: ${font.getTableByType(Table.CFF2) ? 'yes' : 'no'} | max Δ: ${maxDelta.toFixed(2)} | coords: [${coords}]${axisSummary ? ' | ' + axisSummary : ''}${probeInfo ? ' | ' + probeInfo : ''}`;

            if (dumpCff2Trace) {
                dumpCff2Trace = false;
                const trace = lastMainCff2Trace;
                const last = trace.slice(-5);
                console.log('CFF2 trace count:', trace.length);
                console.log('CFF2 trace tail:', last);
                console.log('CFF2 trace tail summary:', JSON.stringify(last.map(summarizeCff2Event), null, 2));
                const blends = trace.filter(t => t?.type === 'blend').slice(-8);
                console.log('CFF2 recent blends summary:', JSON.stringify(blends.map(summarizeCff2Event), null, 2));
            }
        }

        function renderProbeGlyph() {
            if (!font || !probeCtx) return '';
            const head = font.getTableByType(Table.head);
            const unitsPerEm = head?.unitsPerEm ?? 1000;
            const scale = 220 / unitsPerEm;
            const gid = Number(probeGlyphInput.value);
            if (!Number.isFinite(gid)) return 'probe: invalid';
            probeCtx.clearRect(0, 0, probeCanvas.width, probeCanvas.height);
            probeCtx.fillStyle = '#fbfcff';
            probeCtx.fillRect(0, 0, probeCanvas.width, probeCanvas.height);

            if (font.getTableByType(Table.CFF2) && axes.length > 0) {
                const restore = font.variationCoords ? font.variationCoords.slice() : [];
                const renderWithCoords = (coords, color) => {
                    font.setVariationCoords(coords);
                    const g = font.getGlyph(gid);
                    if (g) {
                        CanvasRenderer.drawGlyphToContext(probeCtx, g, {
                            x: 20,
                            y: 220,
                            scale,
                            styles: { fillStyle: color, strokeStyle: color, lineWidth: 1 }
                        });
                    }
                };
                const baseCoords = new Array(axes.length).fill(0);
                renderWithCoords(baseCoords, 'rgba(120,120,120,0.35)');
                const wghtIndex = axes.findIndex(a => a.name === 'wght');
                const opszIndex = axes.findIndex(a => a.name === 'opsz');
                if (wghtIndex >= 0) {
                    const coords = baseCoords.slice();
                    coords[wghtIndex] = 1;
                    renderWithCoords(coords, 'rgba(40,120,220,0.45)');
                }
                if (opszIndex >= 0) {
                    const coords = baseCoords.slice();
                    coords[opszIndex] = 1;
                    renderWithCoords(coords, 'rgba(220,80,80,0.45)');
                }
                font.setVariationCoords(restore);
            }

            if (compareAxes.checked && axes.length) {
                const restoreValues = axes.map(axis => axis.value);
                setAllAxes('min');
                const minGlyph = font.getGlyph(gid);
                if (minGlyph) {
                    CanvasRenderer.drawGlyphToContext(probeCtx, minGlyph, {
                        x: 20,
                        y: 220,
                        scale,
                        styles: { fillStyle: 'rgba(64,120,200,0.35)', strokeStyle: 'rgba(64,120,200,0.9)', lineWidth: 1 }
                    });
                }
                setAllAxes('max');
                const maxGlyph = font.getGlyph(gid);
                if (maxGlyph) {
                    CanvasRenderer.drawGlyphToContext(probeCtx, maxGlyph, {
                        x: 20,
                        y: 220,
                        scale,
                        styles: { fillStyle: 'rgba(216,74,74,0.35)', strokeStyle: 'rgba(216,74,74,0.9)', lineWidth: 1 }
                    });
                }
                axes.forEach((axis, idx) => {
                    axis.value = restoreValues[idx];
                    if (axis._slider) axis._slider.value = String(axis.value);
                });
                applyAxisValues();
            } else {
                const glyph = font.getGlyph(gid);
                if (!glyph) return `probe gid ${gid}: no glyph`;

                // draw baseline (default coords) in light gray for comparison
                const restoreCoords = font.variationCoords ? font.variationCoords.slice() : [];
                if (typeof font.setVariationCoords === 'function' && !debugCff2.checked) {
                    font.setVariationCoords([]);
                    const baseGlyph = font.getGlyph(gid);
                    if (baseGlyph) {
                        CanvasRenderer.drawGlyphToContext(probeCtx, baseGlyph, {
                            x: 20,
                            y: 220,
                            scale,
                            styles: { fillStyle: 'rgba(120,140,170,0.35)', strokeStyle: 'rgba(120,140,170,0.5)', lineWidth: 1 }
                        });
                    }
                    font.setVariationCoords(restoreCoords);
                }

                CanvasRenderer.drawGlyphToContext(probeCtx, glyph, {
                    x: 20,
                    y: 220,
                    scale,
                    styles: { fillStyle: '#2f4f7a', strokeStyle: '#2f4f7a', lineWidth: 1.2 }
                });
            }

            const gvar = font.getTableByType(Table.gvar);
            if (!gvar || !font.glyf?.getDescription) return `probe gid ${gid}`;
            const desc = font.glyf.getDescription(gid);
            if (!desc || desc.isComposite()) return `probe gid ${gid} (composite/no desc)`;
            const deltas = gvar.getDeltasForGlyph(gid, font.variationCoords ?? [], desc.getPointCount() + 4);
            if (!deltas) return `probe gid ${gid} (no deltas)`;
            let max = 0;
            for (let i = 0; i < desc.getPointCount(); i++) {
                const d = Math.hypot(deltas.dx[i], deltas.dy[i]);
                if (d > max) max = d;
            }
            return `probe gid ${gid} maxΔ ${max.toFixed(2)}`;
        }

        function renderAxes(fvar) {
            axesContainer.innerHTML = '';
            if (!fvar || !fvar.axes?.length) {
                axesContainer.innerHTML = '<div class="hint">No fvar table found.</div>';
                return;
            }
            axes = fvar.axes.map(axis => ({ ...axis, value: axis.defaultValue }));

            axes.forEach((axis, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'axis';
                const label = document.createElement('label');
                label.textContent = `${axis.name} (${axis.minValue} → ${axis.maxValue})`;
                const slider = document.createElement('input');
                slider.type = 'range';
                slider.min = String(axis.minValue);
                slider.max = String(axis.maxValue);
                slider.step = '1';
                slider.value = String(axis.defaultValue);
                slider.addEventListener('input', () => {
                    axis.value = Number(slider.value);
                    applyAxisValues();
                });
                axis._slider = slider;
                wrapper.appendChild(label);
                wrapper.appendChild(slider);
                axesContainer.appendChild(wrapper);
            });
        }

        function applyAxisValues() {
            if (!font) return;
            if (!enableGvar.checked) {
                if (typeof font.setVariationCoords === 'function') {
                    font.setVariationCoords([]);
                }
                renderText();
                return;
            }
            if (font.getTableByType(Table.CFF2) && typeof font.setVariationCoords === 'function') {
                const coords = axes.map((axis, idx) => {
                    const value = (soloAxis.checked && idx > 0) ? axis.defaultValue : axis.value;
                    const norm = value === axis.defaultValue
                        ? 0
                        : value > axis.defaultValue
                            ? (value - axis.defaultValue) / (axis.maxValue - axis.defaultValue)
                            : (value - axis.defaultValue) / (axis.defaultValue - axis.minValue);
                    return Math.max(-1, Math.min(1, norm));
                });
                if (swapAxes.checked && coords.length > 1) {
                    coords.reverse();
                }
                font.setVariationCoords(coords);
                if (logDeltas) {
                    console.log('CFF2 coords', coords, 'axes', axes.map(a => a.name));
                }
                if (!loggedVstore && font.cff2?.vstoreRegions?.length) {
                    loggedVstore = true;
                    const axisNames = axes.map(a => a.name);
                    const regions = font.cff2.vstoreRegions.map((region, idx) => {
                        const active = region
                            .map((r, a) => ({ axis: axisNames[a] ?? `a${a}`, start: r.start, peak: r.peak, end: r.end }))
                            .filter(r => !(r.start === 0 && r.peak === 0 && r.end === 0));
                        return { idx, active };
                    });
                    const summary = regions.filter(r => r.active.length > 0).slice(0, 24);
                    console.log('CFF2 vstore regions (first 24 active):', summary);
                }
            } else {
                if (typeof font.setVariationByAxes !== 'function') return;
                const values = {};
                axes.forEach((axis, idx) => {
                    if (soloAxis.checked && idx > 0) {
                        values[axis.name] = axis.defaultValue;
                    } else {
                        values[axis.name] = axis.value;
                    }
                });
                font.setVariationByAxes(values);
            }
            renderText();
        }

        function setAllAxes(to) {
            axes.forEach(axis => {
                if (to === 'min') axis.value = axis.minValue;
                if (to === 'max') axis.value = axis.maxValue;
                if (to === 'default') axis.value = axis.defaultValue;
                if (axis._slider) axis._slider.value = String(axis.value);
            });
            applyAxisValues();
        }

        function findMaxDeltaGlyph() {
            if (!font) return;
            const gvar = font.getTableByType(Table.gvar);
            if (!gvar || !font.glyf?.getDescription) return;
            let bestGid = 0;
            let bestDelta = 0;
            const limit = Math.min(font.getNumGlyphs?.() ?? 0, 512);
            for (let gid = 0; gid < limit; gid++) {
                const desc = font.glyf.getDescription(gid);
                if (!desc || desc.isComposite()) continue;
                const deltas = gvar.getDeltasForGlyph(gid, font.variationCoords ?? [], desc.getPointCount() + 4);
                if (!deltas) continue;
                let max = 0;
                for (let i = 0; i < desc.getPointCount(); i++) {
                    const d = Math.hypot(deltas.dx[i], deltas.dy[i]);
                    if (d > max) max = d;
                }
                if (max > bestDelta) {
                    bestDelta = max;
                    bestGid = gid;
                }
            }
            probeGlyphInput.value = String(bestGid);
            renderText();
        }

        async function loadAndRender() {
            const selected = fonts[Number(fontSelect.value)] ?? fonts[0];
            font = await loadFont(selected.url);
            window.__font = font;
            const fvar = font.getTableByType(Table.fvar);
            renderAxes(fvar);
            let baseGlyph = null;
            const restoreCoords = font.variationCoords ? font.variationCoords.slice() : [];
            if (typeof font.setVariationCoords === 'function') {
                font.setVariationCoords([]);
                baseGlyph = font.getGlyphByChar ? font.getGlyphByChar('H') : null;
                font.setVariationCoords(restoreCoords);
            } else {
                baseGlyph = font.getGlyphByChar ? font.getGlyphByChar('H') : null;
            }
            baselinePoints = baseGlyph ? Array.from({ length: baseGlyph.getPointCount() }, (_, i) => {
                const p = baseGlyph.getPoint(i);
                return p ? { x: p.x, y: p.y } : null;
            }) : null;
            applyAxisValues();
            renderText();
        }

        fontSelect.addEventListener('change', loadAndRender);
        textInput.addEventListener('input', renderText);
        compositeSample.addEventListener('click', () => {
            textInput.value = 'ÅÁÉÖÑæœ';
            renderText();
        });
        enableGvar.addEventListener('change', applyAxisValues);
        probeGlyphInput.addEventListener('input', renderText);
        debugContours.addEventListener('input', renderText);
        debugCff2.addEventListener('input', renderText);
        soloAxis.addEventListener('input', applyAxisValues);
        swapAxes.addEventListener('input', applyAxisValues);
        lockOrigin.addEventListener('input', renderText);
        probeMaxBtn.addEventListener('click', findMaxDeltaGlyph);
        compareAxes.addEventListener('change', renderText);
        dumpCff2.addEventListener('click', () => {
            dumpCff2Trace = true;
            renderText();
        });
        axesMinBtn.addEventListener('click', () => setAllAxes('min'));
        axesMaxBtn.addEventListener('click', () => setAllAxes('max'));
        axesResetBtn.addEventListener('click', () => setAllAxes('default'));

        populateFonts();
        loadAndRender();
    </script>
</body>
