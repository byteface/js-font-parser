<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SVG Glyphs</title>
  <style>
    :root { --bg:#f6f4f1; --ink:#1e1f24; --muted:#5e6574; --panel:#fff; --border:#e3e1db; }
    body { margin:0; font-family:"Merriweather", serif; background:var(--bg); color:var(--ink); }
    header { padding:22px 20px 10px; }
    h1 { margin:0 0 6px; font-size:26px; }
    p { margin:0 0 14px; color:var(--muted); }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px; margin:12px 20px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    input[type="file"], input[type="text"] { padding:6px; border-radius:6px; border:1px solid #ccc; }
    #svgPreview { border:1px dashed #ddd; background:#fff; padding:16px; min-height:420px; display:flex; align-items:center; justify-content:center; }
    #svgPreview svg { width: 420px; height: 420px; max-width: 90vw; max-height: 70vh; }
    .hint { font-size:12px; color:var(--muted); margin-top:8px; }
  </style>
</head>
<body>
<div data-nav="main"></div>
  <header>
    <h1>SVG Glyphs</h1>
    <p>Render glyphs stored in the <code>SVG </code> table.</p>
  </header>

  <div class="panel">
    <div class="row">
      <input id="fileInput" type="file" accept=".otf,.ttf" />
      <button id="loadSample">Load Twemoji SVG Sample</button>
      <button id="prevGlyph">Prev SVG</button>
      <button id="nextGlyph">Next SVG</button>
      <label>Char <input id="charInput" value="A" /></label>
      <label>Glyph ID <input id="glyphInput" type="text" value="" /></label>
    </div>
    <div class="hint">If the SVG table uses gzip compression, your browser must support <code>DecompressionStream</code>.</div>
    <div id="info" class="hint"></div>
  </div>

  <div class="panel">
    <div id="svgPreview"></div>
  </div>

  <script type="module">
    import { FontParser } from "../dist/data/FontParser.js";
    import { Table } from "../dist/table/Table.js";

    const input = document.getElementById("fileInput");
    const charInput = document.getElementById("charInput");
    const glyphInput = document.getElementById("glyphInput");
    const preview = document.getElementById("svgPreview");
    const loadSample = document.getElementById("loadSample");
    const info = document.getElementById("info");
    const prevBtn = document.getElementById("prevGlyph");
    const nextBtn = document.getElementById("nextGlyph");
    let svgRanges = [];
    let currentRangeIndex = 0;

    let font = null;

    function parseTransform(transform) {
      if (!transform) return null;
      const tokens = transform.match(/[a-zA-Z]+\([^)]*\)/g) || [];
      let m = { a: 1, b: 0, c: 0, d: 1, e: 0, f: 0 };
      const multiply = (m1, m2) => ({
        a: m1.a * m2.a + m1.c * m2.b,
        b: m1.b * m2.a + m1.d * m2.b,
        c: m1.a * m2.c + m1.c * m2.d,
        d: m1.b * m2.c + m1.d * m2.d,
        e: m1.a * m2.e + m1.c * m2.f + m1.e,
        f: m1.b * m2.e + m1.d * m2.f + m1.f
      });
      for (const t of tokens) {
        const name = t.slice(0, t.indexOf('('));
        const args = t.slice(t.indexOf('(') + 1, -1).split(/[ ,]+/).filter(Boolean).map(Number);
        if (name === 'matrix' && args.length === 6) {
          m = multiply(m, { a: args[0], b: args[1], c: args[2], d: args[3], e: args[4], f: args[5] });
        } else if (name === 'translate') {
          const tx = args[0] || 0;
          const ty = args[1] || 0;
          m = multiply(m, { a: 1, b: 0, c: 0, d: 1, e: tx, f: ty });
        } else if (name === 'scale') {
          const sx = args[0];
          const sy = args.length > 1 ? args[1] : sx;
          m = multiply(m, { a: sx, b: 0, c: 0, d: sy, e: 0, f: 0 });
        }
      }
      return m;
    }

    function invertMatrix(m) {
      const det = m.a * m.d - m.b * m.c;
      if (!det) return null;
      return {
        a: m.d / det,
        b: -m.b / det,
        c: -m.c / det,
        d: m.a / det,
        e: (m.c * m.f - m.d * m.e) / det,
        f: (m.b * m.e - m.a * m.f) / det
      };
    }

    function applyMatrix(m, x, y) {
      return { x: m.a * x + m.c * y + m.e, y: m.b * x + m.d * y + m.f };
    }

    async function renderGlyph() {
      if (!font) return;
      const char = charInput.value || "A";
      let glyphId = glyphInput.value ? Number(glyphInput.value) : font.getGlyphIndexByChar?.(char);
      if (glyphId == null || Number.isNaN(glyphId)) {
        preview.textContent = "No glyph index found.";
        return;
      }
      const svgTable = font.getTableByType(Table.SVG);
      if (!svgTable || typeof svgTable.getSvgDocumentForGlyphAsync !== "function") {
        preview.textContent = "SVG table not found in this font.";
        return;
      }
      const result = await svgTable.getSvgDocumentForGlyphAsync(glyphId);
      if (!result.svgText) {
        preview.textContent = result.isCompressed ? "SVG data is compressed; decompression failed." : "No SVG glyph found.";
        return;
      }
      const rawText = result.svgText;
      const svgStart = rawText.indexOf("<svg");
      const cleaned = svgStart >= 0 ? rawText.slice(svgStart) : rawText;
      const parser = new DOMParser();
      const doc = parser.parseFromString(cleaned, "image/svg+xml");
      const svgEl = doc.querySelector("svg");
      preview.innerHTML = "";
      if (svgEl) {
        const gWithTransform = svgEl.querySelector('g[transform]');
        const transform = gWithTransform?.getAttribute('transform') || '';
        if (!svgEl.getAttribute("viewBox")) {
          const width = parseFloat(svgEl.getAttribute("width") || "");
          const height = parseFloat(svgEl.getAttribute("height") || "");
          if (Number.isFinite(width) && Number.isFinite(height)) {
            svgEl.setAttribute("viewBox", `0 0 ${width} ${height}`);
          }
        }
        if (gWithTransform) {
          const width = parseFloat(svgEl.getAttribute("width") || "36");
          const height = parseFloat(svgEl.getAttribute("height") || "36");
          const w = Number.isFinite(width) ? width : 36;
          const h = Number.isFinite(height) ? height : 36;
          svgEl.setAttribute("viewBox", `0 0 ${w} ${h}`);
          gWithTransform.removeAttribute("transform");
        }
        svgEl.setAttribute("width", "100%");
        svgEl.setAttribute("height", "100%");
        svgEl.setAttribute("preserveAspectRatio", "xMidYMid meet");
        preview.appendChild(svgEl);
      } else {
        preview.textContent = "SVG glyph parsed, but no <svg> root found.";
      }
    }

    input.addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const buf = await file.arrayBuffer();
      font = FontParser.fromArrayBuffer(buf);
      renderGlyph();
    });

    loadSample.addEventListener("click", async () => {
      const response = await fetch("../truetypefonts/svg/TwitterColorEmoji-SVGinOT-15.1.0/TwitterColorEmoji-SVGinOT.ttf");
      if (!response.ok) {
        preview.textContent = "Failed to load sample font.";
        return;
      }
      const buf = await response.arrayBuffer();
      font = FontParser.fromArrayBuffer(buf);
      charInput.value = "😀";
      glyphInput.value = "";
      const svgTable = font.getTableByType(Table.SVG);
      if (svgTable?.entries?.length) {
        svgRanges = svgTable.entries;
        currentRangeIndex = 0;
        const first = svgRanges[0];
        glyphInput.value = String(first.startGlyphId);
        info.textContent = `SVG entries: ${svgRanges.length} (first ${first.startGlyphId}-${first.endGlyphId})`;
      }
      renderGlyph();
    });

    prevBtn.addEventListener("click", () => {
      if (!svgRanges.length) return;
      currentRangeIndex = (currentRangeIndex - 1 + svgRanges.length) % svgRanges.length;
      const entry = svgRanges[currentRangeIndex];
      glyphInput.value = String(entry.startGlyphId);
      renderGlyph();
    });

    nextBtn.addEventListener("click", () => {
      if (!svgRanges.length) return;
      currentRangeIndex = (currentRangeIndex + 1) % svgRanges.length;
      const entry = svgRanges[currentRangeIndex];
      glyphInput.value = String(entry.startGlyphId);
      renderGlyph();
    });

    charInput.addEventListener("input", () => {
      glyphInput.value = "";
      renderGlyph();
    });
    glyphInput.addEventListener("input", renderGlyph);
  </script>
  <script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
