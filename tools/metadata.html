<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Font Metadata</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; color: #222; }
        select { padding: 6px; margin-bottom: 12px; }
        table { border-collapse: collapse; width: 100%; max-width: 900px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f4f4f4; }
        .note { color: #666; margin-bottom: 12px; }
    </style>
</head>
<body>
<div data-nav="main" style="position:sticky;top:0;z-index:10;background:#f6f4f1;border-bottom:1px solid #e3e1db;padding:10px 16px;font-family:'Merriweather',serif;display:flex;gap:12px;align-items:center"><a href="../demos/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Demos</a><a href="../tools/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Tools</a></div>

<h1>Font Metadata</h1>
<div class="note">Reads name/OS2/post convenience APIs and the raw name records.</div>
<label for="fontSelect">Font:</label>
<select id="fontSelect"></select>
<div id="output"></div>

<script type="module">
    import { FontParser } from '../dist/data/FontParser.js';

    const fonts = [
        { label: 'DiscoMo.ttf', url: '../truetypefonts/DiscoMo.ttf' },
        { label: 'DevilInside-G3xP.ttf', url: '../truetypefonts/devil-inside-font/DevilInside-G3xP.ttf' },
        { label: 'JoeJack.ttf', url: '../truetypefonts/JoeJack.ttf' },
        { label: 'NotoSans-Regular.ttf', url: '../truetypefonts/noto/NotoSans-Regular.ttf' },
        { label: 'NotoSansHebrew-Regular.ttf', url: '../truetypefonts/noto/NotoSansHebrew-Regular.ttf' },
        { label: 'NotoSansArabic-VF.ttf', url: '../truetypefonts/curated-extra/NotoSansArabic-VF.ttf' },
        { label: 'NotoSansDevanagari-VF.ttf', url: '../truetypefonts/curated-extra/NotoSansDevanagari-VF.ttf' },
        { label: 'NotoSansHebrew-VF.ttf', url: '../truetypefonts/curated-extra/NotoSansHebrew-VF.ttf' },
        { label: 'NotoSansThai-VF.ttf', url: '../truetypefonts/curated-extra/NotoSansThai-VF.ttf' },
        { label: 'NotoSansKhmer-VF.ttf', url: '../truetypefonts/curated-extra/NotoSansKhmer-VF.ttf' },
        { label: 'NotoSansEthiopic-VF.ttf', url: '../truetypefonts/curated-extra/NotoSansEthiopic-VF.ttf' },
        { label: 'SourceCodePro-Regular.otf', url: '../truetypefonts/curated-extra/SourceCodePro-Regular.otf' },
        { label: 'SourceCodePro-Bold.otf', url: '../truetypefonts/curated-extra/SourceCodePro-Bold.otf' },
        { label: 'FontAwesome-4.7.0.ttf', url: '../truetypefonts/curated-extra/FontAwesome-4.7.0.ttf' }
    ];

    const nameIdLabels = {
        0: 'Copyright',
        1: 'Font Family',
        2: 'Font Subfamily',
        3: 'Unique Subfamily',
        4: 'Full Name',
        5: 'Version',
        6: 'PostScript Name',
        7: 'Trademark',
        8: 'Manufacturer',
        9: 'Designer',
        10: 'Description',
        11: 'Vendor URL',
        12: 'Designer URL',
        13: 'License Description',
        14: 'License URL',
        16: 'Typographic Family',
        17: 'Typographic Subfamily'
    };

    const select = document.getElementById('fontSelect');
    const output = document.getElementById('output');

    fonts.forEach((f, i) => {
        const opt = document.createElement('option');
        opt.value = f.url;
        opt.textContent = f.label;
        if (i === 0) opt.selected = true;
        select.appendChild(opt);
    });

    select.addEventListener('change', () => loadFont(select.value));

    loadFont(select.value);

    function loadFont(url) {
        output.innerHTML = 'Loading...';
        FontParser.load(url).then(font => {
            const records = font.getAllNameRecords();
            renderRecords(records, font);
        }).catch(err => {
            output.textContent = `Failed to load font: ${err}`;
        });
    }

    function renderRecords(records, font) {
        if (!records.length) {
            output.textContent = 'No name records found.';
            return;
        }

        const nameInfo = typeof font.getNameInfo === 'function' ? font.getNameInfo() : null;
        const os2Info = typeof font.getOs2Info === 'function' ? font.getOs2Info() : null;
        const postInfo = typeof font.getPostInfo === 'function' ? font.getPostInfo() : null;

        const summary = document.createElement('div');
        summary.style.marginBottom = '12px';
        summary.style.color = '#444';
        const chunks = [];
        if (nameInfo) {
            chunks.push(`<strong>Name</strong>: ${nameInfo.fullName || nameInfo.family || 'Unknown'}`);
            if (nameInfo.postScriptName) chunks.push(`PostScript: ${nameInfo.postScriptName}`);
            if (nameInfo.version) chunks.push(`Version: ${nameInfo.version}`);
        }
        if (os2Info) {
            chunks.push(`<strong>OS/2</strong>: weight ${os2Info.weightClass}, width ${os2Info.widthClass}, vendor ${os2Info.vendorId || '?'}`);
            chunks.push(`Typo asc/desc/lineGap: ${os2Info.typoAscender}/${os2Info.typoDescender}/${os2Info.typoLineGap}`);
            chunks.push(`Win ascent/descent: ${os2Info.winAscent}/${os2Info.winDescent}`);
        }
        if (postInfo) {
            chunks.push(`<strong>Post</strong>: italicAngle ${postInfo.italicAngle.toFixed(2)}, underline ${postInfo.underlinePosition}/${postInfo.underlineThickness}`);
        }
        summary.innerHTML = chunks.join(' | ');

        const rows = records
            .filter(r => r.record && r.record.trim().length > 0)
            .map(r => ({
                nameId: r.nameId,
                label: nameIdLabels[r.nameId] || `Name ID ${r.nameId}`,
                value: r.record
            }));

        const table = document.createElement('table');
        const thead = document.createElement('thead');
        thead.innerHTML = '<tr><th>Name ID</th><th>Label</th><th>Value</th></tr>';
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        rows.forEach(r => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${r.nameId}</td><td>${r.label}</td><td>${r.value}</td>`;
            tbody.appendChild(tr);
        });
        table.appendChild(tbody);

        output.innerHTML = '';
        output.appendChild(summary);
        output.appendChild(table);
    }
</script>
</body>
</html>
