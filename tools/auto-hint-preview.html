<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auto-Hint Preview</title>
  <style>
    :root { --bg:#f6f4f1; --ink:#1e1f24; --muted:#5e6574; --panel:#fff; --border:#e3e1db; }
    body { margin:0; font-family:"Merriweather", serif; background:var(--bg); color:var(--ink); }
    header { padding:22px 20px 10px; }
    h1 { margin:0 0 6px; font-size:26px; }
    p { margin:0 0 14px; color:var(--muted); }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px; margin:12px 20px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    label { font-size:12px; color:var(--muted); display:flex; flex-direction:column; gap:4px; }
    select, input[type="text"], input[type="range"] { padding:7px 9px; border-radius:8px; border:1px solid #d8d5ce; min-width:140px; }
    canvas { width:100%; height:auto; border:1px dashed #ddd; background:#fff; border-radius:10px; }
    .hint { margin-top:8px; font-size:12px; color:var(--muted); }
  </style>
</head>
<body>
<div data-nav="main"></div>
  <header>
    <h1>Auto-Hint Preview</h1>
    <p>Visual diff between raw outlines and grid-fitted outlines (simulated auto-hinting).</p>
  </header>

  <div class="panel">
    <div class="row">
      <label>Font
        <select id="fontSelect"></select>
      </label>
      <label>Text
        <input id="textInput" type="text" value="HINTING TEST AVAV" />
      </label>
      <label>Pixel Size
        <input id="pixelSize" type="range" min="10" max="96" value="44" />
      </label>
      <label>Strength
        <input id="strength" type="range" min="0" max="1" step="0.05" value="1" />
      </label>
      <label>Snap
        <select id="snapMode">
          <option value="oncurve">On-curve points</option>
          <option value="all">All points</option>
        </select>
      </label>
      <label>View
        <select id="viewMode">
          <option value="split">Split</option>
          <option value="overlay">Overlay</option>
          <option value="diff">Diff</option>
        </select>
      </label>
    </div>
    <div class="hint" id="status"></div>
  </div>

  <div class="panel">
    <canvas id="canvas" width="1360" height="540"></canvas>
  </div>

  <script type="module">
    import { FontParser } from "../dist/data/FontParser.js";
    import { createFontLoader, getSelectedFont, populateFontSelect } from "./shared/font-ui.js";

    const fonts = [
      { name: "Noto Sans", url: "../truetypefonts/noto/NotoSans-Regular.ttf" },
      { name: "Roboto VF", url: "../truetypefonts/curated/Roboto-VF.ttf" },
      { name: "Noto Sans Arabic VF", url: "../truetypefonts/curated-extra/NotoSansArabic-VF.ttf" },
      { name: "Noto Sans Devanagari VF", url: "../truetypefonts/curated-extra/NotoSansDevanagari-VF.ttf" },
      { name: "Noto Sans Hebrew VF", url: "../truetypefonts/curated-extra/NotoSansHebrew-VF.ttf" },
      { name: "Noto Sans Thai VF", url: "../truetypefonts/curated-extra/NotoSansThai-VF.ttf" },
      { name: "Noto Sans Khmer VF", url: "../truetypefonts/curated-extra/NotoSansKhmer-VF.ttf" },
      { name: "Noto Sans Ethiopic VF", url: "../truetypefonts/curated-extra/NotoSansEthiopic-VF.ttf" },
      { name: "Source Code Pro Regular (OTF)", url: "../truetypefonts/curated-extra/SourceCodePro-Regular.otf" },
      { name: "Source Code Pro Bold (OTF)", url: "../truetypefonts/curated-extra/SourceCodePro-Bold.otf" },
      { name: "Font Awesome 4.7 (TTF)", url: "../truetypefonts/curated-extra/FontAwesome-4.7.0.ttf" }
    ];

    const fontSelect = document.getElementById("fontSelect");
    const textInput = document.getElementById("textInput");
    const pixelSize = document.getElementById("pixelSize");
    const strength = document.getElementById("strength");
    const snapMode = document.getElementById("snapMode");
    const viewMode = document.getElementById("viewMode");
    const status = document.getElementById("status");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let font = null;
    const loadFont = createFontLoader(FontParser.load);

    function cloneGlyphPoints(glyph) {
      const pts = [];
      for (let i = 0; i < glyph.getPointCount(); i++) {
        const p = glyph.getPoint(i);
        pts.push({ x: p.x, y: p.y, onCurve: !!p.onCurve, endOfContour: !!p.endOfContour });
      }
      return pts;
    }

    function hintedPoints(points, scale, snap, amount) {
      const pxUnit = 1 / scale;
      return points.map(p => {
        if (snap === "oncurve" && !p.onCurve) return { ...p };
        const sx = Math.round(p.x / pxUnit) * pxUnit;
        const sy = Math.round(p.y / pxUnit) * pxUnit;
        return {
          ...p,
          x: p.x + (sx - p.x) * amount,
          y: p.y + (sy - p.y) * amount
        };
      });
    }

    function buildContours(points) {
      const contours = [];
      let current = [];
      for (const p of points) {
        current.push(p);
        if (p.endOfContour) {
          contours.push(current);
          current = [];
        }
      }
      if (current.length) contours.push(current);
      return contours;
    }

    function drawContourPath(ctx2d, contour) {
      if (!contour.length) return;
      const count = contour.length;
      const get = i => contour[(i + count) % count];
      ctx2d.moveTo(get(0).x, get(0).y);
      let offset = 0;
      while (offset < count) {
        const a = get(offset);
        const b = get(offset + 1);
        if (a.onCurve) {
          if (b.onCurve) {
            ctx2d.lineTo(b.x, b.y);
            offset += 1;
          } else {
            const c = get(offset + 2);
            if (c.onCurve) {
              ctx2d.quadraticCurveTo(b.x, b.y, c.x, c.y);
            } else {
              ctx2d.quadraticCurveTo(b.x, b.y, (b.x + c.x) * 0.5, (b.y + c.y) * 0.5);
            }
            offset += 2;
          }
        } else {
          if (b.onCurve) {
            ctx2d.quadraticCurveTo(a.x, a.y, b.x, b.y);
          } else {
            ctx2d.quadraticCurveTo(a.x, a.y, (a.x + b.x) * 0.5, (a.y + b.y) * 0.5);
          }
          offset += 1;
        }
      }
      ctx2d.closePath();
    }

    function drawGlyphWithPoints(glyph, points, x, y, scale, style) {
      const contours = buildContours(points);
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, -scale);
      ctx.beginPath();
      for (const contour of contours) {
        drawContourPath(ctx, contour);
      }
      if (style.fill) {
        ctx.fillStyle = style.fill;
        ctx.fill();
      }
      if (style.stroke) {
        ctx.strokeStyle = style.stroke;
        ctx.lineWidth = style.lineWidth ?? (1 / scale);
        ctx.stroke();
      }
      ctx.restore();
      return glyph.advanceWidth * scale;
    }

    function drawGrid(x0, y0, w, h, stepPx) {
      ctx.save();
      ctx.strokeStyle = "#f0eee9";
      ctx.lineWidth = 1;
      for (let x = x0; x <= x0 + w; x += stepPx) {
        ctx.beginPath();
        ctx.moveTo(x + 0.5, y0);
        ctx.lineTo(x + 0.5, y0 + h);
        ctx.stroke();
      }
      for (let y = y0; y <= y0 + h; y += stepPx) {
        ctx.beginPath();
        ctx.moveTo(x0, y + 0.5);
        ctx.lineTo(x0 + w, y + 0.5);
        ctx.stroke();
      }
      ctx.restore();
    }

    function clear() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function render() {
      if (!font) return;
      clear();

      const text = textInput.value || "";
      const px = Number(pixelSize.value) || 44;
      const s = Number(strength.value) || 0;
      const mode = snapMode.value;
      const view = viewMode.value;
      const upem = typeof font.getUnitsPerEm === "function" ? font.getUnitsPerEm() : 1000;
      const scale = px / upem;
      const left = 30;
      const top = 30;
      const panelGap = 24;
      const panelW = view === "split" ? (canvas.width - left * 2 - panelGap) / 2 : (canvas.width - left * 2);
      const panelH = canvas.height - top * 2;
      const baseY = top + panelH * 0.7;

      const drawRun = (startX, unhintStyle, hintedStyle, diffOnly) => {
        drawGrid(startX, top, panelW, panelH, 1);
        let cursor = startX + 14;
        for (const ch of text) {
          const gid = font.getGlyphIndexByChar(ch);
          const glyph = gid != null ? font.getGlyph(gid) : null;
          if (!glyph) { cursor += px * 0.4; continue; }
          const raw = cloneGlyphPoints(glyph);
          const snapped = hintedPoints(raw, scale, mode, s);
          if (!diffOnly) {
            drawGlyphWithPoints(glyph, raw, cursor, baseY, scale, unhintStyle);
            drawGlyphWithPoints(glyph, snapped, cursor, baseY, scale, hintedStyle);
          } else {
            drawGlyphWithPoints(glyph, raw, cursor, baseY, scale, { fill: "rgba(255,255,255,1)", stroke: "rgba(0,0,0,0)" });
            drawGlyphWithPoints(glyph, raw, cursor, baseY, scale, { fill: "rgba(220,48,44,0.55)", stroke: null });
            ctx.globalCompositeOperation = "difference";
            drawGlyphWithPoints(glyph, snapped, cursor, baseY, scale, { fill: "rgba(220,48,44,0.55)", stroke: null });
            ctx.globalCompositeOperation = "source-over";
          }
          cursor += glyph.advanceWidth * scale;
        }
      };

      if (view === "split") {
        ctx.fillStyle = "#3a4452";
        ctx.font = "12px sans-serif";
        ctx.fillText("Unhinted", left + 4, top - 8);
        ctx.fillText("Grid-fitted", left + panelW + panelGap + 4, top - 8);
        drawRun(left, { fill: "rgba(34,50,80,0.08)", stroke: "#1f3559", lineWidth: 1.2 }, { fill: null, stroke: null }, false);
        drawRun(left + panelW + panelGap, { fill: null, stroke: null }, { fill: "rgba(30,120,65,0.12)", stroke: "#187546", lineWidth: 1.2 }, false);
      } else if (view === "overlay") {
        ctx.fillStyle = "#3a4452";
        ctx.font = "12px sans-serif";
        ctx.fillText("Overlay: blue=unhinted, green=grid-fitted", left + 4, top - 8);
        drawRun(left, { fill: "rgba(34,50,80,0.10)", stroke: "#1f3559", lineWidth: 1.2 }, { fill: "rgba(30,120,65,0.10)", stroke: "#187546", lineWidth: 1.2 }, false);
      } else {
        ctx.fillStyle = "#3a4452";
        ctx.font = "12px sans-serif";
        ctx.fillText("Diff (brighter = larger shift)", left + 4, top - 8);
        drawRun(left, null, null, true);
      }

      status.textContent = `Mode: simulated auto-hinting (point snapping). Font: ${fonts[Number(fontSelect.value)]?.name ?? "?"} | Pixel size: ${px}px | Strength: ${s.toFixed(2)}`;
    }

    async function boot() {
      const selected = getSelectedFont(fontSelect, fonts);
      try {
        font = await loadFont(selected.url);
        render();
      } catch (err) {
        status.textContent = `Failed to load font: ${err?.message ?? err}`;
      }
    }

    populateFontSelect(fontSelect, fonts);
    fontSelect.addEventListener("change", boot);
    textInput.addEventListener("input", render);
    pixelSize.addEventListener("input", render);
    strength.addEventListener("input", render);
    snapMode.addEventListener("change", render);
    viewMode.addEventListener("change", render);
    boot();
  </script>
  <script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
