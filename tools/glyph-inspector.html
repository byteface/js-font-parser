<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Glyph Inspector</title>
    <meta charset="utf-8">
    <style>
        :root { color-scheme: light; }
        body {
            margin: 24px;
            font-family: "Source Serif 4", "Georgia", serif;
            background: radial-gradient(circle at 20% 10%, #ffffff, #eef2f4);
            color: #15171b;
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; }
        .panel {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #dbe2e7;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(20, 30, 60, 0.08);
        }
        label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #4e5a6b;
        }
        select, input[type="text"], input[type="number"], input[type="file"] {
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #dbe2e7;
            font-size: 14px;
            min-width: 180px;
            background: #fbfcff;
        }
        input[type="checkbox"] { transform: translateY(2px); }
        button {
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            background: #2f4f7a;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        .layout {
            display: grid;
            grid-template-columns: minmax(260px, 320px) 1fr;
            gap: 16px;
        }
        .card {
            background: #ffffff;
            border: 1px solid #dbe2e7;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 6px 20px rgba(20, 30, 60, 0.06);
        }
        canvas {
            width: 100%;
            height: auto;
            border: 1px dashed #dbe2e7;
            border-radius: 12px;
            background: #fbfcff;
        }
        .inspectCanvas {
            min-height: 360px;
        }
        .gridViewport {
            max-height: 520px;
            overflow: auto;
            border: 1px dashed #dbe2e7;
            border-radius: 12px;
            background: #fbfcff;
        }
        .gridCanvas {
            display: block;
            border: 0;
        }
        .info {
            font-size: 13px;
            line-height: 1.5;
            color: #2a2f36;
        }
        .info strong { color: #111; }
        .hint { margin-top: 8px; color: #4e5a6b; font-size: 12px; }
    </style>
</head>
<body>
<div data-nav="main"></div>

    <h1>Glyph Inspector</h1>
    <div class="panel">
        <label>
            Font
            <select id="fontSelect" data-font-source-ui="off"></select>
            <input id="fontFileInput" type="file" accept=".ttf,.otf,.woff,.woff2" />
        </label>
        <label>
            Glyph Index
            <input id="glyphInput" type="number" min="0" value="0" />
        </label>
        <label>
            Character
            <input id="charInput" type="text" value="A" />
        </label>
        <label>
            Unicode
            <input id="unicodeInput" type="text" placeholder="U+0041 or 0x41" />
        </label>
        <button id="unicodeBtn">Jump</button>
        <button id="prevBtn">Prev</button>
        <button id="nextBtn">Next</button>
        <label><span>Fill</span><input id="fillToggle" type="checkbox" checked /></label>
        <label><span>Outline</span><input id="outlineToggle" type="checkbox" checked /></label>
        <label><span>Points</span><input id="pointsToggle" type="checkbox" checked /></label>
        <label><span>Handles</span><input id="handlesToggle" type="checkbox" checked /></label>
        <label><span>Point Indices</span><input id="indexToggle" type="checkbox" /></label>
        <label><span>Anchors</span><input id="anchorToggle" type="checkbox" checked /></label>
        <label><span>BBox</span><input id="bboxToggle" type="checkbox" checked /></label>
    </div>

    <div class="layout">
        <div class="card">
            <div class="info" id="meta"></div>
            <div class="hint">Click a glyph in the grid to inspect it.</div>
            <div class="gridViewport" id="gridViewport">
                <canvas id="gridCanvas" class="gridCanvas" width="320" height="520"></canvas>
            </div>
        </div>
        <div class="card">
            <canvas id="inspectCanvas" class="inspectCanvas" width="900" height="360"></canvas>
        </div>
    </div>

    <script type="module">
        import { FontParser } from '../dist/data/FontParser.js';
        import { Table } from '../dist/table/Table.js';
        import { getFontList } from './shared/font-catalog.js';
        import { createFontLoader, getSelectedFont, populateFontSelect } from './shared/font-ui.js';
        import { createSharedToolbar, persistInputValue } from './shared/shared-toolbar.js';

        const fontSelect = document.getElementById('fontSelect');
        const fontFileInput = document.getElementById('fontFileInput');
        const glyphInput = document.getElementById('glyphInput');
        const charInput = document.getElementById('charInput');
        const unicodeInput = document.getElementById('unicodeInput');
        const unicodeBtn = document.getElementById('unicodeBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const fillToggle = document.getElementById('fillToggle');
        const outlineToggle = document.getElementById('outlineToggle');
        const pointsToggle = document.getElementById('pointsToggle');
        const handlesToggle = document.getElementById('handlesToggle');
        const indexToggle = document.getElementById('indexToggle');
        const anchorToggle = document.getElementById('anchorToggle');
        const bboxToggle = document.getElementById('bboxToggle');
        const gridViewport = document.getElementById('gridViewport');
        const gridCanvas = document.getElementById('gridCanvas');
        const inspectCanvas = document.getElementById('inspectCanvas');
        const meta = document.getElementById('meta');
        const gridCtx = gridCanvas.getContext('2d');
        const inspectCtx = inspectCanvas.getContext('2d');

        const fonts = getFontList('allGlyphs');

        const loadFont = createFontLoader(FontParser.load);
        let customFontUrl = null;
        let font = null;
        let glyphCount = 0;
        const cell = 48;
        let gridCols = 6;
        let selectedGlyphIndex = 0;
        const TOOL_KEY = "tool:glyph-inspector";
        const savedFontIndexRaw = localStorage.getItem(`${TOOL_KEY}:font`);
        const savedFontIndex = Number.isFinite(Number(savedFontIndexRaw)) ? Number(savedFontIndexRaw) : 0;

        function persistCheckbox(input, key) {
            const saved = localStorage.getItem(key);
            if (saved != null) {
                input.checked = saved === '1';
            }
            input.addEventListener('change', () => {
                localStorage.setItem(key, input.checked ? '1' : '0');
            });
        }

        function clear(ctx, canvas) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fbfcff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function getContours(points) {
            const contours = [];
            let current = [];
            for (const p of points) {
                current.push(p);
                if (p.endOfContour) {
                    contours.push(current);
                    current = [];
                }
            }
            if (current.length) contours.push(current);
            return contours;
        }

        function contourArea(contour) {
            let area = 0;
            for (let i = 0; i < contour.length; i++) {
                const p0 = contour[i];
                const p1 = contour[(i + 1) % contour.length];
                area += (p0.x * p1.y) - (p1.x * p0.y);
            }
            return area / 2;
        }

        function drawContourPath(ctx, contour) {
            if (!contour.length) return;
            let offset = 0;
            const count = contour.length;
            const get = (i) => contour[(i + count) % count];

            const p0 = get(0);
            ctx.moveTo(p0.x, p0.y);

            while (offset < count) {
                const a = get(offset);
                const b = get(offset + 1);
                if (a.onCurve) {
                    if (b.onCurve) {
                        ctx.lineTo(b.x, b.y);
                        offset++;
                    } else {
                        const c = get(offset + 2);
                        if (c.onCurve) {
                            ctx.quadraticCurveTo(b.x, b.y, c.x, c.y);
                        } else {
                            ctx.quadraticCurveTo(b.x, b.y, (b.x + c.x) / 2, (b.y + c.y) / 2);
                        }
                        offset += 2;
                    }
                } else {
                    if (!b.onCurve) {
                        ctx.quadraticCurveTo(a.x, a.y, (a.x + b.x) / 2, (a.y + b.y) / 2);
                    } else {
                        ctx.quadraticCurveTo(a.x, a.y, b.x, b.y);
                    }
                    offset++;
                }
            }
        }

        function renderGrid() {
            clear(gridCtx, gridCanvas);
            if (!font) return;
            const cols = gridCols;
            const rows = Math.ceil(glyphCount / cols);
            gridCanvas.height = rows * cell + 20;
            clear(gridCtx, gridCanvas);
            gridCtx.strokeStyle = '#e2e6ef';

            for (let i = 0; i < glyphCount; i++) {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const x = col * cell;
                const y = row * cell;

                gridCtx.strokeRect(x, y, cell, cell);
                const glyph = font.getGlyph(i);
                if (glyph) {
                    gridCtx.save();
                    gridCtx.translate(x + cell * 0.5, y + cell * 0.7);
                    gridCtx.scale(0.03, -0.03);
                    gridCtx.beginPath();
                    const contours = getContours(glyph.points ?? []);
                    contours.forEach(c => drawContourPath(gridCtx, c));
                    gridCtx.fillStyle = '#2f4f7a';
                    gridCtx.fill();
                    gridCtx.restore();
                }
            }

            const selected = Math.max(0, Math.min(glyphCount - 1, selectedGlyphIndex));
            const selectedCol = selected % cols;
            const selectedRow = Math.floor(selected / cols);
            gridCtx.save();
            gridCtx.lineWidth = 2;
            gridCtx.strokeStyle = '#1f6feb';
            gridCtx.strokeRect(selectedCol * cell + 1, selectedRow * cell + 1, cell - 2, cell - 2);
            gridCtx.restore();
        }

        function renderInspector() {
            clear(inspectCtx, inspectCanvas);
            if (!font) return;
            const idx = Number(glyphInput.value) || 0;
            const glyph = font.getGlyph(idx);
            if (!glyph || !glyph.points) {
                meta.innerHTML = '<strong>No glyph data.</strong>';
                return;
            }

            const points = glyph.points;
            const contours = getContours(points);
            const unitsPerEm = typeof font.getUnitsPerEm === 'function' ? font.getUnitsPerEm() : 1000;
            const scale = 240 / unitsPerEm;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            points.forEach(p => {
                minX = Math.min(minX, p.x);
                minY = Math.min(minY, p.y);
                maxX = Math.max(maxX, p.x);
                maxY = Math.max(maxY, p.y);
            });
            const bboxWidth = maxX - minX;
            const bboxHeight = maxY - minY;
            const rightBearing = glyph.advanceWidth - bboxWidth - glyph.leftSideBearing;

            const winding = contours.map(c => contourArea(c) >= 0 ? 'CCW' : 'CW');

            const anchors = font.getMarkAnchorsForGlyph ? font.getMarkAnchorsForGlyph(idx) : [];
            const anchorSummary = anchors.length
                ? anchors.map(a => `${a.type}[${a.classIndex}] (${a.x}, ${a.y})`).join(', ')
                : 'none';

            meta.innerHTML = `
                <div><strong>Glyph Index:</strong> ${idx}</div>
                <div><strong>Contours:</strong> ${contours.length}</div>
                <div><strong>Points:</strong> ${points.length}</div>
                <div><strong>Advance Width:</strong> ${glyph.advanceWidth}</div>
                <div><strong>Left Side Bearing:</strong> ${glyph.leftSideBearing}</div>
                <div><strong>Right Side Bearing:</strong> ${rightBearing.toFixed(2)}</div>
                <div><strong>Bounding Box:</strong> [${minX}, ${minY}] to [${maxX}, ${maxY}]</div>
                <div><strong>Winding:</strong> ${winding.join(', ') || 'n/a'}</div>
                <div><strong>Anchors:</strong> ${anchorSummary}</div>
            `;

            inspectCtx.save();
            inspectCtx.translate(180, inspectCanvas.height * 0.7);
            inspectCtx.scale(scale, -scale);

            if (fillToggle.checked || outlineToggle.checked) {
                inspectCtx.beginPath();
                contours.forEach(c => drawContourPath(inspectCtx, c));
                if (fillToggle.checked) {
                    inspectCtx.fillStyle = 'rgba(58, 79, 122, 0.18)';
                    inspectCtx.fill();
                }
                if (outlineToggle.checked) {
                    inspectCtx.strokeStyle = '#2f4f7a';
                    inspectCtx.lineWidth = 3 / scale;
                    inspectCtx.stroke();
                }
            }

            if (bboxToggle.checked) {
                inspectCtx.strokeStyle = '#c04b3b';
                inspectCtx.lineWidth = 2 / scale;
                inspectCtx.strokeRect(minX, minY, bboxWidth, bboxHeight);
            }

            if (handlesToggle.checked) {
                inspectCtx.strokeStyle = '#8b97ad';
                inspectCtx.lineWidth = 1.5 / scale;
                points.forEach((p, i) => {
                    if (p.onCurve) return;
                    const prev = points[(i - 1 + points.length) % points.length];
                    const next = points[(i + 1) % points.length];
                    inspectCtx.beginPath();
                    inspectCtx.moveTo(prev.x, prev.y);
                    inspectCtx.lineTo(p.x, p.y);
                    inspectCtx.lineTo(next.x, next.y);
                    inspectCtx.stroke();
                });
            }

            if (pointsToggle.checked) {
                points.forEach((p, i) => {
                    inspectCtx.beginPath();
                    inspectCtx.fillStyle = p.onCurve ? '#2f4f7a' : '#f39c12';
                    inspectCtx.arc(p.x, p.y, 6 / scale, 0, Math.PI * 2);
                    inspectCtx.fill();

                    if (indexToggle.checked) {
                        inspectCtx.save();
                        inspectCtx.scale(1, -1);
                        inspectCtx.fillStyle = '#1a1d24';
                        inspectCtx.font = `${14 / scale}px serif`;
                        inspectCtx.fillText(String(i), p.x + 8 / scale, -p.y - 8 / scale);
                        inspectCtx.restore();
                    }
                });
            }

            if (anchorToggle.checked && anchors.length) {
                anchors.forEach(anchor => {
                    inspectCtx.beginPath();
                    let color = '#27ae60';
                    if (anchor.type === 'mark') color = '#f39c12';
                    if (anchor.type === 'ligature') color = '#8e44ad';
                    if (anchor.type === 'mark2') color = '#e67e22';
                    if (anchor.type === 'cursive-entry') color = '#16a085';
                    if (anchor.type === 'cursive-exit') color = '#2980b9';
                    inspectCtx.fillStyle = color;
                    inspectCtx.arc(anchor.x, anchor.y, 10 / scale, 0, Math.PI * 2);
                    inspectCtx.fill();
                });
            }

            inspectCtx.restore();
        }

        function selectGlyph(idx) {
            selectedGlyphIndex = Math.max(0, Math.min(glyphCount - 1, Number(idx) || 0));
            glyphInput.value = String(selectedGlyphIndex);
            renderGrid();
            renderInspector();
            if (font?.getGlyph) {
                const glyph = font.getGlyph(selectedGlyphIndex);
                if (glyph && typeof glyph.unicode === 'number' && Number.isFinite(glyph.unicode)) {
                    unicodeInput.value = `U+${glyph.unicode.toString(16).toUpperCase().padStart(4, '0')}`;
                }
            }
        }

        function parseUnicodeToken(raw) {
            const text = String(raw || '').trim();
            if (!text) return null;
            const m = text.match(/^U\+([0-9A-Fa-f]{1,6})$/) || text.match(/^0x([0-9A-Fa-f]{1,6})$/);
            if (m) return parseInt(m[1], 16);
            if (/^\d+$/.test(text)) return Number(text);
            if (Array.from(text).length === 1) return text.codePointAt(0);
            return null;
        }

        gridCanvas.addEventListener('click', (event) => {
            const rect = gridCanvas.getBoundingClientRect();
            const scaleX = gridCanvas.width / rect.width;
            const scaleY = gridCanvas.height / rect.height;
            const x = (event.clientX - rect.left) * scaleX;
            const y = (event.clientY - rect.top) * scaleY;
            const col = Math.floor(x / cell);
            const row = Math.floor(y / cell);
            const idx = row * gridCols + col;
            selectGlyph(idx);
        });

        async function loadAndRender() {
            const selected = customFontUrl
                ? { name: fontFileInput.files?.[0]?.name || 'Custom font', url: customFontUrl, isCustom: true }
                : getSelectedFont(fontSelect, fonts);
            font = await loadFont(selected.url);
            glyphCount = font.getNumGlyphs();
            gridCols = Math.max(4, Math.floor(gridCanvas.width / cell));
            renderGrid();
            selectGlyph(Number(glyphInput.value) || 0);
        }

        fontSelect.addEventListener('change', loadAndRender);
        fontFileInput.addEventListener('change', () => {
            if (customFontUrl) URL.revokeObjectURL(customFontUrl);
            customFontUrl = fontFileInput.files?.[0] ? URL.createObjectURL(fontFileInput.files[0]) : null;
            loadAndRender();
        });
        glyphInput.addEventListener('input', () => selectGlyph(Number(glyphInput.value)));
        charInput.addEventListener('input', () => {
            const ch = Array.from(charInput.value || '')[0] || '';
            if (!ch) return;
            const idx = font?.getGlyphIndexByChar(ch) ?? 0;
            selectGlyph(idx);
        });
        unicodeBtn.addEventListener('click', () => {
            const cp = parseUnicodeToken(unicodeInput.value);
            if (cp == null || !font) return;
            let ch = '';
            try { ch = String.fromCodePoint(cp); } catch { return; }
            charInput.value = ch;
            const idx = font.getGlyphIndexByChar(ch) ?? 0;
            selectGlyph(idx);
        });
        prevBtn.addEventListener('click', () => selectGlyph(Number(glyphInput.value) - 1));
        nextBtn.addEventListener('click', () => selectGlyph(Number(glyphInput.value) + 1));
        [fillToggle, outlineToggle, pointsToggle, handlesToggle, indexToggle, anchorToggle, bboxToggle].forEach(el => {
            el.addEventListener('change', renderInspector);
        });

        persistInputValue(glyphInput, TOOL_KEY, "glyph");
        persistInputValue(charInput, TOOL_KEY, "char");
        persistInputValue(unicodeInput, TOOL_KEY, "unicode");
        persistCheckbox(fillToggle, `${TOOL_KEY}:fill`);
        persistCheckbox(outlineToggle, `${TOOL_KEY}:outline`);
        persistCheckbox(pointsToggle, `${TOOL_KEY}:points`);
        persistCheckbox(handlesToggle, `${TOOL_KEY}:handles`);
        persistCheckbox(indexToggle, `${TOOL_KEY}:indices`);
        persistCheckbox(anchorToggle, `${TOOL_KEY}:anchors`);
        persistCheckbox(bboxToggle, `${TOOL_KEY}:bbox`);

        createSharedToolbar({
            mount: document.body,
            fontSelect,
            scriptOptions: [
                { value: "latin", label: "Latin" },
                { value: "arabic", label: "Arabic" },
                { value: "hebrew", label: "Hebrew" },
                { value: "devanagari", label: "Devanagari" },
                { value: "thai", label: "Thai" }
            ],
            onScriptChange: (value) => {
                if (value === "arabic") charInput.value = "م";
                else if (value === "hebrew") charInput.value = "ש";
                else if (value === "devanagari") charInput.value = "क";
                else if (value === "thai") charInput.value = "ท";
                else charInput.value = "A";
                const idx = font?.getGlyphIndexByChar(charInput.value) ?? 0;
                selectGlyph(idx);
            },
            getExportData: () => ({
                tool: "glyph-inspector",
                glyphIndex: selectedGlyphIndex,
                char: charInput.value,
                unicode: unicodeInput.value,
                glyphCount,
                diagnostics: typeof font?.getDiagnostics === 'function' ? font.getDiagnostics() : []
            }),
            exportFilename: "glyph-inspector.json",
            getDiagnosticsText: () => {
                const list = typeof font?.getDiagnostics === 'function' ? font.getDiagnostics() : [];
                if (!list.length) return "No diagnostics.";
                return list.slice(0, 30).map((d) => `[${d.phase}/${d.level}] ${d.code}: ${d.message}`).join('\n');
            }
        });

        populateFontSelect(fontSelect, fonts);
        if (fonts.length > 0) {
            fontSelect.value = String(Math.max(0, Math.min(savedFontIndex, fonts.length - 1)));
        }
        fontSelect.addEventListener('change', () => {
            if (fontFileInput.value) {
                fontFileInput.value = '';
                if (customFontUrl) URL.revokeObjectURL(customFontUrl);
                customFontUrl = null;
            }
            localStorage.setItem(`${TOOL_KEY}:font`, fontSelect.value);
        });
        loadAndRender();
    </script>
</body>
</html>
