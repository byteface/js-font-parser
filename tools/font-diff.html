<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Font Diff</title>
  <style>
    :root { --bg:#f6f4f1; --ink:#1e1f24; --muted:#5e6574; --panel:#fff; --border:#e3e1db; }
    body { margin:0; font-family:"Merriweather", serif; background:var(--bg); color:var(--ink); }
    header { padding:22px 20px 10px; }
    h1 { margin:0 0 6px; font-size:26px; }
    p { margin:0 0 12px; color:var(--muted); }
    .panel {
      margin: 0 20px 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: end;
    }
    label { display:flex; flex-direction:column; gap:5px; font-size:12px; color:var(--muted); }
    select, input[type="text"], input[type="range"] {
      min-width: 220px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 14px;
    }
    button {
      padding: 9px 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #2c3e50;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    .grid {
      margin: 0 20px 14px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
    }
    .card h2 { margin: 0 0 8px; font-size: 14px; color: #2c3e50; }
    canvas {
      width: 100%;
      height: 190px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: #fff;
    }
    .meta {
      margin: 0 20px 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.45;
    }
    .meta code { background: #f2f3f7; padding: 2px 4px; border-radius: 4px; }
    table {
      width: calc(100% - 40px);
      margin: 0 20px 24px;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      font-size: 13px;
    }
    th, td { padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    th { background: #f1efe9; color: #2c3e50; }
    tr:last-child td { border-bottom: 0; }
    .ok { color: #1d7a42; font-weight: 700; }
    .warn { color: #a9442f; font-weight: 700; }
    .font-diff-drawer {
      position: sticky;
      top: 0;
      z-index: 25;
      display: grid;
      justify-items: start;
      margin: 0 20px 14px;
    }
    .font-diff-tabs {
      display: flex;
      gap: 8px;
      align-items: start;
    }
    .font-diff-tab {
      border: 1px solid rgba(66, 76, 96, 0.28);
      border-bottom: none;
      background: rgba(255, 255, 255, 0.94);
      color: #233044;
      border-radius: 0 0 12px 12px;
      padding: 8px 11px 9px;
      font: 700 15px/1 serif;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(20, 30, 60, 0.12);
    }
    .font-diff-drawer-panel {
      width: min(1080px, calc(100vw - 40px));
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 14px;
      padding: 14px 16px;
      margin-top: 2px;
      border: 1px solid rgba(66, 76, 96, 0.2);
      border-radius: 14px 0 14px 14px;
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 18px 36px rgba(20, 30, 60, 0.16);
      max-height: 260px;
      overflow: hidden;
      transition: transform 220ms ease, opacity 220ms ease, max-height 220ms ease, padding 220ms ease, margin-top 220ms ease;
      transform-origin: top left;
    }
    .font-diff-drawer:not(.open) .font-diff-drawer-panel {
      transform: translateY(-14px);
      opacity: 0;
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-top: 0;
      pointer-events: none;
      border-width: 0 1px 1px;
    }
    .font-diff-drawer-group {
      display: grid;
      gap: 6px;
      min-width: 0;
    }
    .font-diff-drawer-group label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .font-diff-drawer-group input,
    .font-diff-drawer-group select,
    .font-diff-drawer-group button {
      width: 100%;
      min-width: 0;
      max-width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 14px;
    }
    .font-diff-url-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: end;
    }
  </style>
</head>
<body>
<div id="fontDrawer" class="font-diff-drawer">
  <div class="font-diff-tabs">
    <a class="font-diff-tab" href="./index.html" aria-label="Back to tools home">🔧</a>
    <button id="fontDrawerToggle" type="button" class="font-diff-tab" aria-label="Toggle font drawer">Aa</button>
  </div>
  <div class="font-diff-drawer-panel">
    <div class="font-diff-drawer-group">
      <label>Font A Catalog</label>
      <select id="fontA" hidden data-font-source-ui="off"></select>
      <input id="fontAFile" type="file" accept=".ttf,.otf,.woff,.woff2" />
      <div class="font-diff-url-row">
        <input id="fontAUrl" type="text" placeholder="https://.../fontA.woff" />
        <button id="fontALoadUrl" type="button">Load URL</button>
      </div>
    </div>
    <div class="font-diff-drawer-group">
      <label>Font B Catalog</label>
      <select id="fontB" hidden data-font-source-ui="off"></select>
      <input id="fontBFile" type="file" accept=".ttf,.otf,.woff,.woff2" />
      <div class="font-diff-url-row">
        <input id="fontBUrl" type="text" placeholder="https://.../fontB.woff" />
        <button id="fontBLoadUrl" type="button">Load URL</button>
      </div>
    </div>
  </div>
</div>
<header>
  <h1>Font Diff</h1>
  <p>Compare two fonts on the same input text: mapping, metrics, and rendering.</p>
</header>

<div class="panel">
  <label>
    Text
    <input id="textInput" type="text" value="Hamburgefons ÅÁÉÖÑ æœ مرحبا नमस्ते" />
  </label>
  <label>
    Size
    <input id="sizeInput" type="range" min="80" max="220" value="150" />
  </label>
  <button id="runBtn">Compare</button>
</div>

<div class="grid">
  <div class="card">
    <h2>Font A</h2>
    <canvas id="canvasA" width="900" height="190"></canvas>
  </div>
  <div class="card">
    <h2>Font B</h2>
    <canvas id="canvasB" width="900" height="190"></canvas>
  </div>
  <div class="card">
    <h2>Overlay (A blue / B red)</h2>
    <canvas id="canvasDiff" width="900" height="190"></canvas>
  </div>
</div>

<div class="meta" id="summary"></div>

<table>
  <thead>
    <tr>
      <th>Char</th>
      <th>U+</th>
      <th>Glyph A</th>
      <th>Glyph B</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<script type="module">
  import { FontParser } from '../dist/data/FontParser.js';
  import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';
  import { getFontList } from './shared/font-catalog.js';
  import { createFontLoader, populateFontSelect } from './shared/font-ui.js';

  const fontDrawer = document.getElementById('fontDrawer');
  const fontDrawerToggle = document.getElementById('fontDrawerToggle');
  const fontASelect = document.getElementById('fontA');
  const fontBSelect = document.getElementById('fontB');
  const fontAFile = document.getElementById('fontAFile');
  const fontBFile = document.getElementById('fontBFile');
  const fontAUrl = document.getElementById('fontAUrl');
  const fontBUrl = document.getElementById('fontBUrl');
  const fontALoadUrl = document.getElementById('fontALoadUrl');
  const fontBLoadUrl = document.getElementById('fontBLoadUrl');
  const textInput = document.getElementById('textInput');
  const sizeInput = document.getElementById('sizeInput');
  const runBtn = document.getElementById('runBtn');
  const summary = document.getElementById('summary');
  const rows = document.getElementById('rows');
  const canvasA = document.getElementById('canvasA');
  const canvasB = document.getElementById('canvasB');
  const canvasDiff = document.getElementById('canvasDiff');

  const ctxA = canvasA.getContext('2d');
  const ctxB = canvasB.getContext('2d');
  const ctxD = canvasDiff.getContext('2d');
  const catalog = getFontList('allGlyphs');
  const loadFont = createFontLoader(FontParser.load);
  let customFontA = null;
  let customFontB = null;

  populateFontSelect(fontASelect, catalog);
  populateFontSelect(fontBSelect, catalog);

  fontASelect.selectedIndex = Math.max(0, catalog.findIndex(f => /DiscoMo/.test(f.name)));
  fontBSelect.selectedIndex = Math.max(1, catalog.findIndex(f => /Noto Sans Regular/.test(f.name)));
  fontASelect.hidden = false;
  fontBSelect.hidden = false;

  fontDrawerToggle.addEventListener('click', () => {
    fontDrawer.classList.toggle('open');
  });

  function revokeObjectUrl(url) {
    if (url && String(url).startsWith('blob:')) URL.revokeObjectURL(url);
  }

  function selectedFont(select, customUrl, fallbackName) {
    if (customUrl) return { name: fallbackName, url: customUrl, isCustom: true };
    return catalog[Number(select.value)] || catalog[0];
  }

  function loadUrlInto(side) {
    if (side === 'A') {
      revokeObjectUrl(customFontA);
      customFontA = fontAUrl.value.trim() || null;
      fontAFile.value = '';
      run();
      return;
    }
    revokeObjectUrl(customFontB);
    customFontB = fontBUrl.value.trim() || null;
    fontBFile.value = '';
    run();
  }

  function clear(ctx, w, h) {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);
  }

  function drawPreview(font, text, ctx, color, size) {
    clear(ctx, ctx.canvas.width, ctx.canvas.height);
    const upm = font.getUnitsPerEm?.() ?? 1000;
    const scale = size / upm;
    CanvasRenderer.drawString(font, text, ctx.canvas, {
      x: 24,
      y: 150,
      scale,
      spacing: 2,
      styles: { fillStyle: color, strokeStyle: color, lineWidth: 1 }
    });
  }

  function analyzeText(fontA, fontB, text) {
    let missingA = 0;
    let missingB = 0;
    let mismatch = 0;
    const items = [];
    for (const ch of Array.from(text)) {
      const cp = ch.codePointAt(0) ?? 0;
      const gidA = fontA.getGlyphIndexByChar?.(ch);
      const gidB = fontB.getGlyphIndexByChar?.(ch);
      const missingThisA = gidA == null || gidA < 0;
      const missingThisB = gidB == null || gidB < 0;
      if (missingThisA) missingA++;
      if (missingThisB) missingB++;
      if (!missingThisA && !missingThisB && gidA !== gidB) mismatch++;
      items.push({
        ch,
        cp,
        gidA: missingThisA ? 'missing' : gidA,
        gidB: missingThisB ? 'missing' : gidB,
        status: missingThisA || missingThisB ? 'coverage gap' : (gidA === gidB ? 'same gid' : 'different gid')
      });
    }
    return { items, missingA, missingB, mismatch };
  }

  function renderRows(items) {
    rows.innerHTML = '';
    for (const it of items) {
      const tr = document.createElement('tr');
      const statusCls = it.status === 'coverage gap' ? 'warn' : 'ok';
      const values = [
        it.ch === ' ' ? '␠' : it.ch,
        `U+${it.cp.toString(16).toUpperCase().padStart(4, '0')}`,
        String(it.gidA),
        String(it.gidB),
        it.status
      ];
      values.forEach((value, index) => {
        const td = document.createElement('td');
        if (index === 4) td.className = statusCls;
        td.textContent = value;
        tr.appendChild(td);
      });
      rows.appendChild(tr);
    }
  }

  function renderSummary(fontA, fontB, aName, bName, report) {
    const infoA = fontA.getNameInfo?.() ?? {};
    const infoB = fontB.getNameInfo?.() ?? {};
    const upmA = fontA.getUnitsPerEm?.() ?? 'n/a';
    const upmB = fontB.getUnitsPerEm?.() ?? 'n/a';
    const ascA = fontA.getAscent?.() ?? 'n/a';
    const ascB = fontB.getAscent?.() ?? 'n/a';
    const descA = fontA.getDescent?.() ?? 'n/a';
    const descB = fontB.getDescent?.() ?? 'n/a';
    const glyphsA = fontA.getNumGlyphs?.() ?? 'n/a';
    const glyphsB = fontB.getNumGlyphs?.() ?? 'n/a';
    summary.replaceChildren();
    const lines = [
      ['A', `${aName} (${infoA.fullName || 'n/a'})`, true],
      ['B', `${bName} (${infoB.fullName || 'n/a'})`, true],
      ['Metrics', `UPM ${upmA} vs ${upmB} | Asc ${ascA} vs ${ascB} | Desc ${descA} vs ${descB} | Glyphs ${glyphsA} vs ${glyphsB}`],
      ['Text report', `Missing A ${report.missingA}, Missing B ${report.missingB}, Different mapped glyph IDs ${report.mismatch}`]
    ];
    lines.forEach(([label, value, code]) => {
      const div = document.createElement('div');
      const strong = document.createElement('strong');
      strong.textContent = `${label}:`;
      div.appendChild(strong);
      div.append(' ');
      if (code) {
        const codeEl = document.createElement('code');
        codeEl.textContent = value;
        div.appendChild(codeEl);
      } else {
        div.append(value);
      }
      summary.appendChild(div);
    });
  }

  async function run() {
    runBtn.disabled = true;
    runBtn.textContent = 'Loading...';
    try {
      const aSelected = selectedFont(fontASelect, customFontA, fontAFile.files?.[0]?.name || fontAUrl.value.trim() || 'Custom font A');
      const bSelected = selectedFont(fontBSelect, customFontB, fontBFile.files?.[0]?.name || fontBUrl.value.trim() || 'Custom font B');
      const aUrl = aSelected.url;
      const bUrl = bSelected.url;
      const fontA = await loadFont(aUrl);
      const fontB = await loadFont(bUrl);
      const text = textInput.value || '';
      const size = Number(sizeInput.value || 150);

      drawPreview(fontA, text, ctxA, '#1f4f8b', size);
      drawPreview(fontB, text, ctxB, '#8b2e2e', size);
      clear(ctxD, canvasDiff.width, canvasDiff.height);
      const upmA = fontA.getUnitsPerEm?.() ?? 1000;
      const scaleA = size / upmA;
      CanvasRenderer.drawString(fontA, text, canvasDiff, {
        x: 24, y: 150, scale: scaleA, spacing: 2,
        styles: { fillStyle: 'rgba(31,79,139,0.50)', strokeStyle: 'rgba(31,79,139,0.60)', lineWidth: 1 }
      });
      const upmB = fontB.getUnitsPerEm?.() ?? 1000;
      const scaleB = size / upmB;
      CanvasRenderer.drawString(fontB, text, canvasDiff, {
        x: 24, y: 150, scale: scaleB, spacing: 2,
        styles: { fillStyle: 'rgba(171,49,49,0.45)', strokeStyle: 'rgba(171,49,49,0.55)', lineWidth: 1 }
      });

      const report = analyzeText(fontA, fontB, text);
      renderRows(report.items);
      renderSummary(fontA, fontB, aSelected.name, bSelected.name, report);
    } catch (err) {
      summary.replaceChildren();
      const warning = document.createElement('span');
      warning.className = 'warn';
      warning.textContent = `Compare failed: ${err?.message || err}`;
      summary.appendChild(warning);
    } finally {
      runBtn.disabled = false;
      runBtn.textContent = 'Compare';
    }
  }

  runBtn.addEventListener('click', run);
  textInput.addEventListener('input', run);
  sizeInput.addEventListener('input', run);
  fontASelect.addEventListener('change', () => {
    if (customFontA) revokeObjectUrl(customFontA);
    customFontA = null;
    fontAFile.value = '';
    fontAUrl.value = '';
    run();
  });
  fontBSelect.addEventListener('change', () => {
    if (customFontB) revokeObjectUrl(customFontB);
    customFontB = null;
    fontBFile.value = '';
    fontBUrl.value = '';
    run();
  });
  fontAFile.addEventListener('change', () => {
    if (customFontA) revokeObjectUrl(customFontA);
    customFontA = fontAFile.files?.[0] ? URL.createObjectURL(fontAFile.files[0]) : null;
    fontAUrl.value = '';
    run();
  });
  fontBFile.addEventListener('change', () => {
    if (customFontB) revokeObjectUrl(customFontB);
    customFontB = fontBFile.files?.[0] ? URL.createObjectURL(fontBFile.files[0]) : null;
    fontBUrl.value = '';
    run();
  });
  fontALoadUrl.addEventListener('click', () => loadUrlInto('A'));
  fontBLoadUrl.addEventListener('click', () => loadUrlInto('B'));
  fontAUrl.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      loadUrlInto('A');
    }
  });
  fontBUrl.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      loadUrlInto('B');
    }
  });

  run();
</script>
</body>
</html>
