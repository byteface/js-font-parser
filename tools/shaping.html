<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GSUB/GPOS Shaping</title>
  <style>
    :root { --bg:#f6f4f1; --ink:#1e1f24; --muted:#5e6574; --panel:#fff; --border:#e3e1db; }
    body { margin:0; font-family:"Merriweather", serif; background:var(--bg); color:var(--ink); }
    header { padding:22px 20px 10px; }
    h1 { margin:0 0 6px; font-size:26px; }
    p { margin:0 0 14px; color:var(--muted); }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px; margin:12px 20px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    select, input[type="text"] { padding:6px 10px; border:1px solid #ccc; border-radius:6px; }
    label { font-size:12px; color:var(--muted); }
    canvas { width:100%; height:200px; border:1px dashed #ddd; background:#fff; }
    .grid { display:grid; grid-template-columns:1fr; gap:12px; }
    @media (min-width: 900px) { .grid { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
<div data-nav="main" style="position:sticky;top:0;z-index:10;background:#f6f4f1;border-bottom:1px solid #e3e1db;padding:10px 16px;font-family:'Merriweather',serif;display:flex;gap:12px;align-items:center"><a href="../demos/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Demos</a><a href="../tools/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Tools</a></div>
  <header>
    <h1>GSUB/GPOS Shaping</h1>
    <p>Compare raw vs shaped rendering for complex scripts.</p>
  </header>

  <div class="panel">
    <div class="row">
      <label>Font
        <select id="fontSelect">
          <option value="../truetypefonts/noto/NotoNaskhArabic-Regular.ttf">Noto Naskh Arabic</option>
          <option value="../truetypefonts/noto/NotoSansDevanagari-Regular.ttf">Noto Sans Devanagari</option>
        </select>
      </label>
      <label>Script tags
        <input id="scriptTags" type="text" value="arab,DFLT" />
      </label>
      <label>Features
        <input id="features" type="text" value="ccmp,locl,init,medi,fina,isol,rlig,liga,calt" style="min-width:320px" />
      </label>
      <label><input id="enableGpos" type="checkbox" checked /> GPOS</label>
    </div>
    <div class="row" style="margin-top:8px">
      <label>Sample
        <input id="sample" type="text" value="مرحبا بالعالم" style="min-width:420px" />
      </label>
    </div>
  </div>

  <div class="panel grid">
    <div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Raw (no GSUB/GPOS)</div>
      <canvas id="raw" width="1200" height="200"></canvas>
    </div>
    <div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Shaped (GSUB/GPOS)</div>
      <canvas id="shaped" width="1200" height="200"></canvas>
    </div>
  </div>

  <script type="module">
    import { FontParserTTF } from "../dist/data/FontParserTTF.js";
    import { CanvasRenderer } from "../dist/render/CanvasRenderer.js";

    const fontSelect = document.getElementById("fontSelect");
    const scriptTagsInput = document.getElementById("scriptTags");
    const featuresInput = document.getElementById("features");
    const sampleInput = document.getElementById("sample");
    const enableGpos = document.getElementById("enableGpos");
    const rawCanvas = document.getElementById("raw");
    const shapedCanvas = document.getElementById("shaped");

    let font = null;

    function drawPositioned(canvas, positioned, scale, y) {
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let x = 24;
      for (const item of positioned) {
        const glyph = font.getGlyph(item.glyphIndex);
        if (!glyph) continue;
        CanvasRenderer.drawGlyphToContext(ctx, glyph, {
          x: x + item.xOffset * scale,
          y,
          scale,
          styles: { fillStyle: "#2c3e50", strokeStyle: "#111", lineWidth: 1.2 }
        });
        x += item.xAdvance * scale;
      }
    }

    async function loadFont() {
      font = await FontParserTTF.load(fontSelect.value);
      render();
    }

    function render() {
      if (!font) return;
      const text = sampleInput.value;
      const raw = font.getGlyphIndicesForString(text);
      const rawPositioned = raw.map(gid => {
        const glyph = font.getGlyph(gid);
        return { glyphIndex: gid, xAdvance: glyph ? glyph.advanceWidth : 0, xOffset: 0, yOffset: 0 };
      });
      drawPositioned(rawCanvas, rawPositioned, 0.12, 150);

      const scriptTags = scriptTagsInput.value.split(',').map(s => s.trim()).filter(Boolean);
      const features = featuresInput.value.split(',').map(s => s.trim()).filter(Boolean);
      const shaped = font.layoutString(text, { gsubFeatures: features, scriptTags, gpos: enableGpos.checked });
      drawPositioned(shapedCanvas, shaped, 0.12, 150);
    }

    fontSelect.addEventListener("change", loadFont);
    scriptTagsInput.addEventListener("input", render);
    featuresInput.addEventListener("input", render);
    sampleInput.addEventListener("input", render);
    enableGpos.addEventListener("change", render);

    loadFont();
  </script>
</body>
</html>
