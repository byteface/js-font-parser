<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GSUB/GPOS Shaping</title>
  <style>
    :root { --bg:#f6f4f1; --ink:#1e1f24; --muted:#5e6574; --panel:#fff; --border:#e3e1db; }
    body { margin:0; font-family:"Merriweather", serif; background:var(--bg); color:var(--ink); }
    header { padding:22px 20px 10px; }
    h1 { margin:0 0 6px; font-size:26px; }
    p { margin:0 0 14px; color:var(--muted); }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px; margin:12px 20px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    select, input[type="text"] { padding:6px 10px; border:1px solid #ccc; border-radius:6px; }
    label { font-size:12px; color:var(--muted); }
    canvas { width:100%; height:200px; border:1px dashed #ddd; background:#fff; }
    .grid { display:grid; grid-template-columns:1fr; gap:12px; }
    @media (min-width: 900px) { .grid { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
<div data-nav="main"></div>
  <header>
    <h1>GSUB/GPOS Shaping</h1>
    <p>Compare raw vs shaped rendering for complex scripts.</p>
  </header>

  <div class="panel">
    <div class="row">
      <label>Font
        <select id="fontSelect">
          <option value="../truetypefonts/noto/NotoNaskhArabic-Regular.ttf">Noto Naskh Arabic</option>
          <option value="../truetypefonts/noto/NotoSansDevanagari-Regular.ttf">Noto Sans Devanagari</option>
        </select>
      </label>
      <label>Script tags
        <input id="scriptTags" type="text" value="arab,DFLT" />
      </label>
      <label>Features
        <input id="features" type="text" value="ccmp,locl,init,medi,fina,isol,rlig,liga,calt" style="min-width:320px" />
      </label>
      <label><input id="autoDetect" type="checkbox" checked /> Auto detect script</label>
      <label><input id="enableGpos" type="checkbox" checked /> GPOS</label>
      <label>GPOS features
        <input id="gposFeatures" type="text" value="kern,mark,mkmk,curs" style="min-width:220px" />
      </label>
    </div>
    <div class="row" style="margin-top:8px">
      <label>Sample
        <input id="sample" type="text" value="مرحبا بالعالم" style="min-width:420px" />
      </label>
    </div>
  </div>

  <div class="panel grid">
    <div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Raw (no GSUB/GPOS)</div>
      <canvas id="raw" width="1200" height="200"></canvas>
    </div>
    <div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Shaped (GSUB/GPOS)</div>
      <canvas id="shaped" width="1200" height="200"></canvas>
    </div>
  </div>
  <div id="status" style="margin:10px 20px;color:#a33a2a;font-size:12px"></div>
  <div id="summary" style="margin:0 20px 14px;color:#5e6574;font-size:12px"></div>

  <script type="module">
    import { FontParser } from "../dist/data/FontParser.js";
    import { CanvasRenderer } from "../dist/render/CanvasRenderer.js";
    import { detectScriptTags } from "../dist/utils/ScriptDetector.js";
    import { Table } from "../dist/table/Table.js";

    const fontSelect = document.getElementById("fontSelect");
    const scriptTagsInput = document.getElementById("scriptTags");
    const featuresInput = document.getElementById("features");
    const sampleInput = document.getElementById("sample");
    const autoDetect = document.getElementById("autoDetect");
    const enableGpos = document.getElementById("enableGpos");
    const gposFeaturesInput = document.getElementById("gposFeatures");
    const rawCanvas = document.getElementById("raw");
    const shapedCanvas = document.getElementById("shaped");
    const status = document.getElementById("status");
    const summary = document.getElementById("summary");

    let font = null;

    function drawPositioned(canvas, positioned, scale, y) {
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let x = 24;
      for (const item of positioned) {
        const glyph = font.getGlyph(item.glyphIndex);
        if (!glyph) continue;
        CanvasRenderer.drawGlyphToContext(ctx, glyph, {
          x: x + item.xOffset * scale,
          y: y + item.yOffset * scale,
          scale,
          styles: { fillStyle: "#2c3e50", strokeStyle: "#111", lineWidth: 1.2 }
        });
        x += item.xAdvance * scale;
      }
    }

    async function loadFont() {
      font = await FontParser.load(fontSelect.value);
      render();
    }

    function render() {
      if (!font) return;
      const text = sampleInput.value;
      const raw = font.getGlyphIndicesForString(text);
      const rawPositioned = raw.map(gid => {
        const glyph = font.getGlyph(gid);
        return { glyphIndex: gid, xAdvance: glyph ? glyph.advanceWidth : 0, xOffset: 0, yOffset: 0 };
      });
      drawPositioned(rawCanvas, rawPositioned, 0.12, 150);

      let scriptTags = scriptTagsInput.value.split(',').map(s => s.trim()).filter(Boolean);
      let features = featuresInput.value.split(',').map(s => s.trim()).filter(Boolean);
      const gposFeatures = gposFeaturesInput.value.split(',').map(s => s.trim()).filter(Boolean);
      let shaped = [];
      if (autoDetect.checked && typeof font.layoutStringAuto === 'function') {
        const detected = detectScriptTags(text);
        scriptTags = detected.scripts;
        features = detected.features;
        scriptTagsInput.value = scriptTags.join(',');
        featuresInput.value = features.join(',');
        shaped = font.layoutStringAuto(text, { gpos: enableGpos.checked, gposFeatures });
      } else {
        if (autoDetect.checked) {
          const detected = detectScriptTags(text);
          scriptTags = detected.scripts;
          features = detected.features;
          scriptTagsInput.value = scriptTags.join(',');
          featuresInput.value = features.join(',');
        }
        shaped = font.layoutString(text, { gsubFeatures: features, scriptTags, gpos: enableGpos.checked, gposFeatures });
      }
      const gsubIndices = font.getGlyphIndicesForStringWithGsub
        ? font.getGlyphIndicesForStringWithGsub(text, features, scriptTags)
        : [];
      const shapedFallback = gsubIndices.map(gid => {
        const glyph = font.getGlyph(gid);
        return { glyphIndex: gid, xAdvance: glyph ? glyph.advanceWidth : 0, xOffset: 0, yOffset: 0 };
      });
      if (!shaped || shaped.length === 0) {
        status.textContent = "Shaped output is empty; showing GSUB-only fallback.";
        drawPositioned(shapedCanvas, shapedFallback.length ? shapedFallback : rawPositioned, 0.12, 150);
      } else {
        status.textContent = "";
        drawPositioned(shapedCanvas, shaped, 0.12, 150);
      }
      if (summary) {
        const gsub = font.getTableByType ? font.getTableByType(Table.GSUB) : null;
        const gdef = font.getTableByType ? font.getTableByType(Table.GDEF) : null;
        const gpos = font.getTableByType ? font.getTableByType(Table.GPOS) : null;
        const lookups = gsub?.lookupList?.getLookups?.() ?? [];
        const contextLookups = lookups.filter(l => l.getType && (l.getType() === 5 || l.getType() === 6)).length;
        summary.textContent = `Raw glyphs: ${raw.length} | GSUB glyphs: ${gsubIndices.length} | Shaped glyphs: ${shaped.length} | GDEF: ${gdef ? 'yes' : 'no'} | GSUB lookups: ${lookups.length} (contextual ${contextLookups}) | GPOS: ${gpos ? 'yes' : 'no'}`;
      }
    }

    fontSelect.addEventListener("change", () => {
      const value = fontSelect.value;
      if (value.includes("Arabic")) {
        sampleInput.value = "مرحبا بالعالم";
        scriptTagsInput.value = "arab,DFLT";
        featuresInput.value = "ccmp,locl,init,medi,fina,isol,rlig,liga,calt";
      } else {
        sampleInput.value = "नमस्ते दुनिया";
        scriptTagsInput.value = "deva,DFLT";
        featuresInput.value = "ccmp,locl,liga,clig,rlig,calt";
      }
      loadFont();
    });
    scriptTagsInput.addEventListener("input", render);
    featuresInput.addEventListener("input", render);
    gposFeaturesInput.addEventListener("input", render);
    sampleInput.addEventListener("input", render);
    enableGpos.addEventListener("change", render);
    autoDetect.addEventListener("change", render);

    loadFont();
  </script>
  <script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
