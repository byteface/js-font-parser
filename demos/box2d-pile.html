<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Box2D Glyph Pile</title>
  <style>
    :root { --bg:#0f1118; --ink:#f4f1ec; --muted:#b4a9a0; --panel:#1a1c22; --border:#2b2f3a; }
    body { margin:0; font-family:"IBM Plex Sans", system-ui, sans-serif; background:var(--bg); color:var(--ink); }
    header { padding:20px 22px 10px; }
    h1 { margin:0 0 6px; font-size:24px; }
    p { margin:0 0 12px; color:var(--muted); }
    .panel { display:flex; flex-wrap:wrap; gap:12px; padding:10px 22px 16px; align-items:center; }
    label { display:flex; flex-direction:column; gap:6px; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); }
    input, select, button { background:#151821; color:var(--ink); border:1px solid var(--border); border-radius:8px; padding:8px 10px; min-width:160px; }
    canvas { display:block; width:100vw; height:70vh; background:#0f1118; }
  </style>
</head>
<body>
<div data-nav="main"></div>

  <header>
    <h1>Glyph Pile</h1>
    <p>Chaos pile of glyph bodies with random impulses.</p>
  </header>
  <div class="panel">
    <label>Font
      <select id="fontSelect">
        <option value="../truetypefonts/DiscoMo.ttf">DiscoMo</option>
        <option value="../truetypefonts/devil-inside-font/DevilInside-G3xP.ttf">DevilInside</option>
        <option value="../truetypefonts/Quill.ttf">Quill</option>
      </select>
    </label>
    <label>Text
      <input id="textInput" value="PILE" />
    </label>
    <label>Gravity
      <input id="gravInput" type="range" min="4" max="18" value="10" />
    </label>
    <button id="resetBtn">Reset</button>
  </div>
  <canvas id="stage" width="1200" height="600"></canvas>

  <script src="https://unpkg.com/planck-js@0.3.0/dist/planck.min.js"></script>
  <script src="../dist-build/fontparser.min.js"></script>
<script type="module">
import { collectGlyphPoints, splitContours as splitGlyphContours, sampleContour } from "./shared/glyph-helpers.js";
const { FontParser, CanvasRenderer, SVGFont } = window.FontParser;
    const planck = window.planck;

    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d");
    const fontSelect = document.getElementById("fontSelect");
    const textInput = document.getElementById("textInput");
    const gravInput = document.getElementById("gravInput");
    const resetBtn = document.getElementById("resetBtn");

    const scale = 30;
    const floorY = pxToWorld(canvas.height - 24);
    let world = null;
    let font = null;
    let bodies = [];

    function pxToWorld(v) { return v / scale; }
    function worldToPx(v) { return v * scale; }

    function glyphBounds(glyph) {
      const pts = glyph.points.slice(0, Math.max(0, glyph.getPointCount() - 2));
      const xs = pts.map(p => p.x);
      const ys = pts.map(p => p.y);
      return {
        minX: xs.length ? Math.min(...xs) : 0,
        maxX: xs.length ? Math.max(...xs) : 0,
        minY: ys.length ? Math.min(...ys) : 0,
        maxY: ys.length ? Math.max(...ys) : 0
      };
    }

    function splitContours(glyph) {
      return splitGlyphContours(collectGlyphPoints(glyph));
    }

    function contourToLocal(contour, glyphScale, bounds) {
      const anchorX = bounds.minX;
      const anchorY = bounds.maxY;
      const out = [];
      for (let i = 0; i < contour.length; i++) {
        const p = contour[i];
        out.push({
          x: pxToWorld((p.x - anchorX) * glyphScale),
          y: pxToWorld((anchorY - p.y) * glyphScale)
        });
      }
      return out;
    }

    function contourArea(contour) {
      let area = 0;
      for (let i = 0; i < contour.length; i++) {
        const a = contour[i];
        const b = contour[(i + 1) % contour.length];
        area += (a.x * b.y) - (b.x * a.y);
      }
      return area * 0.5;
    }

    function simplifyContour(contour, maxPoints = 24) {
      if (contour.length <= maxPoints) return contour.slice();
      const step = Math.ceil(contour.length / maxPoints);
      const out = [];
      for (let i = 0; i < contour.length; i += step) out.push(contour[i]);
      return out;
    }

    function convexHull(points) {
      if (!points || points.length < 3) return points ? points.slice() : [];
      const sorted = [...points]
        .map((p) => ({ x: p.x, y: p.y }))
        .sort((a, b) => (a.x === b.x ? a.y - b.y : a.x - b.x));
      const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
      const lower = [];
      for (const p of sorted) {
        while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
        lower.push(p);
      }
      const upper = [];
      for (let i = sorted.length - 1; i >= 0; i--) {
        const p = sorted[i];
        while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
        upper.push(p);
      }
      lower.pop();
      upper.pop();
      return lower.concat(upper);
    }

    function reduceHullVertices(hull, maxVertices = 8) {
      if (hull.length <= maxVertices) return hull.slice();
      const step = Math.ceil(hull.length / maxVertices);
      const out = [];
      for (let i = 0; i < hull.length; i += step) out.push(hull[i]);
      while (out.length > maxVertices) out.pop();
      return out;
    }

    function addGlyphOutlineFixtures(body, glyph, glyphScale, bounds) {
      const localContours = splitContours(glyph)
        .map((contour) => sampleContour(contour, 0.18))
        .map((contour) => contourToLocal(contour, glyphScale, bounds))
        .filter((contour) => contour.length >= 3);
      if (!localContours.length) return { ok: false, centerX: 0, centerY: 0 };

      // Use only the dominant outer contour to keep the body stable + fast.
      let outer = localContours[0];
      let bestArea = Math.abs(contourArea(outer));
      for (let i = 1; i < localContours.length; i++) {
        const area = Math.abs(contourArea(localContours[i]));
        if (area > bestArea) {
          bestArea = area;
          outer = localContours[i];
        }
      }

      const contour = simplifyContour(outer, 40);
      if (contour.length < 3) return { ok: false, centerX: 0, centerY: 0 };

      const minX = Math.min(...contour.map((p) => p.x));
      const maxX = Math.max(...contour.map((p) => p.x));
      const minY = Math.min(...contour.map((p) => p.y));
      const maxY = Math.max(...contour.map((p) => p.y));
      const centerX = (minX + maxX) * 0.5;
      const centerY = (minY + maxY) * 0.5;

      const centered = contour.map((p) => ({ x: p.x - centerX, y: p.y - centerY }));
      const hull = convexHull(centered);
      const hullReduced = reduceHullVertices(hull, 8);
      if (hullReduced.length < 3) return { ok: false, centerX: 0, centerY: 0 };
      const vertices = hullReduced.map((p) => planck.Vec2(p.x, p.y));
      try {
        body.createFixture(planck.Polygon(vertices), {
          density: 0.95,
          friction: 0.3,
          restitution: 0.05
        });
      } catch {
        return { ok: false, centerX: 0, centerY: 0 };
      }

      return { ok: true, centerX, centerY };
    }

    function setupWorld() {
      const gravity = Number(gravInput.value);
      world = planck.World({ gravity: planck.Vec2(0, gravity) });
      const ground = world.createBody();
      const floorThickness = pxToWorld(36);
      ground.createFixture(
        planck.Box(pxToWorld(canvas.width + 120) * 0.5, floorThickness, planck.Vec2(pxToWorld(canvas.width) * 0.5, floorY + floorThickness * 0.5), 0),
        { friction: 0.9, restitution: 0.02 }
      );
    }

    function buildPile() {
      bodies = [];
      const unitsPerEm = typeof font.getUnitsPerEm === "function" ? font.getUnitsPerEm() : 1000;
      const sizePx = 120;
      const glyphScale = sizePx / unitsPerEm;

      const chars = Array.from(textInput.value || "");
      for (let i = 0; i < 12; i++) {
        const ch = chars[i % chars.length] || "A";
        const glyph = font.getGlyphByChar(ch);
        if (!glyph) continue;
        const bounds = glyphBounds(glyph);
        const w = Math.max(10, (bounds.maxX - bounds.minX) * glyphScale);
        const h = Math.max(10, (bounds.maxY - bounds.minY) * glyphScale);
        const body = world.createBody({
          type: "dynamic",
          position: planck.Vec2(pxToWorld(80 + Math.random() * 600), pxToWorld(40 + Math.random() * 120)),
          angle: (Math.random() - 0.5) * 0.24,
          bullet: true,
          linearDamping: 0.65,
          angularDamping: 1.45
        });
        const result = addGlyphOutlineFixtures(body, glyph, glyphScale, bounds);
        if (!result.ok) {
          body.createFixture(planck.Box(pxToWorld(w * 0.3), pxToWorld(h * 0.3)), {
            density: 0.9,
            friction: 0.65,
            restitution: 0.08
          });
        }
        body.applyLinearImpulse(planck.Vec2((Math.random() - 0.5) * 0.25, Math.random() * 0.08), body.getWorldCenter(), true);
        bodies.push({ body, glyph, glyphScale, bounds, centerX: result.centerX || 0, centerY: result.centerY || 0 });
      }
    }

    async function boot() {
      font = await FontParser.load(fontSelect.value);
      setupWorld();
      buildPile();
    }

    function reset() {
      setupWorld();
      buildPile();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0f1118";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "#2c3140";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, worldToPx(floorY));
      ctx.lineTo(canvas.width, worldToPx(floorY));
      ctx.stroke();

      for (const item of bodies) {
        const { body, glyph, glyphScale, bounds, centerX = 0, centerY = 0 } = item;
        const pos = body.getPosition();
        const angle = body.getAngle();
        ctx.save();
        ctx.translate(worldToPx(pos.x), worldToPx(pos.y));
        ctx.rotate(-angle);
        CanvasRenderer.drawGlyphToContext(ctx, glyph, {
          x: -(bounds.minX * glyphScale) - worldToPx(centerX),
          y: (bounds.maxY * glyphScale) - worldToPx(centerY),
          scale: glyphScale,
          styles: { fillStyle: "#f4f1ec", strokeStyle: "#b4a9a0", lineWidth: 1 }
        });
        ctx.restore();
      }
    }

    function tick() {
      if (world) {
        world.step(1 / 60, 10, 6);
        draw();
      }
      requestAnimationFrame(tick);
    }

    fontSelect.addEventListener("change", boot);
    textInput.addEventListener("input", reset);
    gravInput.addEventListener("input", reset);
    resetBtn.addEventListener("click", reset);

    boot();
    requestAnimationFrame(tick);
  </script>
  <script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
