<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Box2D Glyph Pile</title>
  <style>
    :root { --bg:#120f0c; --ink:#f5eadf; --muted:#b89f8b; --panel:rgba(28,20,16,0.88); --border:#4b3a2d; }
    body { margin:0; font-family:"IBM Plex Sans", system-ui, sans-serif; background:radial-gradient(circle at 18% 14%, #2c1c12, transparent 28%),linear-gradient(180deg,#140f0c,#0e0b09); color:var(--ink); }
    header { padding:20px 22px 10px; }
    h1 { margin:0 0 6px; font-size:24px; letter-spacing:-0.03em; }
    p { margin:0 0 12px; color:var(--muted); max-width:720px; }
    .panel { display:flex; flex-wrap:wrap; gap:12px; padding:10px 22px 16px; align-items:center; backdrop-filter:blur(10px); }
    label { display:flex; flex-direction:column; gap:6px; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); }
    input, select, button { background:rgba(20,15,12,0.92); color:var(--ink); border:1px solid var(--border); border-radius:10px; padding:8px 10px; min-width:160px; }
    button { cursor:pointer; }
    canvas { display:block; width:100vw; background:#120f0c; }
  </style>
</head>
<body>
<div data-nav="main"></div>

  <header>
    <h1>Glyph Pile</h1>
    <p>Letterforms drop like carved blocks onto a lit stage, picking up heat where they collide.</p>
  </header>
  <div class="panel">
    <label>Font
      <select id="fontSelect"></select>
    </label>
    <label>Text
      <input id="textInput" value="PILE" />
    </label>
    <label>Gravity
      <input id="gravInput" type="range" min="4" max="18" value="18" />
    </label>
    <label>Stack Size
      <input id="countInput" type="range" min="4" max="36" value="36" />
    </label>
    <label>Glyph Size
      <input id="sizeInput" type="range" min="72" max="180" value="180" />
    </label>
    <label>Drop Spread
      <input id="spreadInput" type="range" min="120" max="920" value="920" />
    </label>
    <label>Bounce
      <input id="bounceInput" type="range" min="0" max="40" value="40" />
    </label>
    <button id="resetBtn">Reset</button>
  </div>
  <canvas id="stage" width="1200" height="600"></canvas>

<script src="https://unpkg.com/planck-js@0.3.0/dist/planck.min.js"></script>
  <script src="../dist-build/fontparser.min.js"></script>
<script type="module">
import { collectGlyphPoints, splitContours as splitGlyphContours, sampleContour } from "./shared/glyph-helpers.js";
import { getFontList } from "../tools/shared/font-catalog.js";
const { FontParser, CanvasRenderer, SVGFont } = window.FontParser;
    const planck = window.planck;

    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d");
    const fontSelect = document.getElementById("fontSelect");
    const textInput = document.getElementById("textInput");
    const gravInput = document.getElementById("gravInput");
    const countInput = document.getElementById("countInput");
    const sizeInput = document.getElementById("sizeInput");
    const spreadInput = document.getElementById("spreadInput");
    const bounceInput = document.getElementById("bounceInput");
    const resetBtn = document.getElementById("resetBtn");
    const fontOptions = [
      ...getFontList("demoCore"),
      ...getFontList("allGlyphs").slice(0, 14),
      ...getFontList("variableFonts").slice(0, 6)
    ]
      .filter((entry) => !/2006 Team|Twemoji|Font Awesome/i.test(entry.name))
      .filter((entry, index, all) => all.findIndex((item) => item.url === entry.url) === index);

    const scale = 30;
    let world = null;
    let font = null;
    let bodies = [];
    let bodyMeta = new Map();
    let viewportWidth = canvas.width;
    let viewportHeight = canvas.height;

    for (const entry of fontOptions) {
      const option = document.createElement("option");
      option.value = entry.url;
      option.textContent = entry.name;
      fontSelect.appendChild(option);
    }
    if (fontOptions.length) {
      const preferred = fontOptions.find((entry) => /Gotham|Quill|DiscoMo|Source Serif|Roboto/i.test(entry.name));
      fontSelect.value = (preferred || fontOptions[0]).url;
    }

    function pxToWorld(v) { return v / scale; }
    function worldToPx(v) { return v * scale; }
    function getFloorY() { return pxToWorld(viewportHeight - 24); }

    function resizeCanvas() {
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const top = canvas.getBoundingClientRect().top;
      const cssHeight = Math.max(260, window.innerHeight - top);
      canvas.style.height = `${cssHeight}px`;
      const rect = canvas.getBoundingClientRect();
      viewportWidth = rect.width;
      viewportHeight = rect.height;
      canvas.width = Math.round(rect.width * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
    }

    function glyphBounds(glyph) {
      const pts = collectGlyphPoints(glyph);
      const xs = pts.map(p => p.x);
      const ys = pts.map(p => p.y);
      return {
        minX: xs.length ? Math.min(...xs) : 0,
        maxX: xs.length ? Math.max(...xs) : 0,
        minY: ys.length ? Math.min(...ys) : 0,
        maxY: ys.length ? Math.max(...ys) : 0
      };
    }

    function splitContours(glyph) {
      return splitGlyphContours(collectGlyphPoints(glyph));
    }

    function contourToLocal(contour, glyphScale, bounds) {
      const anchorX = bounds.minX;
      const anchorY = bounds.maxY;
      const out = [];
      for (let i = 0; i < contour.length; i++) {
        const p = contour[i];
        out.push({
          x: pxToWorld((p.x - anchorX) * glyphScale),
          y: pxToWorld((anchorY - p.y) * glyphScale)
        });
      }
      return out;
    }

    function contourArea(contour) {
      let area = 0;
      for (let i = 0; i < contour.length; i++) {
        const a = contour[i];
        const b = contour[(i + 1) % contour.length];
        area += (a.x * b.y) - (b.x * a.y);
      }
      return area * 0.5;
    }

    function simplifyContour(contour, maxPoints = 24) {
      if (contour.length <= maxPoints) return contour.slice();
      const step = Math.ceil(contour.length / maxPoints);
      const out = [];
      for (let i = 0; i < contour.length; i += step) out.push(contour[i]);
      return out;
    }

    function convexHull(points) {
      if (!points || points.length < 3) return points ? points.slice() : [];
      const sorted = [...points]
        .map((p) => ({ x: p.x, y: p.y }))
        .sort((a, b) => (a.x === b.x ? a.y - b.y : a.x - b.x));
      const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
      const lower = [];
      for (const p of sorted) {
        while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
        lower.push(p);
      }
      const upper = [];
      for (let i = sorted.length - 1; i >= 0; i--) {
        const p = sorted[i];
        while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
        upper.push(p);
      }
      lower.pop();
      upper.pop();
      return lower.concat(upper);
    }

    function reduceHullVertices(hull, maxVertices = 8) {
      if (hull.length <= maxVertices) return hull.slice();
      const step = Math.ceil(hull.length / maxVertices);
      const out = [];
      for (let i = 0; i < hull.length; i += step) out.push(hull[i]);
      while (out.length > maxVertices) out.pop();
      return out;
    }

    function addGlyphOutlineFixtures(body, glyph, glyphScale, bounds, bounce) {
      const localContours = splitContours(glyph)
        .map((contour) => sampleContour(contour, 0.18))
        .map((contour) => contourToLocal(contour, glyphScale, bounds))
        .filter((contour) => contour.length >= 3);
      if (!localContours.length) return { ok: false, centerX: 0, centerY: 0 };

      // Use only the dominant outer contour to keep the body stable + fast.
      let outer = localContours[0];
      let bestArea = Math.abs(contourArea(outer));
      for (let i = 1; i < localContours.length; i++) {
        const area = Math.abs(contourArea(localContours[i]));
        if (area > bestArea) {
          bestArea = area;
          outer = localContours[i];
        }
      }

      const contour = simplifyContour(outer, 40);
      if (contour.length < 3) return { ok: false, centerX: 0, centerY: 0 };

      const minX = Math.min(...contour.map((p) => p.x));
      const maxX = Math.max(...contour.map((p) => p.x));
      const minY = Math.min(...contour.map((p) => p.y));
      const maxY = Math.max(...contour.map((p) => p.y));
      const centerX = (minX + maxX) * 0.5;
      const centerY = (minY + maxY) * 0.5;

      const centered = contour.map((p) => ({ x: p.x - centerX, y: p.y - centerY }));
      const hull = convexHull(centered);
      const hullReduced = reduceHullVertices(hull, 8);
      if (hullReduced.length < 3) return { ok: false, centerX: 0, centerY: 0 };
      const vertices = hullReduced.map((p) => planck.Vec2(p.x, p.y));
      try {
        body.createFixture(planck.Polygon(vertices), {
          density: 0.95,
          friction: 0.3,
          restitution: Math.max(0.05, bounce)
        });
      } catch {
        return { ok: false, centerX: 0, centerY: 0 };
      }

      return { ok: true, centerX, centerY };
    }

    function setupWorld() {
      const gravity = Number(gravInput.value);
      world = planck.World({ gravity: planck.Vec2(0, gravity) });
      bodyMeta = new Map();
      const ground = world.createBody();
      const floorY = getFloorY();
      const floorThickness = pxToWorld(36);
      ground.createFixture(
        planck.Box(pxToWorld(viewportWidth + 120) * 0.5, floorThickness, planck.Vec2(pxToWorld(viewportWidth) * 0.5, floorY + floorThickness * 0.5), 0),
        { friction: 0.9, restitution: 0.02 }
      );
      const wallThickness = pxToWorld(60);
      ground.createFixture(
        planck.Box(wallThickness, pxToWorld(viewportHeight) * 0.5, planck.Vec2(-wallThickness * 0.5, pxToWorld(viewportHeight) * 0.5), 0),
        { friction: 0.8, restitution: 0.02 }
      );
      ground.createFixture(
        planck.Box(wallThickness, pxToWorld(viewportHeight) * 0.5, planck.Vec2(pxToWorld(viewportWidth) + wallThickness * 0.5, pxToWorld(viewportHeight) * 0.5), 0),
        { friction: 0.8, restitution: 0.02 }
      );
      ground.setUserData({ kind: "ground" });

      world.on("post-solve", (contact, impulse) => {
        if (!contact) return;
        const fixtureA = contact.getFixtureA();
        const fixtureB = contact.getFixtureB();
        const bodyA = fixtureA ? fixtureA.getBody() : null;
        const bodyB = fixtureB ? fixtureB.getBody() : null;
        if (!bodyA || !bodyB) return;

        const dataA = bodyA.getUserData();
        const dataB = bodyB.getUserData();
        const isGlyphA = dataA && dataA.kind === "glyph";
        const isGlyphB = dataB && dataB.kind === "glyph";
        if (!isGlyphA && !isGlyphB) return;

        const normalImpulses = impulse && impulse.normalImpulses ? impulse.normalImpulses : [];
        let totalImpulse = 0;
        for (let i = 0; i < normalImpulses.length; i++) totalImpulse += Math.abs(normalImpulses[i] || 0);
        if (!Number.isFinite(totalImpulse) || totalImpulse <= 0.01) return;
        const heatBoost = Math.min(1, totalImpulse * 0.11);

        if (isGlyphA) {
          const m = bodyMeta.get(bodyA);
          if (m) m.heat = Math.min(1, m.heat + heatBoost);
        }
        if (isGlyphB) {
          const m = bodyMeta.get(bodyB);
          if (m) m.heat = Math.min(1, m.heat + heatBoost);
        }
        const worldManifold = contact.getWorldManifold ? contact.getWorldManifold(null) : null;
        const points = worldManifold && Array.isArray(worldManifold.points) ? worldManifold.points.filter(Boolean) : [];
        if (!points.length) return;

        if (isGlyphA) {
          const m = bodyMeta.get(bodyA);
          if (m) {
            for (const p of points) {
              const lp = bodyA.getLocalPoint(p);
              m.hits.push({ x: lp.x, y: lp.y, life: 1, intensity: Math.min(1, heatBoost) });
            }
          }
        }
        if (isGlyphB) {
          const m = bodyMeta.get(bodyB);
          if (m) {
            for (const p of points) {
              const lp = bodyB.getLocalPoint(p);
              m.hits.push({ x: lp.x, y: lp.y, life: 1, intensity: Math.min(1, heatBoost) });
            }
          }
        }
      });
    }

    function buildPile() {
      bodies = [];
      const unitsPerEm = typeof font.getUnitsPerEm === "function" ? font.getUnitsPerEm() : 1000;
      const sizePx = Number(sizeInput.value);
      const glyphScale = sizePx / unitsPerEm;
      const bounce = Number(bounceInput.value) / 100;
      const stackSize = Number(countInput.value);
      const spread = Number(spreadInput.value);
      const spawnLeft = Math.max(110, viewportWidth * 0.5 - spread * 0.5);
      const impulseScale = 0.12 + bounce * 0.7;

      const chars = Array.from(textInput.value || "");
      for (let i = 0; i < stackSize; i++) {
        const ch = chars[i % chars.length] || "A";
        const glyph = font.getGlyphByChar(ch);
        if (!glyph) continue;
        const bounds = glyphBounds(glyph);
        const w = Math.max(10, (bounds.maxX - bounds.minX) * glyphScale);
        const h = Math.max(10, (bounds.maxY - bounds.minY) * glyphScale);
        const body = world.createBody({
          type: "dynamic",
          position: planck.Vec2(pxToWorld(spawnLeft + Math.random() * spread), pxToWorld(40 + Math.random() * 140)),
          angle: (Math.random() - 0.5) * (0.16 + bounce * 1.4),
          bullet: true,
          linearDamping: 0.65,
          angularDamping: 1.45
        });
        const result = addGlyphOutlineFixtures(body, glyph, glyphScale, bounds, bounce);
        if (!result.ok) {
          body.createFixture(planck.Box(pxToWorld(w * 0.3), pxToWorld(h * 0.3)), {
            density: 0.9,
            friction: 0.65,
            restitution: Math.max(0.08, bounce)
          });
        }
        body.applyLinearImpulse(
          planck.Vec2((Math.random() - 0.5) * impulseScale, Math.random() * impulseScale * 0.35),
          body.getWorldCenter(),
          true
        );
        const item = { body, glyph, glyphScale, bounds, centerX: result.centerX || 0, centerY: result.centerY || 0, heat: 0, hits: [] };
        body.setUserData({ kind: "glyph" });
        bodyMeta.set(body, item);
        bodies.push(item);
      }
    }

    async function boot() {
      try {
        font = await FontParser.load(fontSelect.value);
        setupWorld();
        buildPile();
      } catch (err) {
        console.error("Failed to load font for box2d-pile demo:", err);
      }
    }

    function reset() {
      setupWorld();
      buildPile();
    }

    function draw() {
      const floorY = getFloorY();
      ctx.clearRect(0, 0, viewportWidth, viewportHeight);
      const bg = ctx.createLinearGradient(0, 0, 0, viewportHeight);
      bg.addColorStop(0, "#17110d");
      bg.addColorStop(0.55, "#120f0c");
      bg.addColorStop(1, "#0d0a08");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, viewportWidth, viewportHeight);

      const poolGrad = ctx.createLinearGradient(0, viewportHeight * 0.72, 0, viewportHeight);
      poolGrad.addColorStop(0, "rgba(255,184,102,0)");
      poolGrad.addColorStop(1, "rgba(255,140,62,0.12)");
      ctx.fillStyle = poolGrad;
      ctx.fillRect(0, viewportHeight * 0.72, viewportWidth, viewportHeight * 0.28);

      ctx.fillStyle = "#251a13";
      ctx.fillRect(0, worldToPx(floorY), viewportWidth, viewportHeight - worldToPx(floorY));

      ctx.strokeStyle = "rgba(255,205,142,0.28)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, worldToPx(floorY));
      ctx.lineTo(viewportWidth, worldToPx(floorY));
      ctx.stroke();

      for (const item of bodies) {
        const { body, glyph, glyphScale, bounds, centerX = 0, centerY = 0 } = item;
        item.heat = Math.max(0, item.heat * 0.92);
        const heat = item.heat;
        const fillR = Math.round(244 + ((255 - 244) * heat * 0.2));
        const fillG = Math.round(241 - (86 * heat * 0.2));
        const fillB = Math.round(236 - (140 * heat * 0.2));
        const strokeR = Math.round(180 + (70 * heat * 0.35));
        const strokeG = Math.round(169 - (89 * heat * 0.35));
        const strokeB = Math.round(160 - (120 * heat * 0.35));
        const pos = body.getPosition();
        const angle = body.getAngle();
        ctx.save();
        ctx.translate(worldToPx(pos.x), worldToPx(pos.y));
        ctx.rotate(-angle);
        ctx.shadowBlur = 18 + (22 * heat);
        ctx.shadowColor = `rgba(255, 152, 82, ${0.12 + heat * 0.22})`;
        CanvasRenderer.drawGlyphToContext(ctx, glyph, {
          x: -(bounds.minX * glyphScale) - worldToPx(centerX),
          y: (bounds.maxY * glyphScale) - worldToPx(centerY),
          scale: glyphScale,
          styles: {
            fillStyle: `rgb(${fillR}, ${fillG}, ${fillB})`,
            strokeStyle: `rgb(${strokeR}, ${strokeG}, ${strokeB})`,
            lineWidth: 1.2 + (0.3 * heat)
          }
        });
        ctx.shadowBlur = 0;

        if (item.hits.length) {
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          for (let i = item.hits.length - 1; i >= 0; i--) {
            const hit = item.hits[i];
            hit.life -= 0.06;
            if (hit.life <= 0) {
              item.hits.splice(i, 1);
              continue;
            }
            const alpha = hit.life * 0.75;
            const radius = 4 + (13 * hit.intensity * (1 - hit.life));
            const hx = worldToPx(hit.x);
            const hy = worldToPx(hit.y);
            const grad = ctx.createRadialGradient(hx, hy, 0, hx, hy, radius);
            grad.addColorStop(0, `rgba(255, 245, 215, ${alpha})`);
            grad.addColorStop(0.5, `rgba(255, 163, 66, ${alpha * 0.85})`);
            grad.addColorStop(1, "rgba(255, 120, 32, 0)");
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(hx, hy, radius, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
        ctx.restore();
      }
    }

    function tick() {
      if (world) {
        world.step(1 / 60, 10, 6);
        draw();
      }
      requestAnimationFrame(tick);
    }

    fontSelect.addEventListener("change", boot);
    textInput.addEventListener("input", reset);
    gravInput.addEventListener("input", reset);
    countInput.addEventListener("input", reset);
    sizeInput.addEventListener("input", reset);
    spreadInput.addEventListener("input", reset);
    bounceInput.addEventListener("input", reset);
    resetBtn.addEventListener("click", reset);
    window.addEventListener("resize", () => {
      resizeCanvas();
      reset();
    });

    resizeCanvas();
    boot();
    requestAnimationFrame(tick);
  </script>
  <script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
