<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Script 2</title>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: Arial, sans-serif; }
        .label { padding: 12px 16px; }
    </style>
</head>
<body>
<div class="label">Script 2 (rotating)</div>
<canvas id="myDrawing" width="800" height="800"></canvas>
<script type="module">
    import { CanvasGlyph } from '../dist/render/CanvasGlyph.js';

    const drawingCanvas = document.getElementById('myDrawing');
    const context = drawingCanvas.getContext('2d');
    context.translate(300, 400);

    const font = new CanvasGlyph("../truetypefonts/Quill.ttf");
    font.onFontLoaded().then(() => {
        font.setStyle(1, "#000000", "#ffffff", 0.6);
        setInterval(drawIt, 50);
    });

    function drawIt() {
        const col = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
        font.setStyle(1, col, "#ffffff", 0.5);
        font.drawChar("Q", "myDrawing");
        context.rotate(0.3);
    }
</script>
</body>
</html>
