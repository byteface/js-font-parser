<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Three Point Cloud Glyph</title>
  <style>
    body{margin:0;background:#04070f;color:#e8f2ff;font-family:"Trebuchet MS",sans-serif}
    .ui{position:fixed;top:56px;left:12px;z-index:20;background:rgba(4,9,18,.75);border:1px solid #2d3c58;border-radius:10px;padding:10px;display:flex;gap:8px;align-items:center}
    select,input{background:#10192a;color:#e8f2ff;border:1px solid #2d3c58;border-radius:7px;padding:6px}
    #c{width:100vw;height:100vh;display:block}
  </style>
</head>
<body>
<div data-nav="main"></div>
<div class="ui">
  <label>Font <select id="font"></select></label>
  <label>Glyph <input id="char" value="A" maxlength="2" size="2" /></label>
</div>
<canvas id="c"></canvas>
<script src="../dist-build/fontparser.min.js"></script>
<script type="module">
  import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
  import { CREATIVE_FONTS, populateCreativeFonts, loadFontByUrl, getGlyphGeometry } from './shared/creative-kit.js';

  const canvas = document.getElementById('c');
  const fontSel = document.getElementById('font');
  const charInput = document.getElementById('char');
  populateCreativeFonts(fontSel);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x04070f);
  const camera = new THREE.PerspectiveCamera(52, 1, 1, 5000);
  camera.position.set(0, 0, 900);

  const cloudGeo = new THREE.BufferGeometry();
  const mat = new THREE.PointsMaterial({ size: 5, vertexColors: true, transparent: true, opacity: 0.9 });
  const points = new THREE.Points(cloudGeo, mat);
  scene.add(points);

  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(360, 1.2, 8, 180),
    new THREE.MeshBasicMaterial({ color: 0x3e5f99, transparent: true, opacity: 0.35 })
  );
  scene.add(ring);

  let base = [];
  let font = null;

  async function rebuild() {
    try {
      font = await loadFontByUrl(fontSel.value || CREATIVE_FONTS[0].url);
      const g = getGlyphGeometry(font, (charInput.value || 'A')[0], { sizePx: 540, centerX: 0, centerY: 0 });
      base = g.points.map((p, i) => ({
        x: p.x,
        y: p.y,
        z: Math.sin(i * 0.09) * 40,
        seed: i * 0.013
      }));
      const pos = new Float32Array(base.length * 3);
      const col = new Float32Array(base.length * 3);
      for (let i = 0; i < base.length; i++) {
        pos[i * 3] = base[i].x;
        pos[i * 3 + 1] = base[i].y;
        pos[i * 3 + 2] = base[i].z;
        const t = i / Math.max(1, base.length - 1);
        col[i * 3] = 0.3 + 0.6 * t;
        col[i * 3 + 1] = 0.5 + 0.35 * (1 - t);
        col[i * 3 + 2] = 1.0;
      }
      cloudGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      cloudGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));
    } catch (err) {
      console.error(err);
    }
  }

  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }

  function animate(t) {
    requestAnimationFrame(animate);
    const pos = cloudGeo.getAttribute('position');
    if (pos && base.length) {
      for (let i = 0; i < base.length; i++) {
        const b = base[i];
        const pulse = Math.sin(t * 0.0014 + b.seed * 80);
        pos.array[i * 3] = b.x + Math.cos(t * 0.0008 + b.seed * 37) * 9;
        pos.array[i * 3 + 1] = b.y + Math.sin(t * 0.001 + b.seed * 53) * 9;
        pos.array[i * 3 + 2] = b.z + pulse * 24;
      }
      pos.needsUpdate = true;
    }
    points.rotation.y = Math.sin(t * 0.00022) * 0.45;
    ring.rotation.z += 0.001;
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', resize);
  fontSel.addEventListener('change', rebuild);
  charInput.addEventListener('input', rebuild);
  resize();
  await rebuild();
  animate(0);
</script>
<script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
