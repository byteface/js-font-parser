<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Spin</title>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: Arial, sans-serif; }
        .label { padding: 12px 16px; }
    </style>
</head>
<body>
<div class="label">Spin</div>
<canvas id="myDrawing" width="800" height="800"></canvas>
<script type="module">
    import { FontParserTTF } from '../dist/data/FontParserTTF.js';
    import { Color } from '../dist/utils/Color.js';
    import { drawGlyphToContext } from './shared/glyph-render.js';

    const canvas = document.getElementById('myDrawing');
    const ctx = canvas.getContext('2d');
    ctx.translate(500, 400);

    FontParserTTF.load("../truetypefonts/20FACES.TTF")
        .then(font => {
            setInterval(() => draw(font), 50);
        })
        .catch(err => console.error("Failed to load font:", err));

    function draw(font) {
        for (let i = 0; i < 10; i++) {
            const col = Color.rndColor();
            drawGlyphToContext(ctx, font.getGlyphByChar("S"), {
                x: 0,
                y: 0,
                scale: 0.4,
                styles: {
                    'color': col,
                    'stroke-color': '#ffffff',
                    'line-width': '1',
                    'opacity': '0.4'
                }
            });
            ctx.rotate(0.35);
        }
    }
</script>
</body>
</html>
