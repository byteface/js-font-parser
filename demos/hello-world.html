<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hello World Demo</title>
  <style>
    :root {
      --bg: #f1ece2;
      --ink: #1a2430;
      --muted: #6a6f78;
      --panel: rgba(255, 252, 246, 0.86);
      --line: rgba(25, 36, 48, 0.12);
      --accent: #b64d2f;
      --accent-2: #224f85;
      --shadow: rgba(23, 29, 38, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Fraunces", "Georgia", serif;
      background:
        radial-gradient(circle at top left, rgba(224, 113, 54, 0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(44, 89, 146, 0.12), transparent 34%),
        linear-gradient(180deg, #f7f2e9 0%, #ece3d4 100%);
    }
    .shell {
      width: min(1200px, calc(100vw - 28px));
      margin: 72px auto 36px;
    }
    .controls, .specimen {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 70px var(--shadow);
    }
    .controls {
      margin-bottom: 20px;
      padding: 18px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: end;
    }
    .controls h2 {
      margin: 0;
      font: 700 16px/1.2 "IBM Plex Sans", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .control-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
      flex: 1;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font: 600 12px/1.2 "IBM Plex Sans", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    input, select {
      width: 100%;
      border: 1px solid rgba(25, 36, 48, 0.14);
      border-radius: 12px;
      padding: 11px 12px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.9);
      font: 500 14px/1.2 "IBM Plex Sans", sans-serif;
    }
    input[type="range"] {
      padding: 0;
      accent-color: var(--accent);
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .stat {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.6);
      font: 500 13px/1.4 "IBM Plex Sans", sans-serif;
    }
    .specimens {
      display: grid;
      gap: 16px;
    }
    .specimen {
      padding: 18px 18px 14px;
    }
    .specimen-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .specimen-title {
      font: 700 18px/1.2 "IBM Plex Sans", sans-serif;
    }
    .specimen-sub {
      color: var(--muted);
      font: 500 12px/1.4 "IBM Plex Sans", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    canvas {
      width: 100%;
      height: auto;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(252, 247, 239, 0.94)),
        radial-gradient(circle at top right, rgba(182, 77, 47, 0.12), transparent 34%);
      border: 1px solid rgba(25, 36, 48, 0.08);
      display: block;
    }
    .status {
      margin-top: 8px;
      min-height: 18px;
      color: var(--muted);
      font: 500 12px/1.4 "IBM Plex Sans", sans-serif;
    }
  </style>
</head>
<body>
<div data-nav="main"></div>
<main class="shell">
  <section class="controls">
    <h2>Specimen Controls</h2>
    <div class="control-grid">
      <label>Phrase
        <input id="phraseInput" value="hello world" />
      </label>
      <label>Scale
        <input id="scaleInput" type="range" min="0.06" max="0.18" value="0.1" step="0.005" />
      </label>
      <label>Tracking
        <input id="trackingInput" type="range" min="0" max="40" value="8" step="1" />
      </label>
    </div>
    <div class="stats">
      <div class="stat"><span>Visible specimens</span><strong id="fontCount">0</strong></div>
      <div class="stat"><span>Outline-ready</span><strong id="outlineCount">0</strong></div>
      <div class="stat"><span>Phrase length</span><strong id="phraseCount">0</strong></div>
    </div>
  </section>

  <section class="specimens" id="fontList"></section>
</main>

<script src="../dist-build/fontparser.min.js"></script>
<script type="module">
import { getFontList } from "../tools/shared/font-catalog.js";
const { FontParser } = window.FontParser;

const TABLE_TAGS = {
  glyf: 0x676c7966,
  CFF: 0x43464620,
  CFF2: 0x43464632
};

const fontList = document.getElementById("fontList");
const phraseInput = document.getElementById("phraseInput");
const scaleInput = document.getElementById("scaleInput");
const trackingInput = document.getElementById("trackingInput");
const fontCount = document.getElementById("fontCount");
const outlineCount = document.getElementById("outlineCount");
const phraseCount = document.getElementById("phraseCount");

const fontFiles = getFontList("stringExplorer");
const cards = [];
const fontCache = new Map();
const visibleCards = new Set();
let redrawScheduled = false;
let observer = null;

function getStyles() {
  return {
    fillStyle: "#224f85",
    strokeStyle: "rgba(10, 18, 28, 0.82)",
    globalAlpha: 1,
    lineWidth: 1.35,
    shadowColor: "rgba(21, 28, 37, 0.18)",
    shadowBlur: 18,
    shadowOffsetX: 0,
    shadowOffsetY: 10
  };
}

function updateStats() {
  const phrase = phraseInput.value || "";
  fontCount.textContent = String(visibleCards.size);
  outlineCount.textContent = String(cards.filter((card) => card.outlineReady).length);
  phraseCount.textContent = String(Array.from(phrase).length);
}

function redrawCard(card) {
  const phrase = phraseInput.value || "hello world";
  const scale = Number(scaleInput.value);
  const tracking = Number(trackingInput.value);
  const ctx = card.canvas.getContext("2d");
  ctx.clearRect(0, 0, card.canvas.width, card.canvas.height);

  if (!card.font) {
    card.status.textContent = "Loading font…";
    return;
  }

  const hasGlyf = !!card.font.getTableByType(TABLE_TAGS.glyf);
  const hasCff = !!card.font.getTableByType(TABLE_TAGS.CFF);
  const hasCff2 = !!card.font.getTableByType(TABLE_TAGS.CFF2);
  card.outlineReady = hasGlyf || hasCff;
  updateStats();

  if (!card.outlineReady) {
    card.status.textContent = hasCff2 ? "CFF2 outlines are present but not rendered in this specimen." : "No drawable glyph outlines found.";
    return;
  }

  card.font.drawText(card.canvas, phrase, {
    x: 34,
    y: 170,
    scale,
    spacing: tracking,
    styles: getStyles()
  });

  const width = typeof card.font.measureText === "function"
    ? card.font.measureText(phrase, { gpos: true }).advanceWidth
    : null;
  const widthText = Number.isFinite(width) ? `${Math.round(width)} units` : "n/a";
  card.status.textContent = `${card.label} • ${phrase.length} chars • ${widthText}`;
}

function redrawAll() {
  redrawScheduled = false;
  updateStats();
  const targets = visibleCards.size ? visibleCards : new Set(cards.slice(0, 6));
  for (const card of targets) redrawCard(card);
}

function scheduleRedraw() {
  if (redrawScheduled) return;
  redrawScheduled = true;
  requestAnimationFrame(redrawAll);
}

async function ensureFont(card) {
  if (card.font) return;
  try {
    if (!fontCache.has(card.url)) {
      fontCache.set(card.url, FontParser.load(card.url));
    }
    card.font = await fontCache.get(card.url);
    if (visibleCards.has(card) || visibleCards.size === 0) redrawCard(card);
  } catch (error) {
    card.status.textContent = `Failed to load font: ${error?.message || error}`;
  }
}

observer = new IntersectionObserver((entries) => {
  let changed = false;
  for (const entry of entries) {
    const card = entry.target.__cardRef;
    if (!card) continue;
    if (entry.isIntersecting) {
      if (!visibleCards.has(card)) {
        visibleCards.add(card);
        changed = true;
      }
      if (card.font) redrawCard(card);
      else ensureFont(card);
    } else if (visibleCards.delete(card)) {
      changed = true;
    }
  }
  if (changed) updateStats();
}, {
  rootMargin: "300px 0px"
});

for (const file of fontFiles) {
  const safePath = file.split("/").map((part) => encodeURIComponent(part)).join("/");
  const url = `../truetypefonts/${safePath}`;
  const label = file.split("/").pop() || file;

  const card = {
    url,
    label,
    font: null,
    outlineReady: false
  };

  const article = document.createElement("article");
  article.className = "specimen";
  const head = document.createElement("div");
  head.className = "specimen-head";
  const title = document.createElement("div");
  title.className = "specimen-title";
  title.textContent = label;
  const sub = document.createElement("div");
  sub.className = "specimen-sub";
  sub.textContent = file;
  head.appendChild(title);
  head.appendChild(sub);
  article.appendChild(head);

  const canvas = document.createElement("canvas");
  canvas.width = 1080;
  canvas.height = 240;
  article.appendChild(canvas);

  const status = document.createElement("div");
  status.className = "status";
  status.textContent = "Loading font…";
  article.appendChild(status);

  card.canvas = canvas;
  card.status = status;
  article.dataset.font = label;
  article.__cardRef = card;
  fontList.appendChild(article);
  cards.push(card);
  observer.observe(article);
}

phraseInput.addEventListener("input", scheduleRedraw);
scaleInput.addEventListener("input", scheduleRedraw);
trackingInput.addEventListener("input", scheduleRedraw);
updateStats();
</script>
<script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
