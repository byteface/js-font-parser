<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pixi Neon Pulse Glyph</title>
  <style>
    body{margin:0;background:#020206;color:#e9f4ff;font-family:"Gill Sans",sans-serif}
    #stage{width:100vw;height:100vh;display:block}
    .ui{position:fixed;top:56px;left:12px;z-index:10;background:rgba(2,3,8,.75);border:1px solid #2b3761;border-radius:10px;padding:10px;display:flex;gap:8px;align-items:center}
    select,input{padding:6px;border-radius:7px;border:1px solid #2b3761;background:#101634;color:#fff}
  </style>
</head>
<body>
<div data-nav="main"></div>
<div class="ui">
  <label>Font <select id="font"></select></label>
  <label>Glyph <input id="char" value="G" maxlength="2" size="2"></label>
</div>
<div id="stage"></div>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
<script src="../dist-build/fontparser.min.js"></script>
<script type="module">
  import { CREATIVE_FONTS, populateCreativeFonts, loadFontByUrl, getGlyphGeometry } from './shared/creative-kit.js';

  const fontSel = document.getElementById('font');
  const charInput = document.getElementById('char');
  populateCreativeFonts(fontSel);

  const app = new PIXI.Application();
  await app.init({ resizeTo: window, background: '#020206', antialias: true });
  document.getElementById('stage').appendChild(app.canvas);

  const g = new PIXI.Graphics();
  const glow = new PIXI.Graphics();
  const particles = new PIXI.Container();
  app.stage.addChild(glow, g, particles);

  let geom = null;
  let dots = [];

  function drawGlyph(progress = 0) {
    if (!geom?.contours?.length) return;
    g.clear();
    glow.clear();

    glow.setStrokeStyle({ width: 8, color: 0x4fc3ff, alpha: 0.28 + 0.18 * Math.sin(progress) });
    g.setStrokeStyle({ width: 2.2, color: 0xeaf7ff, alpha: 0.95 });

    for (const contour of geom.contours) {
      if (!contour.length) continue;
      glow.moveTo(contour[0].x, contour[0].y);
      g.moveTo(contour[0].x, contour[0].y);
      for (let i = 1; i < contour.length; i++) {
        glow.lineTo(contour[i].x, contour[i].y);
        g.lineTo(contour[i].x, contour[i].y);
      }
      glow.closePath();
      g.closePath();
    }

    particles.removeChildren();
    const lim = Math.min(dots.length, 380);
    for (let i = 0; i < lim; i++) {
      const p = dots[i];
      const s = new PIXI.Graphics().circle(0, 0, 1.6 + 0.9 * Math.sin(progress + i * 0.07)).fill(0x7de6ff);
      s.position.set(p.x + Math.cos(progress + i) * 2.2, p.y + Math.sin(progress * 1.3 + i) * 2.2);
      particles.addChild(s);
    }
  }

  async function rebuild() {
    const font = await loadFontByUrl(fontSel.value || CREATIVE_FONTS[0].url);
    geom = getGlyphGeometry(font, (charInput.value || 'G')[0], {
      sizePx: Math.min(window.innerHeight * 0.62, 480),
      centerX: window.innerWidth * 0.5,
      centerY: window.innerHeight * 0.56
    });
    dots = geom.points.filter((_, i) => i % 2 === 0);
    drawGlyph(0);
  }

  app.ticker.add((ticker) => {
    const t = ticker.lastTime * 0.0023;
    drawGlyph(t);
  });

  window.addEventListener('resize', rebuild);
  fontSel.addEventListener('change', rebuild);
  charInput.addEventListener('input', rebuild);
  await rebuild();
</script>
<script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
