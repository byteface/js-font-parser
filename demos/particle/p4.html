<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Particle p4</title>
    <style>
        body { margin: 0; background: #0d0f14; color: #e6e6e6; font-family: Arial, sans-serif; }
        .label { padding: 10px 16px; }
    </style>
</head>
<body>
<div class="label">p4 - DiscoMo, short burst</div>
<canvas id="myDrawing" width="2000" height="1200"></canvas>
<script type="module">
    import { setupParticleDemo } from './particle-utils.js';
    setupParticleDemo({
        fontUrl: '../../truetypefonts/DiscoMo.ttf',
        canvasId: 'myDrawing',
        color: '#ffffff',
        scale: 0.2,
        randomGlyphMax: 50,
        maxSpeed: 40,
        damp: 1.0,
        wander: 0.2,
        edgeBehavior: 'bounce',
        pointSize: 2,
        stopAfterMs: 1000
    });
</script>
</body>
</html>
