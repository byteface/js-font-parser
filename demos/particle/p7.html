<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Particle p7</title>
    <style>
        body { margin: 0; background: #0d0f14; color: #e6e6e6; font-family: Arial, sans-serif; }
        .label { padding: 10px 16px; }
    </style>
</head>
<body>
<div data-nav="main" data-nav-root="../.."></div>

<div class="label">p7 - CARDS, wander + grav to mouse</div>
<canvas id="myDrawing" width="2000" height="1200"></canvas>
<script src="../../dist-build/fontparser.min.js"></script>
<script type="module">
    import { setupParticleDemo } from './particle-utils.js';
    setupParticleDemo({
        fontUrl: '../../truetypefonts/CARDS.TTF',
        canvasId: 'myDrawing',
        color: '#ffffff',
        scale: 0.22,
        char: "C",
        maxSpeed: 30,
        damp: 0.2,
        wander: 0.6,
        gravToMouse: true,
        gravStrength: 20000,
        edgeBehavior: 'bounce',
        pointSize: 2
    });
</script>
  <script type="module" src="../../tools/shared/main-nav.js"></script>
</body>
</html>
