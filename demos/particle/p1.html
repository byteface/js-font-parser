<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Particle p1</title>
    <style>
        body { margin: 0; background: #0d0f14; color: #e6e6e6; font-family: Arial, sans-serif; }
        .label { padding: 10px 16px; }
    </style>
</head>
<body>
<div data-nav="main" style="position:sticky;top:0;z-index:10;background:#f6f4f1;border-bottom:1px solid #e3e1db;padding:10px 16px;font-family:'Merriweather',serif;display:flex;gap:12px;align-items:center"><a href="../../demos/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Demos</a><a href="../../tools/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Tools</a></div>

<div class="label">p1 - DiscoMo, gravity to mouse, bounce</div>
<canvas id="myDrawing" width="800" height="800"></canvas>
<script type="module">
    import { setupParticleDemo } from './particle-utils.js';
    setupParticleDemo({
        fontUrl: '../../truetypefonts/DiscoMo.ttf',
        canvasId: 'myDrawing',
        color: '#ffffff',
        scale: 0.12,
        char: "A",
        maxSpeed: 20,
        damp: 0.6,
        gravToMouse: true,
        gravStrength: 1000,
        edgeBehavior: 'bounce',
        pointSize: 2
    });
</script>
</body>
</html>
