<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Particle p27</title>
    <style>
        :root {
            --bg: #060816;
            --ink: #eef3ff;
            --muted: #9ba9cf;
            --panel: rgba(7, 10, 25, 0.82);
            --line: rgba(136, 164, 255, 0.16);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background:
                radial-gradient(circle at 16% 12%, rgba(69, 120, 255, 0.22), transparent 22%),
                radial-gradient(circle at 84% 14%, rgba(255, 79, 154, 0.18), transparent 20%),
                radial-gradient(circle at 50% 78%, rgba(80, 219, 255, 0.08), transparent 32%),
                linear-gradient(180deg, #050712 0%, #060816 100%);
            color: var(--ink);
            font-family: "Space Grotesk", "IBM Plex Sans", system-ui, sans-serif;
            overflow: hidden;
        }
        .ui {
            position: fixed;
            top: 58px;
            left: 16px;
            z-index: 10;
            width: min(280px, calc(100vw - 32px));
            max-height: calc(100vh - 74px);
            overflow-y: auto;
            display: grid;
            gap: 10px;
            padding: 12px;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: var(--panel);
            backdrop-filter: blur(18px);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.4);
        }
        .ui.collapsed .panelBody { display: none; }
        .bar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }
        .title strong {
            display: block;
            margin-bottom: 4px;
            font-size: 20px;
            letter-spacing: -0.03em;
        }
        .title span {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.35;
        }
        .grid {
            display: grid;
            gap: 8px;
        }
        label {
            display: grid;
            gap: 4px;
            color: var(--muted);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        input, select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px 12px;
            color: var(--ink);
            background: rgba(6, 11, 24, 0.88);
            font: inherit;
        }
        input[type="range"] {
            padding: 0;
            accent-color: #92d8ff;
        }
        .panelActions {
            display: flex;
            gap: 8px;
        }
        .panelActions button {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 6px 10px;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.05);
            font: inherit;
            cursor: pointer;
        }
        .chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chip {
            padding: 5px 10px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
            color: var(--muted);
            font-size: 12px;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
<div data-nav="main" data-nav-root="../.."></div>

<section class="ui">
    <div class="bar">
        <div class="title">
            <strong>Particle p27</strong>
            <span>The system clock burns through particle digits. Every second detonates the points outward, then the springs pull them back into time.</span>
        </div>
        <div class="panelActions">
            <button id="shuffleButton" type="button">Shuffle</button>
            <button id="togglePanelButton" type="button">Hide</button>
        </div>
    </div>
    <div class="panelBody">
        <div class="grid">
            <label>Font
                <select id="fontSelect"></select>
            </label>
            <label>Scale
                <input id="scaleInput" type="range" min="14" max="30" value="19" />
            </label>
            <label>Scatter
                <input id="scatterInput" type="range" min="0" max="140" value="20" />
            </label>
            <label>Burst
                <input id="burstInput" type="range" min="8" max="80" value="34" />
            </label>
            <label>Spring
                <input id="springInput" type="range" min="6" max="36" value="18" />
            </label>
            <label>Wander
                <input id="wanderInput" type="range" min="0" max="24" value="6" />
            </label>
            <label>Max Speed
                <input id="speedInput" type="range" min="4" max="36" value="18" />
            </label>
            <label>Trail
                <input id="trailInput" type="range" min="3" max="26" value="9" />
            </label>
            <label>Connect
                <input id="connectInput" type="range" min="24" max="180" value="68" />
            </label>
            <label>Glow
                <input id="glowInput" type="range" min="10" max="90" value="42" />
            </label>
        </div>
        <div class="chips">
            <div class="chip" id="timeChip">--:--:--</div>
            <div class="chip" id="particleChip">0 particles</div>
            <div class="chip" id="fontChip">loading…</div>
        </div>
    </div>
</section>

<canvas id="stage"></canvas>
<script src="../../dist-build/fontparser.min.js"></script>
<script type="module" src="./p27-scene.js"></script>
<script type="module" src="../../tools/shared/main-nav.js"></script>
</body>
</html>
