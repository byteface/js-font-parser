<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Grid Demo</title>
    <meta charset="utf-8">
</head>
<body>
<canvas id="myDrawing" width="800" height="800">
    <p>Your browser doesn't support canvas</p>
</canvas>

<script type="module">
    import { FontParserTTF } from '../dist/data/FontParserTTF.js';
    import { Debug } from '../dist/utils/Debug.js';
    import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';

    const DEBUG = false;
    Debug.enabled = DEBUG;

    let font = null;
    const GRID_SIZE = 25;
    const CELL_SIZE = 30;

    FontParserTTF.load("../truetypefonts/DiscoMo.ttf")
        .then(ttf_font => {
            font = ttf_font;
            drawGrid();
        })
        .catch(error => {
            console.error("Failed to load font:", error);
        });

    const cssStyles = {
        fillStyle: '#3498db',
        strokeStyle: '#000000',
        globalAlpha: 1,
        lineWidth: 2,
        shadowColor: '#95a5a6',
        shadowBlur: 10,
        shadowOffsetX: 4,
        shadowOffsetY: 4
    };

    function drawGrid() {
        const drawingCanvas = document.getElementById('myDrawing');
        const context = drawingCanvas.getContext('2d');
        let charIndex = 0;
        const maxGlyphs = font.getNumGlyphs ? font.getNumGlyphs() : Infinity;

        for (let row = 0; row < GRID_SIZE; row++) {
            for (let col = 0; col < GRID_SIZE; col++) {
                if (charIndex >= maxGlyphs) {
                    return;
                }
                drawGlyph(font, charIndex, context, col * CELL_SIZE, row * CELL_SIZE);
                charIndex++;
            }
        }
    }

    function drawGlyph(font, char, context, x, y) {
        const glyph = font.getGlyph(char);
        if (!glyph) {
            return;
        }
        CanvasRenderer.drawGlyphToContext(context, glyph, {
            x: x + CELL_SIZE / 2,
            y: y + CELL_SIZE / 2,
            scale: 0.04,
            styles: cssStyles
        });
    }
</script>
</body>
</html>
