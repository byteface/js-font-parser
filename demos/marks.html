<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mark Attachment Demo</title>
  <style>
    :root { --bg:#f6f4f1; --ink:#1e1f24; --muted:#5e6574; --panel:#fff; --border:#e3e1db; }
    body { margin:0; font-family:"Merriweather", serif; background:var(--bg); color:var(--ink); }
    header { padding:22px 20px 10px; }
    h1 { margin:0 0 6px; font-size:26px; }
    p { margin:0 0 14px; color:var(--muted); }
    .wrap { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:16px; padding:16px 20px 32px; }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px; }
    canvas { width:100%; height:220px; border:1px dashed var(--border); border-radius:10px; background:#fff; }
    input { width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--border); margin-bottom:10px; }
  </style>
</head>
<body>
  <header>
    <h1>Mark Attachment Demo</h1>
    <p>Uses GPOS MarkToBase anchors to position combining marks.</p>
  </header>
  <div class="wrap">
    <div class="panel">
      <input id="textInput" value="A\u0301 A\u0327 A\u0303" />
      <canvas id="plain" width="900" height="220"></canvas>
    </div>
    <div class="panel">
      <canvas id="anchored" width="900" height="220"></canvas>
      <div id="info" style="margin-top:10px; font-size:12px; color:var(--muted);"></div>
    </div>
  </div>

  <script type="module">
    import { FontParserTTF } from '../dist/data/FontParserTTF.js';
    import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';

    const input = document.getElementById('textInput');
    const plainCanvas = document.getElementById('plain');
    const anchoredCanvas = document.getElementById('anchored');
    const info = document.getElementById('info');

    let font = null;
    FontParserTTF.load('../truetypefonts/noto/NotoSans-Regular.ttf').then(f => {
      font = f;
      render();
    });

    input.addEventListener('input', render);

    function render() {
      if (!font) return;
      const text = input.value;
      const ctxPlain = plainCanvas.getContext('2d');
      const ctxAnch = anchoredCanvas.getContext('2d');
      ctxPlain.clearRect(0,0,plainCanvas.width,plainCanvas.height);
      ctxAnch.clearRect(0,0,anchoredCanvas.width,anchoredCanvas.height);

      CanvasRenderer.drawString(font, text, plainCanvas, { x: 20, y: 140, scale: 0.12, spacing: 2, styles: { fillStyle: '#111', strokeStyle: '#111' } });

      let cursorX = 20;
      const baseY = 140;
      const scale = 0.12;
      let attachments = 0;
      const chars = Array.from(text);

      for (let i = 0; i < chars.length; i++) {
        const ch = chars[i];
        const glyphId = font.getGlyphIndexByChar(ch);
        const glyph = glyphId != null ? font.getGlyph(glyphId) : null;
        if (!glyph) {
          cursorX += 20;
          continue;
        }

        const anchors = font.getMarkAnchorsForGlyph(glyphId);
        const markAnchor = anchors.find(a => a.type === 'mark');
        if (markAnchor && i > 0) {
          const prevChar = chars[i - 1];
          const baseGlyphId = font.getGlyphIndexByChar(prevChar);
          const baseAnchors = baseGlyphId != null ? font.getMarkAnchorsForGlyph(baseGlyphId) : [];
          const baseAnchor = baseAnchors.find(a => a.type === 'base' && a.classIndex === markAnchor.classIndex);
          if (baseAnchor) {
            attachments++;
            const dx = (baseAnchor.x - markAnchor.x) * scale;
            const dy = (baseAnchor.y - markAnchor.y) * scale;
            CanvasRenderer.drawGlyphToContext(ctxAnch, glyph, {
              x: cursorX + dx,
              y: baseY + dy,
              scale,
              styles: { fillStyle: '#2f4f7a', strokeStyle: '#2f4f7a' }
            });
            continue;
          }
        }

        CanvasRenderer.drawGlyphToContext(ctxAnch, glyph, {
          x: cursorX,
          y: baseY,
          scale,
          styles: { fillStyle: '#2f4f7a', strokeStyle: '#2f4f7a' }
        });

        cursorX += glyph.advanceWidth * scale + 2;
      }

      info.textContent = attachments > 0
        ? `Anchors applied: ${attachments}`
        : 'No mark anchors found for this string/font.';
    }
  </script>
</body>
</html>
