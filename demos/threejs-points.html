<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Three.js Point Cloud</title>
  <style>
    :root { --bg:#0e1016; --ink:#f0f4ff; --muted:#aab4cc; --panel:#151826; --border:#2a3147; }
    body { margin:0; font-family:"Space Grotesk", system-ui, sans-serif; background:var(--bg); color:var(--ink); }
    header { padding:20px 22px 10px; }
    h1 { margin:0 0 6px; font-size:24px; }
    p { margin:0 0 12px; color:var(--muted); }
    .panel { display:flex; flex-wrap:wrap; gap:12px; padding:10px 22px 16px; align-items:center; }
    label { display:flex; flex-direction:column; gap:6px; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); }
    input, select { background:#0f1320; color:var(--ink); border:1px solid var(--border); border-radius:8px; padding:8px 10px; min-width:180px; }
    canvas { display:block; width:100vw; height:70vh; }
  </style>
</head>
<body>
<div data-nav="main"></div>

  <header>
    <h1>Three.js Glyph Point Cloud</h1>
    <p>Live 3D point cloud pulled directly from glyph outlines.</p>
  </header>
  <div class="panel">
    <label>Font
      <select id="fontSelect">
        <option value="../truetypefonts/DiscoMo.ttf">DiscoMo</option>
        <option value="../truetypefonts/devil-inside-font/DevilInside-G3xP.ttf">DevilInside</option>
        <option value="../truetypefonts/Quill.ttf">Quill</option>
      </select>
    </label>
    <label>Text
      <input id="textInput" value="GLYPH" />
    </label>
    <label>Size
      <input id="sizeInput" type="range" min="80" max="260" value="160" />
    </label>
  </div>
  <canvas id="stage"></canvas>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "https://unpkg.com/three@0.158.0/examples/jsm/controls/OrbitControls.js";
    import { FontParser } from "../dist/data/FontParser.js";
    import { Table } from "../dist/table/Table.js";

    const canvas = document.getElementById("stage");
    const fontSelect = document.getElementById("fontSelect");
    const textInput = document.getElementById("textInput");
    const sizeInput = document.getElementById("sizeInput");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0e1016");
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
    camera.position.set(0, 120, 400);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const light = new THREE.PointLight("#ffffff", 1.2, 1000);
    light.position.set(200, 200, 200);
    scene.add(light);

    let pointsMesh = null;
    let font = null;

    async function loadFont(url) {
      return FontParser.load(url);
    }

    function buildPoints(text) {
      const head = font.getTableByType(Table.head);
      const unitsPerEm = head?.unitsPerEm ?? 1000;
      const sizePx = Number(sizeInput.value);
      const scale = sizePx / unitsPerEm;

      const positions = [];
      let cursorX = 0;
      for (const ch of Array.from(text)) {
        const glyph = font.getGlyphByChar(ch);
        if (!glyph || !glyph.points) {
          cursorX += sizePx * 0.3;
          continue;
        }
        const pts = glyph.points.slice(0, Math.max(0, glyph.getPointCount() - 2));
        for (const p of pts) {
          positions.push((p.x + cursorX) * scale);
          positions.push(p.y * scale);
          positions.push((Math.sin(p.x * 0.01) * 30));
        }
        cursorX += glyph.advanceWidth * scale + 12;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      return geo;
    }

    function rebuild() {
      if (!font) return;
      const text = textInput.value || "";
      const geo = buildPoints(text);
      const mat = new THREE.PointsMaterial({ color: "#9ad7ff", size: 2.2, transparent: true, opacity: 0.9 });
      if (pointsMesh) {
        scene.remove(pointsMesh);
        pointsMesh.geometry.dispose();
      }
      pointsMesh = new THREE.Points(geo, mat);
      pointsMesh.position.set(-180, -40, 0);
      scene.add(pointsMesh);
    }

    async function boot() {
      font = await loadFont(fontSelect.value);
      rebuild();
    }

    function resize() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    function animate(time) {
      resize();
      if (pointsMesh) {
        pointsMesh.rotation.y = time * 0.0003;
        pointsMesh.rotation.x = Math.sin(time * 0.0002) * 0.2;
      }
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    fontSelect.addEventListener("change", boot);
    textInput.addEventListener("input", rebuild);
    sizeInput.addEventListener("input", rebuild);

    boot();
    requestAnimationFrame(animate);
  </script>
  <script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
