<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Magnetic Letterfield</title>
  <style>
    :root{--ink:#e7f5ff;--muted:#9eb9d5;--line:rgba(135,204,255,.35)}
    body{margin:0;color:var(--ink);font-family:"Avenir Next",sans-serif;background:radial-gradient(circle at 16% 8%,#254378 0,transparent 36%),linear-gradient(145deg,#060c17,#101d31)}
    .wrap{width:min(1240px,calc(100vw - 20px));margin:10px auto 18px;display:grid;grid-template-columns:320px 1fr;gap:12px}
    .panel{border:1px solid var(--line);border-radius:12px;background:rgba(8,20,35,.75);padding:12px}
    h1{margin:0 0 6px;font-size:22px} p{margin:0 0 12px;color:var(--muted);font-size:13px}
    label{display:block;color:var(--muted);font-size:12px;margin-bottom:10px}
    select,input{width:100%;margin-top:6px}
    select,input{background:#081424;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 10px}
    .status{min-height:16px;font-size:12px;color:#c7e8ff}
    canvas{width:100%;height:min(74vh,680px);display:block;border:1px solid var(--line);border-radius:12px;background:linear-gradient(#040b14,#0a1728);cursor:crosshair}
    @media(max-width:940px){.wrap{grid-template-columns:1fr}canvas{height:min(60vh,560px)}}
  </style>
</head>
<body>
<div data-nav="main"></div>
<div class="wrap">
  <section class="panel">
    <h1>Magnetic Letterfield</h1>
    <p>Click to drop attractors/repulsors and bend particle letters in real time.</p>
    <label>Font <select id="fontSelect"></select></label>
    <label>Text <input id="textInput" value="MAGNET" /></label>
    <label>Density <input id="densityInput" type="range" min="1" max="8" value="3" /></label>
    <div class="status" id="status">Click canvas: left adds attractor, right adds repulsor.</div>
  </section>
  <canvas id="stage" width="1360" height="760"></canvas>
</div>
<script src="../dist-build/fontparser.min.js"></script>
<script type="module">
const { FontParser } = window.FontParser;
import { getFontList } from '../tools/shared/font-catalog.js';

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const fontSelect = document.getElementById('fontSelect');
const textInput = document.getElementById('textInput');
const densityInput = document.getElementById('densityInput');
const statusEl = document.getElementById('status');

let dpr = 1;
let font = null;
let particles = [];
let magnets = [];

const fonts = [...getFontList('demoCore'), ...getFontList('allGlyphs').slice(0, 8)]
  .filter((f, i, arr) => arr.findIndex((x) => x.url === f.url) === i)
  .filter((f) => !/2006 Team/i.test(f.name));
for (const f of fonts) { const o = document.createElement('option'); o.value = f.url; o.textContent = f.name; fontSelect.appendChild(o); }

function resize() {
  dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  const r = canvas.getBoundingClientRect();
  canvas.width = Math.round(r.width * dpr);
  canvas.height = Math.round(r.height * dpr);
  rebuild();
}

function rebuild() {
  if (!font) return;
  particles = [];
  const text = textInput.value || 'MAGNET';
  const density = Number(densityInput.value);
  const scale = Math.min(canvas.width / 1600, canvas.height / 900) * 0.2;
  let x = 80 * dpr;
  const y = canvas.height * 0.62;
  for (const ch of Array.from(text)) {
    const g = font.getGlyphByChar(ch);
    if (!g) { x += 34 * dpr; continue; }
    const step = Math.max(1, density);
    for (let i = 0; i < g.getPointCount(); i += step) {
      const p = g.getPoint(i);
      particles.push({
        x: x + p.x * scale,
        y: y - p.y * scale,
        ox: x + p.x * scale,
        oy: y - p.y * scale,
        vx: 0,
        vy: 0
      });
    }
    x += Math.max(40 * dpr, (g.advanceWidth || 200) * scale + 14 * dpr);
  }
  statusEl.textContent = `${particles.length} particles | magnets ${magnets.length}`;
}

function frame() {
  ctx.fillStyle = 'rgba(4,10,18,0.25)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (const p of particles) {
    p.vx += (p.ox - p.x) * 0.004;
    p.vy += (p.oy - p.y) * 0.004;
    for (const m of magnets) {
      const dx = m.x - p.x;
      const dy = m.y - p.y;
      const dist2 = Math.max(36, dx * dx + dy * dy);
      const force = m.type * m.strength / dist2;
      p.vx += dx * force;
      p.vy += dy * force;
    }
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.x += p.vx;
    p.y += p.vy;
  }

  ctx.save();
  for (const p of particles) {
    ctx.beginPath();
    ctx.fillStyle = 'rgba(128,214,255,0.88)';
    ctx.arc(p.x, p.y, 1.4 * dpr, 0, Math.PI * 2);
    ctx.fill();
  }
  for (const m of magnets) {
    ctx.beginPath();
    ctx.fillStyle = m.type > 0 ? 'rgba(245,157,179,0.95)' : 'rgba(255,217,132,0.95)';
    ctx.arc(m.x, m.y, 6 * dpr, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  requestAnimationFrame(frame);
}

function pointerPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) * dpr, y: (e.clientY - r.top) * dpr };
}
canvas.addEventListener('contextmenu', (e) => e.preventDefault());
canvas.addEventListener('pointerdown', (e) => {
  const p = pointerPos(e);
  magnets.push({ x: p.x, y: p.y, type: e.button === 2 ? -1 : 1, strength: 140 * dpr });
  if (magnets.length > 12) magnets.shift();
  statusEl.textContent = `${particles.length} particles | magnets ${magnets.length}`;
});

async function loadFont() {
  try {
    statusEl.textContent = `Loading ${fontSelect.selectedOptions[0]?.textContent || ''}…`;
    font = await FontParser.load(fontSelect.value);
    rebuild();
  } catch (e) {
    statusEl.textContent = `Load failed: ${e?.message || e}`;
  }
}

fontSelect.addEventListener('change', loadFont);
textInput.addEventListener('input', rebuild);
densityInput.addEventListener('input', rebuild);
window.addEventListener('resize', resize);
resize();
await loadFont();
requestAnimationFrame(frame);
</script>
<script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
