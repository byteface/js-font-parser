<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Three.js Contour Lines</title>
  <style>
    :root { --bg:#0b0d12; --ink:#e9eefc; --muted:#9aa7c4; --panel:#141824; --border:#263048; }
    body { margin:0; font-family:"Space Grotesk", system-ui, sans-serif; background:var(--bg); color:var(--ink); }
    header { padding:20px 22px 10px; }
    h1 { margin:0 0 6px; font-size:24px; }
    p { margin:0 0 12px; color:var(--muted); }
    .panel { display:flex; flex-wrap:wrap; gap:12px; padding:10px 22px 16px; align-items:center; }
    label { display:flex; flex-direction:column; gap:6px; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); }
    input, select { background:#0f1320; color:var(--ink); border:1px solid var(--border); border-radius:8px; padding:8px 10px; min-width:180px; }
    canvas { display:block; width:100vw; height:70vh; }
  </style>
</head>
<body>
  <header>
    <h1>Three.js Contour Lines</h1>
    <p>Glyph contours rendered as animated 3D line loops.</p>
  </header>
  <div class="panel">
    <label>Font
      <select id="fontSelect">
        <option value="../truetypefonts/DiscoMo.ttf">DiscoMo</option>
        <option value="../truetypefonts/devil-inside-font/DevilInside-G3xP.ttf">DevilInside</option>
        <option value="../truetypefonts/Quill.ttf">Quill</option>
      </select>
    </label>
    <label>Text
      <input id="textInput" value="LINES" />
    </label>
    <label>Size
      <input id="sizeInput" type="range" min="80" max="240" value="150" />
    </label>
  </div>
  <canvas id="stage"></canvas>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "https://unpkg.com/three@0.158.0/examples/jsm/controls/OrbitControls.js";
    import { FontParserTTF } from "../dist/data/FontParserTTF.js";
    import { Table } from "../dist/table/Table.js";

    const canvas = document.getElementById("stage");
    const fontSelect = document.getElementById("fontSelect");
    const textInput = document.getElementById("textInput");
    const sizeInput = document.getElementById("sizeInput");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0b0d12");
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
    camera.position.set(0, 140, 420);
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const group = new THREE.Group();
    scene.add(group);

    let font = null;

    function splitContours(points) {
      const contours = [];
      let current = [];
      for (const p of points) {
        current.push(p);
        if (p.endOfContour) {
          contours.push(current);
          current = [];
        }
      }
      return contours;
    }

    function buildContours(text) {
      group.clear();
      if (!font) return;
      const head = font.getTableByType(Table.head);
      const unitsPerEm = head?.unitsPerEm ?? 1000;
      const sizePx = Number(sizeInput.value);
      const scale = sizePx / unitsPerEm;
      let cursorX = 0;

      for (const ch of Array.from(text)) {
        const glyph = font.getGlyphByChar(ch);
        if (!glyph || !glyph.points) {
          cursorX += sizePx * 0.4;
          continue;
        }
        const pts = glyph.points.slice(0, Math.max(0, glyph.getPointCount() - 2));
        const contours = splitContours(pts);
        contours.forEach((contour, idx) => {
          const verts = contour.map(p => new THREE.Vector3((p.x + cursorX) * scale, p.y * scale, idx * 2));
          const geom = new THREE.BufferGeometry().setFromPoints(verts);
          const mat = new THREE.LineBasicMaterial({ color: idx % 2 ? 0x7bb0ff : 0xa8f0ff });
          const line = new THREE.LineLoop(geom, mat);
          group.add(line);
        });
        cursorX += glyph.advanceWidth * scale + 14;
      }
      group.position.set(-180, -40, 0);
    }

    async function boot() {
      font = await FontParserTTF.load(fontSelect.value);
      buildContours(textInput.value);
    }

    function resize() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    function animate(time) {
      resize();
      group.rotation.y = time * 0.0003;
      group.rotation.x = Math.sin(time * 0.0002) * 0.2;
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    fontSelect.addEventListener("change", boot);
    textInput.addEventListener("input", () => buildContours(textInput.value));
    sizeInput.addEventListener("input", () => buildContours(textInput.value));

    boot();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
