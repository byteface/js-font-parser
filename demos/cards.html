<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Cards Font (Ported)</title>
    <meta charset="utf-8">
</head>
<body>
<canvas id="myDrawing" width="1000" height="800">
    <p>Your browser doesn't support canvas</p>
</canvas>

<script type="module">
    import { FontParserTTF } from '../dist/data/FontParserTTF.js';
    import { Debug } from '../dist/utils/Debug.js';
    import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';

    const DEBUG = false;
    Debug.enabled = DEBUG;

    const GRID_SIZE = 8;
    const CELL_SIZE = 120;
    const SCALE = 0.18;

    FontParserTTF.load("../truetypefonts/CARDS.TTF")
        .then(font => {
            drawGrid(font);
        })
        .catch(error => {
            console.error("Failed to load font:", error);
        });

    function drawGrid(font) {
        const canvas = document.getElementById('myDrawing');
        const context = canvas.getContext('2d');
        let glyphIndex = 0;
        const maxGlyphs = font.getNumGlyphs ? font.getNumGlyphs() : Infinity;

        for (let row = 0; row < GRID_SIZE; row++) {
            for (let col = 0; col < GRID_SIZE; col++) {
                if (glyphIndex >= maxGlyphs) {
                    return;
                }
                drawGlyph(font, glyphIndex, context, col * CELL_SIZE, row * CELL_SIZE);
                glyphIndex++;
            }
        }
    }

    function drawGlyph(font, index, context, x, y) {
        const glyph = font.getGlyph(index);
        if (!glyph) return;
        CanvasRenderer.drawGlyphToContext(context, glyph, {
            x: x + CELL_SIZE / 2,
            y: y + CELL_SIZE / 2,
            scale: SCALE,
            styles: {
                fillStyle: '#000000',
                strokeStyle: '#000000',
                lineWidth: '1',
                globalAlpha: '1'
            }
        });
    }
</script>
</body>
</html>
