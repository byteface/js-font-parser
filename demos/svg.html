<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>SVG Glyph</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        #svg-container { width: 500px; height: 500px; border: 1px solid #000; }
        path { stroke: black; fill: none; stroke-width: 1; }
    </style>
</head>
<body>
<h1>SVG Glyph</h1>
<div id="svg-container"></div>

<script type="module">
    import { FontParserTTF } from '../dist/data/FontParserTTF.js';

    const SVG_NS = "http://www.w3.org/2000/svg";

    FontParserTTF.load("../truetypefonts/DiscoMo.ttf")
        .then(font => {
            const glyph = font.getGlyphByChar("A");
            if (!glyph) return;
            const pathData = glyphToPath(glyph, 0.2);
            renderPath(pathData);
        })
        .catch(err => console.error("Failed to load font:", err));

    function renderPath(d) {
        const svg = document.createElementNS(SVG_NS, "svg");
        svg.setAttribute("width", "500");
        svg.setAttribute("height", "500");
        svg.setAttribute("viewBox", "-50 -50 500 500");

        const path = document.createElementNS(SVG_NS, "path");
        path.setAttribute("d", d);
        svg.appendChild(path);

        document.getElementById("svg-container").appendChild(svg);
    }

    function glyphToPath(glyph, scale) {
        let d = "";
        let firstindex = 0;
        let counter = 0;
        for (let i = 0; i < glyph.getPointCount(); i++) {
            counter++;
            if (glyph.getPoint(i).endOfContour) {
                d += contourToPath(glyph, firstindex, counter, scale);
                firstindex = i + 1;
                counter = 0;
            }
        }
        return d;
    }

    function contourToPath(glyph, startIndex, count, scale) {
        if (glyph.getPoint(startIndex).endOfContour) return "";
        let d = "";
        let offset = 0;
        while (offset < count) {
            const p0 = glyph.getPoint(startIndex + offset % count);
            const p1 = glyph.getPoint(startIndex + (offset + 1) % count);

            if (offset === 0) {
                d += `M ${p0.x * scale} ${-p0.y * scale} `;
            }

            if (p0.onCurve) {
                if (p1.onCurve) {
                    d += `L ${p1.x * scale} ${-p1.y * scale} `;
                    offset++;
                } else {
                    const p2 = glyph.getPoint(startIndex + (offset + 2) % count);
                    if (p2.onCurve) {
                        d += `Q ${p1.x * scale} ${-p1.y * scale}, ${p2.x * scale} ${-p2.y * scale} `;
                    } else {
                        const mx = (p1.x + p2.x) / 2;
                        const my = (p1.y + p2.y) / 2;
                        d += `Q ${p1.x * scale} ${-p1.y * scale}, ${mx * scale} ${-my * scale} `;
                    }
                    offset += 2;
                }
            } else {
                if (!p1.onCurve) {
                    const mx = (p0.x + p1.x) / 2;
                    const my = (p0.y + p1.y) / 2;
                    d += `Q ${p0.x * scale} ${-p0.y * scale}, ${mx * scale} ${-my * scale} `;
                } else {
                    d += `Q ${p0.x * scale} ${-p0.y * scale}, ${p1.x * scale} ${-p1.y * scale} `;
                }
                offset++;
            }
        }
        d += "Z ";
        return d;
    }
</script>
</body>
</html>
