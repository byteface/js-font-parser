<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GSUB Ligature Demo</title>
  <style>
    :root { --bg:#f5f6fb; --ink:#1e1f24; --muted:#5e6574; --panel:#fff; --border:#e3e6ee; }
    body { margin:0; font-family:"Merriweather", serif; background:var(--bg); color:var(--ink); }
    header { padding:22px 20px 10px; }
    h1 { margin:0 0 6px; font-size:26px; }
    p { margin:0 0 14px; color:var(--muted); }
    .wrap { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:16px; padding:16px 20px 32px; }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px; }
    canvas { width:100%; height:200px; border:1px dashed var(--border); border-radius:10px; background:#fff; }
    input { width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--border); margin-bottom:10px; }
  </style>
</head>
<body>
  <header>
    <h1>GSUB Ligature Demo</h1>
    <p>Shows a string rendered normally vs after GSUB ligature substitution (when available).</p>
  </header>
  <div class="wrap">
    <div class="panel">
      <select id="fontSelect" style="width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--border); margin-bottom:10px;"></select>
      <input id="textInput" value="office official affine" />
      <canvas id="plain" width="900" height="200"></canvas>
    </div>
    <div class="panel">
      <canvas id="gsub" width="900" height="200"></canvas>
      <div id="info" style="margin-top:10px; font-size:12px; color:var(--muted);"></div>
    </div>
  </div>

  <script type="module">
    import { FontParserTTF } from '../dist/data/FontParserTTF.js';
    import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';

    const input = document.getElementById('textInput');
    const fontSelect = document.getElementById('fontSelect');
    const plainCanvas = document.getElementById('plain');
    const gsubCanvas = document.getElementById('gsub');
    const info = document.getElementById('info');

    const fonts = [
      { name: 'Noto Sans', url: '../truetypefonts/noto/NotoSans-Regular.ttf' },
      { name: 'DiscoMo', url: '../truetypefonts/DiscoMo.ttf' },
      { name: 'AUGIE', url: '../truetypefonts/AUGIE___.TTF' },
      { name: 'Quill', url: '../truetypefonts/Quill.ttf' }
    ];
    const cache = new Map();
    let font = null;

    function populateFonts() {
      fontSelect.innerHTML = '';
      fonts.forEach((f, i) => {
        const opt = document.createElement('option');
        opt.value = String(i);
        opt.textContent = f.name;
        fontSelect.appendChild(opt);
      });
    }

    async function loadFont(url) {
      if (cache.has(url)) return cache.get(url);
      const f = await FontParserTTF.load(url);
      cache.set(url, f);
      return f;
    }

    input.addEventListener('input', render);
    fontSelect.addEventListener('change', async () => {
      font = await loadFont(fonts[Number(fontSelect.value)]?.url ?? fonts[0].url);
      render();
    });

    function render() {
      if (!font) return;
      const text = input.value;
      const ctxPlain = plainCanvas.getContext('2d');
      const ctxGsub = gsubCanvas.getContext('2d');
      ctxPlain.clearRect(0,0,plainCanvas.width,plainCanvas.height);
      ctxGsub.clearRect(0,0,gsubCanvas.width,gsubCanvas.height);

      CanvasRenderer.drawString(font, text, plainCanvas, { x: 20, y: 140, scale: 0.12, spacing: 2, styles: { fillStyle: '#111', strokeStyle: '#111' } });

      const layout = font.layoutString(text, { gsubFeatures: ['liga'] });
      CanvasRenderer.drawLayout(font, layout, gsubCanvas, { x: 20, y: 140, scale: 0.12, styles: { fillStyle: '#111', strokeStyle: '#111' } });

      const plainGlyphs = font.getGlyphIndicesForString(text);
      const gsubGlyphs = font.getGlyphIndicesForStringWithGsub(text, ['liga']);
      const diff = plainGlyphs.length - gsubGlyphs.length;
      info.textContent = diff > 0
        ? `Ligatures found: ${diff} substitutions`
        : 'No ligature substitutions detected for this string/font.';
    }

    populateFonts();
    loadFont(fonts[0].url).then(f => { font = f; render(); });
  </script>
</body>
</html>
