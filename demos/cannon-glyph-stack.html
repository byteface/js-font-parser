<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cannon Glyph Stack</title>
  <style>
    body{margin:0;background:#05090d;color:#eaf7ff;font-family:"Segoe UI",sans-serif}
    canvas{display:block;width:100vw;height:100vh}
    .ui{position:fixed;top:56px;left:12px;z-index:10;background:rgba(5,9,13,.75);border:1px solid #38536a;border-radius:10px;padding:10px;display:flex;gap:8px;align-items:center}
    select,input,button{padding:6px;border-radius:7px;border:1px solid #38536a;background:#10202f;color:#fff}
  </style>
</head>
<body>
<div data-nav="main"></div>
<div class="ui">
  <label>Font <select id="font"></select></label>
  <label>Glyph <input id="char" value="B" maxlength="2" size="2"></label>
  <button id="drop">Drop Again</button>
</div>
<canvas id="c"></canvas>
<script src="../dist-build/fontparser.min.js"></script>
<script type="module">
  import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
  import * as CANNON from 'https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js';
  import { CREATIVE_FONTS, populateCreativeFonts, loadFontByUrl, getGlyphGeometry } from './shared/creative-kit.js';

  const canvas = document.getElementById('c');
  const fontSel = document.getElementById('font');
  const charInput = document.getElementById('char');
  const dropBtn = document.getElementById('drop');
  populateCreativeFonts(fontSel);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05090d);
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
  camera.position.set(0, 0, 620);
  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const dir = new THREE.DirectionalLight(0xb8e2ff, 1.1); dir.position.set(0, 1, 1); scene.add(dir);

  const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -220, 0) });
  world.broadphase = new CANNON.SAPBroadphase(world);
  world.allowSleep = true;
  const floor = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
  floor.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
  floor.position.set(0, -220, 0);
  world.addBody(floor);

  let bodies = [];
  let meshes = [];

  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }

  function clearGlyphBodies() {
    for (const b of bodies) world.removeBody(b);
    for (const m of meshes) scene.remove(m);
    bodies = [];
    meshes = [];
  }

  async function rebuild() {
    clearGlyphBodies();
    const font = await loadFontByUrl(fontSel.value || CREATIVE_FONTS[0].url);
    const geom = getGlyphGeometry(font, (charInput.value || 'B')[0], { sizePx: 260, centerX: 0, centerY: 80 });
    const pts = geom.points.filter((_, i) => i % 3 === 0).slice(0, 180);

    for (const p of pts) {
      const body = new CANNON.Body({ mass: 0.35, shape: new CANNON.Sphere(3.8) });
      body.position.set(p.x * 0.55, p.y * 0.55 + 240 + Math.random() * 80, (Math.random() - 0.5) * 40);
      world.addBody(body);
      bodies.push(body);

      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(4.4, 10, 10),
        new THREE.MeshStandardMaterial({ color: 0x8dd9ff, metalness: 0.2, roughness: 0.35 })
      );
      scene.add(mesh);
      meshes.push(mesh);
    }
  }

  dropBtn.addEventListener('click', rebuild);
  fontSel.addEventListener('change', rebuild);
  charInput.addEventListener('input', rebuild);
  window.addEventListener('resize', resize);

  function animate() {
    requestAnimationFrame(animate);
    world.step(1 / 60);
    for (let i = 0; i < bodies.length; i++) {
      const b = bodies[i];
      const m = meshes[i];
      m.position.set(b.position.x, b.position.y, b.position.z);
      m.quaternion.set(b.quaternion.x, b.quaternion.y, b.quaternion.z, b.quaternion.w);
    }
    renderer.render(scene, camera);
  }

  resize();
  await rebuild();
  animate();
</script>
<script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
