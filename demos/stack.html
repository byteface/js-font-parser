<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Stack</title>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: Arial, sans-serif; }
        .label { padding: 12px 16px; }
    </style>
</head>
<body>
<div class="label">Stack</div>
<canvas id="myDrawing" width="800" height="800"></canvas>
<script type="module">
    import { FontParserTTF } from '../dist/data/FontParserTTF.js';
    import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';

    const canvas = document.getElementById('myDrawing');
    const ctx = canvas.getContext('2d');

    FontParserTTF.load("../truetypefonts/DiscoMo.ttf")
        .then(font => {
            const glyph = font.getGlyphByChar("D");
            let x = 200;
            let y = 300;
            for (let i = 0; i < 80; i++) {
                CanvasRenderer.drawGlyphToContext(ctx, glyph, {
                    x,
                    y,
                    scale: 0.2,
                    styles: {
                        fillStyle: '#000000',
                        strokeStyle: '#ffffff',
                        lineWidth: '1',
                        globalAlpha: '0.5'
                    }
                });
                x += 2;
                y += 2;
            }
        })
        .catch(err => console.error("Failed to load font:", err));
</script>
</body>
</html>
