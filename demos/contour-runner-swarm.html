<!doctype html>
<html lang="en">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Contour Runner Swarm</title>
<style>
:root{--ink:#e8f4ff;--muted:#9fb8d4;--line:rgba(133,203,255,.35)}
body{margin:0;color:var(--ink);font-family:"Avenir Next",sans-serif;background:radial-gradient(circle at 16% 8%,#264476 0,transparent 36%),linear-gradient(145deg,#050b16,#111d31)}
.wrap{width:min(1240px,calc(100vw - 20px));margin:10px auto 18px;display:grid;grid-template-columns:320px 1fr;gap:12px}.panel{border:1px solid var(--line);border-radius:12px;background:rgba(8,20,35,.75);padding:12px}
h1{margin:0 0 6px;font-size:22px}p{margin:0 0 12px;color:var(--muted);font-size:13px}label{display:block;color:var(--muted);font-size:12px;margin-bottom:10px}
select,input{width:100%;margin-top:6px;background:#081424;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 10px}
canvas{width:100%;height:min(74vh,680px);display:block;border:1px solid var(--line);border-radius:12px;background:linear-gradient(#040b14,#081729)}
@media(max-width:940px){.wrap{grid-template-columns:1fr}canvas{height:min(60vh,560px)}}
</style></head>
<body>
<div data-nav="main"></div>
<div class="wrap"><section class="panel"><h1>Contour Runner Swarm</h1><p>Agents race around outline loops leaving neon wakes.</p><label>Font <select id="fontSelect"></select></label><label>Character <input id="charInput" maxlength="2" value="G" /></label><label>Agents <input id="agentInput" type="range" min="8" max="160" value="64" /></label></section><canvas id="stage" width="1360" height="760"></canvas></div>
<script src="../dist-build/fontparser.min.js"></script>
<script type="module">
const { FontParser } = window.FontParser;
import { getFontList } from '../tools/shared/font-catalog.js';
import { collectGlyphPoints, splitContours, sampleContour, getBounds } from './shared/glyph-helpers.js';
const canvas=document.getElementById('stage'),ctx=canvas.getContext('2d');
const fontSelect=document.getElementById('fontSelect'),charInput=document.getElementById('charInput'),agentInput=document.getElementById('agentInput');
let dpr=1,font=null,route=[],agents=[];
const fonts=getFontList('demoCore').filter((f)=>!/2006 Team/i.test(f.name));for(const f of fonts){const o=document.createElement('option');o.value=f.url;o.textContent=f.name;fontSelect.appendChild(o);} 
function resize(){dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));const r=canvas.getBoundingClientRect();canvas.width=Math.round(r.width*dpr);canvas.height=Math.round(r.height*dpr);rebuild();}
function rebuild(){if(!font)return;const ch=Array.from(charInput.value||'G')[0]||'G';const gi=font.getGlyphIndexByChar(ch)??0;const g=font.getGlyph(gi);if(!g)return;const pts=collectGlyphPoints(g);const b=getBounds(pts);if(!b)return;const s=Math.min((canvas.width*0.62)/Math.max(1,b.width),(canvas.height*0.62)/Math.max(1,b.height));const gx=(b.minX+b.maxX)*0.5,gy=(b.minY+b.maxY)*0.5;const mapped=pts.map((p)=>({...p,x:(p.x-gx)*s+canvas.width*0.5,y:(gy-p.y)*s+canvas.height*0.5}));route=[];for(const c of splitContours(mapped)) route.push(...sampleContour(c,0.09));agents=Array.from({length:Number(agentInput.value)},(_,i)=>({idx:Math.floor((i/Math.max(1,Number(agentInput.value)))*route.length),speed:0.6+Math.random()*1.8,color:`hsla(${190+i*5},100%,70%,0.9)`}));}
function frame(){ctx.fillStyle='rgba(4,10,18,0.18)';ctx.fillRect(0,0,canvas.width,canvas.height);if(route.length){for(const a of agents){a.idx=(a.idx+a.speed)%route.length;const i=Math.floor(a.idx);const p=route[i],q=route[(i+1)%route.length];ctx.beginPath();ctx.strokeStyle=a.color;ctx.lineWidth=1.1*dpr;ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();ctx.beginPath();ctx.fillStyle=a.color;ctx.arc(p.x,p.y,1.8*dpr,0,Math.PI*2);ctx.fill();}}requestAnimationFrame(frame);} 
async function loadFont(){try{font=await FontParser.load(fontSelect.value);rebuild();}catch(e){console.error(e);}}
fontSelect.addEventListener('change',loadFont);charInput.addEventListener('input',rebuild);agentInput.addEventListener('input',rebuild);window.addEventListener('resize',resize);resize();await loadFont();requestAnimationFrame(frame);
</script><script type="module" src="../tools/shared/main-nav.js"></script></body></html>
