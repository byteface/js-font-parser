<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>p5 Flowfield Glyph</title>
  <style>
    :root {
      --bg: #0c0f17;
      --ink: #eef4ff;
      --muted: #9fb0cb;
      --panel: rgba(12, 18, 31, 0.76);
      --line: rgba(255, 255, 255, 0.11);
    }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 10% 15%, rgba(83, 129, 255, 0.18), transparent 24%),
        radial-gradient(circle at 88% 12%, rgba(255, 112, 148, 0.18), transparent 24%),
        linear-gradient(180deg, #080b12 0%, #0c0f17 100%);
      color: var(--ink);
      font-family: "IBM Plex Sans", system-ui, sans-serif;
    }
    #ui {
      position: fixed;
      top: 64px;
      left: 16px;
      z-index: 20;
      display: grid;
      gap: 12px;
      width: min(320px, calc(100vw - 32px));
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
    }
    .title {
      display: grid;
      gap: 6px;
    }
    .title strong {
      font-size: 20px;
      letter-spacing: -0.03em;
    }
    .title span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .grid {
      display: grid;
      gap: 10px;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }
    input, select {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--ink);
      background: rgba(10, 14, 24, 0.82);
      font: inherit;
    }
    input[type="range"] {
      padding: 0;
      accent-color: #ff7094;
    }
    .statline {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
<div data-nav="main"></div>
<section id="ui">
  <div class="title">
    <strong>Flowfield Bloom</strong>
    <span>The glyph acts like a magnetic weather system. Trails orbit, curl, and thicken around the contour before fading back into the dark.</span>
  </div>
  <div class="grid">
    <label>Font
      <select id="font"></select>
    </label>
    <label>Glyph
      <input id="char" value="S" maxlength="2" size="2" />
    </label>
    <label>Intensity
      <input id="intensity" type="range" min="6" max="28" value="16" />
    </label>
  </div>
  <div class="statline">
    <div class="chip" id="particleStat">0 particles</div>
    <div class="chip" id="fontStat">loading…</div>
  </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/p5@1.10.0/lib/p5.min.js"></script>
<script src="../dist-build/fontparser.min.js"></script>
<script type="module">
import { CREATIVE_FONTS, populateCreativeFonts, loadFontByUrl, getGlyphGeometry } from "./shared/creative-kit.js";

const fontSel = document.getElementById("font");
const charInput = document.getElementById("char");
const intensityInput = document.getElementById("intensity");
const particleStat = document.getElementById("particleStat");
const fontStat = document.getElementById("fontStat");
populateCreativeFonts(fontSel);

let particles = [];
let geom = null;
let fontLabel = "";

class Particle {
  constructor(anchor) {
    this.anchor = { x: anchor.x, y: anchor.y };
    this.x = anchor.x + random(-12, 12);
    this.y = anchor.y + random(-12, 12);
    this.px = this.x;
    this.py = this.y;
    this.vx = 0;
    this.vy = 0;
    this.seed = random(1000);
    this.life = random(0.35, 1);
  }

  update(time, intensity) {
    const dx = this.anchor.x - this.x;
    const dy = this.anchor.y - this.y;
    const dist = max(16, sqrt(dx * dx + dy * dy));
    const n = noise(this.x * 0.002, this.y * 0.002, this.seed + time * 0.00018);
    const angle = n * TAU * 2.0 + dist * 0.01;
    const swirl = intensity * 0.034;
    const pull = intensity * 0.0075;

    this.px = this.x;
    this.py = this.y;
    this.vx += cos(angle) * swirl + dx / dist * pull;
    this.vy += sin(angle) * swirl + dy / dist * pull;
    this.vx *= 0.93;
    this.vy *= 0.93;
    this.x += this.vx;
    this.y += this.vy;
    this.life *= 0.9988;

    if (dist < 9 || this.life < 0.14) {
      this.x = this.anchor.x + random(-20, 20);
      this.y = this.anchor.y + random(-20, 20);
      this.px = this.x;
      this.py = this.y;
      this.vx = 0;
      this.vy = 0;
      this.life = random(0.5, 1);
    }
  }

  draw(intensity) {
    const alpha = 45 + this.life * 120;
    stroke(117 + intensity * 2, 180, 255, alpha);
    line(this.px, this.py, this.x, this.y);
    stroke(255, 118, 155, alpha * 0.45);
    point(this.x, this.y);
  }
}

async function rebuild() {
  const font = await loadFontByUrl(fontSel.value || CREATIVE_FONTS[0].url);
  fontLabel = fontSel.selectedOptions[0]?.textContent || "font";
  fontStat.textContent = fontLabel;
  geom = getGlyphGeometry(font, (charInput.value || "S")[0], {
    sizePx: Math.min(window.innerHeight * 0.62, 520),
    centerX: window.innerWidth * 0.55,
    centerY: window.innerHeight * 0.58
  });

  const stride = max(1, floor(6 - min(Number(intensityInput.value) / 6, 4)));
  particles = geom.points
    .filter((_, index) => index % stride === 0)
    .map((point) => new Particle(point));

  particleStat.textContent = `${particles.length} particles`;
  background("#080b12");
}

new p5(() => {
  window.setup = function() {
    createCanvas(window.innerWidth, window.innerHeight);
    pixelDensity(min(2, window.devicePixelRatio || 1));
    background("#080b12");
    rebuild();
  };

  window.draw = function() {
    const intensity = Number(intensityInput.value);
    noStroke();
    fill(8, 11, 18, 22);
    rect(0, 0, width, height);

    if (geom?.contours?.length) {
      stroke(255, 255, 255, 18);
      strokeWeight(1);
      noFill();
      for (const contour of geom.contours) {
        beginShape();
        for (const point of contour) vertex(point.x, point.y);
        endShape(CLOSE);
      }
    }

    strokeWeight(1.35);
    for (const particle of particles) {
      particle.update(frameCount, intensity);
      particle.draw(intensity);
    }
  };

  window.windowResized = function() {
    resizeCanvas(window.innerWidth, window.innerHeight);
    rebuild();
  };
});

fontSel.addEventListener("change", rebuild);
charInput.addEventListener("input", rebuild);
intensityInput.addEventListener("input", rebuild);
</script>
<script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
