<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>regl Ribbon Trails</title>
  <style>
    body{margin:0;background:#03040a;color:#e9f6ff;font-family:"Segoe UI",sans-serif}
    #gl{width:100vw;height:100vh;display:block}
    .ui{position:fixed;top:56px;left:12px;z-index:10;background:rgba(8,10,18,.78);border:1px solid #2b3d63;border-radius:10px;padding:10px;display:flex;gap:8px;align-items:center}
    select,input{padding:6px;background:#121b30;color:#fff;border:1px solid #2b3d63;border-radius:7px}
  </style>
</head>
<body>
<div data-nav="main"></div>
<div class="ui">
  <label>Font <select id="font"></select></label>
  <label>Glyph <input id="char" value="R" maxlength="2" size="2"></label>
</div>
<canvas id="gl"></canvas>
<script src="https://cdn.jsdelivr.net/npm/regl@2.1.0/dist/regl.min.js"></script>
<script src="../dist-build/fontparser.min.js"></script>
<script type="module">
  import { CREATIVE_FONTS, populateCreativeFonts, loadFontByUrl, getGlyphGeometry } from './shared/creative-kit.js';

  const canvas = document.getElementById('gl');
  const fontSel = document.getElementById('font');
  const charInput = document.getElementById('char');
  populateCreativeFonts(fontSel);

  const regl = createREGL({ canvas, attributes: { antialias: true } });
  const draw = regl({
    frag: `
      precision mediump float;
      varying vec3 vColor;
      void main(){
        gl_FragColor = vec4(vColor, 0.95);
      }
    `,
    vert: `
      precision mediump float;
      attribute vec2 position;
      attribute vec3 color;
      varying vec3 vColor;
      uniform float pointSize;
      void main(){
        vColor = color;
        gl_Position = vec4(position,0,1);
        gl_PointSize = pointSize;
      }
    `,
    attributes: {
      position: regl.prop('positions'),
      color: regl.prop('colors')
    },
    uniforms: {
      pointSize: regl.prop('size')
    },
    count: regl.prop('count'),
    primitive: 'points'
  });

  let data = [];

  function resize() {
    canvas.width = Math.floor(window.innerWidth * Math.min(2, window.devicePixelRatio || 1));
    canvas.height = Math.floor(window.innerHeight * Math.min(2, window.devicePixelRatio || 1));
  }

  async function rebuild() {
    const font = await loadFontByUrl(fontSel.value || CREATIVE_FONTS[0].url);
    const geom = getGlyphGeometry(font, (charInput.value || 'R')[0], {
      sizePx: Math.min(window.innerHeight * 0.62, 460),
      centerX: 0,
      centerY: 0
    });
    data = geom.points.filter((_, i) => i % 2 === 0).map((p, i) => ({ x: p.x, y: p.y, seed: i * 0.023 }));
  }

  function toNdc(x, y) {
    const sx = x / (window.innerWidth * 0.5);
    const sy = y / (window.innerHeight * 0.5);
    return [sx, -sy];
  }

  regl.frame(({ time }) => {
    regl.clear({ color: [0.015, 0.02, 0.05, 1], depth: 1 });
    if (!data.length) return;
    const positions = [];
    const colors = [];
    for (let i = 0; i < data.length; i++) {
      const p = data[i];
      const ox = Math.cos(time * 1.8 + p.seed * 80) * 14;
      const oy = Math.sin(time * 1.3 + p.seed * 67) * 14;
      positions.push(toNdc(p.x + ox, p.y + oy));
      const v = 0.5 + 0.5 * Math.sin(time * 2.0 + p.seed * 30);
      colors.push([0.18 + 0.72 * v, 0.42 + 0.4 * (1 - v), 1.0]);
    }
    draw({ positions, colors, count: positions.length, size: 2.8 });
  });

  window.addEventListener('resize', () => { resize(); rebuild(); });
  fontSel.addEventListener('change', rebuild);
  charInput.addEventListener('input', rebuild);
  resize();
  await rebuild();
</script>
<script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
