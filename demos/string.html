<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>String Demo</title>
    <meta charset="utf-8">
</head>
<body>
<div data-nav="main"></div>

<div id="font-list"></div>
<script src="../dist-build/fontparser.min.js"></script>
<script type="module">
const { FontParser, CanvasRenderer, SVGFont } = window.FontParser;
    import { getFontList } from '../tools/shared/font-catalog.js';

    const DEBUG = false;
    if (DEBUG) console.log("String demo debug mode enabled");
    const TABLE_TAGS = {
        glyf: 0x676c7966,
        CFF: 0x43464620,
        CFF2: 0x43464632
    };

    const fonts = getFontList('stringExplorer');

    const container = document.getElementById("font-list");

    fonts.forEach((file) => {
        const block = document.createElement("div");
        block.style.marginBottom = "30px";

        const label = document.createElement("div");
        label.textContent = file.split("/").pop() || file;
        label.style.fontFamily = "Arial, sans-serif";
        label.style.marginBottom = "6px";
        block.appendChild(label);

        const canvas = document.createElement("canvas");
        canvas.width = 1000;
        canvas.height = 220;
        block.appendChild(canvas);

        const status = document.createElement("div");
        status.style.fontSize = "12px";
        status.style.color = "#666";
        status.style.marginTop = "6px";
        block.appendChild(status);

        container.appendChild(block);

        const safePath = file
            .split("/")
            .map((part) => encodeURIComponent(part))
            .join("/");
        const url = `../truetypefonts/${safePath}`;
        FontParser.load(url)
            .then(font => {
                const hasGlyf = !!font.getTableByType(TABLE_TAGS.glyf);
                const hasCff = !!font.getTableByType(TABLE_TAGS.CFF);
                const hasCff2 = !!font.getTableByType(TABLE_TAGS.CFF2);
                if (!hasGlyf && !hasCff) {
                    status.textContent = hasCff2 ? "CFF2 outlines not supported yet." : "No glyph outlines found.";
                    return;
                }
                CanvasRenderer.drawString(font, "hello world", canvas, {
                    x: 20,
                    y: 160,
                    scale: 0.1,
                    styles: cssStyles
                });
            })
            .catch(error => {
                console.error("Failed to load font:", file, error);
            });
    });

    const cssStyles = {
        fillStyle: '#3498db',
        strokeStyle: '#000000',
        globalAlpha: 1,
        lineWidth: 2,
        shadowColor: '#95a5a6',
        shadowBlur: 10,
        shadowOffsetX: 4,
        shadowOffsetY: 4
    };

</script>
  <script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
