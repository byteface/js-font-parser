<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>String Demo</title>
    <meta charset="utf-8">
</head>
<body>
<div id="font-list"></div>

<script type="module">
    import { FontParserTTF } from '../dist/data/FontParserTTF.js';
    import { Debug } from '../dist/utils/Debug.js';
    import { drawString } from './shared/glyph-render.js';

    const DEBUG = false;
    Debug.enabled = DEBUG;

    const fonts = [
        "2006 Team.ttf",
        "20FACES.TTF",
        "AUGIE___.TTF",
        "Aims in your Life normal.ttf",
        "CARDS.TTF",
        "DiscoMo.ttf",
        "ELLO____.TTF",
        "GothamNarrow-Ultra.otf",
        "JoeJack.ttf",
        "Quill.ttf",
        "RENAV___.TTF",
        "ZWISDOM.ttf",
        "slkscr.ttf"
    ];

    const container = document.getElementById("font-list");

    fonts.forEach((file) => {
        const block = document.createElement("div");
        block.style.marginBottom = "30px";

        const label = document.createElement("div");
        label.textContent = file;
        label.style.fontFamily = "Arial, sans-serif";
        label.style.marginBottom = "6px";
        block.appendChild(label);

        const canvas = document.createElement("canvas");
        canvas.width = 1000;
        canvas.height = 220;
        block.appendChild(canvas);

        container.appendChild(block);

        const url = `../truetypefonts/${encodeURIComponent(file)}`;
        FontParserTTF.load(url)
            .then(font => {
                drawString(font, "hello world", canvas, {
                    x: 20,
                    y: 160,
                    scale: 0.1,
                    styles: cssStyles
                });
            })
            .catch(error => {
                console.error("Failed to load font:", file, error);
            });
    });

    const cssStyles = {
        'color': '#3498db',
        'stroke-color': '#000000',
        'opacity': '1',
        'line-width': '2',
        'shadow-color': '#95a5a6',
        'shadow-blur': '10',
        'shadow-offset-x': '4',
        'shadow-offset-y': '4'
    };

</script>
</body>
</html>
