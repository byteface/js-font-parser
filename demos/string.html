<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>String Demo</title>
    <meta charset="utf-8">
</head>
<body>
<div id="font-list"></div>
<script type="module">
    import { FontParserTTF } from '../dist/data/FontParserTTF.js';
    import { Debug } from '../dist/utils/Debug.js';
    import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';
    import { Table } from '../dist/table/Table.js';

    const DEBUG = false;
    Debug.enabled = DEBUG;

    const fonts = [
        { file: "2006 Team.ttf", text: "hello world" },
        { file: "20FACES.TTF", text: "hello world" },
        { file: "AUGIE___.TTF", text: "hello world" },
        { file: "Aims in your Life normal.ttf", text: "hello world" },
        { file: "CARDS.TTF", text: "hello world" },
        { file: "DiscoMo.ttf", text: "hello world" },
        { file: "DiscoMo-pl.ttf", text: "Zażółć gęślą jaźń" },
        { file: "DiscoMo-cs.ttf", text: "Příliš žluťoučký kůň" },
        { file: "DiscoMo-hu.ttf", text: "Árvíztűrő tükörfúrógép" },
        { file: "DiscoMo-tr.ttf", text: "İstanbul, ığdır, şehri" },
        { file: "DiscoMo-ro.ttf", text: "Șerban ține țăruș" },
        { file: "DiscoMo-es.ttf", text: "¡Feliz cumpleaños!" },
        { file: "devil-inside-font/DevilInside-G3xP.ttf", text: "hello world" },
        { file: "ELLO____.TTF", text: "hello world" },
        { file: "GothamNarrow-Ultra.otf", text: "hello world" },
        { file: "JoeJack.ttf", text: "hello world" },
        { file: "Quill.ttf", text: "hello world" },
        { file: "RENAV___.TTF", text: "hello world" },
        { file: "ZWISDOM.ttf", text: "hello world" },
        { file: "slkscr.ttf", text: "hello world" }
    ];

    const container = document.getElementById("font-list");

    fonts.forEach(({ file, text }) => {
        const block = document.createElement("div");
        block.style.marginBottom = "30px";

        const label = document.createElement("div");
        label.textContent = file;
        label.style.fontFamily = "Arial, sans-serif";
        label.style.marginBottom = "6px";
        block.appendChild(label);

        const canvas = document.createElement("canvas");
        canvas.width = 1000;
        canvas.height = 220;
        block.appendChild(canvas);

        const status = document.createElement("div");
        status.style.fontSize = "12px";
        status.style.color = "#666";
        status.style.marginTop = "6px";
        block.appendChild(status);

        container.appendChild(block);

        const url = `../truetypefonts/${encodeURIComponent(file)}`;
        FontParserTTF.load(url)
            .then(font => {
                const hasGlyf = !!font.getTableByType(Table.glyf);
                const hasCff = !!font.getTableByType(Table.CFF);
                const hasCff2 = !!font.getTableByType(Table.CFF2);
                if (!hasGlyf && !hasCff) {
                    status.textContent = hasCff2 ? "CFF2 outlines not supported yet." : "No glyph outlines found.";
                    return;
                }
                CanvasRenderer.drawString(font, text, canvas, {
                    x: 20,
                    y: 160,
                    scale: 0.1,
                    styles: cssStyles
                });
            })
            .catch(error => {
                console.error("Failed to load font:", file, error);
            });
    });

    const cssStyles = {
        fillStyle: '#3498db',
        strokeStyle: '#000000',
        globalAlpha: 1,
        lineWidth: 2,
        shadowColor: '#95a5a6',
        shadowBlur: 10,
        shadowOffsetX: 4,
        shadowOffsetY: 4
    };

</script>
</body>
</html>
