<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>String Demo</title>
    <meta charset="utf-8">
</head>
<body>
<div id="font-list"></div>
<script type="module">
    import { FontParserTTF } from '../dist/data/FontParserTTF.js';
    import { Debug } from '../dist/utils/Debug.js';
    import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';
    import { Table } from '../dist/table/Table.js';

    const DEBUG = false;
    Debug.enabled = DEBUG;

    const fonts = [
        "2006 Team.ttf",
        "20FACES.TTF",
        "AUGIE___.TTF",
        "Aims in your Life normal.ttf",
        "CARDS.TTF",
        "DiscoMo.ttf",
        "devil-inside-font/DevilInside-G3xP.ttf",
        "ELLO____.TTF",
        "GothamNarrow-Ultra.otf",
        "JoeJack.ttf",
        "Quill.ttf",
        "RENAV___.TTF",
        "ZWISDOM.ttf",
        "slkscr.ttf"
    ];

    const container = document.getElementById("font-list");

    fonts.forEach((file) => {
        const block = document.createElement("div");
        block.style.marginBottom = "30px";

        const label = document.createElement("div");
        label.textContent = file;
        label.style.fontFamily = "Arial, sans-serif";
        label.style.marginBottom = "6px";
        block.appendChild(label);

        const canvas = document.createElement("canvas");
        canvas.width = 1000;
        canvas.height = 220;
        block.appendChild(canvas);

        const status = document.createElement("div");
        status.style.fontSize = "12px";
        status.style.color = "#666";
        status.style.marginTop = "6px";
        block.appendChild(status);

        container.appendChild(block);

        const url = `../truetypefonts/${encodeURIComponent(file)}`;
        FontParserTTF.load(url)
            .then(font => {
                const hasGlyf = !!font.getTableByType(Table.glyf);
                const hasCff = !!font.getTableByType(Table.CFF);
                const hasCff2 = !!font.getTableByType(Table.CFF2);
                if (!hasGlyf && !hasCff) {
                    status.textContent = hasCff2 ? "CFF2 outlines not supported yet." : "No glyph outlines found.";
                    return;
                }
                CanvasRenderer.drawString(font, "hello world", canvas, {
                    x: 20,
                    y: 160,
                    scale: 0.1,
                    styles: cssStyles
                });
            })
            .catch(error => {
                console.error("Failed to load font:", file, error);
            });
    });

    const cssStyles = {
        fillStyle: '#3498db',
        strokeStyle: '#000000',
        globalAlpha: 1,
        lineWidth: 2,
        shadowColor: '#95a5a6',
        shadowBlur: 10,
        shadowOffsetX: 4,
        shadowOffsetY: 4
    };

</script>
</body>
</html>
