<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Shadow</title>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: Arial, sans-serif; }
        .label { padding: 12px 16px; }
    </style>
</head>
<body>
<div data-nav="main"></div>

<div class="label">Shadow (canvas shadow)</div>
<div style="padding: 0 16px 12px; color:#eee; display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
    <label>Text <input id="textInput" value="shadow" /></label>
    <label>Blur <input id="blurInput" type="range" min="0" max="40" value="20" /></label>
    <label>Offset X <input id="offsetXInput" type="range" min="-30" max="30" value="8" /></label>
    <label>Offset Y <input id="offsetYInput" type="range" min="-30" max="30" value="8" /></label>
    <label>Alpha <input id="alphaInput" type="range" min="0" max="100" value="100" /></label>
</div>
<canvas id="myDrawing" width="900" height="420"></canvas>
<script src="../dist-build/fontparser.min.js"></script>
<script type="module">
const { FontParser, CanvasRenderer, SVGFont } = window.FontParser;

    const canvas = document.getElementById('myDrawing');
    const ctx = canvas.getContext('2d');

    const textInput = document.getElementById('textInput');
    const blurInput = document.getElementById('blurInput');
    const offsetXInput = document.getElementById('offsetXInput');
    const offsetYInput = document.getElementById('offsetYInput');
    const alphaInput = document.getElementById('alphaInput');

    let font = null;
    FontParser.load("../truetypefonts/DiscoMo.ttf")
        .then(f => {
            font = f;
            render();
        })
        .catch(err => console.error("Failed to load font:", err));

    [textInput, blurInput, offsetXInput, offsetYInput, alphaInput].forEach(el => {
        el.addEventListener('input', render);
    });

    function render() {
        if (!font) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.shadowColor = "#888";
        ctx.shadowBlur = Number(blurInput.value);
        ctx.shadowOffsetX = Number(offsetXInput.value);
        ctx.shadowOffsetY = Number(offsetYInput.value);
        const alpha = Number(alphaInput.value) / 100;
        CanvasRenderer.drawString(font, textInput.value, canvas, {
            x: 60,
            y: 280,
            scale: 0.2,
            styles: {
                fillStyle: '#ffffff',
                strokeStyle: '#000000',
                lineWidth: 1,
                globalAlpha: alpha
            }
        });
    }
</script>
  <script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
