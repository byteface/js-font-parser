<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Shadow</title>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: Arial, sans-serif; }
        .label { padding: 12px 16px; }
    </style>
</head>
<body>
<div class="label">Shadow (canvas shadow)</div>
<canvas id="myDrawing" width="900" height="600"></canvas>
<script type="module">
    import { FontParserTTF } from '../dist/data/FontParserTTF.js';
    import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';

    const canvas = document.getElementById('myDrawing');
    const ctx = canvas.getContext('2d');

    FontParserTTF.load("../truetypefonts/DiscoMo.ttf")
        .then(font => {
            ctx.shadowColor = "#888";
            ctx.shadowBlur = 20;
            ctx.shadowOffsetX = 8;
            ctx.shadowOffsetY = 8;
            CanvasRenderer.drawString(font, "shadow", canvas, {
                x: 60,
                y: 350,
                scale: 0.2,
                styles: {
                    fillStyle: '#ffffff',
                    strokeStyle: '#000000',
                    lineWidth: '1',
                    globalAlpha: '1'
                }
            });
        })
        .catch(err => console.error("Failed to load font:", err));
</script>
</body>
</html>
