<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Breathing Letters</title>
    <meta charset="utf-8">
    <style>
        :root { color-scheme: light; }
        body {
            margin: 24px;
            font-family: "Georgia", "Times New Roman", serif;
            background: radial-gradient(circle at top, #f3fff9 0%, #e7f5ef 45%, #d8eae2 100%);
            color: #1b1b1b;
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; }
        .panel {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #cfe1d7;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(10, 40, 20, 0.08);
        }
        label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #3f5c4b;
        }
        input[type="text"], select {
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #cfe1d7;
            font-size: 14px;
            min-width: 220px;
            background: #fbfffd;
        }
        input[type="range"] { width: 160px; }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #2f6b52;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
        }
        #stage {
            border-radius: 16px;
            padding: 18px;
            background: #ffffff;
            border: 1px solid #cfe1d7;
            min-height: 360px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6);
        }
        canvas {
            width: 100%;
            height: 360px;
            display: block;
        }
        .hint {
            margin-top: 10px;
            color: #3f5c4b;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>Breathing Letters</h1>
    <div class="panel">
        <label>
            Font
            <select id="fontSelect">
                <option value="../truetypefonts/DiscoMo.ttf">DiscoMo</option>
                <option value="../truetypefonts/AUGIE___.TTF">Augie</option>
                <option value="../truetypefonts/JoeJack.ttf">JoeJack</option>
                <option value="../truetypefonts/Quill.ttf">Quill (script)</option>
            </select>
        </label>
        <label>
            Text
            <input id="textInput" type="text" value="Breathe" />
        </label>
        <label>
            Size
            <input id="sizeInput" type="range" min="80" max="240" value="160" />
        </label>
        <label>
            Amplitude
            <input id="ampInput" type="range" min="2" max="40" value="14" />
        </label>
        <label>
            Speed
            <input id="speedInput" type="range" min="1" max="10" value="4" />
        </label>
        <button id="renderBtn">Render</button>
    </div>
    <div id="stage">
        <canvas id="canvas" width="1200" height="360"></canvas>
    </div>
    <div class="hint">Contours are displaced along their radial vectors, giving a living, organic wobble.</div>

    <script type="module">
        import { FontParserTTF } from "../dist/data/FontParserTTF.js";
        import { CanvasRenderer } from "../dist/render/CanvasRenderer.js";

        const fontSelect = document.getElementById("fontSelect");
        const textInput = document.getElementById("textInput");
        const sizeInput = document.getElementById("sizeInput");
        const ampInput = document.getElementById("ampInput");
        const speedInput = document.getElementById("speedInput");
        const renderBtn = document.getElementById("renderBtn");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const fontCache = new Map();
        let font = null;
        let animId = null;

        function getScale(font, sizePx) {
            const unitsPerEm = font.getTableByType(0)?.unitsPerEm ?? 1000;
            return sizePx / unitsPerEm;
        }

        function makeGlyph(points) {
            return {
                points,
                getPoint(i) { return points[i]; },
                getPointCount() { return points.length; }
            };
        }

        function clear() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fbfffd";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        async function loadFont(url) {
            if (fontCache.has(url)) return fontCache.get(url);
            const f = await FontParserTTF.load(url);
            fontCache.set(url, f);
            return f;
        }

        function deformPoints(points, amp, time) {
            let cx = 0;
            let cy = 0;
            for (const p of points) {
                cx += p.x;
                cy += p.y;
            }
            cx /= points.length || 1;
            cy /= points.length || 1;

            return points.map((p, i) => {
                const dx = p.x - cx;
                const dy = p.y - cy;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                const wobble = Math.sin(time + i * 0.15) * amp;
                return {
                    x: p.x + (dx / dist) * wobble,
                    y: p.y + (dy / dist) * wobble,
                    onCurve: p.onCurve,
                    endOfContour: p.endOfContour
                };
            });
        }

        function render() {
            if (!font) return;
            const text = textInput.value || "";
            const sizePx = Number(sizeInput.value);
            const amp = Number(ampInput.value);
            const speed = Number(speedInput.value);
            const scale = getScale(font, sizePx);

            let glyphs = [];
            for (const ch of text) {
                const g = font.getGlyphByChar(ch);
                if (g) glyphs.push(g);
            }

            let t = 0;
            const draw = () => {
                clear();
                const baseline = canvas.height * 0.68;
                let penX = 80;
                for (const g of glyphs) {
                    const points = [];
                    for (let i = 0; i < g.getPointCount(); i++) {
                        points.push(g.getPoint(i));
                    }
                    const warped = deformPoints(points, amp, t);
                    const glyph = makeGlyph(warped);
                    CanvasRenderer.drawGlyphToContext(ctx, glyph, {
                        x: penX,
                        y: baseline,
                        scale,
                        styles: {
                            fillStyle: "rgba(45, 105, 78, 0.08)",
                            strokeStyle: "#2f6b52",
                            lineWidth: 2
                        }
                    });
                    penX += g.advanceWidth * scale + 14;
                }
                t += 0.02 * speed;
                animId = requestAnimationFrame(draw);
            };

            if (animId) cancelAnimationFrame(animId);
            draw();
        }

        async function boot() {
            font = await loadFont(fontSelect.value);
            render();
        }

        renderBtn.addEventListener("click", render);
        fontSelect.addEventListener("change", boot);
        textInput.addEventListener("change", render);
        sizeInput.addEventListener("input", render);
        ampInput.addEventListener("input", render);
        speedInput.addEventListener("input", render);

        boot();
    </script>
</body>
</html>
