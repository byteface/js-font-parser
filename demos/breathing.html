<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Breathing Letters</title>
    <meta charset="utf-8">
    <style>
        :root { color-scheme: light; }
        body {
            margin: 24px;
            font-family: "Georgia", "Times New Roman", serif;
            background: radial-gradient(circle at top, #f3fff9 0%, #e7f5ef 45%, #d8eae2 100%);
            color: #1b1b1b;
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; }
        .panel {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #cfe1d7;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(10, 40, 20, 0.08);
        }
        label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #3f5c4b;
        }
        input[type="text"], select {
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #cfe1d7;
            font-size: 14px;
            min-width: 220px;
            background: #fbfffd;
        }
        input[type="range"] { width: 160px; }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #2f6b52;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
        }
        #stage {
            border-radius: 16px;
            padding: 18px;
            background: #ffffff;
            border: 1px solid #cfe1d7;
            min-height: 360px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6);
        }
        canvas {
            width: 100%;
            height: 360px;
            display: block;
        }
        .hint {
            margin-top: 10px;
            color: #3f5c4b;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div data-nav="main"></div>

    <h1>Breathing Letters</h1>
    <div class="panel">
        <label>
            Font
            <select id="fontSelect">
                <option value="../truetypefonts/DiscoMo.ttf">DiscoMo</option>
                <option value="../truetypefonts/devil-inside-font/DevilInside-G3xP.ttf">DevilInside</option>
                <option value="../truetypefonts/AUGIE___.TTF">Augie</option>
                <option value="../truetypefonts/JoeJack.ttf">JoeJack</option>
                <option value="../truetypefonts/Quill.ttf">Quill (script)</option>
            </select>
        </label>
        <label>
            Word / Mode
            <select id="modeSelect">
                <option value="breathing">Breathing</option>
                <option value="scared">Scared</option>
                <option value="floating">Floating</option>
                <option value="stretching">Stretching</option>
            </select>
        </label>
        <label>
            Size
            <input id="sizeInput" type="range" min="80" max="240" value="160" />
        </label>
        <label>
            Amplitude
            <input id="ampInput" type="range" min="2" max="40" value="14" />
        </label>
        <label>
            Speed
            <input id="speedInput" type="range" min="1" max="10" value="4" />
        </label>
        <button id="renderBtn">Render</button>
    </div>
    <div id="stage">
        <canvas id="canvas" width="1200" height="360"></canvas>
    </div>
    <div class="hint">Switch Word / Mode to compare different deformation profiles and pick the keepers.</div>

    <script src="../dist-build/fontparser.min.js"></script>
<script type="module">
const { FontParser, CanvasRenderer, SVGFont } = window.FontParser;
        import { createFontLoader, getSelectedFont, populateFontSelect } from "./shared/demo-scaffold.js";
        import { getFontList } from "../tools/shared/font-catalog.js";

        const fontSelect = document.getElementById("fontSelect");
        const modeSelect = document.getElementById("modeSelect");
        const sizeInput = document.getElementById("sizeInput");
        const ampInput = document.getElementById("ampInput");
        const speedInput = document.getElementById("speedInput");
        const renderBtn = document.getElementById("renderBtn");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const fonts = getFontList("demoCore");
        const loadFont = createFontLoader(FontParser.load);
        let font = null;
        let animId = null;
        const EFFECTS = {
            breathing: { word: "BREATHING", fill: "rgba(45, 105, 78, 0.08)", stroke: "#2f6b52", speedStep: 0.020 },
            scared: { word: "SCARED", fill: "rgba(120, 44, 44, 0.09)", stroke: "#8f3d3d", speedStep: 0.042 },
            floating: { word: "FLOATING", fill: "rgba(56, 84, 148, 0.08)", stroke: "#365494", speedStep: 0.018 },
            stretching: { word: "STRETCH", fill: "rgba(166, 105, 44, 0.08)", stroke: "#9a5f28", speedStep: 0.014 }
        };

        function getScale(font, sizePx) {
            const unitsPerEm = typeof font.getUnitsPerEm === "function" ? font.getUnitsPerEm() : 1000;
            return sizePx / unitsPerEm;
        }

        function makeGlyph(points) {
            return {
                points,
                getPoint(i) { return points[i]; },
                getPointCount() { return points.length; }
            };
        }

        function clear() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fbfffd";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function getPointStats(points) {
            let cx = 0;
            let cy = 0;
            for (const p of points) {
                cx += p.x;
                cy += p.y;
            }
            cx /= points.length || 1;
            cy /= points.length || 1;
            let maxDist = 1;
            for (const p of points) {
                const dx = p.x - cx;
                const dy = p.y - cy;
                const d = Math.sqrt(dx * dx + dy * dy);
                if (d > maxDist) maxDist = d;
            }
            return { cx, cy, maxDist };
        }

        function deformPointsBreathing(points, amp, time) {
            const { cx, cy } = getPointStats(points);
            return points.map((p, i) => {
                const dx = p.x - cx;
                const dy = p.y - cy;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                const wobble = Math.sin(time + i * 0.15) * amp;
                return {
                    x: p.x + (dx / dist) * wobble,
                    y: p.y + (dy / dist) * wobble,
                    onCurve: p.onCurve,
                    endOfContour: p.endOfContour
                };
            });
        }

        function deformPointsScared(points, amp, time) {
            const { cx, cy } = getPointStats(points);
            const tremorX = Math.sin(time * 1.9) * amp * 0.18;
            const tremorY = Math.cos(time * 2.2) * amp * 0.12;

            return points.map((p, i) => {
                const dx = p.x - cx;
                const dy = p.y - cy;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                const radial = Math.sin(time * 3.2 + i * 0.93) * amp * 0.16;
                const jitterX = Math.sin(time * 8.8 + i * 1.7) * amp * 0.42;
                const jitterY = Math.cos(time * 9.6 + i * 1.31) * amp * 0.42;
                return {
                    x: p.x + tremorX + jitterX + (dx / dist) * radial,
                    y: p.y + tremorY + jitterY + (dy / dist) * radial,
                    onCurve: p.onCurve,
                    endOfContour: p.endOfContour
                };
            });
        }

        function deformPointsFloating(points, amp, time) {
            const { cy } = getPointStats(points);
            return points.map((p, i) => ({
                x: p.x + Math.cos(time * 0.95 + (p.y - cy) * 0.03) * amp * 0.18,
                y: p.y + Math.sin(time * 1.25 + i * 0.09 + (p.x * 0.018)) * amp * 0.55,
                onCurve: p.onCurve,
                endOfContour: p.endOfContour
            }));
        }

        function deformPointsStretching(points, amp, time) {
            const { cx, cy, maxDist } = getPointStats(points);
            const phase = (Math.sin(time) + 1) * 0.5;
            const hold = Math.pow(phase, 1.8);
            const stretchY = 1 + hold * 0.42;
            const squeezeX = 1 - hold * 0.16;
            const rebound = Math.sin(time * 2.1 + Math.PI * 0.35) * amp * 0.08;

            return points.map((p, i) => {
                const dx = p.x - cx;
                const dy = p.y - cy;
                const radial = Math.sqrt(dx * dx + dy * dy) / maxDist;
                const wave = Math.sin(time * 0.65 + radial * 3.4 + i * 0.045) * amp * 0.14;
                const edgePull = Math.sign(dy || 1) * hold * radial * amp * 0.22;
                return {
                    x: cx + (dx * squeezeX) + Math.sin(time * 0.9 + dy * 0.012) * amp * 0.05,
                    y: cy + (dy * stretchY) + edgePull + wave + rebound,
                    onCurve: p.onCurve,
                    endOfContour: p.endOfContour
                };
            });
        }

        function deformByMode(mode, points, amp, time) {
            switch (mode) {
                case "scared": return deformPointsScared(points, amp, time);
                case "floating": return deformPointsFloating(points, amp, time);
                case "stretching": return deformPointsStretching(points, amp, time);
                case "breathing":
                default: return deformPointsBreathing(points, amp, time);
            }
        }

        function render() {
            if (!font) return;
            const mode = EFFECTS[modeSelect.value] ? modeSelect.value : "breathing";
            const effect = EFFECTS[mode];
            const text = effect.word;
            const sizePx = Number(sizeInput.value);
            const amp = Number(ampInput.value);
            const speed = Number(speedInput.value);
            const scale = getScale(font, sizePx);

            let glyphs = [];
            for (const ch of text) {
                const g = font.getGlyphByChar(ch);
                if (g) glyphs.push(g);
            }

            let t = 0;
            const draw = () => {
                clear();
                const baseline = canvas.height * 0.68;
                let penX = 80;
                for (const g of glyphs) {
                    const points = [];
                    for (let i = 0; i < g.getPointCount(); i++) {
                        points.push(g.getPoint(i));
                    }
                    const warped = deformByMode(mode, points, amp, t);
                    const glyph = makeGlyph(warped);
                    CanvasRenderer.drawGlyphToContext(ctx, glyph, {
                        x: penX,
                        y: baseline,
                        scale,
                        styles: {
                            fillStyle: effect.fill,
                            strokeStyle: effect.stroke,
                            lineWidth: 2
                        }
                    });
                    penX += g.advanceWidth * scale + 14;
                }
                t += effect.speedStep * speed;
                animId = requestAnimationFrame(draw);
            };

            if (animId) cancelAnimationFrame(animId);
            draw();
        }

        async function boot() {
            try {
                font = await loadFont(getSelectedFont(fontSelect, fonts).url);
                render();
            } catch (err) {
                console.error("Failed to load font for breathing demo:", err);
            }
        }

        renderBtn.addEventListener("click", render);
        fontSelect.addEventListener("change", boot);
        modeSelect.addEventListener("change", render);
        sizeInput.addEventListener("input", render);
        ampInput.addEventListener("input", render);
        speedInput.addEventListener("input", render);

        populateFontSelect(fontSelect, fonts);
        boot();
    </script>
  <script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
