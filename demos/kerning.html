<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kerning Demo</title>
  <style>
    :root { --bg:#f7f3ef; --ink:#1f1a16; --muted:#6a5f57; --panel:#fff; --border:#e5ded6; }
    body { margin:0; font-family:"Crimson Text", serif; background:var(--bg); color:var(--ink); }
    header { padding:22px 20px 10px; }
    h1 { margin:0 0 6px; font-size:26px; }
    p { margin:0 0 14px; color:var(--muted); }
    .wrap { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:16px; padding:16px 20px 32px; }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:12px; }
    canvas { width:100%; height:200px; border:1px dashed var(--border); border-radius:10px; background:#fff; }
    input { width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--border); margin-bottom:10px; }
  </style>
</head>
<body>
  <header>
    <h1>Kerning Demo</h1>
    <p>Shows text rendered with default spacing vs kern table adjustments (exaggerated).</p>
  </header>
  <div class="wrap">
    <div class="panel">
      <select id="fontSelect" style="width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--border); margin-bottom:10px;"></select>
      <input id="textInput" value="AVATAR WA To VA" />
      <label style="display:block; font-size:12px; color:var(--muted); margin-bottom:8px;">Kerning strength</label>
      <input id="kernInput" type="range" min="1" max="6" value="3" />
      <canvas id="plain" width="900" height="200"></canvas>
    </div>
    <div class="panel">
      <canvas id="kerned" width="900" height="200"></canvas>
      <div id="kernInfo" style="margin-top:10px; font-size:12px; color:var(--muted);"></div>
    </div>
  </div>

  <script type="module">
    import { FontParserTTF } from '../dist/data/FontParserTTF.js';
    import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';

    const input = document.getElementById('textInput');
    const fontSelect = document.getElementById('fontSelect');
    const kernInput = document.getElementById('kernInput');
    const plainCanvas = document.getElementById('plain');
    const kernCanvas = document.getElementById('kerned');
    const kernInfo = document.getElementById('kernInfo');

    const fonts = [
      { name: 'DiscoMo (kern table)', url: '../truetypefonts/DiscoMo.ttf' },
      { name: 'DevilInside', url: '../truetypefonts/devil-inside-font/DevilInside-G3xP.ttf' },
      { name: 'CARDS (kern table)', url: '../truetypefonts/CARDS.TTF' },
      { name: 'Noto Sans (GPOS)', url: '../truetypefonts/noto/NotoSans-Regular.ttf' },
      { name: 'AUGIE', url: '../truetypefonts/AUGIE___.TTF' }
    ];
    const cache = new Map();
    let font = null;

    function populateFonts() {
      fontSelect.innerHTML = '';
      fonts.forEach((f, i) => {
        const opt = document.createElement('option');
        opt.value = String(i);
        opt.textContent = f.name;
        fontSelect.appendChild(opt);
      });
    }

    async function loadFont(url) {
      if (cache.has(url)) return cache.get(url);
      const f = await FontParserTTF.load(url);
      cache.set(url, f);
      return f;
    }

    input.addEventListener('input', render);
    kernInput.addEventListener('input', render);
    fontSelect.addEventListener('change', async () => {
      font = await loadFont(fonts[Number(fontSelect.value)]?.url ?? fonts[0].url);
      render();
    });

    function render() {
      if (!font) return;
      const text = input.value;
      const ctxPlain = plainCanvas.getContext('2d');
      const ctxKern = kernCanvas.getContext('2d');
      ctxPlain.clearRect(0,0,plainCanvas.width,plainCanvas.height);
      ctxKern.clearRect(0,0,kernCanvas.width,kernCanvas.height);

      const kernScale = Number(kernInput.value);
      CanvasRenderer.drawString(font, text, plainCanvas, { x: 20, y: 140, scale: 0.12, spacing: 2, styles: { fillStyle: '#111', strokeStyle: '#111' } });
      CanvasRenderer.drawStringWithKerning(font, text, kernCanvas, { x: 20, y: 140, scale: 0.12, spacing: 2, kerningScale: kernScale, styles: { fillStyle: '#111', strokeStyle: '#111' } });

      const pairs = [];
      for (let i = 0; i < text.length - 1; i++) {
        const a = text[i];
        const b = text[i + 1];
        const v = font.getKerningValue(a, b);
        if (v) pairs.push(`${a}${b}: ${v}`);
      }
      const kernTable = font.getTableByType?.(0x6b65726e);
      const gposTable = font.getTableByType?.(0x47504f53);
      const tables = `kern: ${kernTable ? 'yes' : 'no'}, gpos: ${gposTable ? 'yes' : 'no'}`;
      kernInfo.textContent = pairs.length > 0 ? `Kerning pairs: ${pairs.join(' | ')} | ${tables}` : `No kerning pairs found in this string. | ${tables}`;
    }

    populateFonts();
    loadFont(fonts[0].url).then(f => { font = f; render(); });
  </script>
</body>
</html>
