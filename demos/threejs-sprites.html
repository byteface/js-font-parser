<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Three.js Sprite Field</title>
  <style>
    :root { --bg:#0d0f15; --ink:#f2f5fb; --muted:#aab5ce; --panel:#171b27; --border:#2b334a; }
    body { margin:0; font-family:"Space Grotesk", system-ui, sans-serif; background:var(--bg); color:var(--ink); }
    header { padding:20px 22px 10px; }
    h1 { margin:0 0 6px; font-size:24px; }
    p { margin:0 0 12px; color:var(--muted); }
    .panel { display:flex; flex-wrap:wrap; gap:12px; padding:10px 22px 16px; align-items:center; }
    label { display:flex; flex-direction:column; gap:6px; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); }
    input, select { background:#0f1320; color:var(--ink); border:1px solid var(--border); border-radius:8px; padding:8px 10px; min-width:180px; }
    canvas { display:block; width:100vw; height:70vh; }
  </style>
</head>
<body>
<div data-nav="main" style="position:sticky;top:0;z-index:10;background:#f6f4f1;border-bottom:1px solid #e3e1db;padding:10px 16px;font-family:'Merriweather',serif;display:flex;gap:12px;align-items:center"><a href="../demos/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Demos</a><a href="../tools/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Tools</a></div>

  <header>
    <h1>Three.js Sprite Field</h1>
    <p>Glyph points rendered as glowing sprites with depth offsets.</p>
  </header>
  <div class="panel">
    <label>Font
      <select id="fontSelect">
        <option value="../truetypefonts/DiscoMo.ttf">DiscoMo</option>
        <option value="../truetypefonts/devil-inside-font/DevilInside-G3xP.ttf">DevilInside</option>
        <option value="../truetypefonts/Quill.ttf">Quill</option>
      </select>
    </label>
    <label>Text
      <input id="textInput" value="SPRITE" />
    </label>
    <label>Size
      <input id="sizeInput" type="range" min="80" max="240" value="150" />
    </label>
  </div>
  <canvas id="stage"></canvas>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "https://unpkg.com/three@0.158.0/examples/jsm/controls/OrbitControls.js";
    import { FontParser } from "../dist/data/FontParser.js";
    import { Table } from "../dist/table/Table.js";

    const canvas = document.getElementById("stage");
    const fontSelect = document.getElementById("fontSelect");
    const textInput = document.getElementById("textInput");
    const sizeInput = document.getElementById("sizeInput");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0d0f15");
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
    camera.position.set(0, 110, 360);
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    let font = null;
    let pointsMesh = null;

    function makeSpriteTexture() {
      const size = 64;
      const c = document.createElement("canvas");
      c.width = c.height = size;
      const ctx = c.getContext("2d");
      const g = ctx.createRadialGradient(size/2, size/2, 2, size/2, size/2, size/2);
      g.addColorStop(0, "rgba(120,200,255,1)");
      g.addColorStop(1, "rgba(120,200,255,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0,0,size,size);
      const tex = new THREE.CanvasTexture(c);
      return tex;
    }

    const spriteTex = makeSpriteTexture();

    function buildSprites(text) {
      if (!font) return;
      if (pointsMesh) {
        scene.remove(pointsMesh);
        pointsMesh.geometry.dispose();
      }
      const head = font.getTableByType(Table.head);
      const unitsPerEm = head?.unitsPerEm ?? 1000;
      const sizePx = Number(sizeInput.value);
      const scale = sizePx / unitsPerEm;

      const positions = [];
      let cursorX = 0;
      for (const ch of Array.from(text)) {
        const glyph = font.getGlyphByChar(ch);
        if (!glyph || !glyph.points) {
          cursorX += sizePx * 0.35;
          continue;
        }
        const pts = glyph.points.slice(0, Math.max(0, glyph.getPointCount() - 2));
        for (const p of pts) {
          positions.push((p.x + cursorX) * scale - 160);
          positions.push(p.y * scale - 40);
          positions.push(Math.sin(p.x * 0.02) * 30);
        }
        cursorX += glyph.advanceWidth * scale + 12;
      }

      const geom = new THREE.BufferGeometry();
      geom.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({ size: 6, map: spriteTex, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending });
      pointsMesh = new THREE.Points(geom, mat);
      scene.add(pointsMesh);
    }

    async function boot() {
      font = await FontParser.load(fontSelect.value);
      buildSprites(textInput.value);
    }

    function resize() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    function animate(time) {
      resize();
      if (pointsMesh) {
        pointsMesh.rotation.y = time * 0.0003;
      }
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    fontSelect.addEventListener("change", boot);
    textInput.addEventListener("input", () => buildSprites(textInput.value));
    sizeInput.addEventListener("input", () => buildSprites(textInput.value));

    boot();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
