<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Three.js Glyph Lab</title>
  <style>
    :root { --bg:#070b16; --ink:#ecf3ff; --muted:#a1b1d4; --panel:#121a2d; --border:#2c3d63; }
    body { margin:0; font-family:"Space Grotesk", system-ui, sans-serif; color:var(--ink); background:radial-gradient(circle at 20% 15%, #21345d 0%, #111a32 35%, #070b16 100%); }
    header { padding:20px 22px 10px; }
    h1 { margin:0 0 6px; font-size:24px; }
    p { margin:0 0 12px; color:var(--muted); }
    .panel { display:flex; flex-wrap:wrap; gap:12px; padding:10px 22px 16px; align-items:center; }
    label { display:flex; flex-direction:column; gap:6px; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); }
    select,input { background:var(--panel); color:var(--ink); border:1px solid var(--border); border-radius:8px; padding:8px 10px; min-width:170px; }
    .toggle { flex-direction:row; align-items:center; gap:8px; text-transform:none; letter-spacing:0; font-size:13px; min-height:34px; }
    canvas { display:block; width:100vw; height:70vh; }
  </style>
</head>
<body>
<div data-nav="main"></div>

<header>
  <h1>Three.js Glyph Lab</h1>
  <p>Live 3D scene driven directly by parsed glyph contour points, on-curve/off-curve data, and advance widths.</p>
</header>
<div class="panel">
  <label>Font
    <select id="fontSelect">
      <option value="../truetypefonts/devil-inside-font/DevilInside-G3xP.ttf">DevilInside</option>
      <option value="../truetypefonts/DiscoMo.ttf">DiscoMo</option>
      <option value="../truetypefonts/Quill.ttf">Quill</option>
      <option value="../truetypefonts/noto/NotoSans-Regular.ttf">Noto Sans</option>
    </select>
  </label>
  <label>Text
    <input id="textInput" value="GLYPH LAB" />
  </label>
  <label>Size
    <input id="sizeInput" type="range" min="60" max="220" value="140" />
  </label>
  <label>Depth
    <input id="depthInput" type="range" min="4" max="120" value="32" />
  </label>
  <label>Motion
    <input id="motionInput" type="range" min="0" max="50" value="14" />
  </label>
  <label>Density
    <input id="densityInput" type="range" min="1" max="8" value="2" />
  </label>
  <label class="toggle"><input id="onCurveToggle" type="checkbox" checked />Show on-curve</label>
  <label class="toggle"><input id="offCurveToggle" type="checkbox" checked />Show off-curve</label>
</div>
<canvas id="stage"></canvas>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } }
</script>
<script src="../dist-build/fontparser.min.js"></script>
<script type="module">
const { FontParser, CanvasRenderer, SVGFont } = window.FontParser;
  import * as THREE from "three";
  import { OrbitControls } from "https://unpkg.com/three@0.158.0/examples/jsm/controls/OrbitControls.js";
  import { collectGlyphPoints, splitContours as splitGlyphContours } from "./shared/glyph-helpers.js";

  const canvas = document.getElementById("stage");
  const fontSelect = document.getElementById("fontSelect");
  const textInput = document.getElementById("textInput");
  const sizeInput = document.getElementById("sizeInput");
  const depthInput = document.getElementById("depthInput");
  const motionInput = document.getElementById("motionInput");
  const densityInput = document.getElementById("densityInput");
  const onCurveToggle = document.getElementById("onCurveToggle");
  const offCurveToggle = document.getElementById("offCurveToggle");

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x070b16);
  scene.fog = new THREE.Fog(0x070b16, 180, 1200);

  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 3000);
  camera.position.set(0, 120, 420);

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.minDistance = 120;
  controls.maxDistance = 1200;

  const ambient = new THREE.AmbientLight(0x7b9ad7, 0.35);
  const key = new THREE.PointLight(0x7dd3fc, 1.3, 1800);
  const rim = new THREE.PointLight(0xff80bf, 0.9, 1600);
  key.position.set(220, 220, 240);
  rim.position.set(-280, 100, -220);
  scene.add(ambient, key, rim);

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(1800, 900),
    new THREE.MeshPhysicalMaterial({ color:0x0a1328, metalness:0.85, roughness:0.35, clearcoat:1, clearcoatRoughness:0.2 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -130;
  scene.add(floor);

  const group = new THREE.Group();
  scene.add(group);

  let font = null;
  let pointsMesh = null;
  let lineMesh = null;
  let basePointPositions = null;
  let baseLinePositions = null;
  let rebuildQueued = false;

  function splitContours(glyph) {
    return splitGlyphContours(collectGlyphPoints(glyph)).filter((contour) => contour.length > 1);
  }

  function getGlyphBoundsFromContours(contours) {
    let minX = Infinity;
    let maxX = -Infinity;
    let minY = Infinity;
    let maxY = -Infinity;
    for (const contour of contours) {
      for (const p of contour) {
        if (p.x < minX) minX = p.x;
        if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.y > maxY) maxY = p.y;
      }
    }
    if (!Number.isFinite(minX)) return null;
    return { minX, maxX, minY, maxY, width: maxX - minX };
  }

  function disposeGroup() {
    while (group.children.length) {
      const c = group.children[0];
      group.remove(c);
      c.geometry?.dispose?.();
      c.material?.dispose?.();
    }
    pointsMesh = null;
    lineMesh = null;
    basePointPositions = null;
    baseLinePositions = null;
  }

  function buildSceneFromGlyphs() {
    rebuildQueued = false;
    disposeGroup();
    if (!font) return;

    const unitsPerEm = typeof font.getUnitsPerEm === "function" ? font.getUnitsPerEm() : 1000;
    const scale = Number(sizeInput.value) / unitsPerEm;
    const depth = Number(depthInput.value);
    const density = Number(densityInput.value);

    const pointPositions = [];
    const pointColors = [];
    const pointMeta = [];
    const linePositions = [];
    const lineColors = [];

    let cursorX = 0;
    let glyphIndex = 0;

    for (const ch of Array.from(textInput.value || "")) {
      const glyph = font.getGlyphByChar(ch);
      if (!glyph || glyph.getPointCount() < 2) {
        cursorX += Number(sizeInput.value) * 0.35;
        glyphIndex++;
        continue;
      }

      const contours = splitContours(glyph);
      let contourId = 0;
      const bounds = getGlyphBoundsFromContours(contours);
      const offsetX = bounds ? bounds.minX : 0;
      for (const contour of contours) {
        const sampled = contour.filter((_, i) => i % density === 0);
        if (sampled.length < 2) continue;

        for (let i = 0; i < sampled.length; i++) {
          const p = sampled[i];
          const x = (p.x - offsetX + cursorX) * scale;
          const y = p.y * scale;
          const z = (contourId - contours.length * 0.5) * (depth * 0.06);

          pointPositions.push(x, y, z);
          if (p.onCurve) pointColors.push(0.45, 0.80, 1.0);
          else pointColors.push(1.0, 0.45, 0.78);
          pointMeta.push({ onCurve: !!p.onCurve, phase: i * 0.27 + glyphIndex * 0.61, baseZ: z });

          const n = sampled[(i + 1) % sampled.length];
          const nx = (n.x - offsetX + cursorX) * scale;
          const ny = n.y * scale;
          const nz = z;
          linePositions.push(x, y, z, nx, ny, nz);

          const mix = contourId % 2 ? [0.50, 0.65, 1.0] : [0.80, 0.62, 1.0];
          lineColors.push(...mix, ...mix);
        }
        contourId++;
      }

      const measuredAdvance = Math.max(glyph.advanceWidth, bounds ? bounds.width : 0);
      cursorX += measuredAdvance + 70;
      glyphIndex++;
    }

    const pointGeom = new THREE.BufferGeometry();
    pointGeom.setAttribute("position", new THREE.Float32BufferAttribute(pointPositions, 3));
    pointGeom.setAttribute("color", new THREE.Float32BufferAttribute(pointColors, 3));
    const pointMat = new THREE.PointsMaterial({ size: 2.8, vertexColors: true, transparent: true, opacity: 0.95, sizeAttenuation: true });
    pointsMesh = new THREE.Points(pointGeom, pointMat);
    group.add(pointsMesh);

    const lineGeom = new THREE.BufferGeometry();
    lineGeom.setAttribute("position", new THREE.Float32BufferAttribute(linePositions, 3));
    lineGeom.setAttribute("color", new THREE.Float32BufferAttribute(lineColors, 3));
    const lineMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.72 });
    lineMesh = new THREE.LineSegments(lineGeom, lineMat);
    group.add(lineMesh);

    basePointPositions = { data: pointPositions.slice(), meta: pointMeta };
    baseLinePositions = linePositions.slice();

    const box = new THREE.Box3().setFromObject(group);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const leftEdge = Number.isFinite(box.min.x) ? box.min.x : 0;
    const baselineY = Number.isFinite(box.min.y) ? box.min.y : 0;
    group.position.set(-(leftEdge + size.x * 0.5), -baselineY - size.y * 0.15, 0);

    applyPointFilters();
  }

  function scheduleRebuild() {
    if (rebuildQueued) return;
    rebuildQueued = true;
    requestAnimationFrame(buildSceneFromGlyphs);
  }

  function applyPointFilters() {
    if (!pointsMesh || !basePointPositions) return;
    const showOn = onCurveToggle.checked;
    const showOff = offCurveToggle.checked;
    const colors = pointsMesh.geometry.getAttribute("color");
    for (let i = 0; i < basePointPositions.meta.length; i++) {
      const isOn = basePointPositions.meta[i].onCurve;
      const visible = (isOn && showOn) || (!isOn && showOff);
      const alphaColor = visible ? 1 : 0.01;
      if (isOn) {
        colors.setXYZ(i, 0.45 * alphaColor, 0.80 * alphaColor, 1.0 * alphaColor);
      } else {
        colors.setXYZ(i, 1.0 * alphaColor, 0.45 * alphaColor, 0.78 * alphaColor);
      }
    }
    colors.needsUpdate = true;
  }

  async function boot() {
    try {
      font = await FontParser.load(fontSelect.value);
      buildSceneFromGlyphs();
    } catch (err) {
      console.error("Failed to load font for threejs-glyph-lab demo:", err);
    }
  }

  function resize() {
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }

  function animate(time) {
    resize();

    const t = time * 0.001;
    const motion = Number(motionInput.value) * 0.04;
    if (pointsMesh && lineMesh && basePointPositions) {
      const posAttr = pointsMesh.geometry.getAttribute("position");
      const linePos = lineMesh.geometry.getAttribute("position");
      const basePointData = basePointPositions.data;
      const meta = basePointPositions.meta;

      for (let i = 0; i < meta.length; i++) {
        const ix = i * 3;
        const wobble = Math.sin(t * 2.2 + meta[i].phase) * motion;
        posAttr.array[ix] = basePointData[ix];
        posAttr.array[ix + 1] = basePointData[ix + 1] + wobble * 0.25;
        posAttr.array[ix + 2] = meta[i].baseZ + wobble;
      }
      posAttr.needsUpdate = true;

      // Start from the original line positions each frame so the mesh doesn't drift.
      for (let i = 0; i < linePos.array.length; i += 6) {
        linePos.array[i] = baseLinePositions[i];
        linePos.array[i + 1] = baseLinePositions[i + 1];
        linePos.array[i + 2] = baseLinePositions[i + 2] + Math.sin(t * 1.9 + i * 0.004) * motion * 0.22;
        linePos.array[i + 3] = baseLinePositions[i + 3];
        linePos.array[i + 4] = baseLinePositions[i + 4];
        linePos.array[i + 5] = baseLinePositions[i + 5] + Math.sin(t * 1.9 + (i + 3) * 0.004) * motion * 0.22;
      }
      linePos.needsUpdate = true;
    }

    group.rotation.y = Math.sin(t * 0.4) * 0.26;
    key.position.x = Math.cos(t * 0.7) * 280;
    rim.position.z = Math.sin(t * 0.6) * 260;

    controls.update();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }

  fontSelect.addEventListener("change", boot);
  textInput.addEventListener("input", scheduleRebuild);
  sizeInput.addEventListener("input", scheduleRebuild);
  depthInput.addEventListener("input", scheduleRebuild);
  densityInput.addEventListener("input", scheduleRebuild);
  onCurveToggle.addEventListener("change", applyPointFilters);
  offCurveToggle.addEventListener("change", applyPointFilters);

  boot();
  requestAnimationFrame(animate);
</script>
<script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
