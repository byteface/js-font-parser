<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Path Runner</title>
  <style>
    :root { --ink:#ebf7ff; --muted:#9cb8cf; --line:rgba(138,205,255,.35); }
    body{margin:0;color:var(--ink);font-family:"Avenir Next",sans-serif;background:radial-gradient(circle at 18% 12%, #22406f 0, transparent 38%),linear-gradient(140deg,#050a14,#111f33)}
    .wrap{width:min(1220px,calc(100vw - 20px));margin:10px auto 20px;display:grid;grid-template-columns:320px 1fr;gap:12px}
    .panel{border:1px solid var(--line);border-radius:12px;background:rgba(8,20,35,.74);padding:12px}
    h1{margin:0 0 6px;font-size:22px} p{margin:0 0 12px;color:var(--muted);font-size:13px}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:10px}
    select,input[type="text"],input[type="range"]{width:100%;margin-top:6px}
    select,input[type="text"]{border:1px solid var(--line);border-radius:8px;background:#081424;color:var(--ink);padding:8px 10px}
    .row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.v{min-width:38px;text-align:right;color:#d3efff}
    .status{font-size:12px;color:#c6e9ff;min-height:16px}
    canvas{width:100%;height:min(74vh,680px);display:block;border:1px solid var(--line);border-radius:12px;background:linear-gradient(#040a13,#0b1728)}
    @media (max-width:940px){.wrap{grid-template-columns:1fr}canvas{height:min(60vh,560px)}}
  </style>
</head>
<body>
<div data-nav="main"></div>
<div class="wrap">
  <section class="panel">
    <h1>Path Runner</h1>
    <p>A tracer runs along glyph contours, pauses at control nodes, then continues.</p>
    <label>Font <select id="fontSelect"></select></label>
    <label>Character <input id="charInput" type="text" value="B" maxlength="2" /></label>
    <label class="row">Speed <span id="speedVal" class="v"></span><input id="speedInput" type="range" min="1" max="18" value="7" /></label>
    <label class="row">Pause (node) <span id="pauseVal" class="v"></span><input id="pauseInput" type="range" min="0" max="34" value="10" /></label>
    <label class="row">Glow <span id="glowVal" class="v"></span><input id="glowInput" type="range" min="3" max="28" value="12" /></label>
    <div class="status" id="status">Loading…</div>
  </section>
  <canvas id="stage"></canvas>
</div>

<script type="module">
import { FontParser } from '../dist/data/FontParser.js';
import { getFontList } from '../tools/shared/font-catalog.js';
import { collectGlyphPoints, splitContours, drawGlyphPath, getBounds, transformPoints, sampleContour } from './shared/glyph-helpers.js';

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const fontSelect = document.getElementById('fontSelect');
const charInput = document.getElementById('charInput');
const speedInput = document.getElementById('speedInput');
const pauseInput = document.getElementById('pauseInput');
const glowInput = document.getElementById('glowInput');
const speedVal = document.getElementById('speedVal');
const pauseVal = document.getElementById('pauseVal');
const glowVal = document.getElementById('glowVal');
const statusEl = document.getElementById('status');

let dpr = 1;
let font = null;
let contours = [];
let route = [];
let cursor = 0;
let pauseTimer = 0;

const fonts = [...getFontList('allGlyphs').slice(0, 18), ...getFontList('demoCore')]
  .filter((f) => !/2006 Team/i.test(f.name))
  .filter((f, i, arr) => arr.findIndex((x) => x.url === f.url) === i);
for (const f of fonts) {
  const o = document.createElement('option'); o.value = f.url; o.textContent = f.name; fontSelect.appendChild(o);
}
const preferred = fonts.find((f) => /Noto Sans|DiscoMo|JoeJack/i.test(f.name));
if (preferred) fontSelect.value = preferred.url;

function setVals() {
  speedVal.textContent = speedInput.value;
  pauseVal.textContent = pauseInput.value;
  glowVal.textContent = glowInput.value;
}

function resize() {
  dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  const r = canvas.getBoundingClientRect();
  canvas.width = Math.round(r.width * dpr);
  canvas.height = Math.round(r.height * dpr);
  rebuild();
}

function rebuild() {
  if (!font) return;
  const ch = Array.from(charInput.value || 'B')[0] || 'B';
  const gi = font.getGlyphIndexByChar(ch) ?? font.getGlyphIndexByChar('A') ?? 0;
  const glyph = font.getGlyph(gi);
  if (!glyph) return;
  const pts = collectGlyphPoints(glyph);
  const b = getBounds(pts);
  if (!b) return;
  const scale = Math.min((canvas.width * 0.62) / Math.max(1, b.width), (canvas.height * 0.62) / Math.max(1, b.height));
  const transformed = transformPoints(pts, -((b.minX + b.maxX) * 0.5), -((b.minY + b.maxY) * 0.5), scale, true)
    .map((p) => ({ ...p, x: p.x + canvas.width * 0.5, y: p.y + canvas.height * 0.5 }));
  contours = splitContours(transformed);
  route = [];
  for (const contour of contours) {
    const sampled = sampleContour(contour, 0.08);
    route.push(...sampled);
  }
  cursor = 0;
  pauseTimer = 0;
  statusEl.textContent = `Glyph ${ch} | sampled route ${route.length} steps`;
}

function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
  g.addColorStop(0, '#040a13');
  g.addColorStop(1, '#0b1627');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawFrame(dt) {
  drawBackground();

  ctx.save();
  drawGlyphPath(ctx, contours);
  ctx.fillStyle = 'rgba(95,211,255,0.11)';
  ctx.fill('evenodd');
  ctx.lineWidth = 1.6 * dpr;
  ctx.strokeStyle = 'rgba(117,220,255,0.82)';
  ctx.stroke();
  ctx.restore();

  if (!route.length) return;

  if (pauseTimer > 0) {
    pauseTimer -= dt;
  } else {
    const speed = Number(speedInput.value) * 0.33;
    cursor += speed * dt * 60;
    if (cursor >= route.length) cursor -= route.length;
    const p = route[Math.floor(cursor)];
    if (p && p.isNode) {
      pauseTimer = Number(pauseInput.value) / 100;
    }
  }

  const idx = Math.floor(cursor) % route.length;
  const head = route[idx];
  const trail = 150;
  ctx.save();
  for (let i = 0; i < trail; i++) {
    const j = (idx - i + route.length) % route.length;
    const p = route[j];
    const a = 1 - i / trail;
    ctx.beginPath();
    ctx.fillStyle = `rgba(245,157,179,${a * 0.35})`;
    ctx.arc(p.x, p.y, (1.4 + a * 2.2) * dpr, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  const glow = Number(glowInput.value) * dpr;
  ctx.save();
  ctx.beginPath();
  ctx.fillStyle = 'rgba(255,232,242,0.95)';
  ctx.shadowColor = 'rgba(245,157,179,0.95)';
  ctx.shadowBlur = glow;
  ctx.arc(head.x, head.y, 4.6 * dpr, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.font = `${Math.round(13 * dpr)}px sans-serif`;
  ctx.fillStyle = '#cde8ff';
  ctx.fillText(`route ${idx}/${route.length}  pause ${Math.max(0, pauseTimer).toFixed(2)}s`, 20 * dpr, canvas.height - 20 * dpr);
  ctx.restore();
}

let last = 0;
function tick(ts) {
  if (!last) last = ts;
  const dt = Math.min(0.04, (ts - last) / 1000);
  last = ts;
  drawFrame(dt);
  requestAnimationFrame(tick);
}

async function loadFont() {
  try {
    statusEl.textContent = `Loading ${fontSelect.selectedOptions[0]?.textContent || ''}…`;
    font = await FontParser.load(fontSelect.value);
    rebuild();
  } catch (e) {
    statusEl.textContent = `Load failed: ${e?.message || e}`;
  }
}

fontSelect.addEventListener('change', loadFont);
charInput.addEventListener('input', rebuild);
[speedInput, pauseInput, glowInput].forEach((el) => el.addEventListener('input', setVals));
window.addEventListener('resize', resize);
setVals();
resize();
await loadFont();
requestAnimationFrame(tick);
</script>
<script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
