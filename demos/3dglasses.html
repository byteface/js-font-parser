<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>3D Glasses</title>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: Arial, sans-serif; }
        .label { padding: 12px 16px; }
    </style>
</head>
<body>
<div class="label">3D Glasses (red/cyan offset)</div>
<canvas id="myDrawing" width="1000" height="500"></canvas>
<script type="module">
    import { FontParserTTF } from '../dist/data/FontParserTTF.js';
    import { drawString } from './shared/glyph-render.js';

    const canvas = document.getElementById('myDrawing');
    const ctx = canvas.getContext('2d');

    FontParserTTF.load("../truetypefonts/JoeJack.ttf")
        .then(font => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawString(font, "BYTEFACE", canvas, {
                x: 120,
                y: 300,
                scale: 0.2,
                styles: {
                    'color': '#ff0033',
                    'stroke-color': '#ff0033',
                    'line-width': '1',
                    'opacity': '0.9'
                }
            });
            drawString(font, "BYTEFACE", canvas, {
                x: 130,
                y: 290,
                scale: 0.2,
                styles: {
                    'color': '#00e5ff',
                    'stroke-color': '#00e5ff',
                    'line-width': '1',
                    'opacity': '0.9'
                }
            });
        })
        .catch(err => console.error("Failed to load font:", err));
</script>
</body>
</html>
