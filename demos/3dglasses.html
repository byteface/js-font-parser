<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Glasses Anaglyph</title>
  <style>
    :root {
      --bg-0: #060b12;
      --bg-1: #0f1d2d;
      --ink: #e9f4ff;
      --muted: #9fb4c9;
      --panel: rgba(9, 22, 37, 0.7);
      --border: rgba(140, 190, 230, 0.28);
      --cyan: #15f0ff;
      --red: #ff355c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 18%, #143b61 0%, transparent 40%),
        radial-gradient(circle at 88% 8%, #5a1730 0%, transparent 44%),
        linear-gradient(140deg, var(--bg-0), var(--bg-1));
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }
    .wrap {
      width: min(1200px, calc(100vw - 24px));
      margin: 10px auto 24px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 14px;
    }
    .panel {
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 14px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 21px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .sub {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }
    label {
      display: block;
      margin: 0 0 10px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    input[type="text"],
    select,
    input[type="range"] {
      width: 100%;
      margin-top: 6px;
    }
    input[type="text"],
    select {
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(3, 12, 22, 0.7);
      padding: 8px 10px;
      outline: none;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
    }
    .value {
      min-width: 38px;
      text-align: right;
      color: #d7f0ff;
      font-size: 12px;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      margin-top: 8px;
      color: var(--ink);
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      min-height: 16px;
    }
    .stage {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(3, 10, 18, 0.82);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    canvas {
      display: block;
      width: 100%;
      height: min(70vh, 640px);
      background: linear-gradient(to bottom, #03080f 0%, #070f18 100%);
    }
    .legend {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    .chips {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .chip::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: -1px;
    }
    .chip.red::before { background: var(--red); box-shadow: 0 0 10px var(--red); }
    .chip.cyan::before { background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
    @media (max-width: 980px) {
      .wrap { grid-template-columns: 1fr; }
      canvas { height: min(58vh, 560px); }
    }
  </style>
</head>
<body>
<div data-nav="main"></div>
<div class="wrap">
  <section class="panel">
    <h1>Anaglyph Depth</h1>
    <p class="sub">Built for red/cyan glasses. The depth stack simulates stereo and volume instead of a flat two-layer offset.</p>

    <label>
      Font
      <select id="fontSelect"></select>
    </label>
    <label>
      Text
      <input id="textInput" type="text" value="BYTEFACE 3D" maxlength="42" />
    </label>

    <label class="row">
      Layer Depth
      <span id="depthValue" class="value"></span>
      <input id="depthInput" type="range" min="4" max="30" step="1" value="16" />
    </label>
    <label class="row">
      Eye Separation
      <span id="sepValue" class="value"></span>
      <input id="sepInput" type="range" min="2" max="34" step="1" value="11" />
    </label>
    <label class="row">
      Perspective
      <span id="perspValue" class="value"></span>
      <input id="perspInput" type="range" min="0" max="16" step="1" value="7" />
    </label>
    <label class="row">
      Motion
      <span id="wobbleValue" class="value"></span>
      <input id="wobbleInput" type="range" min="0" max="16" step="1" value="4" />
    </label>
    <label class="row">
      Scale
      <span id="scaleValue" class="value"></span>
      <input id="scaleInput" type="range" min="8" max="28" step="1" value="16" />
    </label>

    <label class="toggle"><input id="animateToggle" type="checkbox" checked /> Animate depth wobble</label>
    <div id="status" class="status">Loading font…</div>
  </section>

  <section class="stage">
    <canvas id="stage"></canvas>
    <div class="legend">
      <div class="chips">
        <span class="chip red">Left eye</span>
        <span class="chip cyan">Right eye</span>
      </div>
      <span>Tip: lower separation if the image is too aggressive.</span>
    </div>
  </section>
</div>

<script type="module">
  import { FontParser } from '../dist/data/FontParser.js';
  import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';
  import { getFontList } from '../tools/shared/font-catalog.js';

  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const fontSelect = document.getElementById('fontSelect');
  const textInput = document.getElementById('textInput');
  const statusEl = document.getElementById('status');

  const depthInput = document.getElementById('depthInput');
  const sepInput = document.getElementById('sepInput');
  const perspInput = document.getElementById('perspInput');
  const wobbleInput = document.getElementById('wobbleInput');
  const scaleInput = document.getElementById('scaleInput');
  const animateToggle = document.getElementById('animateToggle');

  const depthValue = document.getElementById('depthValue');
  const sepValue = document.getElementById('sepValue');
  const perspValue = document.getElementById('perspValue');
  const wobbleValue = document.getElementById('wobbleValue');
  const scaleValue = document.getElementById('scaleValue');

  const demoFonts = [
    ...getFontList('demoCore'),
    ...getFontList('variableFonts').slice(0, 4)
  ].filter((f, i, arr) => arr.findIndex((x) => x.url === f.url) === i);

  let font = null;
  let layout = [];
  let layoutAdvance = 0;
  let dpr = 1;
  let rafId = 0;

  function setValues() {
    depthValue.textContent = depthInput.value;
    sepValue.textContent = sepInput.value;
    perspValue.textContent = perspInput.value;
    wobbleValue.textContent = wobbleInput.value;
    scaleValue.textContent = (Number(scaleInput.value) / 100).toFixed(2);
  }

  function resize() {
    dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    const box = canvas.getBoundingClientRect();
    canvas.width = Math.max(2, Math.round(box.width * dpr));
    canvas.height = Math.max(2, Math.round(box.height * dpr));
    render(performance.now());
  }

  function rebuildLayout() {
    if (!font) return;
    const text = textInput.value || ' ';
    layout = font.layoutString(text, {
      gsubFeatures: ['liga'],
      scriptTags: ['DFLT', 'latn'],
      gpos: true,
      gposFeatures: ['kern', 'mark', 'mkmk', 'curs']
    });
    layoutAdvance = layout.reduce((sum, g) => sum + (g.xAdvance || 0), 0);
  }

  function drawScanlines() {
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.strokeStyle = '#8ec5ff';
    ctx.lineWidth = 1 * dpr;
    for (let y = 0; y < canvas.height; y += Math.round(4 * dpr)) {
      ctx.beginPath();
      ctx.moveTo(0, y + 0.5);
      ctx.lineTo(canvas.width, y + 0.5);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawAnaglyph(timeMs) {
    if (!font || layout.length === 0) return;
    const depth = Number(depthInput.value);
    const separation = Number(sepInput.value) * dpr;
    const perspective = Number(perspInput.value) * dpr;
    const wobbleAmp = Number(wobbleInput.value) * dpr;
    const scale = Number(scaleInput.value) / 100;
    const baseline = canvas.height * 0.64;
    const baseX = (canvas.width - layoutAdvance * scale * dpr) * 0.5;
    const animate = animateToggle.checked;
    const t = timeMs * 0.001;

    ctx.globalCompositeOperation = 'screen';
    for (let i = depth - 1; i >= 0; i--) {
      const k = i / Math.max(1, depth - 1);
      const z = 1 - k;
      const layerShiftX = (i - depth * 0.5) * perspective * 0.18;
      const layerShiftY = (i - depth * 0.5) * perspective * 0.09;
      const swing = animate ? Math.sin(t * 1.6 + i * 0.33) * wobbleAmp * z : 0;
      const eye = separation * (0.3 + z * 0.9);
      const alpha = 0.05 + z * 0.10;
      const blur = z * 12 * dpr;

      CanvasRenderer.drawLayout(font, layout, canvas, {
        x: baseX - eye + layerShiftX + swing,
        y: baseline + layerShiftY,
        scale,
        styles: {
          fillStyle: '#ff355c',
          strokeStyle: '#ff355c',
          globalAlpha: alpha,
          lineWidth: 1,
          shadowColor: '#ff355c',
          shadowBlur: blur
        }
      });

      CanvasRenderer.drawLayout(font, layout, canvas, {
        x: baseX + eye - layerShiftX - swing * 0.7,
        y: baseline - layerShiftY,
        scale,
        styles: {
          fillStyle: '#15f0ff',
          strokeStyle: '#15f0ff',
          globalAlpha: alpha,
          lineWidth: 1,
          shadowColor: '#15f0ff',
          shadowBlur: blur
        }
      });
    }

    // Fused center guide to reduce eye strain while preserving stereo edges.
    CanvasRenderer.drawLayout(font, layout, canvas, {
      x: baseX,
      y: baseline,
      scale,
      styles: {
        fillStyle: '#f4fbff',
        strokeStyle: '#f4fbff',
        globalAlpha: 0.06,
        lineWidth: 1
      }
    });
    ctx.globalCompositeOperation = 'source-over';
  }

  function render(timeMs = 0) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#01060d');
    grad.addColorStop(1, '#091624');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawScanlines();
    drawAnaglyph(timeMs);
  }

  async function loadSelectedFont() {
    const { value } = fontSelect;
    statusEl.textContent = `Loading ${fontSelect.selectedOptions[0]?.textContent || value}…`;
    try {
      font = await FontParser.load(value);
      rebuildLayout();
      statusEl.textContent = `Loaded. Glyphs: ${font.getNumGlyphs()}`;
      render(performance.now());
    } catch (err) {
      font = null;
      layout = [];
      statusEl.textContent = `Load failed: ${err?.message || err}`;
      render(performance.now());
    }
  }

  function tick(ts) {
    if (animateToggle.checked) render(ts);
    rafId = requestAnimationFrame(tick);
  }

  for (const item of demoFonts) {
    const option = document.createElement('option');
    option.value = item.url;
    option.textContent = item.name;
    fontSelect.appendChild(option);
  }
  const joeJack = demoFonts.find((f) => /JoeJack/i.test(f.name));
  if (joeJack) fontSelect.value = joeJack.url;

  setValues();
  window.addEventListener('resize', resize);

  const rerenderOnly = [depthInput, sepInput, perspInput, wobbleInput, scaleInput, animateToggle];
  for (const el of rerenderOnly) {
    el.addEventListener('input', () => {
      setValues();
      render(performance.now());
    });
  }
  textInput.addEventListener('input', () => {
    rebuildLayout();
    render(performance.now());
  });
  fontSelect.addEventListener('change', loadSelectedFont);

  resize();
  await loadSelectedFont();
  rafId = requestAnimationFrame(tick);

  window.addEventListener('beforeunload', () => {
    if (rafId) cancelAnimationFrame(rafId);
  });
</script>
<script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
