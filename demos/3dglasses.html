<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>3D Glasses</title>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: Arial, sans-serif; }
        .label { padding: 12px 16px; }
    </style>
</head>
<body>
<div data-nav="main" style="position:sticky;top:0;z-index:10;background:#f6f4f1;border-bottom:1px solid #e3e1db;padding:10px 16px;font-family:'Merriweather',serif;display:flex;gap:12px;align-items:center"><a href="../demos/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Demos</a><a href="../tools/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Tools</a></div>

<div class="label">3D Glasses (red/cyan offset)</div>
<canvas id="myDrawing" width="1000" height="500"></canvas>
<script type="module">
    import { FontParser } from '../dist/data/FontParser.js';
    import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';

    const canvas = document.getElementById('myDrawing');
    const ctx = canvas.getContext('2d');

    FontParser.load("../truetypefonts/JoeJack.ttf")
        .then(font => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            CanvasRenderer.drawString(font, "BYTEFACE", canvas, {
                x: 120,
                y: 300,
                scale: 0.2,
                styles: {
                    fillStyle: '#ff0033',
                    strokeStyle: '#ff0033',
                    lineWidth: '1',
                    globalAlpha: '0.9'
                }
            });
            CanvasRenderer.drawString(font, "BYTEFACE", canvas, {
                x: 130,
                y: 290,
                scale: 0.2,
                styles: {
                    fillStyle: '#00e5ff',
                    strokeStyle: '#00e5ff',
                    lineWidth: '1',
                    globalAlpha: '0.9'
                }
            });
        })
        .catch(err => console.error("Failed to load font:", err));
</script>
</body>
</html>
