<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>WOFF Demo</title>
</head>
<body>
<h1>WOFF Demo</h1>
<canvas id="myDrawing" width="800" height="600"></canvas>

<script type="module">
    import { FontParserWOFF } from '../dist/data/FontParserWOFF.js';
    import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';

    const canvas = document.getElementById('myDrawing');
    const ctx = canvas.getContext('2d');

    FontParserWOFF.load("https://cdn.jsdelivr.net/npm/opensans-font@1.0.0/OpenSans-Regular.woff")
        .then(font => {
            const glyph = font.getGlyphByChar("W");
            if (!glyph) {
                console.warn("No glyph for W");
                return;
            }
            CanvasRenderer.drawGlyphToContext(ctx, glyph, {
                x: 200,
                y: 400,
                scale: 0.3,
                styles: {
                    fillStyle: '#000000',
                    strokeStyle: '#000000',
                    lineWidth: '1',
                    globalAlpha: '1'
                }
            });
        })
        .catch(error => {
            console.error('Error loading WOFF:', error);
        });
</script>
</body>
</html>
