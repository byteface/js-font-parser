<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rigid Glyphs (Planck.js)</title>
  <style>
    :root { --bg:#101014; --ink:#f4f1ec; --muted:#b4a9a0; --panel:#1a1c22; --border:#2b2f3a; }
    body { margin:0; font-family:"IBM Plex Sans", system-ui, sans-serif; background:var(--bg); color:var(--ink); }
    header { padding:20px 22px 10px; }
    h1 { margin:0 0 6px; font-size:24px; }
    p { margin:0 0 12px; color:var(--muted); }
    .panel { display:flex; flex-wrap:wrap; gap:12px; padding:10px 22px 16px; align-items:center; }
    label { display:flex; flex-direction:column; gap:6px; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); }
    input, select { background:#151821; color:var(--ink); border:1px solid var(--border); border-radius:8px; padding:8px 10px; min-width:180px; }
    canvas { display:block; width:100vw; height:70vh; background:#0f1118; }
  </style>
</head>
<body>
  <header>
    <h1>Rigid Glyphs</h1>
    <p>Glyph outlines are rendered while the rigid bodies tumble in a physics world.</p>
  </header>
  <div class="panel">
    <label>Font
      <select id="fontSelect">
        <option value="../truetypefonts/DiscoMo.ttf">DiscoMo</option>
        <option value="../truetypefonts/devil-inside-font/DevilInside-G3xP.ttf">DevilInside</option>
        <option value="../truetypefonts/Quill.ttf">Quill</option>
      </select>
    </label>
    <label>Text
      <input id="textInput" value="RIGID" />
    </label>
    <label>Size
      <input id="sizeInput" type="range" min="80" max="220" value="140" />
    </label>
    <label>Gravity
      <input id="gravInput" type="range" min="2" max="20" value="8" />
    </label>
    <button id="resetBtn">Reset</button>
  </div>
  <canvas id="stage" width="1200" height="600"></canvas>

  <script src="https://unpkg.com/planck-js@0.3.0/dist/planck.min.js"></script>
  <script type="module">
    const planck = window.planck;
    import { FontParserTTF } from "../dist/data/FontParserTTF.js";
    import { CanvasRenderer } from "../dist/render/CanvasRenderer.js";
    import { Table } from "../dist/table/Table.js";

    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d");
    const fontSelect = document.getElementById("fontSelect");
    const textInput = document.getElementById("textInput");
    const sizeInput = document.getElementById("sizeInput");
    const gravInput = document.getElementById("gravInput");
    const resetBtn = document.getElementById("resetBtn");

    const scale = 30; // pixels per meter
    let world = null;
    let font = null;
    let bodies = [];

    function pxToWorld(v) { return v / scale; }
    function worldToPx(v) { return v * scale; }

    function glyphBounds(glyph) {
      const pts = glyph.points.slice(0, Math.max(0, glyph.getPointCount() - 2));
      const xs = pts.map(p => p.x);
      const ys = pts.map(p => p.y);
      return {
        minX: xs.length ? Math.min(...xs) : 0,
        maxX: xs.length ? Math.max(...xs) : 0,
        minY: ys.length ? Math.min(...ys) : 0,
        maxY: ys.length ? Math.max(...ys) : 0
      };
    }

    function setupWorld() {
      const gravity = Number(gravInput.value);
      world = planck.World({ gravity: planck.Vec2(0, -gravity) });
      const ground = world.createBody();
      ground.createFixture(planck.Edge(planck.Vec2(-50, 0), planck.Vec2(50, 0)));
    }

    function buildBodies() {
      bodies = [];
      const head = font.getTableByType(Table.head);
      const unitsPerEm = head?.unitsPerEm ?? 1000;
      const sizePx = Number(sizeInput.value);
      const glyphScale = sizePx / unitsPerEm;

      let cursorX = 60;
      const baseY = 420;
      for (const ch of Array.from(textInput.value || "")) {
        const glyph = font.getGlyphByChar(ch);
        if (!glyph) {
          cursorX += sizePx * 0.35;
          continue;
        }
        const bounds = glyphBounds(glyph);
        const w = Math.max(10, (bounds.maxX - bounds.minX) * glyphScale);
        const h = Math.max(10, (bounds.maxY - bounds.minY) * glyphScale);
        const body = world.createBody({
          type: "dynamic",
          position: planck.Vec2(pxToWorld(cursorX), pxToWorld(baseY)),
          angle: (Math.random() - 0.5) * 0.3
        });
        body.createFixture(planck.Box(pxToWorld(w / 2), pxToWorld(h / 2)), { density: 1, friction: 0.5, restitution: 0.1 });
        bodies.push({ body, glyph, glyphScale, bounds });
        cursorX += w + 18;
      }
    }

    async function boot() {
      font = await FontParserTTF.load(fontSelect.value);
      setupWorld();
      buildBodies();
    }

    function reset() {
      setupWorld();
      buildBodies();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0f1118";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "#2c3140";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, worldToPx(0));
      ctx.lineTo(canvas.width, worldToPx(0));
      ctx.stroke();

      for (const item of bodies) {
        const { body, glyph, glyphScale, bounds } = item;
        const pos = body.getPosition();
        const angle = body.getAngle();

        ctx.save();
        ctx.translate(worldToPx(pos.x), worldToPx(pos.y));
        ctx.rotate(-angle);
        CanvasRenderer.drawGlyphToContext(ctx, glyph, {
          x: -(bounds.minX * glyphScale),
          y: (bounds.maxY * glyphScale),
          scale: glyphScale,
          styles: { fillStyle: "#f4f1ec", strokeStyle: "#b4a9a0", lineWidth: 1 }
        });
        ctx.restore();
      }
    }

    function tick() {
      if (world) {
        world.step(1 / 60);
        draw();
      }
      requestAnimationFrame(tick);
    }

    fontSelect.addEventListener("change", boot);
    textInput.addEventListener("input", reset);
    sizeInput.addEventListener("input", reset);
    gravInput.addEventListener("input", reset);
    resetBtn.addEventListener("click", reset);

    boot();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
