<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Three.js Tube Trails</title>
  <style>
    :root { --bg:#0f1016; --ink:#eef1f7; --muted:#aab5ce; --panel:#161a24; --border:#2a3247; }
    body { margin:0; font-family:"Space Grotesk", system-ui, sans-serif; background:var(--bg); color:var(--ink); }
    header { padding:20px 22px 10px; }
    h1 { margin:0 0 6px; font-size:24px; }
    p { margin:0 0 12px; color:var(--muted); }
    .panel { display:flex; flex-wrap:wrap; gap:12px; padding:10px 22px 16px; align-items:center; }
    label { display:flex; flex-direction:column; gap:6px; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); }
    input, select { background:#0f1320; color:var(--ink); border:1px solid var(--border); border-radius:8px; padding:8px 10px; min-width:180px; }
    canvas { display:block; width:100vw; height:70vh; }
  </style>
</head>
<body>
<div data-nav="main" style="position:sticky;top:0;z-index:10;background:#f6f4f1;border-bottom:1px solid #e3e1db;padding:10px 16px;font-family:'Merriweather',serif;display:flex;gap:12px;align-items:center"><a href="../demos/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Demos</a><a href="../tools/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Tools</a></div>

  <header>
    <h1>Three.js Tube Trails</h1>
    <p>Contours turned into flowing tubes with depth.</p>
  </header>
  <div class="panel">
    <label>Font
      <select id="fontSelect">
        <option value="../truetypefonts/DiscoMo.ttf">DiscoMo</option>
        <option value="../truetypefonts/devil-inside-font/DevilInside-G3xP.ttf">DevilInside</option>
        <option value="../truetypefonts/Quill.ttf">Quill</option>
      </select>
    </label>
    <label>Text
      <input id="textInput" value="TUBES" />
    </label>
    <label>Size
      <input id="sizeInput" type="range" min="80" max="220" value="140" />
    </label>
  </div>
  <canvas id="stage"></canvas>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "https://unpkg.com/three@0.158.0/examples/jsm/controls/OrbitControls.js";
    import { FontParser } from "../dist/data/FontParser.js";
    import { Table } from "../dist/table/Table.js";

    const canvas = document.getElementById("stage");
    const fontSelect = document.getElementById("fontSelect");
    const textInput = document.getElementById("textInput");
    const sizeInput = document.getElementById("sizeInput");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0f1016");
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
    camera.position.set(0, 120, 420);
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const light = new THREE.PointLight("#ffffff", 1.1, 1000);
    light.position.set(200, 200, 200);
    scene.add(light);

    let font = null;
    const group = new THREE.Group();
    scene.add(group);

    function splitContours(points) {
      const contours = [];
      let current = [];
      for (const p of points) {
        current.push(p);
        if (p.endOfContour) {
          contours.push(current);
          current = [];
        }
      }
      return contours;
    }

    function buildTubes(text) {
      group.clear();
      if (!font) return;
      const head = font.getTableByType(Table.head);
      const unitsPerEm = head?.unitsPerEm ?? 1000;
      const sizePx = Number(sizeInput.value);
      const scale = sizePx / unitsPerEm;
      let cursorX = 0;

      for (const ch of Array.from(text)) {
        const glyph = font.getGlyphByChar(ch);
        if (!glyph || !glyph.points) {
          cursorX += sizePx * 0.4;
          continue;
        }
        const pts = glyph.points.slice(0, Math.max(0, glyph.getPointCount() - 2));
        const contours = splitContours(pts);
        contours.forEach((contour, idx) => {
          const filtered = contour.filter((_, i) => i % 2 === 0);
          const curvePts = filtered.map(p => new THREE.Vector3((p.x + cursorX) * scale - 160, p.y * scale - 40, idx * 3));
          if (curvePts.length < 4) return;
          const curve = new THREE.CatmullRomCurve3(curvePts, true);
          const geom = new THREE.TubeGeometry(curve, 120, 1.2, 6, true);
          const mat = new THREE.MeshStandardMaterial({ color: idx % 2 ? 0x7fd0ff : 0x9ee3ff, roughness: 0.3, metalness: 0.1 });
          const mesh = new THREE.Mesh(geom, mat);
          group.add(mesh);
        });
        cursorX += glyph.advanceWidth * scale + 14;
      }
    }

    async function boot() {
      font = await FontParser.load(fontSelect.value);
      buildTubes(textInput.value);
    }

    function resize() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    function animate(time) {
      resize();
      group.rotation.y = time * 0.0002;
      group.rotation.x = Math.sin(time * 0.0002) * 0.2;
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    fontSelect.addEventListener("change", boot);
    textInput.addEventListener("input", () => buildTubes(textInput.value));
    sizeInput.addEventListener("input", () => buildTubes(textInput.value));

    boot();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
