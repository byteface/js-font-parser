<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feature Reveal</title>
  <style>
    :root { --ink:#eef8ff; --muted:#9db8ce; --line:rgba(140,204,255,.35); }
    body { margin:0; color:var(--ink); font-family:"Avenir Next",sans-serif; background:radial-gradient(circle at 10% 10%, #203f70 0, transparent 36%), linear-gradient(145deg,#050a14,#111e31); }
    .wrap{width:min(1240px, calc(100vw - 20px)); margin:10px auto 20px; display:grid; grid-template-columns:340px 1fr; gap:12px}
    .panel{border:1px solid var(--line); border-radius:12px; background:rgba(8,20,35,.74); padding:12px}
    h1{margin:0 0 6px;font-size:22px} p{margin:0 0 12px;color:var(--muted);font-size:13px}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:10px}
    select,input[type="text"]{width:100%;margin-top:6px;border:1px solid var(--line);border-radius:8px;background:#081424;color:var(--ink);padding:8px 10px}
    .toggle{display:flex;align-items:center;gap:8px;font-size:13px;margin-top:6px}
    .stageTag{font-size:12px;color:#bde8ff;background:rgba(90,160,220,.16);padding:4px 8px;border-radius:999px;display:inline-block;margin:2px 4px 0 0}
    canvas{width:100%;height:min(74vh,680px);display:block;border:1px solid var(--line);border-radius:12px;background:linear-gradient(#040a13,#0b1728)}
    .status{font-size:12px;color:#c8ebff;min-height:16px}
    @media (max-width:940px){.wrap{grid-template-columns:1fr}canvas{height:min(60vh,560px)}}
  </style>
</head>
<body>
<div data-nav="main"></div>
<div class="wrap">
  <section class="panel">
    <h1>Feature Reveal</h1>
    <p>Watch text transition through parse stages: raw glyphs, GSUB substitutions, then full GPOS positioning.</p>
    <label>Font <select id="fontSelect"></select></label>
    <label>Text <input id="textInput" type="text" value="office कक्षा مرحبا" /></label>
    <label class="toggle"><input id="autoPlay" type="checkbox" checked /> Auto cycle stages</label>
    <label class="toggle"><input id="showAnchors" type="checkbox" checked /> Highlight attachments / mark offsets</label>
    <div style="margin:8px 0 6px">
      <span class="stageTag">0 raw</span>
      <span class="stageTag">1 GSUB</span>
      <span class="stageTag">2 GPOS</span>
    </div>
    <div class="status" id="status">Loading…</div>
  </section>
  <canvas id="stage"></canvas>
</div>

<script type="module">
import { FontParser } from '../dist/data/FontParser.js';
import { CanvasRenderer } from '../dist/render/CanvasRenderer.js';
import { getFontList } from '../tools/shared/font-catalog.js';

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const fontSelect = document.getElementById('fontSelect');
const textInput = document.getElementById('textInput');
const autoPlay = document.getElementById('autoPlay');
const showAnchors = document.getElementById('showAnchors');
const statusEl = document.getElementById('status');

let dpr = 1;
let font = null;
let stage = 0;
let stageTime = 0;

const fonts = [...getFontList('featureMatrix'), ...getFontList('demoCore')]
  .filter((f, i, arr) => arr.findIndex((x) => x.url === f.url) === i)
  .slice(0, 18);
for (const f of fonts) {
  const o = document.createElement('option'); o.value = f.url; o.textContent = f.name; fontSelect.appendChild(o);
}

function resize() {
  dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  const r = canvas.getBoundingClientRect();
  canvas.width = Math.round(r.width * dpr);
  canvas.height = Math.round(r.height * dpr);
}

function layoutForStage(text, stageId) {
  if (stageId === 0) {
    const indices = font.getGlyphIndicesForString(text);
    return indices.map((gid) => ({ glyphIndex: gid, xAdvance: 600, xOffset: 0, yOffset: 0, yAdvance: 0 }));
  }
  if (stageId === 1) {
    const g = font.getGlyphIndicesForStringWithGsub(text, ['liga', 'rlig', 'ccmp', 'locl', 'calt'], ['DFLT', 'latn', 'arab', 'deva']);
    return g.map((gid) => ({ glyphIndex: gid, xAdvance: 600, xOffset: 0, yOffset: 0, yAdvance: 0 }));
  }
  return font.layoutStringAuto(text, { gpos: true, gposFeatures: ['kern', 'mark', 'mkmk', 'curs'] });
}

function drawGrid() {
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = '#84b5db';
  ctx.lineWidth = 1 * dpr;
  for (let y = 0; y < canvas.height; y += Math.round(26 * dpr)) {
    ctx.beginPath();
    ctx.moveTo(0, y + 0.5);
    ctx.lineTo(canvas.width, y + 0.5);
    ctx.stroke();
  }
  ctx.restore();
}

function drawStage(ts) {
  if (!font) return;
  const text = textInput.value || ' ';
  const layouts = [layoutForStage(text, 0), layoutForStage(text, 1), layoutForStage(text, 2)];

  const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bg.addColorStop(0, '#040a12');
  bg.addColorStop(1, '#0a1524');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawGrid();

  const labels = ['RAW glyph map', 'GSUB substitution', 'GPOS positioned'];
  const yStart = canvas.height * 0.24;
  const yStep = canvas.height * 0.25;
  const scale = 0.12;

  for (let i = 0; i < layouts.length; i++) {
    const y = yStart + i * yStep;
    const active = i === stage;
    const alpha = active ? 0.95 : 0.26;

    CanvasRenderer.drawLayout(font, layouts[i], canvas, {
      x: 36 * dpr,
      y,
      scale,
      styles: {
        fillStyle: active ? '#86edff' : '#7ea9c8',
        strokeStyle: active ? '#86edff' : '#7ea9c8',
        globalAlpha: alpha,
        lineWidth: 1
      }
    });

    ctx.fillStyle = active ? '#ffd5e4' : '#9eb9cf';
    ctx.font = `${Math.round(14 * dpr)}px sans-serif`;
    ctx.fillText(`${i}. ${labels[i]} (glyphs: ${layouts[i].length})`, 36 * dpr, y - 28 * dpr);

    if (showAnchors.checked && i === 2) {
      const l = layouts[i];
      let penX = 36 * dpr;
      for (const g of l) {
        const ox = penX + (g.xOffset || 0) * scale * dpr;
        const oy = y + (g.yOffset || 0) * scale * dpr;
        if ((g.xOffset || 0) !== 0 || (g.yOffset || 0) !== 0 || (g.xAdvance || 0) === 0) {
          ctx.beginPath();
          ctx.fillStyle = 'rgba(245,157,179,0.95)';
          ctx.arc(ox, oy, 2.3 * dpr, 0, Math.PI * 2);
          ctx.fill();
        }
        penX += (g.xAdvance || 0) * scale * dpr;
      }
    }
  }

  ctx.fillStyle = '#c4e5ff';
  ctx.font = `${Math.round(13 * dpr)}px sans-serif`;
  ctx.fillText(`stage ${stage} ${labels[stage]}  |  t=${(ts * 0.001).toFixed(1)}s`, 36 * dpr, canvas.height - 20 * dpr);
}

function tick(ts) {
  if (!stageTime) stageTime = ts;
  if (autoPlay.checked && ts - stageTime > 1400) {
    stage = (stage + 1) % 3;
    stageTime = ts;
  }
  drawStage(ts);
  requestAnimationFrame(tick);
}

async function loadFont() {
  try {
    statusEl.textContent = `Loading ${fontSelect.selectedOptions[0]?.textContent || ''}…`;
    font = await FontParser.load(fontSelect.value);
    stage = 0;
    stageTime = 0;
    statusEl.textContent = `Loaded | glyphs ${font.getNumGlyphs()}`;
  } catch (e) {
    statusEl.textContent = `Load failed: ${e?.message || e}`;
  }
}

fontSelect.addEventListener('change', loadFont);
textInput.addEventListener('input', () => { stageTime = 0; });
autoPlay.addEventListener('change', () => { stageTime = 0; });
showAnchors.addEventListener('change', () => {});
window.addEventListener('resize', resize);
resize();
await loadFont();
requestAnimationFrame(tick);
</script>
<script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
