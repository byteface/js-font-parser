<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hybrid: Physics + 3D</title>
  <style>
    :root { --bg:#0b0d14; --ink:#f2f5fb; --muted:#aab5ce; --panel:#141824; --border:#2a3247; }
    body { margin:0; font-family:"Space Grotesk", system-ui, sans-serif; background:var(--bg); color:var(--ink); }
    header { padding:20px 22px 10px; }
    h1 { margin:0 0 6px; font-size:24px; }
    p { margin:0 0 12px; color:var(--muted); }
    .panel { display:flex; flex-wrap:wrap; gap:12px; padding:10px 22px 16px; align-items:center; }
    label { display:flex; flex-direction:column; gap:6px; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); }
    input, select, button { background:#0f1320; color:var(--ink); border:1px solid var(--border); border-radius:8px; padding:8px 10px; min-width:160px; }
    canvas { display:block; width:100vw; height:70vh; }
  </style>
</head>
<body>
<div data-nav="main" style="position:sticky;top:0;z-index:10;background:#f6f4f1;border-bottom:1px solid #e3e1db;padding:10px 16px;font-family:'Merriweather',serif;display:flex;gap:12px;align-items:center"><a href="../demos/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Demos</a><a href="../tools/index.html" style="color:#2c3e50;text-decoration:none;font-weight:600">Tools</a></div>

  <header>
    <h1>Hybrid Physics + 3D</h1>
    <p>Planck.js for rigid bodies, Three.js for rendering the glyph points.</p>
  </header>
  <div class="panel">
    <label>Font
      <select id="fontSelect">
        <option value="../truetypefonts/DiscoMo.ttf">DiscoMo</option>
        <option value="../truetypefonts/devil-inside-font/DevilInside-G3xP.ttf">DevilInside</option>
        <option value="../truetypefonts/Quill.ttf">Quill</option>
      </select>
    </label>
    <label>Text
      <input id="textInput" value="HYBRID" />
    </label>
    <label>Gravity
      <input id="gravInput" type="range" min="2" max="16" value="8" />
    </label>
    <button id="resetBtn">Reset</button>
  </div>
  <canvas id="stage"></canvas>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.158.0/build/three.module.js" } }
  </script>
  <script src="https://unpkg.com/planck-js@0.3.0/dist/planck.min.js"></script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "https://unpkg.com/three@0.158.0/examples/jsm/controls/OrbitControls.js";
    import { FontParserTTF } from "../dist/data/FontParserTTF.js";
    import { Table } from "../dist/table/Table.js";

    const planck = window.planck;
    const canvas = document.getElementById("stage");
    const fontSelect = document.getElementById("fontSelect");
    const textInput = document.getElementById("textInput");
    const gravInput = document.getElementById("gravInput");
    const resetBtn = document.getElementById("resetBtn");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0b0d14");
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
    camera.position.set(0, 140, 420);
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const light = new THREE.PointLight("#ffffff", 1.2, 1000);
    light.position.set(200, 200, 200);
    scene.add(light);

    const scale = 30;
    let world = null;
    let font = null;
    const bodies = [];

    function pxToWorld(v) { return v / scale; }
    function worldToPx(v) { return v * scale; }

    function glyphBounds(glyph) {
      const pts = glyph.points.slice(0, Math.max(0, glyph.getPointCount() - 2));
      const xs = pts.map(p => p.x);
      const ys = pts.map(p => p.y);
      return {
        minX: xs.length ? Math.min(...xs) : 0,
        maxX: xs.length ? Math.max(...xs) : 0,
        minY: ys.length ? Math.min(...ys) : 0,
        maxY: ys.length ? Math.max(...ys) : 0
      };
    }

    function makePointCloud(glyph, glyphScale) {
      const pts = glyph.points.slice(0, Math.max(0, glyph.getPointCount() - 2));
      const positions = [];
      for (const p of pts) {
        positions.push(p.x * glyphScale, p.y * glyphScale, Math.sin(p.x * 0.02) * 10);
      }
      const geom = new THREE.BufferGeometry();
      geom.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({ color: 0x8cc7ff, size: 2.2 });
      return new THREE.Points(geom, mat);
    }

    function setupWorld() {
      const gravity = Number(gravInput.value);
      world = planck.World({ gravity: planck.Vec2(0, -gravity) });
      const ground = world.createBody();
      ground.createFixture(planck.Edge(planck.Vec2(-60, 0), planck.Vec2(60, 0)));
    }

    function buildBodies() {
      bodies.length = 0;
      scene.clear();
      scene.add(light);

      const head = font.getTableByType(Table.head);
      const unitsPerEm = head?.unitsPerEm ?? 1000;
      const sizePx = 140;
      const glyphScale = sizePx / unitsPerEm;

      let cursorX = 60;
      const baseY = 420;
      for (const ch of Array.from(textInput.value || "")) {
        const glyph = font.getGlyphByChar(ch);
        if (!glyph) {
          cursorX += sizePx * 0.35;
          continue;
        }
        const bounds = glyphBounds(glyph);
        const w = Math.max(10, (bounds.maxX - bounds.minX) * glyphScale);
        const h = Math.max(10, (bounds.maxY - bounds.minY) * glyphScale);
        const body = world.createBody({
          type: "dynamic",
          position: planck.Vec2(pxToWorld(cursorX), pxToWorld(baseY)),
          angle: (Math.random() - 0.5) * 0.3
        });
        body.createFixture(planck.Box(pxToWorld(w / 2), pxToWorld(h / 2)), { density: 1, friction: 0.4, restitution: 0.1 });

        const group = new THREE.Group();
        const points = makePointCloud(glyph, glyphScale);
        points.position.set(-bounds.minX * glyphScale, bounds.maxY * glyphScale, 0);
        group.add(points);
        scene.add(group);

        bodies.push({ body, group });
        cursorX += w + 18;
      }
    }

    async function boot() {
      font = await FontParserTTF.load(fontSelect.value);
      setupWorld();
      buildBodies();
    }

    function reset() {
      setupWorld();
      buildBodies();
    }

    function resize() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    function animate() {
      resize();
      if (world) {
        world.step(1 / 60);
        bodies.forEach(item => {
          const pos = item.body.getPosition();
          const angle = item.body.getAngle();
          item.group.position.set(worldToPx(pos.x) - 160, worldToPx(pos.y), 0);
          item.group.rotation.z = -angle;
        });
      }
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    fontSelect.addEventListener("change", boot);
    textInput.addEventListener("input", reset);
    gravInput.addEventListener("input", reset);
    resetBtn.addEventListener("click", reset);

    boot();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
