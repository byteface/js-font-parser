<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Particle Demo</title>
    <meta charset="utf-8">
    <style>
        body { margin: 0; background: #0d0f14; color: #e6e6e6; font-family: Arial, sans-serif; }
        #wrap { display: flex; flex-direction: column; align-items: center; padding: 24px; }
        canvas { border: 1px solid #222; background: #0b0d12; }
        .label { margin-bottom: 10px; }
    </style>
</head>
<body>
<div id="wrap">
    <div class="label">Particle demo (glyph points)</div>
    <canvas id="c" width="1000" height="600"></canvas>
</div>

<script type="module">
    import { FontParserTTF } from '../dist/data/FontParserTTF.js';
    import { Debug } from '../dist/utils/Debug.js';

    const DEBUG = false;
    Debug.enabled = DEBUG;

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const text = "HELLO WORLD";
    const scale = 0.09;
    const particles = [];
    let scatter = false;

    FontParserTTF.load("../truetypefonts/DiscoMo.ttf")
        .then(font => {
            buildParticles(font, text);
            setTimeout(() => { scatter = true; }, 5000);
            animate();
        })
        .catch(error => console.error("Failed to load font:", error));

    function buildParticles(font, str) {
        particles.length = 0;
        let x = 120;
        const y = 360;

        for (const ch of str) {
            const glyph = font.getGlyphByChar(ch);
            if (!glyph) {
                x += 20;
                continue;
            }

            for (let i = 0; i < glyph.getPointCount(); i++) {
                const p = glyph.getPoint(i);
                const px = x + p.x * scale;
                const py = y - p.y * scale;
                particles.push({
                    x: px,
                    y: py,
                    vx: (Math.random() - 0.5) * 0.8,
                    vy: (Math.random() - 0.5) * 0.8,
                    life: 1
                });
            }

            x += (glyph.advanceWidth * scale) + 10;
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#61dafb";

        for (const p of particles) {
            if (scatter) {
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.985;
                p.vy *= 0.985;
            }

            ctx.fillRect(p.x, p.y, 2, 2);
        }

        requestAnimationFrame(animate);
    }
</script>
</body>
</html>
