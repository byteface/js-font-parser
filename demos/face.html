<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Face</title>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: Arial, sans-serif; }
        .label { padding: 12px 16px; }
    </style>
</head>
<body>
<div class="label">Face (random letters)</div>
<canvas id="myDrawing" width="800" height="800"></canvas>
<script type="module">
    import { FontParserTTF } from '../dist/data/FontParserTTF.js';
    import { drawGlyphToContext } from './shared/glyph-render.js';

    const canvas = document.getElementById('myDrawing');
    const ctx = canvas.getContext('2d');
    const chars = "FACE";

    FontParserTTF.load("../truetypefonts/20FACES.TTF")
        .then(font => {
            ctx.translate(200, 300);
            const ch = chars[Math.floor(Math.random() * chars.length)];
            drawGlyphToContext(ctx, font.getGlyphByChar(ch), {
                x: 0,
                y: 0,
                scale: 0.5,
                styles: {
                    'color': '#ff0000',
                    'stroke-color': '#ff0000',
                    'opacity': '0.8',
                    'line-width': '1'
                }
            });
        })
        .catch(err => console.error("Failed to load font:", err));
</script>
</body>
</html>
