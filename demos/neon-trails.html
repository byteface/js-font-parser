<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Neon Glyph Trails</title>
  <style>
    :root { --bg:#05040a; --ink:#f6f1ff; --muted:#b9a7d8; --panel:#121025; --border:#2c2842; }
    body { margin:0; font-family:"Alegreya Sans", system-ui, sans-serif; color:var(--ink); background:radial-gradient(circle at 30% 20%, #35206b 0%, #160f30 40%, #06040f 100%); }
    header { padding:20px 22px 10px; }
    h1 { margin:0 0 6px; font-size:24px; }
    p { margin:0 0 12px; color:var(--muted); }
    .panel { display:flex; flex-wrap:wrap; gap:12px; padding:10px 22px 16px; align-items:center; }
    label { display:flex; flex-direction:column; gap:6px; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); }
    input, select { background:var(--panel); color:var(--ink); border:1px solid var(--border); border-radius:8px; padding:8px 10px; min-width:160px; }
    canvas { display:block; width:100vw; height:70vh; background:rgba(2,2,8,0.65); }
  </style>
</head>
<body>
<div data-nav="main"></div>

<header>
  <h1>Neon Glyph Trails</h1>
  <p>Glyph outlines become a living neon current with long-exposure trails.</p>
</header>
<div class="panel">
  <label>Font
    <select id="fontSelect">
      <option value="../truetypefonts/DiscoMo.ttf">DiscoMo</option>
      <option value="../truetypefonts/devil-inside-font/DevilInside-G3xP.ttf">DevilInside</option>
      <option value="../truetypefonts/Quill.ttf">Quill</option>
    </select>
  </label>
  <label>Text
    <input id="textInput" value="NEON" />
  </label>
  <label>Density
    <input id="densityInput" type="range" min="1" max="8" value="3" />
  </label>
  <label>Glow
    <input id="glowInput" type="range" min="1" max="40" value="18" />
  </label>
</div>
<canvas id="stage" width="1200" height="620"></canvas>

<script src="../dist-build/fontparser.min.js"></script>
<script type="module">
const { FontParser, CanvasRenderer, SVGFont } = window.FontParser;

  const canvas = document.getElementById("stage");
  const ctx = canvas.getContext("2d");
  const fontSelect = document.getElementById("fontSelect");
  const textInput = document.getElementById("textInput");
  const densityInput = document.getElementById("densityInput");
  const glowInput = document.getElementById("glowInput");

  let font = null;
  let segments = [];

  function splitContours(glyph) {
    const pts = glyph.points.slice(0, Math.max(0, glyph.getPointCount() - 2));
    const contours = [];
    let current = [];
    for (const p of pts) {
      current.push(p);
      if (p.endOfContour) {
        if (current.length > 1) contours.push(current);
        current = [];
      }
    }
    return contours;
  }

  function collectSegments(text, density) {
    if (!font) return [];
    const unitsPerEm = typeof font.getUnitsPerEm === "function" ? font.getUnitsPerEm() : 1000;
    const scale = (canvas.height * 0.45) / unitsPerEm;
    let cursorX = 60;
    const baseline = canvas.height * 0.72;
    const out = [];

    for (const ch of Array.from(text || "")) {
      const glyph = font.getGlyphByChar(ch);
      if (!glyph || !glyph.points) {
        cursorX += canvas.height * 0.12;
        continue;
      }
      const contours = splitContours(glyph);
      for (const contour of contours) {
        const sampled = contour.filter((_, i) => i % density === 0);
        if (sampled.length < 2) continue;
        for (let i = 0; i < sampled.length; i++) {
          const a = sampled[i];
          const b = sampled[(i + 1) % sampled.length];
          out.push({
            ax: cursorX + a.x * scale,
            ay: baseline - a.y * scale,
            bx: cursorX + b.x * scale,
            by: baseline - b.y * scale,
            phase: (i / sampled.length) * Math.PI * 2
          });
        }
      }
      cursorX += glyph.advanceWidth * scale + 10;
    }
    return out;
  }

  async function boot() {
    font = await FontParser.load(fontSelect.value);
    segments = collectSegments(textInput.value, Number(densityInput.value));
  }

  function rebuild() {
    segments = collectSegments(textInput.value, Number(densityInput.value));
  }

  function drawSegmentGlow(ax, ay, bx, by, width, alphaCore, alphaGlow) {
    ctx.strokeStyle = `rgba(145, 244, 255, ${alphaCore})`;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.stroke();

    ctx.strokeStyle = `rgba(170, 110, 255, ${alphaGlow})`;
    ctx.lineWidth = width * 2.8;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.stroke();
  }

  function frame(time) {
    const glow = Number(glowInput.value);
    ctx.fillStyle = "rgba(3,2,10,0.16)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.globalCompositeOperation = "lighter";
    ctx.shadowColor = "rgba(156, 216, 255, 0.8)";
    ctx.shadowBlur = glow * 0.9;
    for (const s of segments) {
      const wobA = Math.sin(time * 0.0012 + s.phase) * 1.2;
      const wobB = Math.cos(time * 0.0013 + s.phase * 1.2) * 1.2;
      const ax = s.ax + wobA;
      const ay = s.ay + wobB;
      const bx = s.bx + wobB;
      const by = s.by + wobA;
      const pulse = 0.55 + 0.45 * Math.sin(time * 0.001 + s.phase);
      const width = 1.1 + pulse * 1.5;
      drawSegmentGlow(ax, ay, bx, by, width, 0.38 + pulse * 0.34, 0.07 + pulse * 0.18);
    }
    ctx.globalCompositeOperation = "source-over";
    ctx.shadowBlur = 0;

    requestAnimationFrame(frame);
  }

  fontSelect.addEventListener("change", boot);
  textInput.addEventListener("input", rebuild);
  densityInput.addEventListener("input", rebuild);

  boot();
  requestAnimationFrame(frame);
</script>
<script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
