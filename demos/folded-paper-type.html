<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Folded Paper Type</title>
  <style>
    :root{--ink:#efebdf;--muted:#b8b09a;--line:rgba(222,205,168,.36)}
    body{margin:0;color:var(--ink);font-family:"Avenir Next",sans-serif;background:radial-gradient(circle at 14% 10%,#4a3b22 0,transparent 38%),linear-gradient(145deg,#1a150e,#2a2117)}
    .wrap{width:min(1240px,calc(100vw - 20px));margin:10px auto 18px;display:grid;grid-template-columns:320px 1fr;gap:12px}
    .panel{border:1px solid var(--line);border-radius:12px;background:rgba(28,22,14,.74);padding:12px}
    h1{margin:0 0 6px;font-size:22px}p{margin:0 0 12px;color:var(--muted);font-size:13px}
    label{display:block;color:var(--muted);font-size:12px;margin-bottom:10px}
    select,input{width:100%;margin-top:6px}
    select,input{background:#2d2317;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 10px}
    canvas{width:100%;height:min(74vh,680px);display:block;border:1px solid var(--line);border-radius:12px;background:linear-gradient(#1f1810,#2b2116)}
    .status{min-height:16px;font-size:12px;color:#e8ddc3}
    @media(max-width:940px){.wrap{grid-template-columns:1fr}canvas{height:min(60vh,560px)}}
  </style>
</head>
<body>
<div data-nav="main"></div>
<div class="wrap">
  <section class="panel">
    <h1>Folded Paper Type</h1>
    <p>Drag to fold the paper letter. Creases spring back slowly.</p>
    <label>Font <select id="fontSelect"></select></label>
    <label>Character <input id="charInput" maxlength="2" value="A" /></label>
    <label>Fold strength <input id="foldInput" type="range" min="2" max="24" value="10" /></label>
    <div class="status" id="status">Loading…</div>
  </section>
  <canvas id="stage" width="1360" height="760"></canvas>
</div>
<script src="../dist-build/fontparser.min.js"></script>
<script type="module">
const { FontParser } = window.FontParser;
import { getFontList } from '../tools/shared/font-catalog.js';
import { collectGlyphPoints, splitContours, drawGlyphPath, getBounds } from './shared/glyph-helpers.js';

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const fontSelect = document.getElementById('fontSelect');
const charInput = document.getElementById('charInput');
const foldInput = document.getElementById('foldInput');
const statusEl = document.getElementById('status');

let dpr = 1;
let font = null;
let points = [];
let contours = [];
let pointer = { down:false, x:0, y:0 };

const fonts = [...getFontList('demoCore'), ...getFontList('allGlyphs').slice(0, 6)]
  .filter((f, i, arr) => arr.findIndex((x) => x.url === f.url) === i)
  .filter((f) => !/2006 Team/i.test(f.name));
for (const f of fonts) {
  const o = document.createElement('option'); o.value = f.url; o.textContent = f.name; fontSelect.appendChild(o);
}

function resize() {
  dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  const r = canvas.getBoundingClientRect();
  canvas.width = Math.round(r.width * dpr);
  canvas.height = Math.round(r.height * dpr);
  rebuild();
}

function rebuild() {
  if (!font) return;
  const ch = Array.from(charInput.value || 'A')[0] || 'A';
  const gi = font.getGlyphIndexByChar(ch) ?? 0;
  const glyph = font.getGlyph(gi);
  if (!glyph) return;
  const raw = collectGlyphPoints(glyph);
  const b = getBounds(raw);
  if (!b) return;
  const s = Math.min((canvas.width * 0.6) / Math.max(1, b.width), (canvas.height * 0.6) / Math.max(1, b.height));
  const gx = (b.minX + b.maxX) * 0.5;
  const gy = (b.minY + b.maxY) * 0.5;
  points = raw.map((p, i) => ({
    x: (p.x - gx) * s + canvas.width * 0.5,
    y: (gy - p.y) * s + canvas.height * 0.5,
    ox: (p.x - gx) * s + canvas.width * 0.5,
    oy: (gy - p.y) * s + canvas.height * 0.5,
    vx: 0,
    vy: 0,
    onCurve: !!p.onCurve,
    endOfContour: !!p.endOfContour,
    foldBias: Math.sin(i * 0.12)
  }));
  contours = splitContours(points);
  statusEl.textContent = `Glyph ${ch} | points ${points.length}`;
}

function simulate() {
  const strength = Number(foldInput.value) * 0.1 * dpr;
  for (const p of points) {
    if (pointer.down) {
      const dx = p.x - pointer.x;
      const dy = p.y - pointer.y;
      const dist = Math.hypot(dx, dy) || 1;
      if (dist < 170 * dpr) {
        const push = (1 - dist / (170 * dpr)) * strength;
        const nx = dx / dist;
        const ny = dy / dist;
        p.vx += (nx * push + ny * push * p.foldBias) * 0.8;
        p.vy += (ny * push - nx * push * p.foldBias) * 0.8;
      }
    }
    p.vx += (p.ox - p.x) * 0.03;
    p.vy += (p.oy - p.y) * 0.03;
    p.vx *= 0.9;
    p.vy *= 0.9;
    p.x += p.vx;
    p.y += p.vy;
  }
  contours = splitContours(points);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#21190f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  drawGlyphPath(ctx, contours);
  const g = ctx.createLinearGradient(canvas.width * 0.2, canvas.height * 0.15, canvas.width * 0.85, canvas.height * 0.9);
  g.addColorStop(0, 'rgba(255,243,215,0.34)');
  g.addColorStop(1, 'rgba(210,170,122,0.24)');
  ctx.fillStyle = g;
  ctx.fill('evenodd');
  ctx.lineWidth = 1.8 * dpr;
  ctx.strokeStyle = 'rgba(255,232,187,0.88)';
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.strokeStyle = 'rgba(255,198,128,0.18)';
  ctx.lineWidth = 1 * dpr;
  for (let i = 0; i < points.length; i += 3) {
    const p = points[i];
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.ox, p.oy);
    ctx.stroke();
  }
  ctx.restore();
}

function frame() {
  if (points.length) simulate();
  draw();
  requestAnimationFrame(frame);
}

function pointerPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) * dpr, y: (e.clientY - r.top) * dpr };
}
canvas.addEventListener('pointerdown', (e) => { pointer.down = true; Object.assign(pointer, pointerPos(e)); });
canvas.addEventListener('pointermove', (e) => { if (!pointer.down) return; Object.assign(pointer, pointerPos(e)); });
canvas.addEventListener('pointerup', () => { pointer.down = false; });
canvas.addEventListener('pointerleave', () => { pointer.down = false; });

async function loadFont() {
  try {
    statusEl.textContent = `Loading ${fontSelect.selectedOptions[0]?.textContent || ''}…`;
    font = await FontParser.load(fontSelect.value);
    rebuild();
  } catch (e) {
    statusEl.textContent = `Load failed: ${e?.message || e}`;
  }
}

fontSelect.addEventListener('change', loadFont);
charInput.addEventListener('input', rebuild);
window.addEventListener('resize', resize);
resize();
await loadFont();
requestAnimationFrame(frame);
</script>
<script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
