<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>Morphing Letters</title>
    <meta charset="utf-8">
    <style>
        :root { color-scheme: light; }
        body {
            margin: 24px;
            font-family: "Georgia", "Times New Roman", serif;
            background: radial-gradient(circle at top, #f5f4ff 0%, #efeef8 45%, #e8e3f0 100%);
            color: #1b1b1b;
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; }
        .panel {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #d9d4e6;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(20, 10, 40, 0.08);
        }
        label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #5b5670;
        }
        input[type="text"], select {
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #cec7dd;
            font-size: 14px;
            min-width: 220px;
            background: #fbfaff;
        }
        input[type="range"] { width: 160px; }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #3b2f60;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
        }
        button.secondary { background: #7c68a4; }
        #stage {
            border-radius: 16px;
            padding: 18px;
            background: #ffffff;
            border: 1px solid #d9d4e6;
            min-height: 360px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6);
        }
        canvas {
            width: 100%;
            height: 360px;
            display: block;
        }
        .hint {
            margin-top: 10px;
            color: #5b5670;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div data-nav="main"></div>

    <h1>Morphing Letters</h1>
    <div class="panel">
        <label>
            Font
            <select id="fontSelect"></select>
        </label>
        <label>
            Word A
            <input id="wordA" type="text" value="ONE" />
        </label>
        <label>
            Word B
            <input id="wordB" type="text" value="TWO" />
        </label>
        <label>
            Morph Speed
            <input id="speedInput" type="range" min="1" max="10" value="5" />
        </label>
        <label>
            Size
            <input id="sizeInput" type="range" min="80" max="240" value="140" />
        </label>
        <label>
            Points
            <input id="pointInput" type="range" min="80" max="480" value="240" />
        </label>
        <label style="flex-direction:row;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:13px;">
            <input id="fillToggle" type="checkbox" checked />
            Show Fill
        </label>
        <label style="flex-direction:row;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:13px;">
            <input id="pointsToggle" type="checkbox" checked />
            Show Points
        </label>
        <button id="renderBtn">Render</button>
        <button id="swapBtn" class="secondary">Swap</button>
    </div>
    <div id="stage">
        <canvas id="canvas" width="1200" height="360"></canvas>
    </div>
    <div class="hint">This demo morphs point clouds between glyphs. For best results, use equal-length words.</div>

    <script src="../dist-build/fontparser.min.js"></script>
<script type="module">
const { FontParser, CanvasRenderer, SVGFont } = window.FontParser;
        import { createFontLoader, getSelectedFont, populateFontSelect } from "./shared/demo-scaffold.js";
        import { collectGlyphPoints, splitContours as splitGlyphContours, sampleContour } from "./shared/glyph-helpers.js";
        import { getFontList } from "../tools/shared/font-catalog.js";

        const fontSelect = document.getElementById("fontSelect");
        const wordAInput = document.getElementById("wordA");
        const wordBInput = document.getElementById("wordB");
        const speedInput = document.getElementById("speedInput");
        const sizeInput = document.getElementById("sizeInput");
        const pointInput = document.getElementById("pointInput");
        const fillToggle = document.getElementById("fillToggle");
        const pointsToggle = document.getElementById("pointsToggle");
        const renderBtn = document.getElementById("renderBtn");
        const swapBtn = document.getElementById("swapBtn");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const dedupeFonts = (list) => {
            const seen = new Set();
            const out = [];
            for (const item of list) {
                if (!item || !item.url || seen.has(item.url)) continue;
                seen.add(item.url);
                out.push(item);
            }
            return out;
        };

        const fonts = dedupeFonts([
            ...getFontList("demoCore"),
            ...getFontList("kerning").slice(0, 8),
            ...getFontList("allGlyphs").slice(0, 20)
        ]);
        const loadFont = createFontLoader(FontParser.load);
        let font = null;
        let animId = null;

        function getScale(font, sizePx) {
            const unitsPerEm = typeof font.getUnitsPerEm === "function" ? font.getUnitsPerEm() : 1000;
            return sizePx / unitsPerEm;
        }

        function contourLength(points) {
            if (!points || points.length < 2) return 0;
            let len = 0;
            for (let i = 0; i < points.length; i++) {
                const a = points[i];
                const b = points[(i + 1) % points.length];
                len += Math.hypot(b.x - a.x, b.y - a.y);
            }
            return len;
        }

        function contourArea(points) {
            if (!points || points.length < 3) return 0;
            let area = 0;
            for (let i = 0; i < points.length; i++) {
                const a = points[i];
                const b = points[(i + 1) % points.length];
                area += (a.x * b.y) - (b.x * a.y);
            }
            return Math.abs(area) * 0.5;
        }

        function resampleClosedContour(points, targetCount) {
            if (!points || points.length === 0 || targetCount <= 0) return [];
            if (points.length === 1) {
                return [{ x: points[0].x, y: points[0].y, onCurve: true, endOfContour: true }];
            }

            const cumulative = [0];
            for (let i = 0; i < points.length; i++) {
                const a = points[i];
                const b = points[(i + 1) % points.length];
                cumulative.push(cumulative[cumulative.length - 1] + Math.hypot(b.x - a.x, b.y - a.y));
            }
            const total = cumulative[cumulative.length - 1];
            if (total <= 1e-6) {
                return Array.from({ length: targetCount }, (_, i) => ({
                    x: points[0].x,
                    y: points[0].y,
                    onCurve: true,
                    endOfContour: i === targetCount - 1
                }));
            }

            const out = [];
            for (let i = 0; i < targetCount; i++) {
                const d = (i / targetCount) * total;
                let seg = 0;
                while (seg < points.length && cumulative[seg + 1] < d) seg++;
                const a = points[seg % points.length];
                const b = points[(seg + 1) % points.length];
                const segStart = cumulative[seg];
                const segLen = Math.max(1e-6, cumulative[seg + 1] - segStart);
                const t = (d - segStart) / segLen;
                out.push({
                    x: a.x + (b.x - a.x) * t,
                    y: a.y + (b.y - a.y) * t,
                    onCurve: true,
                    endOfContour: i === targetCount - 1
                });
            }
            return out;
        }

        function rotateArray(arr, shift) {
            const n = arr.length;
            if (!n) return arr;
            const k = ((shift % n) + n) % n;
            if (k === 0) return arr.slice();
            return arr.slice(k).concat(arr.slice(0, k));
        }

        function bestShiftToMatch(a, b) {
            const n = Math.min(a.length, b.length);
            if (n <= 1) return 0;
            const step = Math.max(1, Math.floor(n / 80));
            let bestShift = 0;
            let bestScore = Infinity;
            for (let shift = 0; shift < n; shift += step) {
                let score = 0;
                for (let i = 0; i < n; i += step) {
                    const bp = b[(i + shift) % n];
                    const ap = a[i];
                    const dx = bp.x - ap.x;
                    const dy = bp.y - ap.y;
                    score += dx * dx + dy * dy;
                }
                if (score < bestScore) {
                    bestScore = score;
                    bestShift = shift;
                }
            }
            return bestShift;
        }

        function samplePoints(glyph, targetCount) {
            const raw = collectGlyphPoints(glyph);
            const contours = splitGlyphContours(raw);
            if (!contours.length) return [];

            const sampledContours = contours
                .map((contour) => sampleContour(contour, 0.12))
                .filter((contour) => contour.length >= 3);
            if (!sampledContours.length) return [];

            // Keep morph stable by targeting the dominant (outer) contour.
            let dominant = sampledContours[0];
            let best = contourArea(dominant);
            for (let i = 1; i < sampledContours.length; i++) {
                const area = contourArea(sampledContours[i]);
                if (area > best) {
                    best = area;
                    dominant = sampledContours[i];
                }
            }
            return resampleClosedContour(dominant, targetCount);
        }

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        function makeGlyph(points) {
            return {
                points,
                getPoint(i) { return points[i]; },
                getPointCount() { return points.length; }
            };
        }

        function drawPointGlyph(points, x, y, scale, color) {
            const glyph = makeGlyph(points);
            CanvasRenderer.drawGlyphToContext(ctx, glyph, {
                x,
                y,
                scale,
                styles: {
                    fillStyle: fillToggle.checked ? "rgba(59,47,96,0.22)" : "rgba(0,0,0,0)",
                    strokeStyle: color,
                    lineWidth: 2
                }
            });

            if (!pointsToggle.checked) return;
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, -scale);
            ctx.fillStyle = color;
            for (const p of points) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 8 / scale, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function buildMorphPoints(sampleA, sampleB, t) {
            const n = Math.min(sampleA.length, sampleB.length);
            const points = new Array(n);
            for (let i = 0; i < n; i++) {
                const a = sampleA[i];
                const b = sampleB[i];
                points[i] = {
                    x: lerp(a.x, b.x, t),
                    y: lerp(a.y, b.y, t),
                    onCurve: true,
                    endOfContour: i === n - 1
                };
            }
            return points;
        }

        function clear() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fdfcff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function normalizeWord(word) {
            return word.toUpperCase().replace(/\s+/g, "");
        }

        function render() {
            if (!font) return;
            const wordA = normalizeWord(wordAInput.value);
            const wordB = normalizeWord(wordBInput.value);
            if (!wordA || !wordB) return;
            const maxLen = Math.max(wordA.length, wordB.length);
            const a = wordA.padEnd(maxLen, " ");
            const b = wordB.padEnd(maxLen, " ");

            const sizePx = Number(sizeInput.value);
            const scale = getScale(font, sizePx);
            const targetPoints = Number(pointInput.value);
            const speed = Number(speedInput.value);

            const glyphPairs = [];
            for (let i = 0; i < maxLen; i++) {
                const ga = font.getGlyphByChar(a[i]) || font.getGlyphByChar(" ");
                const gb = font.getGlyphByChar(b[i]) || font.getGlyphByChar(" ");
                if (!ga || !gb) continue;
                const sampleA = samplePoints(ga, targetPoints);
                const sampleB = samplePoints(gb, targetPoints);
                if (!sampleA.length || !sampleB.length) continue;
                const shift = bestShiftToMatch(sampleA, sampleB);
                const alignedB = rotateArray(sampleB, shift);
                glyphPairs.push({
                    sampleA,
                    sampleB: alignedB,
                    advance: (ga.advanceWidth + gb.advanceWidth) * 0.5 * scale
                });
            }

            let t = 0;
            let dir = 1;

            const draw = () => {
                clear();
                const baseline = canvas.height * 0.68;
                let penX = 80;
                const color = "#3b2f60";

                glyphPairs.forEach((pair) => {
                    const points = buildMorphPoints(pair.sampleA, pair.sampleB, t);
                    drawPointGlyph(points, penX, baseline, scale, color);
                    penX += pair.advance + 12;
                });

                t += dir * 0.008 * speed;
                if (t >= 1) { t = 1; dir = -1; }
                if (t <= 0) { t = 0; dir = 1; }
                animId = requestAnimationFrame(draw);
            };

            if (animId) cancelAnimationFrame(animId);
            draw();
        }

        async function boot() {
            const selected = getSelectedFont(fontSelect, fonts);
            font = await loadFont(selected.url);
            render();
        }

        renderBtn.addEventListener("click", render);
        swapBtn.addEventListener("click", () => {
            const a = wordAInput.value;
            wordAInput.value = wordBInput.value;
            wordBInput.value = a;
            render();
        });
        fontSelect.addEventListener("change", boot);
        fillToggle.addEventListener("change", render);
        pointsToggle.addEventListener("change", render);

        populateFontSelect(fontSelect, fonts);
        boot();
    </script>
  <script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
