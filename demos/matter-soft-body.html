<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matter Soft Glyph</title>
  <style>
    body{margin:0;background:#090a12;color:#f6f7ff;font-family:"Avenir Next",sans-serif}
    canvas{display:block;width:100vw;height:100vh;background:radial-gradient(circle at 30% 10%,#1a2240,#090a12 56%)}
    .ui{position:fixed;top:56px;left:12px;z-index:10;background:rgba(9,11,20,.82);padding:10px;border-radius:10px;border:1px solid #303a67;display:flex;gap:8px;align-items:center}
    select,input,button{background:#171d34;color:#fff;border:1px solid #3a4778;border-radius:6px;padding:6px}
    button{cursor:pointer}
  </style>
</head>
<body>
<div data-nav="main"></div>
<div class="ui">
  <label>Font <select id="font"></select></label>
  <label>Glyph <input id="char" value="R" maxlength="2" size="2"></label>
  <button id="nudge">Nudge</button>
</div>
<canvas id="cv"></canvas>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
<script src="../dist-build/fontparser.min.js"></script>
<script type="module">
  import { CREATIVE_FONTS, populateCreativeFonts, loadFontByUrl, getGlyphGeometry } from './shared/creative-kit.js';

  const { Engine, Composite, Bodies, Constraint, Runner, Body } = Matter;
  const canvas = document.getElementById('cv');
  const ctx = canvas.getContext('2d');
  const fontSel = document.getElementById('font');
  const charInput = document.getElementById('char');
  populateCreativeFonts(fontSel);

  const engine = Engine.create({ gravity: { x: 0, y: 0.55 } });
  const runner = Runner.create();
  Runner.run(runner, engine);

  let nodes = [];
  let links = [];
  let contours = [];
  let font = null;

  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width = Math.floor(w * Math.min(2, window.devicePixelRatio || 1));
    canvas.height = Math.floor(h * Math.min(2, window.devicePixelRatio || 1));
    ctx.setTransform(canvas.width / w, 0, 0, canvas.height / h, 0, 0);
  }

  function clearWorld() {
    Composite.clear(engine.world, false);
    const w = window.innerWidth;
    const h = window.innerHeight;
    Composite.add(engine.world, [
      Bodies.rectangle(w * 0.5, h + 20, w + 120, 40, { isStatic: true }),
      Bodies.rectangle(-20, h * 0.5, 40, h + 120, { isStatic: true }),
      Bodies.rectangle(w + 20, h * 0.5, 40, h + 120, { isStatic: true })
    ]);
    nodes = [];
    links = [];
  }

  async function rebuild() {
    clearWorld();
    font = await loadFontByUrl(fontSel.value || CREATIVE_FONTS[0].url);
    const g = getGlyphGeometry(font, (charInput.value || 'R')[0], {
      sizePx: Math.min(window.innerHeight * 0.58, 440),
      centerX: window.innerWidth * 0.5,
      centerY: window.innerHeight * 0.35
    });
    contours = g.contours;
    const map = new Map();
    for (const contour of g.contours) {
      for (const p of contour) {
        const key = `${Math.round(p.x)}:${Math.round(p.y)}`;
        if (map.has(key)) continue;
        const b = Bodies.circle(p.x, p.y, 4.4, { frictionAir: 0.02, restitution: 0.2, density: 0.004 });
        b.home = { x: p.x, y: p.y };
        map.set(key, b);
        nodes.push(b);
      }
    }
    Composite.add(engine.world, nodes);

    const uniq = [...nodes];
    for (let i = 0; i < uniq.length; i++) {
      const a = uniq[i];
      for (let j = i + 1; j < uniq.length; j++) {
        const b = uniq[j];
        const d = Math.hypot(a.position.x - b.position.x, a.position.y - b.position.y);
        if (d > 38) continue;
        const c = Constraint.create({ bodyA: a, bodyB: b, stiffness: 0.14, damping: 0.06, length: d });
        links.push(c);
      }
    }
    Composite.add(engine.world, links);
  }

  function draw() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = 'rgba(7,10,22,0.28)';
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = 'rgba(96,144,255,0.24)';
    ctx.lineWidth = 1;
    for (const c of links) {
      const a = c.bodyA.position;
      const b = c.bodyB.position;
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    }

    ctx.fillStyle = '#7de2ff';
    for (const n of nodes) {
      const dx = n.home.x - n.position.x;
      const dy = n.home.y - n.position.y;
      Body.applyForce(n, n.position, { x: dx * 0.00002, y: dy * 0.00002 });
      ctx.beginPath(); ctx.arc(n.position.x, n.position.y, 3.1, 0, Math.PI * 2); ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  document.getElementById('nudge').addEventListener('click', () => {
    for (const n of nodes) {
      Body.applyForce(n, n.position, { x: (Math.random() - 0.5) * 0.03, y: -Math.random() * 0.04 });
    }
  });
  fontSel.addEventListener('change', rebuild);
  charInput.addEventListener('input', rebuild);
  window.addEventListener('resize', async () => { resize(); await rebuild(); });

  resize();
  await rebuild();
  draw();
</script>
<script type="module" src="../tools/shared/main-nav.js"></script>
</body>
</html>
